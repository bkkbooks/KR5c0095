body:
  text: 宋鶴林彭耜纂集天下皆謂章第六十七天下皆謂我道大似不肖夫惟大故似不肖若肖久矣其細也夫御注曰肖物者小為物所肖者大道覆載萬物者也洋洋乎其大哉故似不肖若肖則道外有物豈得為大乎碧虛子陳景元曰肖似也天下之人皆言我道虛無廣大光而不耀盛德若愚無所象似猶如不賢我道虛無廣大不為下士所信故似不賢也若賢而使人稱美之不待于今亦已久矣若為人所稱美其道豈足為大耶細小也夫老子謂士成綺曰夫巧智神聖之人吾自以為脫焉此乃老氏不以賢美為貴久矣寧武子其智可及其愚不可及近之矣涑水司馬光曰言異於衆人潁濱蘇轍曰夫道曠然無形頽然無名充遍萬物而與物無一相似此其所以為大也若似於物則亦一物矣而何足大哉臨川王安石曰夫道之大則不可以名故似不肖小則可以名故若肖故曰若肖久矣其細也夫達真子曰凡以此肖彼則有形有體也有形有體則必有形體之所勝而不能為無敵之大也唯道無形無體凡所以言大者莫能勝若肖則為更大之所勝終不免細之名也故曰若肖久矣其細也夫黃茂材曰天下惟道為大又孰有肖似若有肖似則道亦是一物也何足以為道程大昌曰特不與俗肖而與道肖也為其不與世俗肖足以見其大我有三寶寶而持之一曰慈二曰儉三曰不敢為天下先夫慈故能勇儉故能廣不敢為天下先故能成器長今捨其慈且勇捨其儉且廣捨其後且先死矣碧虛子陳景元曰聖人以慈為行勇於濟物語曰仁者必有勇謂勇於救難水火可蹈不懼之謂也儉約其用者必能廣於賑施所謂節用而愛人也不敢先於天下則必能成器用之長易曰用九見群龍無首吉此所謂道大似不肖也潁濱蘇轍曰道以不似物為大故其蓮而為德則亦悶然以鈍為利以退為進不合於世俗今夫世俗貴勇敢尚廣大夸進鋭而吾之所寶則慈忍儉約廉退此三者皆世之所謂不肖者也世以勇決為賢而以慈忍為不及事不知勇決之易挫而慈忍之不可勝其終必至於勇也世以廣大蓋物而以儉約為陋不知廣大之易窮而儉約之易足其終必至於廣也世以進鋭為能而以不敢先為耻不知進鋭之多惡於人而不敢先之樂推於世其終卒為器長也蓋朴散而為器聖人用之則為官長自朴成器始有屬有長矣勇廣先三者人之所共疾也為衆所疾故常近於死臨川王安石曰慈則能柔柔則能勝天下之至堅故能勇儉則知足知足則常足故能廣不敢為天下先則物莫為之先故能成其器長勇廣先三者人之所共疾也為衆所疾故常近於死清源子劉驥曰夫道之至大然有三寶可以寶而持之慈以愛物應世之寶也儉以自愛修身之寶也不敢為天下先則挫鋭解紛體道之寶也慈則果敢於濟難故勇儉則寡欲而易足故廣不敢為天下先則不爭而天下莫能與之爭故能成器長若捨其慈且勇捨其儉且廣捨其後且先三者人之所共疾也則剛強之徒有死之道焉夫慈以戰則勝以守則固天將救之以慈衛之御注曰仁人無敵於天下故以戰則勝民愛其上若手足之捍頭目子弟之衛父兄效死而弗去故以守則固碧虛子陳景元曰三寶之中慈最為貴故偏嘆美也且慈兵入於敵之境也則人知有所庇矣兵至於國邑之郊不踐果稼不穴丘墓不殘積聚不焚室屋得人虜而厚歸之則人人悅之若孝子之見慈親餓隸之遇美食歸降者若強弩之射深谷也如是則何必陳兵於野戰而後勝重門擊柝以為守固哉天道福善禍淫善人則自天祐之吉無不利經曰天道無親常與善人所以天將救助之者以其主將能用慈仁衛護於士卒人民也此皆道大似不肖者也潁濱蘇轍曰以慈御物物之愛之如己父母雖為之效死而不辭故可以戰可以守天之將救是人也則開其心志使之無所不慈無所不慈則物皆為之衛矣達真子曰慈則衆無不歸故以戰則勝無不共力故以守則固凡天將拯救其人者必使有慈以衛之也葉夢得曰雖然我自處己易物無所不濟難故即三者推慈以為先而終復明之以為以戰則勝以守則固是今之所急也天若救斯民必使有為慈者出而衛之此老氏之所怛然有期於天下者歟清源子劉驥曰三寶之中慈最為貴所以再言之慈以愛人愛人者人常愛之為之效死可以無敵於天下故慈以戰則勝以守則固天將救之則使之無所不慈無所不慈則物皆為之衛矣黃茂材曰慈愛之人無害物之心物亦無害之者豈特戰則勝守則固哉物無害之則可以長生故曰天將救之以慈衛之程大昌曰曾子曰戒之戒之出乎爾者反乎爾者也我能慈人且為我勇故遇戰則勝遇守則固設有不及天且以其慈而加佑助焉去邠而岐周以興是其救也善為士章第六十八善為士者不武善戰者不怒善勝敵者不爭善用人者為之下穎濱蘇轍曰士當以武為本行之以怯若以武行武則死矣聖人不得已而後戰若出於怒是以我故殺人也天必殃之以吾不爭故能勝彼之爭若皆出於爭則未必勝矣人皆有相上之心故莫能相為用誠能下之則天下皆吾用也道真仁靜先生曹道沖曰勇而不武威而不怒不爭者勝貪先動者必敗謙下則人與為用忽慢者人不為力程大昌曰老氏論兵常惡乎爭勝於兩陳之交而貴夫圖全於未戰之前正其重用人命焉耳是謂不爭之德是謂用人之力是謂配天古之極涑水司馬光曰德與天合自生民以來無以加也黃茂材曰老子言兵皆有為而發故曰是謂配天古之極然非深知兵者安能言之熟論此篇之義正使太公穰苴孫武之儔亦不過此用兵有言章第六十九用兵有言吾不敢為主而為客不敢進寸而退尺是謂行無行攘無臂仍無敵執無兵御注曰感之者為主應之者為客迫而後動不得已而後起謂之應兵不嗜殺人故難進而易退碧虛子陳景元曰老氏痛當世用兵以好戰為本夫兵者必以先舉為主後應為客且聖人之兵常為不得已而用之故應敵而後起應敵而後起者所以常為客也進少而退多者是沈機密用重敵之意也夫行師在乎止敵貴乎不爭雖行止敵不行殺心既無殺心即我之師徒抱義以守故行無行也又將奮臂而先登則若無臂而可奮以其惡殺而尚慈也夫有道之君縱有凶暴之寇妄動而來則告之以文德示之以義兵彼必聞義而退自然無敵雖有仍引之威而無敵可引故曰仍無敵敵既遠退干戈戢藏雖有持執之儀而無兵可執故曰執無兵涑水司馬光曰主謂以強兵為己任客謂人加於己己不得已而應之潁濱蘇轍曰主造事者也客應敵者也進者有意於爭者也退者無意於爭者也無意於爭則雖用兵與不用均也苟無意於爭則雖在軍旅如無臂可攘無敵可因無兵可執而安有用兵之咎耶達真子曰不能不有其己不能不專其性莫甚於用兵也故用兵有言可以托其至道之心矣設若雖用兵之時猶不敢為主而為客則是不自有其己不自專其性心不事於殺伐者也不敢進寸而退尺心不勇於勝敵者也禍莫大於輕敵輕敵幾喪吾寶故抗兵相加哀者勝矣御注曰輕敵則好戰好戰是樂殺人也樂殺人者喪其慈而失仁民愛物之心不可得志於天下矣聖人用兵救民於水火之中取其殘而已神武不殺而以慈為寶故仁眇天下而無不懷義眇天下而無不畏是謂常勝碧虛子陳景元曰書曰撫我則后虐我則讎若然者則天下皆敵也一國亦吾敵也一鄉亦吾敵也一家亦吾敵也一身亦吾敵也故王者不遺卑小之臣即得萬國之歡心公侯不侮於鰥寡即得百姓之歡心志士不忘於修身即神悅而天樂然後可以全吾寶幾亡吾寶者何哉我本慈愛不樂殺人不得已而至於無敵非吾志也抗舉也夫兩國舉兵相加也哀者慈愛發於哀誠之謂也則由其君之有道也若夫上存慈愛之心不失使臣之禮下輸忠臣之節盡得事君之義則何向而不勝哉穎濱蘇轍曰聖人以慈為寶輕敵則輕戰輕戰則輕殺人喪其所以為慈矣兩敵相加而吾出於不得已則有哀心哀心見而天人助之雖欲不勝不可得矣道真仁靜先生曹道沖曰輕敵必敗之因也失計則死得計則生其所係之大者莫若於生與邦家之重非寶者何以兵相抗愛士則哀其臨敵以身視士卒不以鬬戰殺人貪功為樂必勝也黃茂村曰自周之衰大道不明人偽長而天真失天下之人溺於聲色嗜欲以喪其生者十常八九故曰輕敵者幾喪吾寶老子所以再三言之不已深哀其禍慘於兵矣吾言甚易知章第七十吾言甚易知甚易行天下莫能知莫能行御注曰道炳而易見也故載之言則甚易知要而易守也故見之事則甚易行孟子曰道若大路然豈難知哉故道無難而天下無不能有難不能者不知反求諸己耳碧虛子陳景元曰經曰常無欲以觀其妙又曰少則得又曰為無為事無事又曰不出户知天下不窺牖見天道又曰行不言之教並是無為分內簡易之道言則不煩行則不勞是易知易行也莫能知行者下士也潁濱蘇轍曰道之大復性而足而性之妙見於起居飲食之間耳聖人指此以示人豈不易知乎人能體此以應物豈不易行乎然世常患日用而不知知且不能而況行之乎王雱曰凡天地之難事皆起於捨本逐末與妄為構故內外交亂奇物滋出而智者不能勝也道真仁靜先生曹道沖曰至簡至易無出於道平易逍遙何可難行以其至簡非思慮擬議之能喻故莫能知以其至近非步驟遲速之能至故莫能行清源子劉驥曰天下莫能知莫能行者以其見善不明用心不剛敗道於有為喪生於多方言有宗事有君御注曰言不勝窮也而理為之本事不勝應也而道為之主順理而索循道而行天下無難矣碧虛子陳景元曰宗本也君主也百家之言雖殊途而同歸於理得理者忘言故言以不言為宗本萬緒之事雖異趣而同會于功成功而遣事故事以無事為君主此以不言無事為教豈不易知易行耶潁濱蘇轍曰言者道之筌也事者道之迹也使道可以言盡則聽言而足矣可以事見則考事而足矣唯言不能盡事不能見非舍言而求其宗遺事而求其君不可得也劉概曰天下莫能知吾之易而知其難者蓋有宗莫之知也天下莫能行吾之易而行其難者蓋有君莫之知也達真子曰天下適於詳而不能反約離其本而不能歸要故曰莫能知莫能行言有宗為言有宗主所謂約也事有君為事有君領所謂要也陳象古曰宗君強名也在知其要而已清源子劉驥曰百家之言不勝窮也當捨其言以求其意得意則言可忘忘言者事之宗也萬緒之事不勝應也當棄其事以求其理窮理則事無事無事者事之君也言得其宗事得其君則知一氣之動作為變化之樞機煉形中之神修神中之真內澄一景萬氣流行恍恍惚惚其中化物窈窈冥冥其中育精程大昌曰宗者族之總也君者臣之總也道者事之總也夫惟無知是以不吾知也御注曰小夫之智不離簡牘雖曰有知實無知也夫豈足以知道碧虛子陳景元曰不我知猶不知我也不知我之道大而謂似不肖也涑水司馬光曰有知則知道矣潁濱蘇轍曰蓋古之聖人無思無為而有漠然不自知者存焉此則思慮之所不及是以終莫吾知也黃茂材曰井蛙不可以語於海者拘於墟也夏蟲不可以語於冰者篤於時也曲士不可以語於道者束於教也豈非其無知故不吾知耶知我者稀則我貴矣御注曰有高世之行者見非于衆有獨智之慮者見驁于民故有以少為貴者涑水司馬光曰道大故知之者鮮潁濱蘇轍曰衆人之所能知亦不足貴矣臨川王安石曰中士聞道若存若亡下士聞道則大笑之惟其大笑故知我者稀惟其若存故知我者貴道真仁靜先生曹道沖曰知我者稀則我之道不與世相往來我乃貴矣若人皆知我則我不足貴也是以聖人被褐懷玉御注曰聖人藏于天而不自衒鬻潁濱蘇轍曰聖人外與人同而中獨異耳清源子劉驥曰被褐則和光同塵外與人同懷玉則抱道藴奇中與人異程大昌曰褐者日用之不可無舉世所共也玉者難得之貨富者所獨也知我者稀固足以見吾道之上矣而聖人不以自異也還以聖不可知之妙而藏諸日用共由之間以期乎人之皆能也此孔子所謂二三子以我為隱乎吾無隱乎爾者也知不知章第七十一知不知尚矣不知知病矣碧虛子陳景元曰夫聖人之稟氣純粹而天性高明內懷真知而萬事自悟雖能通知而不以知自矜是德之上也故曰知不知上夫中下之士受氣昏濁而屬性剛強內多機智而凡事夸大實不知道而強辨飾説以為知之是德之病也故曰不知知病此亦所謂知者不言而言者不知也涑水司馬光曰知之如不知則遠怨不知而強知則招患道真仁靜先生曹道沖曰雖知謙而曰不知是實勝於名故為上不知而曰知是名過於實故為病清源子劉驥曰無思無慮始知道無處無服始安道無從無道始得道所以至人無為大聖不作無知而無不知無為而無不為通於一而萬事畢其知出於不知故知不知尚矣衆人務多知而樂通物於不知而知之弊精神役思慮以文滅質以博溺心故不知知病矣黃茂材曰夫深知道者與道為一尚何有知哉此為知之之至若夫世人未嘗知道乃自以為知知之之病又甚於不知者焉夫唯病病是以不病聖人之不病以其病病是以不病御注曰知其愚者非大愚也知其惑者非大惑也大惑者終身不解大愚者終身不靈涑水司馬光曰病人能自知其病斯不甚病矣道真仁靜先生曹道沖曰能知病為病則終不為病聖人緣何不病聖人知病為病終日循省是以不病清源子劉驥曰聖人所以不病以病其病而去其病也民不畏威章第七十二民不畏威則大威至矣御注曰小人以小惡為無傷而弗去也故惡積而不可掩易曰荷校滅耳凶碧虛子陳景元曰大威謂死兆也君子有三畏畏天命畏大人畏聖人之言夫人立身以憂畏為本若以小惡為無傷而不憂畏遂積之盈貫以致乎大威至而不可逃也嚴君平曰大威已至乃始為善當是之時道德不能救天地不能解非天之罪也穎濱蘇轍曰夫性自有威高明光大赫然物莫能加此所謂大威也人常患溺於衆妄畏生死而憚得喪萬物之威雜然乘之終身惴栗之不暇雖有大威而無自知也苟誠知之一生死齊得喪坦然無所怖畏則大威熚然見於前矣劉概曰詩曰畏天之威于時保之蓋衆人不知畏天之威故大威至矣清源子劉驥曰世俗之人不知天命不畏天威以小惡為無傷而不知憂畏然積之足以滅身以至大威至而無所逃於天地之間大威謂死兆也黃茂材曰夫民冒險而行死亡有所不顧何威之畏不畏威則大威及之孰為大威不有人禍必有天殃是也無狹其所居無厭其所生夫惟不厭是以不厭御注曰居者性之宅人之性至大不可圍而曲士不可以語於道者狹其所居故也擴而充之則充滿天地包裹六極無自而不可孟子曰居天下之廣居生者氣之聚人之生通乎物之所造而厭其所生者旦晝之所為有梏亡之矣梏之反復則夜氣不足以存彼保合太和而無中道夭者無厭其所生故也碧虛子陳景元曰古本作狎狎習也所居謂所居之處也厭惡也所生謂道也言畏慎之人凡居處當擇善鄰無習惡友清靜自守使災禍莫干形全神王斯所謂畏慎之深也人不可厭惡其道當服勤尊仰則可以永保元吉也若縱其欲惡厭道慢德則禍不旋踵矣潁濱蘇轍曰性之大可以包絡天地彼不知者以四肢九竅為己守也守之而不厭是以見不出視聞不出聽蕞然其甚陋也故教之曰無狹其所居彼知之者知性之大而吾生之狹也則愀然厭之欲脫而不得不知有厭有慕之方囿於物也故教之曰無厭其所生夫惟聖人不狹不厭與人同生而與道同居無廣狹淨穢之辨既不厭生而後知生之無可厭也劉概曰無狹其所居德之地也無厭其所生德之本也德之地盡性也德之本至命也清源子劉驥曰無狹其所居無厭其所生所以畏威也居者性之宅也擴而充之無狹其所居則居天下之廣居與萬物同其情與虛無同其體生者氣之聚也寶而持之無厭其所生則含太虛之至精與天地合其德與曰月合其明曲士不可語於道或狹其所居或厭其所生也小智自私惑於存想狹其所居者也棄有著空蔽於斷滅厭其所生者也夫道不棄人人自棄道人若不厭道道亦不厭人故夫惟不厭是以不厭黃茂材曰無厭其所生欲其好生也夫能好生則能長保其生何厭之有程大昌曰不厭之一語方且重復言之者其一在上其一在下也夫惟不厭者君上不厭也是以不厭者民多賴也故曰夫惟不厭是以不厭也是以聖人自知不自見自愛不自貴故去彼取此御注曰聖人有自知之明而不自見以矜其能有自愛之仁而不自貴以臨物若是者處物不傷物物莫之能傷也方且樂天而無憂何威怒之足畏乎聖人之所去取抑可見矣碧虛子陳景元曰若夫去彼自見自貴之憍縱而取此自知自愛之畏威得其尊道奉天之理而天道亦不厭惡於人是故威罰外消而生道內足也穎濱蘇轍曰聖人雖自知之而不自見以示人雖自愛之而不自貴以眩人恐人之有厭有慕也厭慕之心未忘則猶有畏也畏去而後大威至矣道真仁靜先生曹道沖曰自知消息損益惟道是從不自見功能求顯於世保身自愛內自修鍊不自貴其身而耀俗彼謂外物此謂自真達真子曰所居不能無狹所生不能無厭者蓋由乎自見其自知之性自貴其自愛之心也唯雖自知也不自見雖自愛也不自貴則所居不狹而廣所生不厭而善故聖人去彼自知自愛之情取此不自見不自貴之心也黃茂村曰知者在心見者在目故知可自而見不可自愛者在我貴者在人故愛可自而貴不可自去彼去其自見自貴者也取此取其自知自愛者也道德真經集注卷之十六
