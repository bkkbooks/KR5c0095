body:
  text: 宋鶴林彭耜纂集以道佐人主章第三十以道佐人主者不以兵强天下其事好還御註曰孟子所謂反乎爾者潁濱蘇轍曰聖人用兵皆出不得已非不得已而欲以强勝天下雖或能勝其禍必還報之楚靈齊惛秦始皇漢武帝或以殺其身或以禍其子孫人之所毒鬼之所疾未有得免者也臨川王安石曰明則人報之幽則天報之殺人之父人亦殺其父殺人之兄人亦殺其兄人報之也師之所處荆棘生焉大軍之後必有凶年者天報之也劉概曰以道佐人主者不以兵强天下故孔子對衛靈公之問則曰俎豆之事則嘗聞之矣軍旅之事未之學也葉夢得曰古之善用兵者毒天下而民從之亡國而不失人心蓋知禍之端不在我非以是爲强也黃茂材曰使其勝之事且好還况有不勝者乎程大昌曰課其酬復其斃人乃以自斃也師之所處荆棘生焉大軍之後必有凶年御註曰下奪民力故荆棘生焉上違天時故有凶年穎濱蘇轍曰兵之所在民事廢故田不修用兵之後殺氣勝故年穀傷凡兵皆然而况以兵强天下者耶黃茂材曰師之所處田事廢故荆棘生大軍之後和氣傷故有凶年兵之爲人害如此故善者果而已矣不敢以取强焉御註曰以强勝人是謂凶德碧虚子陳景元曰兵之害物也人神共惡之然而明王聖主未嘗去者其所自來上矣庚桑子曰有以咽藥而死者欲禁天下之醫非也有以乘舟而死者欲禁天下之船非也有以用兵喪其國者欲禁天下之兵非也夫兵之不可廢譬水火焉善用之則爲福不善用之則爲禍是故怒笞不可偃於家刑罰不可偃於國征伐不可偃於天下古之聖王有義兵而無偃兵也故以道輔人主者當守雌靜不敢以兵强天下若爲敵所侵不得已而應之故曰善用也果猶勇也言善用師者勇於濟難而已矣潁濱蘇轍曰果决也德所不能綏政所不能服不得已而後以兵决之耳臨川王安石曰用兵者不過勝而已故曰善者果而已果者勝之辭也程大昌曰果似强而非强强以力果以理揆之以理而不可已乃斷然奮行無能沮遏之者是之謂果若理未可動雖兵力百倍亦不輕舉此果者所以不肯爲强也老氏之論兵也慈哀恬澹如不欲有兵然則敵之至殆將不忍與鬬而以何立國故此章論果凡其開許用兵者惟此一路也其曰不敢以取强焉言善其事者一果之外勢可以强亦不敢爲也果而勿矜果而勿伐果而勿驕果而不得已果而勿强潁濱蘇轍曰勿矜勿伐勿驕不得已四者所以爲勿强也程大昌曰矜者自揚其能也伐者自夸其功也驕者謂敵爲不足畏也此三者皆出於嘗戰而勝乃始有之故從而戒之曰果可爲也矜伐驕皆不可爲也兵家之語曰難與慮敵而有識者則又曰有道之主能持勝皆慮其狃勝而鋭於自恃則向焉迫不得已之果遂將轉而入於怙力之强也故老氏逆以爲戒物壯則老是謂非道非道早已碧虚子陳景元曰夫草木之生也柔脆其壯極則枯落人之幼也柔弱其壯極則衰老以喻用兵壯武則雄力暴興暴興則敗矣既敗則不得謂之有道夫非道之事不可法則而行是知不如早止也故義兵王應兵勝忿兵死驕兵滅善用兵者决定果敢不矜不忿不貪不驕迫不得已而後應之義在除敵救人亦非恃力好戰也治身解曰人之枯槁因不行道不行道者早死而已矣潁濱蘇轍曰壯之必老物無不然者唯有道者成而若缺盈而若冲未嘗壯故未嘗老未嘗死以兵强天下壯亦甚矣而能無老乎道眞仁靜先生曹道冲曰道貴於生兵戰殺傷是謂不道既知戰非保生之道早已謂宜早止黃茂材曰兵强者必敗物壯者必老皆爲非道不能長存程大昌曰使哀詔而棄輪臺在未築朔方之前則文景之富庶不虚耗矣夫佳兵章第三十一夫佳兵者不祥之器物或惡之故有道者不處御註曰吉事有祥兵凶器也故曰不祥兵戢而時動有道者耀德不觀兵故不處潁濱蘇轍曰以之濟難而不以爲常是謂不處達眞子曰佳兵者兵之善者也佳兵者不祥之器言其驚異於常矣以佳兵驚異於常雖飛潜竄伏之物猶且惡而避之而況有道者乎故曰物或惡之故有道者不處言不處心於此也是以君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬淡爲上故不美也若美必樂之樂之者是樂殺人也樂殺人者不可得志於天下矣御註曰左爲陽而主生右爲陰而司殺陽爲德陰爲刑君子貴德而畏刑故曰恬淡爲上無心於勝物則兵非所樂也故不羙國君好仁天下無敵安其危而利其菑樂其所以亡者怨之所歸禍之所集也臨川王安石曰夫戰非得已也非得已則雖勝猶不足以爲善勝而爲善者樂致人於死矣此所以不嗜殺人者能一之是也道眞仁靜先生曹道冲曰左陽也陽好生右陰也陰主殺老子再言不祥之器是戒用兵黃茂材曰有道之世民各安其居樂其業物無有害之者何嘗識兵革當是時也有人言兵豈不惡之指爲不祥之器至於不得已而用之志在恬淡非樂於殺人此其與吾養生之說有以異乎無以異乎吉事尚左凶事尚右是以偏將軍處左上將軍處右言居上勢則以喪禮處之殺人衆多以悲哀泣之戰勝以喪禮處之御註曰易以師爲毒天下雖戰而勝必有被其毒者故居上勢與戰勝者以喪禮處之碧虚子陳景元曰左爲陽主生故居常則尚左吉也右爲陰主死故喪禮則尚右凶也禮記檀弓曰孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學也我則有姊之喪故也二三子皆尚左夫上將軍專殺則處右偏將軍不專殺故處左言用兵之道同於喪禮尚右今上將軍居右者是以喪禮處置之爾道眞仁靜先生曹道冲曰兵行即殺非喪者何葉夢得曰易以聰眀睿智而不殺者謂之神武季康子問如殺無道以就有道孔子告之曰子爲政焉用殺夫雖無道而亦不可殺戰勝而處以喪禮宜也黃茂材曰夫兵之不可去者以盜賊敵國之爲人害非兵不除而不善用者殺人之禍乃甚於盜賊敵國故此凡三致意焉皆戒於用兵而不及於盜賊敵國然則有道之士虚無恬淡無所慕悦又何慮於外物聲色之欲有以害吾也哉道常無名章第三十二道常無名樸雖小天下莫能臣侯王若能守萬物將自賔天地相合以降甘露人莫之令而自均御註曰道者天地之始豈得而名樸以喻道之全體形名而降大則制小道之全體不離于性小而辨物莊周所謂其有眞君存焉道足以爲物之主則物自賔服萬物而不以威刑幾是已純素之道守而勿失匪特物將自賔上際于天下蟠于地上下與天地同流則交通成和而萬物咸被其澤甘露者天地之和氣傳曰帝王之德上及太清下及太寧中及萬靈則甘露降涑水司馬光曰侯王守道則物服氣和民化潁濱蘇轍曰樸性也道常無名則性亦不可名矣故其爲物舒之無所不在而斂之不盈毫末此所以雖小而不可臣也故匹夫之賤守之則塵垢粃糠可以陶鑄堯舜而侯王之尊不能守則萬物不賔矣冲氣升降相合爲一而降甘露脗然被於萬物無不均遍聖人體至道以應諸有亦如露之無不及者此所以能賔萬物也臨川王安石曰道常無名矣名者强名之也樸者道之本而未散者也小者至微而不可見者也樸未散則雖小足以爲物之君樸散則爲器器則雖聖人足以爲官長而已故曰樸雖小天下莫能臣陸佃曰樸者藏於無名之域而與神明居與造化游所以爲天下貴者也豈復有加之者哉故曰樸雖小天下莫能臣侯王者萬物之主而萬物之所視而效者也苟爲寄於萬物之上而守之以無名之樸則萬物將自賔而人與天地之和應也天地相合以降甘露所謂天地之和而人莫之令而自均所謂人和也夫惟以道致平而人與天地之和應矣道眞仁靜先生曹道冲曰樸非器位名數無上下之定分先於品物故不能臣之若能抱樸守眞無爲拱默萬物自服天地交泰甘露乃降和之至也甘露效祥人莫能使之而然上下交感陰陽之氣自和矣清源子劉驥曰道之眞常天地之始造化之先不可得而名故謂之樸樸以喻道之大全所謂天地之純古人之大體也雖覆載天地彌滿六虚然反求諸己不離乎方寸之中可謂眇乎小哉故言樸雖小視之不見其形聽之不聞其聲窈兮冥兮難測難識天地不能犯聖智不能干故天下莫能臣乃萬物之所系一化之所待也故侯王若能守萬物將自賔守而勿失與道爲一上際於天下蟠於地兩者交通成和而物生焉故天地相合以降甘露甘露者天地之和氣也人莫之令而自均出於自然也黃茂材曰樸亦道也道無名謂之樸皆强名也域中四大而道爲先孰能臣之古之侯王無有不知道者天地合而降甘露和氣所致也人身中陰陽之交感水火之相濟蓋亦有不約而同者均同也程大昌曰雨之於露皆天地交感之氣而澤之所被均與不均則不同也東州之澇西州之暵通天下觀之未嘗或能周遍也此固不得不云交感若夫露也者不與雨同矣無遠無近無希無驟亘四時有之雖甚旱而淵谷皆竭其莫夜之滋濡厭浥輕細均齊天下如一此蓋天地騰降而有常者也故老氏取象於均而求原於合也始制有名名亦既有夫亦將知止知止所以不殆碧虚子陳景元曰始者道也無名也道常無名也有名者萬物之器用也夫道始無名能制御有名之物是謂樸散則爲器聖人用之則爲官長名器者亦盡爲王者之所有名分既立尊卑是陳不可越乎上下故亦將知所止足能知止足者是自知曰明既明且哲豈有危殆乎河上公本作天亦將知之言人能法道行德天亦將知之隨註解釋義理相通涑水司馬光曰聖人得道必制而用之不能無言雖以有名教民亦務簡要勿令滋彰潁濱蘇轍曰聖人散樸爲器因器制名豈其徇名而忘樸逐末而喪本哉蓋亦知復於性是以乘萬變而不殆也臨川王安石曰名者非道之本也以其始有所制則於是有名矣論語堯曰蕩蕩乎民無能名焉以其有所制也故名隨之故曰始制而有名有名矣不止則用有時而竭身有時而殆故堯老而舜攝也故曰夫亦將知止知止所以不殆王雱曰名迹既立則名將遂而不反枝葉横生源流派别而性命爛熳矣故始制有名當即知止而終無爭奪之危制者判樸成器之謂陸佃曰天下之名吾皆得而有之故曰始制有名名亦既有然而功成名遂身退天之道也故曰夫亦將知止知止所以不殆道眞仁靜先生曹道冲曰初以無名之樸制於有名之者使高卑不亂名分以定各有所屬過此以往近於煩細事成息念亦當知其止息矣不盡慮以憂人亦休心而適己息念保身終身不困陳象古曰天地既判名從此制必有資始資生之繁豈無名而可言乎物既衆而名既多在知止以御之不知止則物窮而塞所以危亡之幾生焉清源子劉驥曰體道至此始制有名始謂道也其道能制御有名之物所謂物物而不物於物也既有其實必有其名雖和光同塵毋近於名而名自彰故名亦既有既有其名若不知止則舍己從人以賣名聲於天下而失其本心知止則恬然自足於内淡然無求於外故不殆黃茂材曰始制有名自無而始適有也處群有中不知所止將逐物而忘返其危矣哉故莊子曰吉祥止止林東曰聖人散樸以爲器因器以制名雖勢所必至又豈徇名而忘樸逐末而喪本故能知止而不至於危殆正所謂大曰逝逝曰遠遠曰反之意譬道之在天下由川谷之與江海也御註曰天下一性也道之在天下以性而合由川谷之與江海以水而聚同焉者得類焉者應聖人之臨莅何爲哉因性而已矣潁濱蘇轍曰江海水之鍾也川谷水之分也道萬物之宗也萬物道之末也皆水也故川谷歸其所鍾皆道也故萬物賔其所宗道眞仁靜先生曹道冲曰江海水之宗川谷水之派異流終返於源百慮同歸於道黃茂材曰人之於道如川谷之赴江海無有不至惟其不知道之所在故有横流絶港之患知人者智章第三十三知人者智自知者明御註曰傳曰智如目也能見百歩之外而不能自見其睫察人之邪正若辨白黑是智之事知人而已易曰復以自知傳曰内視之謂明智以知人則與接爲構日以心鬭復以自知者靜而反本自見而已天地之鑑也萬物之照也碧虚子陳景元曰知人善惡而分别之之謂智故曰知而言之所以之人也是謂適人之智而已矣而不自知者也自知而默守之之謂明故曰知而不言所以之天也是謂自適其明而已矣此可以超乎智之上也潁濱蘇轍曰分别爲智蔽盡爲明分别之心未除故止於知人而不能自知蔽盡則無復分别故能自知而又可以及人也道眞仁靜先生曹道冲曰智以達外但能知人明以照内自靈於身葉夢得曰自知者見性知人者未必能見性爲智而已智者有别乎外也故見性而後爲明明則無所不照也清源子劉驥曰知人則有見於外故曰智自知則反照於内故曰明黃茂材曰人之情僞無窮吾之智有限烏得而盡知之一人之情千萬人之情也如能自知敦能逃吾所知故智不如明程大昌曰莊子曰吾所謂明者非謂其見彼也自見而已夫不自見而見彼是得人之得而不自得其得者也此則智明之辨也林東曰智則不無於窺伺揣度而明則如日月之容光必照者勝人者有力自勝者强御註曰至人尚德而不尚力自勝而不務勝人智者詐愚勇者若怯此勝人也而所恃者力勝己之私以直養而無害潁濱蘇轍曰力能及人而不能及我我能克己復性則非力之所及故可謂强矣道眞仁靜先生曹道冲曰勝人者謂有形質才力勝己謂能勝於情欲性正而神强陳象古曰智與力行於外者也明與强行於内者也明則省己無遺强則進道有漸葉夢得曰自勝者克己勝人者未必克己爲有力而已故克己而後爲强强則無所不敵也清源子劉驥曰智足以知人則能勝人而不爲人物所惑故曰力明足以自知則能自勝而不爲情欲所使故曰强黃茂材曰有力者可以勝人力所不及烏能勝人吾能自勝不與物爭强莫甚焉知足者富碧虚子陳景元曰謂止其欲也穎濱蘇轍曰知足者所遇而足則未嘗不富矣雖有天下而常挾不足之心以處之則是終身不能富也道眞仁靜先生曹道冲曰雖貧若富也陳象古曰得一不求二自足於心所以爲富不在多也葉夢得曰求富者終無已也苟以爲足則簞食瓢飲亦可以爲富矣清源子劉驥曰既有勝人之力又有自勝之强則知取足於身而萬物皆備於我其有萬不同之富何以加焉易曰富有之謂大業亦此之謂也黃茂材曰鷦鶉巢於深林不過一枝偃鼠飲河不過滿腹人而知足其用無窮故謂之富强行者有志御註曰自强不息斯志於道碧虚子陳景元曰强行者謂勤而行之也潁濱蘇轍曰不與物爭而自强不息物莫能奪其志也臨川王安石曰上士聞道謹而行之故强行者有志道眞仁靜先生曹道冲曰大道雖遠强行不息曰進曰近不覺與道混而爲一凡有志者無事不集黃茂材曰自强不息所以體天行健非有志者孰能之林東曰有志於行則凡物莫能奪其志而自强不息之效可與天同其健不失其所者乆御註曰立不易方故能乆於其道與時推移與物轉徙者可暫而已涑水司馬光曰得所則安潁濱蘇轍曰物變無窮而心未嘗失則久矣道眞仁靜先生曹道冲曰外安其分内存於道未有不乆者也陳象古曰得其所則安於道安於道則可久葉夢得曰所者人之所安也人之所安莫大於道易曰艮其止止其所也所猶有在道變通不窮則無所不在隨所在而安之孰不可爲乆者所謂道乃久也黃茂材曰新故相代變化不停吾能不失其常故吾往而新吾至是爲長乆死而不亡者壽御註曰生有所乎萌死有所乎歸原始反終故知死生之說聖人通乎晝夜之道而知死之未始異于生故其形化其神不亡與天地並而莫知其極非壽而何涑水司馬光曰身没道存潁濱蘇轍曰死生之變益大矣而其性湛然不亡此古之至人能不生不死者也臨川王安石曰聖人死而不亡者無異於生故曰死而不亡者壽王雱曰賢人死曰鬼盡其道以反眞者也聖人死曰神未嘗死未嘗生也愚人死曰物雖生猶死耳盡道養形之人雖形體萬變而眞性湛然無所終極可謂壽矣此至於命者也陸佃曰言死生之未始有異也夫唯死生同狀而萬物一府故夫身如蜩甲蛇蜕寓之而已矣蓋蜩之甲已死而其蜩未嘗亡蛇之蜕已腐而其蛇未嘗喪何則有眞者雖死不滅也又曰佛氏之不滅與此同意道眞仁靜先生曹道冲曰形骸有極妙者長存陳象古曰死不可免形氣澌盡有生者之常也其不亡者因自知勝知足强行不失其所而有存焉此爲之實也非世人百歲之所可同日而語清源子劉驥曰四肢百體將爲塵垢死生終始將爲晝夜以其入於不死不生而死生無變於己故死而不亡者壽非深造於道者敦能與此黃茂材曰古之眞人不知悅生不知惡死其出不訴其入不距翛然而往翛然而來而已夫如是又烏有死生哉本來子邵若愚曰形雖死而性不亡處於不生滅之鄉萬劫常存者是謂壽道德眞經集註卷之八
