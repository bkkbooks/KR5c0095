body:
  text: 宋鶴林彭耜纂集天下柔弱章第七十八天下莫柔弱於水而攻堅强者莫之能先以其無以易之也御註曰易以井喻性言其不改老氏謂水幾於道以其無以易之也有以易之則徇人而失己烏能勝物惟無以易之故萬變而常一物無得而勝之者臨川王安石曰天下之物能小而不能大能方而不能圓水則不然因地而爲小大隨器而爲方圓不失其常故曰無以易王雱曰水方圓曲直隨物萬變而初不易己此其所以終能勝物也夫玉石堅强矣而持以攻物有時而碎者以其可易耳道眞仁靜先生曹道冲曰柔之力甚大日以摩乹馳騁堅而强者皆不能勝之矣陳象古曰水之爲功善利萬物入污流下非柔而何攻堅强者恃力違順故不能勝水之柔也無以易之其理自然故不可改易清源子劉驥曰水且尚爾况於道乎道之爲物惟恍惟惚至柔至弱也黄茂材曰上善若水章言水善利萬物而不爭處衆人所惡與此所言大抵略同含垢納污水之德也雖爲天下王莫能違之柔之勝剛弱之勝强天下莫不知而莫之能行御註曰智及之仁不能守之碧虚子陳景元曰夫水之滅火陰之制陽舌柔齒剛舌存齒亡此天下之莫不知而世俗之所共聞也而迺各師其心莫能行其柔弱之道者此老氏所以重嘆息故引聖人之言道眞仁靜先生曹道冲曰人非不知而不能行者何也以其好强耻弱也陳象古曰水衆人之所見非難知之物也莫能行則信道不明崇道不篤也是以聖人言受國之垢是謂杜稷主受國之不祥是謂天下王碧虚子陳景元曰聖人言者三墳之遺文也或老氏之謙也垢穢辱也言人君能含受垢穢引萬方之罪在子一人子一人有罪無以汝萬方則民仰德美而不離散可以常奉社稷而爲至矣又人君能謙虚用柔稱孤寡不榖則四海歸仁六合宅心是謂天下王矣傳曰山澤納污國君含垢蓋近之矣涑水司馬光曰含垢納污乃能成其大道眞仁靜先生曹道冲曰杜稷之主如天地之大江海之寬容垢包濁無所不可祥者善也自是則人皆非之不自善者人皆美之故王天下葉夢得曰不祥重於垢故所受彌多所得彌大程大昌曰百姓有過在子一人小人怨汝詈汝則曰朕之愆允若時是受垢也人之所惡惟孤寡不穀而侯王以爲稱是受不祥也二者皆莊子之所謂謙下濡弱也正言若反御註曰言豈一端而已反於物而合於道是謂天下之至正碧虚子陳景元曰夫能行柔弱則爲王爲主尚剛强則招禍招咎聖人受垢受惡則永保元吉世俗樂美樂榮則終致灾凶正言俗意如此乖反明矣潁濱蘇轍曰正言合道而反俗俗以受垢爲辱受不祥爲殃故也王雱曰此可爲智者道爾正言若反反於小智之近情而合於大道之至正也道眞仁靜先生曹道冲曰皆反於俗見故曰若反陳象古曰似反於正矣受垢爲社稷主受不祥爲天下王以言觀之則似非正以理觀之則至正矣葉夢得曰此正言而人謂之反以其言觀之也黄茂村曰合於道者反於俗程大昌曰若反而實不反也和大怨章第七十九和大怨者必有餘怨安可以爲善御註曰復讎者不折鏌干雖有忮心不怨飄瓦故無餘怨愛人者害人之本也偃兵者造兵之本也安可以爲善碧虚子陳景元曰怨恚也惡也相望也大怨者輕生徇死之謂也夫國君不能無爲無事謙卑柔弱而民乃多欲好爭奸詐並興怨惡相望心氣不平遂使輕生徇死之徒攘臂於道術矣而國君設教立法以繩之其殺人者死傷人者刑而和報其恚惡怨望也然以事和之則翻濟其怨故知有怨而和之者未若無怨而不和也徒知和其大怨而不省其大怨之所由興雖和之以至公而不免有餘怨若乃大小多少而以無心至德報之者幾乎造物哉夫聖賢本以刑政和報其怨惡奈何奸詐愈甚而怨望益多也如是則安可以爲善潁濱蘇轍曰夫怨生於妄而妄出於性知性者不見諸妄而又何怨乎今不知除其本而欲和其末故外雖和而内未忘也清源子劉驥曰爲治者不能無事無爲至於有大怨而後和之必有餘怨安可以爲善黄茂村曰夫人不怒虚舟不怨飄瓦以其無心而已若以爲怨而和之是有心也安能無怨不足以爲善程大昌曰怨之大者莫大於兩國干戈之讎矣聘會以平之詛盟以要之皆求有以和之者也然會稽之棲厭然臣妾也而嘗膽抱冰藏毒伺釁多歷年所廼始發見則陽浮道以示相平者豈其可信也况夫攻奪人之城邑殺戮人之父兄借使敵國之君遷延未肯輕動而其人民子弟含痛茹耻必且隨事從臾以期報復者人情之常也故曰安可以爲善是以聖人執左契而不責於人碧虚子陳景元曰李榮曰古者聖人刻木爲契君執於左臣執於右爲信又陸希聲曰聖人之心與百姓心猶左右契耳契來則合而不責於人故上下相親怨惡不作穎濱蘇轍曰契之有左右所以爲信而息爭也聖人與人均有是性人方以妄爲常馳驚於爭奪之場而不知性之未始少亡也是以聖人以其性示之使之除妄以復性待其妄盡而性復未有不廓然自得如右契之合左不待責之而自服也然則雖有大怨懟將涣然冰釋知其本非有矣而安用和之彼無德者乃欲人人而通之則亦勞而無功矣王雱曰左契取於人右契取人左無事而右主權故古者分契之法如此也聖人執左契不從事於物而物自來合吾應其合者耳所謂感而遂通天下之故也然則聖人常受天下之責而無責人之心是以終無怨莊子曰以得爲在人以失爲在己湯曰萬方有罪罪在朕躬此之謂也記曰獻牛馬者操右契蓋獻者並券以進是知左契乃受責者之所執史記曰操右券以責事道眞仁靜先生曹道冲曰左陽也契合也左契者天道也天道無私民之善惡自與吉凶相契聖人非故責人而或子之或奪之但司之而已吉凶禍福皆民自爲之也故不私其恩而終無歸其怨達眞子曰左者心之所處契者言其合也聖人執心以合道而不責於人清源子劉驥曰古者結繩以爲治破木以爲契君執於左臣執於右契來則合所以取信黄茂村曰道無求於世待其自至同焉者合而已譬如契有左右執其左契以待其來合者何責於人故有德司之程大昌曰獻粟者執右契漢之剖竹爲符也右留京師左以授守臣謂之左符其意度制作皆與此應也故有德司契無德司徹御註曰樂通物非聖人也無德者不自得其得而得人之得方且物物求通而有和怨之心焉兹徹也祗所以爲蔽碧虚子陳景元曰夫有德者中古之君也無文書法律但刻契合符以爲信約則民自從化故稱有德也無德者謂遠古之君也德大無名物皆自然而穴處巢居各安其分故其君無思無慮朝徹而見獨不爲不恃道冥而德淵更無契可司但司其通徹而已矣故稱無德焉臨川王安石曰司徹通於事則不能無責於人不能無責於人則不能使人之無怨此其所以爲無德也道眞仁靜先生曹道冲曰司契以天道契於臧否司徹欲以聰明盡其民情而民情安能盡之故與則爲恩不子則爲怨清源子劉驥曰有德司契亦猶是也有德之人眞性内明通玄究微若合符契而不求之於人故謂之司契無德之人眞性未明博學多識以務通徹而不求之於己黄茂村曰徹者通也莊子曰樂通物者非聖人也林東曰聖人軌左契不從事於物而物自來合吾應其合者耳故有德之人司契如右契之合左彼無德者乃欲人人而徹通之則亦勞而無功矣天道無親常與善人御註曰善則與之何親之有碧虚子陳景元曰夫天道無所私唯善人是與是謂天網恢恢疏而不失是以上善之人自然符會何用司契而責於人哉此復太古之風也潁濱蘇轍曰契之無私亦猶是也惟合者則得之矣道眞仁靜先生曹道冲曰非親而與之而善人自與福契此天道也清源子劉驥曰契之無私亦猶是也惟合者得之黄茂材曰天無私親善則與之爲善者非特無求於人亦無求於天待其自至而已小國寡民章第八十小國寡民御註曰廣土衆民則事不勝應智不勝察德自此衰刑自此超後世之亂自此始矣老氏當周之末厭周之亂原道之意寓之於書方且易文勝之弊俗而躋之淳厚之域故以小國寡民爲言蓋至德之世自容成氏至于神農十有二君號稱至治者以此而已碧虚子陳景元曰國小能自守民寡能自足可以返乎太古矣潁濱蘇轍曰老子生於衰周文勝俗弊將以無爲救之故於其書之終言其所志願得小國寡民以試焉而不可得爾道眞仁靜先生曹道冲曰小國民少而事務亦簡若數口之家衣食粗足無所用心又以小爲大則張大而勞以大爲小則簡靜而佚葉夢得曰國之不能治以大視之也民之不能安以衆視之也夫孰知有以大爲小以多爲少之道乎是故國大而以大治之民衆而以衆爲之則有終身不能勝者聖人之道無他亦曰小國寡民而已普天之下不爲不廣率土之濱不爲不多而吾未嘗知其廣且多也清源子劉驥曰本在上末在下要在主詳在臣天下雖大其本甚小故言小國百姓雖多其要甚寡故言寡民使民有什伯之器而不用也穎濱蘇轍曰民各安其分則小有材者不求用於世什伯之器則材堪什夫伯夫之長者也使民重死而不遠徙御註曰其生可樂其死可葬故民不輕死而之四方孔子曰上失其道民散乆矣遠徙之謂歟涑水司馬光曰愛生安土王雱曰樂生遂性故重死安土無求故不遠徙無道之世貧薄士多而利欲勝乎好生末盛本衰而食求在乎分外故觸刑陷險如履平地而車轍足迹交於四方此亦亂之極也道眞仁靜先生曹道冲曰千金之下必有勇夫故民重利而輕死邦小民寡家給事希故樂土而不遷陳象古曰人各自足以全生意故重其死少欲寡求不必遠就其利雖有舟輿無所乘之雖有甲兵無所陳之御註曰山無蹊隧澤無舟梁同乎無知其德不離無絶險之迹故雖有舟輿無所乘之無攻戰之患故雖有甲兵無所陳之臨川王安石曰民自足於性分之内則無遠游交戰之患道眞仁靜先生曹道冲曰水行則用舟陸行則用輿今既樂其土不遷弗遠徙而就利民不相往來故無用大國不侵小國守土介胄戈矛不戰安用陳象古曰寡欲易足民共不爭故舟輿可閑甲兵可偃清源子劉驥曰淡然自守不相往來故雖有舟輿無所乘之恬然自足不相紛爭故雖有甲兵無所陳之程大昌曰難於就死則必樂生故無盜無盜則甲兵爲虚設安土而無外慕無外慕則不他徙故舟輿爲長物也使民復結繩而用之碧虚子陳景元曰今將使人忘情去欲歸於淳古潁濱蘇轍曰事少民樸雖結繩足矣清源子劉驥曰彼民各有常性耕而食織而衣含哺而熙鼓腹而遊其行填填其視顛顛可以同於上古至德之世故使民復結繩而用之甘其食美其服安其俗樂其業鄰國相望鷄犬之音相聞使民至老死不相往來程大昌曰莊子備舉此語而致諸伏義神農以上且推論後世之失曰今遂使民延頸舉踵曰某所有賢者臝糧而趣之足跡接乎諸侯之境車軌結乎千里之外是上好智之過也好智而無道則天下亂矣故夫結繩之可復也其必自民無外慕者始也則愚其智使入於無欲者又絶其外慕之本也甘其食美其服安其俗樂其業御註曰止分故甘去華故美不擾故安存生故樂碧虚子陳景元曰夫君上無欲而民自樸嗜好不生民乃知足雖蔬食藜羹之糲而飽滿淡味爲甘葛衣鹿裘之粗而温凉無文爲美茅茨蓬蓽之陋而風雨不侵爲安南炎北沍之苦而水土任適爲樂涑水司馬光曰雖疏惡隘陋自以爲甘美安樂潁濱蘇轍曰内足而外無所慕故以其所有爲美以其所處爲樂而不復求也陳象古曰易自足也鄰國相望鷄犬之聲相聞使民至老死不相與往來御註曰居相比也聲相聞也而不相與往來當是時也無欲無求莫之爲而常自然此之謂至德碧虚子陳景元曰鄰國相望猶今郡縣之相接也鷄犬之音相聞謂民豐而境近也民至老死言無戰敵而壽終也不相往來猶魚相忘於江湖人相忘於道術也此可以同赫胥尊盧之風矣穎濱蘇轍曰民物繁夥而不相求則彼此皆足故也臨川王安石曰夫德之被於民及其極也則能使民無知無欲惟知耕而食蠶而衣而不知其所以然道眞仁靜先生曹道沖曰自耕自織不闕衣食無與無求往來何益清源子劉驥曰古之人有連墻二十年而不相謁請者蓋進此矣黄茂村曰昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏義氏神農氏當是時民結繩而用之甘其食美其服樂其俗安其居鄰國相望鷄犬之音相聞民至老死不相往來老子之意欲與天下之民同於上古乎信言不美章第八十一信言不美美言不信御註曰道之出口淡乎其無味貌言華也故不足信碧虚子陳景元曰夫信實之言淡乎無味其猶水也水淡則能乆不美者以其質而苦也美好之言甘而滋溢其猶醴也醴甘則易絶不信者以其華而虚也潁濱蘇轍曰信則爲實而已故不必美美則爲觀而已故未必信臨川王安石曰信者性也言近於性則極天下之至順故言之信者不美言之美則不能近於性矣清源子劉驥曰信言合於道美言悦於人黄茂村曰天下皆知美之爲美斯惡矣言足信於人何用美哉美則不信程大昌曰信者誠然也用其誠然者言之無所縁飾故不美也所謂道之出口淡乎其無味者也美言則涉迹而文如春臺太牢者是矣食於母而談其眞者不如此也善者不辯辯者不善涑水司馬光曰吉人寡辭盜言孔甘潁濱蘇轍曰以善爲主則不求辯以辯爲主則未必善道眞仁靜先生曹道冲曰其行實善不假辯說心行不善自疑而巧說黄茂材曰道無問無辯果於善何用辯哉辯則不善知者不博博者不知御註曰知道之微者反要而已聞見之多不如其約也莊子曰博之不必知辯之不必慧碧虚子陳景元曰知者謂知其道也明於理而知根本得其要而已何必博乎所謂少則得也西升經曰子得一萬事畢博者謂博通於物務於事而攻異端不知所極所謂多則惑也莊子曰文滅質博溺心涑水司馬光曰知者不博一以貫之博者不知多歧亡羊潁濱蘇轍曰有一以貫之則無所用博學而日益者未必知道也道眞仁靜先生曹道冲曰精粹已知而不須廣博不知要理徒謂多聞葉夢得曰今老氏之爲書使人得以受而味焉則近乎美窮萬物之理而無不至則近乎辯察萬事之變而無不該則近乎博然固有信而不美善而不辯知而不博者存黄茂材曰通乎一萬事畢苟知一矣何用博哉聖人無積既以爲人己愈有既以與人己愈多御註曰有積故不足無藏故有餘莊子曰聖道運而無所積涑水司馬光曰聖人不積不私無物既以爲人己愈有德智無窮既以與人己愈多損之而益潁濱蘇轍曰聖人抱一而已他無所積也然施其所能以爲人推其所有以與人人有盡而一無盡然後知一之爲貴也王雱曰聖道運乎無方而我常無滯故以至無供萬物之求積而有之所得鮮矣爲人者施於事業以治天下也因其勢而利之則吾道不虧而事業彌廣矣與人者授之以道也授之以道如天生物吾未嘗費而物日以夥既云無積故又明能淡足萬物蓋唯無積乃所以能足也道眞仁靜先生曹道冲曰體虚善應清源子劉驥曰聖人體道之妙應物之求以德分人未嘗費我既以爲人己愈有既以與人己愈多萬物皆往資焉而不匱無積故也黄茂村曰道與天下共也非聖人己私物聖人運而無積既以爲人而在己者不加亡故曰愈有既以與人而在己者不加少故曰愈多此道所以爲善貸萬物而不遺者歟程大昌曰此其故何也聖人者道之管也道者居於至無而萬有莫不由之以出故不待營致藏聚視之不足於見聽之不足於聞而用之無時或既莊子曰益之而不加益損之而不加損者聖人之所保也淵淵乎其若海巍巍乎其終則復始也天之道利而不害聖人之道爲而不爭御註曰體天而已何爭之有穎濱蘇轍曰勢可以利人則可以害人矣力足以爲之則足以爭之矣能利能害而未嘗害能爲能爭而未嘗爭此天與聖人所以大過人而爲萬物宗者也葉夢得曰抑嘗觀世之論老氏者矣自漢蓋公得其術教曹參以相齊而齊治竇太后好之施于文景而天下大安兹非其利乎然以清虚而廢實務其流遂至於亡晋則不可謂無害孔子曰述而不作信而好古竊比於我老彭古今所傳以老爲老氏信斯言也孔子所不廢兹非其爲乎然有病其搥提仁義絶滅禮學以爲有見於上而無見於下群起而非之則不可謂無爭此二言者老氏之所前知也黄茂村曰聖人與天其道一也在天謂之利而不害在聖人謂之爲而不爭其實無二八十一章雖名道德經始終言道而已程大昌曰此二語皆主柔而言也凡其一書皆主柔以達所欲而其道原蓋出於天也是以篇終對而言之潁濱蘇轍曰凡此皆老子之所以爲書與其所以爲道之大略也故於終篇復言之道徳眞經集註卷之十八道德直經集註釋文序長五甚矣文字之流傳而說者之不一也魯語一書以何晏所傳校之蔡邕石經已不同矣况其他乎余於老氏音釋既集李林二家以補陸德明之未備其經之正文則專據政和御本而諸家之同異亦互見於其中合爲一書以繼篇末惟老氏以清虚無爲爲本領其學與經生學士異固不在乎一句一讀之微然亦安有辭義之未通而理道之頓悟惟覽者互考焉鶴林彭耜謹書
