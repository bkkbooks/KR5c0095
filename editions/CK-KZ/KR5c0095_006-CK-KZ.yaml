body:
  text: 黃茂材曰經云吾不知其名字之曰道名卽道也故爲萬物之母時雖變而無常名常存而不已甫美也天地之大人物之眾昆蟲草木之微莫不具有此美捨此皆非道也曲則全章第二十二曲則全枉則直窪則盈弊則新少則得多則惑是以聖人抱一爲天下式碧虛子陳景元曰聖賢之士鉤深致遠廓然見獨而蟠曲才能未嘗顯耀者故欲遠害而全身也故曰曲則全聰達明察曉辨諸物有大功業立大名聲心直如猛矢志端如朱絃常枉己屈伏而不自伸者此則大直之士也故曰枉則直人以謙卑爲本易曰地道變盈而流謙葢設象而會意也夫陵原川谷之變高下之不常也川谷窪下則水流而滿之陵原高峻則雨剝而頽之人之謙下則眾仰德而歸之以致其光大也夫自尊則眾毁而辱及之以致其危亡也故曰窪則盈且人有賢才而能支離其德弊薄其身则眾共樂推而其道日新矣故曰弊則新夫少者簡易之謂也易曰易則易知簡則易從易簡而天下之理得矣西升經曰子得一萬事畢又曰丹書萬卷不如守一故曰少則得夫多者博學之謂也莊子曰文滅質博溺心列子曰路多岐則亡羊學多方則喪道庚桑子曰萬人操弓共射一鵰鵰無不中萬物章章以害一生生無不傷經曰多言數窮不如守中此並戒其多也故曰多則惑道生一一者道之子謂太極也太極卽混元也亦太和純一之氣也又無爲也夫聖人抱守混元純一之道者謂復太古無爲之風也經曰天得一以淸地得一以寍莊子曰天無爲以之淸地無爲以之寍以此可明矣自曲則全下六事尙有對治之迹此云抱一無爲可以兼包之故爲天下式潁濱蘇轍曰聖人動必循理理之所在或直或曲要於通而已通故與物不迕故全也直而非理則非直也循理雖枉而天下之至直也眾之所歸者下也雖欲不盈不可得矣昭昭察察非道也悶悶若將弊矣而日新之所自出也道一而已得一則無不得矣多學而無以一之則惑矣抱一者復性者也葢曲則全枉則直窪則盈弊則新少則得多則惑皆抱一之餘也故以抱一終之臨川王安石曰方則易挫曲以應之此所以能全也直則易折故枉以待之此所以能直也海者常處於卑而爲百川之所委故窪則盈無春夏之榮華秋冬之彫落故弊則新少者復本則得矣多者有爲則惑矣王雱曰至人冲虛其行如水無心於物不與物忤故常全也此篇大旨與莊子養生主相類陸佃曰葢其周旋動止於物無忤與之俱往故謂之曲物之變也而天理之在我終於完而無缺故謂之全達眞子曰已雖全也常自以爲曲所以求全不己則卒至於全矣是則所謂曲則全也已雖直也常自以爲枉所以求直不己則卒至於直矣是則所謂枉則直也猶德雖盈也常自以爲不足則若其窪知雖新也常自以爲不明則若其弊以若窪之心不已其求則卒至於盈是則所謂窪則盈也以若弊之心不已其求則卒至於新矣是則所謂弊則新也少則約多則詳以道散則適於多道聚則歸於少是以少則得得其道也多則惑惑其道也是以聖人抱一爲天下式抱一則不離於道爲天下式陳象古曰一者不繁不亂可以曲可以全可以枉可以直可以窪可以盈可以弊可以新可以少可以得可以多可以惑夫小者大之端暗者明之漸理當然也故聖人抱一於數則有增於象則有容不自滿假先見未萌天下若取以爲式則人人合於道矣葉夢得曰曲則全窪則盈少則得理也卽其體而言之也枉則直弊則新多則惑勢也極其變而言之也曲則不忤故全窪則不滿故盈少則不夸故得此理之必至者也枉非以求直而枉之極必直弊非以求新而弊之反必新多非以求惑而多之罪必惑此勢之不得不然者也理勢之相成或更爲終始或迭爲得失紛然其不可窮而聖人獨能濟之不與之俱變者抱一也前言魂魄之合而曰抱一者一之存乎己者也今言理勢之雜而曰抱一者一之總乎物者也一則萬法之所從出故以爲天下式黃茂材曰世皆曲吾與之爲曲故能保其全人皆枉吾與之爲枉故能養其直莫不欲盈也孰自處於窪吾能窪乃所以爲盈莫不欲新也孰自期於弊吾能弊乃所以爲新爲道日損損則少其入道也近故得爲學日益益則多其去道也遠故惑曰全曰直曰盈曰新曰得曰惑散之則六斂之則一通乎一萬事畢又何有於六乎故曰聖人抱一爲天下式不自見故明不自是故彰不自伐故有功不自矜故長夫惟不爭故天下莫能與之爭御註曰不弊於一己之見則無所不燭故明不私於一己之是而惟是之從則功大名顯而天下服故彰人皆取先已獨處後曰受天下之垢若是者常處於不爭之地孰能與之爭乎碧虛子陳景元曰此四事皆無爲之職夫聖人無爲何嘗顯見己之才能則天下自然稱其明矣故曰不自見故明河上公曰聖人雖明不以自見千里之外乃因天下之目以視之故能明達夫能用天下之目者亦不自顯見之意也音訓雖異而其旨畧同矣且聖人虛靜何嘗自是而非人葢彼我都忘則天下自然稱其是而其德彰矣故曰不自是故彰且聖人恬澹何嘗自伐取其德美則天下自然稱其功業矣故曰不自伐故有功且聖人寂寞何嘗自矜大其賢貴則天下自然稱其有道而長存矣故曰不自矜故長潁濱蘇轍曰不自見不自是不自伐不自矜皆不爭之餘也故以不爭終之臨川王安石曰不自見乃無所不見故常明不自是乃無所不是故常彰不自伐則善不喪故有功不自矜則不有能故能可久矣夫惟不爭故天下莫能與之爭者書曰汝惟不矜天下莫與汝爭能達眞子曰如自見其全則以爲全足於己更不求其全由是故全或至於不能明如自是其直則以爲直足於身更不求其直由是故直或至於不能彰唯不自見其全也常以爲求全之不足若是則全終至於明也唯不自是其直也常以爲求直之不足若是則直終至於彰也推此二類凡有於己者皆不自足於己如雖有功也不自伐其功故得其有功已雖長也不自矜其長故能得其長葢聖人不自滿假凡在於此也葉夢得曰見字當讀爲見乃謂之象之見夫惟得一故雖晦其迹不自見而反明雖藏其用不自是而反彰不伐而有功不矜而能長亦由前之爲曲全窪盈者天下之理同也是以復終之以夫唯不爭故天下莫能與之爭以爲萬物之變非吾所能執及其旣定物亦莫能與我競此不爭之效也雖萬物無不可爲爭心苟存則雖一法無所容措黃茂材曰至人之處於世未嘗有我也無我故不自見不自是不自伐矜夫然故與物無爭而物亦莫與之爭方舟而濟於河有虛船來觸舟雖有惼心之人不怒天下孰能與之爭乎不自見而明不自是而彰不自伐矜有功而長亦其自然之理夫何容心古之所謂曲則全者豈虛言哉誠全而歸之御註曰聖人其動若水以交物而不虧其全其應若繩以順理而不失其直知窪之爲盈無充滿之累知弊之爲新無夸耀之迹若性之自爲而不知爲之者致曲而已故全而歸之可以保身可以盡年而不知其盡也是謂全德之人豈虛言哉碧虛子陳景元曰夫聖人獨抱守純一無爲何嘗更有爭競之心哉經曰含德之厚比於赤子毒蟲不螫猛獸不據攫鳥不摶蟲獸尙爾况於人乎然而上古有此曲全之語豈今日之寓言哉人能行之誠有全德之美而歸之於身此再三勸勵之深旨也潁濱蘇轍曰世以直爲是以曲爲非將循理而行於世則有不免於曲者矣故終篇復言之曰此豈虛言哉誠全而歸之夫所謂全者非獨全身也内以全身外以全物物我兼全而歸復於性則其爲直也大矣葉夢得曰知此則循其本而反之所謂曲則全者豈虛言哉吾誠先得其全而後歸於道則由枉而下爲可知矣黃茂材曰醉者之墜車雖疾不死骨節與人同而犯害與人異其神全也全於酒猶若是况全於天乎古之至人天以其全付之還以其全歸之希言自然章第二十三希言自然御註曰希者獨立於萬物之上而不與物對列子所謂疑獨是也去智與故循天之理不從事於外故言自然碧虛子陳景元曰希者疏也易曰吉人之辭寡涑水司馬光曰知道者不言而喻故曰自然潁濱蘇轍曰道之出口淡乎其無味視之不足見聽之不足聞用之不可旣此所謂希言矣臨川王安石曰多言數窮故希言則自然陸佃曰夫物莫能使之然亦莫能使之不然者謂之自然道眞仁靜先生曹道冲曰言教出則爲迹未能因於物情故聖人行不言之教任自然之理達眞子曰道不可聞故聽之不聞則名曰希希者冥其聲之謂也葉夢得曰此章明言不足以得道欲得道者必卽道以求之而道之不行世始有方術之士各以其一曲詼怪詭譎違理而叛道雖幸或見不旋踵而亡矣淸源子劉驥曰聽之不聞名曰希希言則聽乎無聲而無聲之中獨聞和焉故自然也故飄風不終朝驟雨不終日孰爲此者天地天地尙不能久而况於人乎御註曰天地之造萬物風以散之委眾形之自化雨以潤之任萬物之自滋故不益生不勸成而萬物自遂於天地之間所以長且久也飄驟則陰陽有繆戾之患必或使之而物被其害故不能久碧虛子陳景元曰形之大者莫過乎天地氣之廣者莫極乎陰陽陰陽相激天地交錯尙不能崇朝終日何况人處天地之間不似毫末之在馬體乎而敢縱愛欲任喜怒趨取速亡不亦悲乎潁濱蘇轍曰陰陽不爭風雨時至不疾不徐盡其勢之所至而後止若夫陽亢於上陰伏於下否而不得泄於是爲飄風暴雨若將不勝然其勢不能以終日古之聖人言出於希行出於夷皆因其自然故久而不窮世或厭之以爲不若詭辭之悓耳怪行之驚世不知其不能久也道眞仁靜先生曹道冲曰飄風驟雨謂不常也而况人心豈能常也葉夢得曰夫言之不足尙如此黃茂材曰道無可言自然而已自然則久飄風驟雨非其自然故不能終朝日况於人乎人法地地法天天法道道法自然其所法也回轉而及自然自然之功豈易到哉故從事於道者道者同於道德者同於德失者同於失同於道者道亦樂得之同於德者德亦樂得之同於失者失亦樂得之碧虛子陳景元曰從爲也順也言人爲事當從順於道希言愛氣永保天和豈可若飄風驟雨而不久長也潁濱蘇轍曰孔子曰苟志於仁矣無惡也故曰仁者之過易辭志於仁猶若此而况志於道者乎苟從事於道矣則其所爲合於道者得道合於德者得德不幸而失雖失於所爲然必有得於道德矣道眞仁靜先生曹道冲曰聖人從事於自然之道不强物情道者同於道有道者可與語道德者同於德謂彼此俱造於德則可與語於德也失者同於失鵂鶹與梟皆以夜爲晝則難與辨其謬失也葉夢得曰非失之云能得道也因其失而正之亦可以得乎道也黃茂材曰道至大也有從事於此道則同於道德則同於德失則同於失譬之海廣無不容大無不納物之在其中也無不各得其欲故道者曰吾得之德者曰吾得之失者曰吾得之失旣以爲失矣又焉得曰失道而後德則德也者非失而得之乎失德而後仁則仁也者非失而得之乎失仁而後義失義而後禮則義與禮也者非失而得之乎夫是謂之大同信不足有不信碧虛子陳景元曰仙道貴生鬼道貴終葢各以類應也是以信乎道者得其道信乎德者得其德不信於道輕忽於德故道亦不應德亦無稱舉之天下豈有信之者哉潁濱蘇轍曰不知道者信道不篤因其失而疑之於是益以不信夫惟知道然後不以得失疑道也達眞子曰信道足則於道無不信也信德足則於德無不信也陳象古曰言亂而理寡故人不之信黃茂材曰至道甚微信者寡不信者多老子重言及此憫世人之愚而欲其信也歟跂者不立章第二十四跂者不立跨者不行御註曰違性之常而冀形之適難矣碧虛子陳景元曰冒進之夫跂望非分欲求寵榮雖苟得之有若延頸舉踵何能久立乎涑水司馬光曰心有所屬故不能兩存潁濱蘇轍曰人未有不能立且行者也苟以立爲未足而加之以跂以行爲未足而加之以跨未有不喪失其行立者彼其自見自是自伐自矜亦若是矣道眞仁靜先生曹道冲曰跨謂不內不外跨其兩端不一於道也達眞子曰跂者非立之常跨者非行之常而皆性之强矯非動之自然者也黃茂材曰跂而欲立必不能立跨而欲行必不能行程大昌曰足之履地爲立跂則騰竦以爲高隨足力所及而更迭以進是之謂步跨則展布以示濶貪新失故且將并其能行能步者而失之自見者不明自是者不彰自伐者無功自矜者不長其在道也曰餘食贅行御註曰泰色淫志豈道也哉故於食爲餘於行爲贅碧虛子陳景元曰棄餘之食適使人惡附贅之形適使人醜涑水司馬光曰皆外競而内亡黃茂材曰自見其見不可與明自是其是不可與彰伐者無功矜者不長此皆性外事程大昌曰露才揚己之謂自見曰子旣已知則爲自是誇其勞者爲自伐眩其能者爲自矜凡此數者不獨足己自當又且廣己造大課其所有甚狹而無助故不明不彰無功不長物或惡之故有道者不處也碧虛子陳景元曰凡物尙惡之况有道之士乎葉夢得曰智之不眀未必皆能惡也故曰物或惡之惟有道者不處豈必知道而後能辨也程大昌曰見是伐矜有道者不肯指以爲居也有物混成章第二十五有物混成先天地生御註曰氣形質具而未相離曰渾淪合於渾淪則其成不虧易所謂太極者是也天地亦待是而後生故云先天地生然有生也而非不生之妙故謂之物碧虛子陳景元曰至理湛然而常存故謂之有物眞道萬派而莫分故謂之混成然而混成不可得而知萬物由之以生故曰有物混成也先天地生者道之元也經曰吾不知誰子象帝之先莊子曰夫道在太極之先而不爲高在六極之下而不爲深先天地生而不爲久長於上古而不爲老此皆標道之大體也潁濱蘇轍曰夫道非淸非濁非高非下非去非來善惡混然而成體其於人爲性故曰有物混成此未有知其生者葢湛然常存而天地生於其中耳陳象古曰混成大道之喻也道無定象天地有形因道而生故先天地之義昭矣葉夢得曰易曰易有太極是生兩儀則生兩儀者易也然不直言易而設爲太極於中者葢言易之生初不可以正名故假太極以見則易與太極固未之有分也謂太極爲生兩儀則有易居其上謂太極爲生於易則未見太極之有間故寄之曰有則易爲無也老子曰有物混成先天地生則天地生於混成而混成者亦自有所生也然不顯言其生而虛生生者於上亦以生生者不可以正名黃茂材曰有物果何物也先天地而生天地者也林東曰有物混然而成則包含萬象圭角不露皆所以想像道之體質也必也先天地而生言是道之有自來也遠矣或以爲道在太極之先則非止在天地先也亦言其來也遠之意寂兮寥兮獨立而不改周行而不殆可以爲天下母御註曰寂兮寥兮則不涉於動不交於物湛然而已大定持之不與物化言道之體利用出入往來不窮言道之用萬物恃之以生碧虛子陳景元曰杳冥空洞無象無質故曰寂寥大塊卓然無物可比妙道廓然何物偶對故曰獨立物雖千變萬化出生入死而妙道未嘗遷故曰不改且道之用也散則冲和之氣徧於太無歛則精純之物藏於黍粟周流六虛應用不窮故曰周行而不殆夫物無大小皆仰於道得之則全離之則殞生之成之咸有所賴故曰可以爲天下母潁濱蘇轍曰寂兮無聲寥兮無形獨立無匹而未嘗變行於羣有而未嘗殆俯以化育萬物則皆其母矣達眞子曰致虛極則曰寂廣遠極則曰寥此有物混成之體也陳象古曰母取其始生萬物也葉夢得曰寂寥之中獨立而周行者彼亦不過動靜之兩間爾學者多不能明寥之義與寂同爲靜非也古者謂大風之聲爲寥吹萬竅而怒號者寥能覆之則安得爲靜乎寂言靜也寥言動也惟寂故能獨立而不改惟寥故能周行而不殆此其所以能母天下者也吾不知其名字之曰道强爲之名曰大大曰逝逝曰遠遠曰反御註曰運而不留故曰逝應而不窮故曰遠歸根曰靜靜而復命故曰反道之中體方名其大則徧覆包含而無所殊易所謂以言乎遠則不禦也動者靜作者息則反復其道不離乎性易所謂以言乎邇則靜而正也碧虛子陳景元曰凡物之大皆有邊際惟道之大無窮無極往無涯畔故云大曰逝愈逝愈遠莫究其源故云逝曰遠雖遠出八荒之外逐之不逮而收視反聽湛然於方寸之間若鑑之明應而不藏故云遠曰反反復也潁濱蘇轍曰道本無名聖人見萬物之無不由也故字之曰道見萬物之莫能加也故强爲之名曰大然其實則無得而稱之也自大而求之則逝而往矣自往而求之則遠不及矣雖逝雖遠然反而求之一心足矣道眞仁靜先生曹道冲曰不可名字而强名曰道也道非大小旣强名之不可不謂之大矣逝者往也道不止於大又能逝而徧於萬物旣以謂逝則無往不周雖曰遠未嘗離本故曰反淸源子劉驥曰不可得而名故吾不知其名以其萬物之無不由也故字之曰道以其萬物之莫能加也故强爲之名曰大自大而求之則測之益深窮之益遠故曰逝自逝而求之則在太極之先而不爲高在六極之下而不爲深故曰遠雖遠至六合之外無窮無盡然反求諸己不離乎方寸之中故曰反林東曰字曰道强名曰大然其實則無得而稱之也不特如是其大大則直塊然一物矣大而又能逝逝而遠遠而又反則非泛然無統虛無荒唐之說甚矣反之一字見大道之道與吾儒不隔蠅翼或者不可以老氏孔子差殊觀也故道大天大地大王亦大域中有四大而王處一焉御註曰道覆載天地者也天無不覆地無不載王者位天地之中而與天地參故亦大碧虛子陳景元曰王者黔黎之首不敢與天地道爲比故云亦也域中有四大者謂道天地王也域者限域也夫道大包宇宙細入秋毫或超象外或處域中自地而上皆屬於天蒼蒼者之謂也天在地外地處天内王者人倫之尊居九州之間此皆處於域中故曰域中有四大也而又王者參天地之道而秉萬物之權於四大之中預其一焉莊子曰莫神於天莫富於地莫大於帝王帝王之德配天地故曰王居其一焉穎濱蘇轍曰由道言之則雖天地與王皆不足大也然世之人皆知三者之大而不信道之大也道眞仁靜先生曹道冲曰無不化育故曰大無不覆燾故曰大無不持載故曰大人者三才之一非君何以統制域者謂限制之名雖有名而無邊際之實範圍萬物者也凡言天則造物可知矣凡言地則成物可知矣凡言王則人道可知矣靈秀智力莫出於人而王統之大也淸源子劉驥曰王亦大者王指人心而言之經所謂心爲國主五藏王是也人心潛天而天潛地而地俯仰之間再撫四海恍惚之際經緯萬方亦可謂大矣故域中有四大而王處一焉此使人知自貴自愛而不陷溺其良心也人法地地法天天法道道法自然碧虛子陳景元曰此戒王者當法象二儀取則至道而天下自然治矣夫王者守雌靜則與陰同德其所載無私是法地也又不可守地不變將運剛健則與陽同波其所覆至公是法天也復不可執天不移將因無爲則與道同體其所任物咸歸自然是法道自然此謂王者之法天地則至道也非天地道之相法也宜察聖人垂教之深旨不必專事其空言而已矣潁濱蘇轍曰故以實告之人不若地地不若天天不若道道不若自然然使人一日復性則此三者人皆足以盡之矣道眞仁靜先生曹道冲曰人與地近形著而位分故法則於
