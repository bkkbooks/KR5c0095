front:
  text: 太上道德眞經集註序道常無言不得已而有言言之費也從而言之費之費者也言固可廢乎曰不可也以藥治病非上醫也方病而奪之藥雖盧扁莫爲也葢老子一書自列氏莊氏己陰立訓傳而自爲一家者也至漢相曹參用其言有驗世益尊信之文帝時有河上公者乃始泄道之藴名爲註釋自是之後有鄰氏傅氏徐氏劉氏晋魏以來獨王氏最顯唐玄宗又改定章句刻石渦口廟中而世之言道德經益繁宋興專守一道曰仁其治以慈儉不爭爲本幾若委靡不振而實參用老子家法故當時君臣於此書頗盡心焉耜雖不敏亦覃思有年矣常患註釋之繁而矛盾迭興復憂流派之廣而門戸各異求出世者多鄙薄於治世之常經思治世者復忽畧於出世之妙旨於是合本朝註釋之書畢力纂集尊御註於其首列諸子於其下凡分一十二卷其他如河上公王弼所著己載陳景元纂微茲不復詳吁亦多言矣乎然世方懵於其道我又吝於其言則道益晦矣此經以自然爲體無爲爲用治世出世之法皆在焉如我無爲而民自化我無欲而民自樸此治世之法也如生之徒十有三死而不亡者夀此出世之法也若夫秦漢方術之士所謂丹竈奇技符籙小數盡舉而歸之道家此道之緒餘土苴者耳學者當於此而有悟焉則鑿開混沌剖破藩蘺以之治世則反樸而還淳以之出世則超凡而入聖然後知孔老無異法天生二聖人迭爲賓主以道詔天下後世其功至不淺也惟我同志相與勉之紹定己丑重九日鶴林眞逸彭耜謹序太上道德眞經說序史記列傳曰老子者楚苦縣厲鄕曲仁里人也裴駉注云地理志曰苦縣屬陳
