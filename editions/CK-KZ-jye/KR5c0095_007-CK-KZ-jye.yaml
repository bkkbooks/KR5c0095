seq: 7
front:
  text: 地而知剛柔之分地靜而承順法則於天淸明剛健崇高至極而未能混於無形故法於道也道無可法自然而已達眞子曰道也者固無所法也以其相因而相成相繼而相用固若其法爾王者能盡人道以人道之施爲則應於地故人法地也以地道之化養則應於天故地法天也以天之運用則應於道故天法道也以道之充塞則應於自然故道法自然也然則有物混成之初信以爲天下之母矣重刻道藏輯要
  hash: sha256:1460361e321670f4ec13cd05e2bf16ea0fe13c428d4abe576b5a039730c50b09
  markers:
  - {type: head, offset: 161, content: '太上道德眞經集註　　　¶¶<md:KR5c0095_HFL_007-001a>¶¶¶¶　　　　@by宋鶴林彭耜纂集', id: KR5c0095_CK-KZ-jye_007-h1, level: 1}
body:
  text: 重爲輕根靜爲躁君御註曰重則不搖奪而有所守故爲輕根靜則不妄動而有所制故爲躁君潁濱蘇轍曰凡物輕不能載重小不能鎭大不行者使行不動者制動故輕以重爲根躁以靜爲君臨川王安石曰輕者必以重爲依躁者必以靜爲主葉夢得曰重輕在身必有所本故以根言之靜躁在心必有所制故以君言之木之生自拱把至合抱必有根焉然後枝葉有所賴不深其根而豐其末末勝則木必拔矣故身不可以不重心之物爲火炎上而善緣炎上則愈進善緣則莫知已非有以制之則必熾躁者動而不知守者也故心不可以不靜黃茂材曰輕躁之人不可進於道重則其本固故爲輕根靜則其主安故爲躁君是以君子終日行不離輜重御註曰靜重以自持則失之者鮮君子終日行不離輜重是以履畏塗而無患碧虛子陳景元曰輜屏車也又大車也道眞仁靜先生曹道沖曰輜重謂保身之寶隨而資用不可須臾離也達眞子曰如君子雖終日行不離輜重者葢非輜重則不可行是則輕本於重也淸源子劉驥曰君子之處已貴乎重靜戒乎輕躁故終日行不離輜重謂如輜車之重不敢容易其行雖有榮觀燕處超然御註曰榮觀在物燕處在身身安然後物可樂道眞仁靜先生曹道沖曰雖有榮盛可觀之事不能移其志游觀榮樂無所係著淸源子劉驥曰榮觀在物燕處在已不以物易已不以美害生超然自得於物外取足於身而已如何萬乘之主而以身輕天下輕則失臣躁則失君御註曰天下大物也有大物者懍乎若朽索之馭六馬故不可以身輕天下不重則不威故失臣不倡而和則犯分故失君潁濱蘇轍曰輕與躁無施而可然君輕則臣知其不足賴臣躁則君知其志於利故曰輕則失臣躁則失君臨川王安石曰臣者佐也君者主也靜爲動之主重爲輕之佐輕而不知歸於重則失於佐矣動而不知反於靜則失其主矣王雱曰人主以天下爲根不可以一身故輕之陳象古曰王者治天下之大當守其重處其靜以鎭輕浮以杜僭躁不可以欲之所縱身之所貪輕忽妄動而忘治天下之道淸源子劉驥曰歎人不知貴愛其身殘生傷性動之死地是猶處萬乘之尊居大寶之位輕身躁動不顧天下者也輕則妄動故失臣躁則擾民故失君聖人重而不輕靜而不躁所以無爲而天下治黃茂材曰君子終日行不離輜重是其能持重也雖有榮觀宴處超然是其能守靜也奈何萬乘之主而以身輕天下人身中自有一天下萬乘之主指心爲言君者心也臣者肺爲相傅之官肝爲將軍之官膽爲中正之官膻中爲臣使之官倉庫官脾胃是也傳道官大腸是也受盛官小腸是也作强官腎是也三焦者決瀆之官膀胱者州都之官失君心亂失臣五臟六腑亂善行無轍迹善言無瑕謫善計不用籌算善閉無關楗而不可開善結無繩約而不可解潁濱蘇轍曰乘理而行故無迹時然後言故言滿無口過萬物之數畢陳於前不計而知安用籌筭全德之人其於萬物如母之於子雖縱之而不去故無關而能閉無繩而能約臨川王安石曰不疾而速不行而至故無轍迹巵言日出和之以天倪因之以曼衍故無瑕謫六合之內萬物之間不能逃其數故不用籌筭萬物不得其門而入故無關楗而不可開達眞子曰善行者以道爲行者也以道爲行故行於內而不行於外是以善行無轍迹善言者以道爲言者也以道爲言故言於正而不言於邪是以善言無瑕謫也善計者以道爲計者也以道爲計故計於心而不計於物是以善計不用籌筭也心處於道不爲外物之所入是以善閉無關楗而不可開也心聚於道不爲外物之遷離是以善結無繩約而不可解也淸源子劉驥曰以其不爲而爲故善行無轍迹之可尋以其道之出口故善言無瑕謫之可累以其通於一而萬事畢故善計不用籌筭以其形全精復非愛慾所能誘故善閉無關楗而不可開以其神凝氣定雖天地不能犯故善結無繩約而不可解黃茂材曰行不違道故無轍迹言不失中故無瑕謫善計不用籌筭一可以知萬也何用籌筭善閉無關楗而不可開其精固而不泄也何用關楗善結無繩約而不可解者陰陽之氣自然相合也何用繩約是以聖人常善救人故無棄人常善救物故無棄物是謂襲明御註曰襲者不表而出之襲明則光矣而不曜碧虛子陳景元曰常善者謂藴其常道善達自然之理也襲明者聖人密用其常道而能明悟任物也潁濱蘇轍曰彼方執筭以計設關以閉持繩以結其力之所及者少矣聖人之於人非特容之又善救之我不棄人而人安得不我歸乎救人於危難之中非救之大者也方其流轉生死爲物所蔽而推吾至明以與之使暗者皆明如燈相傳相襲而不絶則可謂善救人矣葉夢得曰常之爲言無時而不然也救之爲言廹而後應之不廹則不强施也淸源子劉驥曰非特聖人有是心也人物皆有之方其以僞喪眞以物易性則固有之眞性暗而不明鬱而不發聖人常善救之而無棄使之歸根復命收視返聽室虛而純白生宇定而天光發如燈之明相傳襲而不絶故是謂襲明黃茂材曰凡此皆人身中物修之而至爲之而成經曰恍兮惚其中有物人誰不具此物迷而不知爾聖人善救之無棄人亦無棄物使之自明而已故謂之襲明故善人不善人之師不善人善人之資御註曰資以言其利有不善也然後知善之爲利碧虛子陳景元曰故立天子置三公此將以教不善之人也故曰善人不善人之師設有不善之人善人亦資取役使以漸化導之經曰善者吾善之不善者吾亦善之得善信者吾信之不信者吾亦信之得信此以德化攝伏不善人爲資給役用也達眞子曰善人者得此五善之人也不善人者失此五善之人也得此五善之人可以救其不善故善人不善人之師也失此五善之人故善人取以爲戒故不善人善人之資也然則不善人因其善人之襲已則得其師善人因其不善人之襲已則得其資是皆因襲而明也淸源子劉驥曰善人者因其善而師之故不善人之師不善人者因其不善而改之故善人之資林東曰善人爲善可師也見不善而不爲之是可資也不貴其師不愛其資雖智大迷是謂要妙御註曰天下皆知善之爲善斯不善已善與不善彼是兩忘無容心焉則何貴愛之有此聖人所以大同於物道之要妙不睹眾善無所用智七聖皆迷無所問途義恊於此碧虛子陳景元曰夫聖人雖游心於自得之場不可不立其師資也雖立師資復恐貴尙其師怜愛其資泥於陳迹不至遠達故再舉不貴其師不愛其資者夫人雖因師之發蒙尋其至理岀自天性是曰獨化故伯樂不能馭駑駘爲騏騮良匠不能伐樗櫟爲棟梁將使人忘其企慕然後可造至道之極故列子之師老商友伯高而得風仙旣而曰不知夫子之爲我師若人之爲我友不知風乘我耶我乘風耶内外盡矣此眞忘其師資者也聖人雖知小夫執滯言教必以此言大爲迷謬然而垂訓上士使彼我俱忘乃至言要妙之道也穎濱蘇轍曰聖人無心於教故不愛其資天下無心於學故不貴其師聖人非特吾忘天下亦使天下忘我又曰聖人之妙雖智者有所不喻也達眞子曰苟不貴其師則不善者不知修不愛其資則已善者不知戒若是則雖有智者亦入於大迷矣况其不智乎然能以是推之則得其道之要妙也黃茂材曰以善爲師以不善爲資貴其師猶爲人情所同愛其資是何心哉至人淡然無所貴愛善者吾善之不善者吾亦善之雖有智者於此大迷是謂要妙知其雄守其雌爲天下谿爲天下谿常德不離復歸於嬰兒知其白守其黑爲天下式爲天下式常德不忒復歸於無極知其榮守其辱爲天下谷爲天下谷常德乃足復歸於樸御註曰雄以剛勝物雌柔靜而已聖人之智知所以勝物矣而自處于柔靜萬物皆往資焉而不匱故爲天下谿谿下而流水所赴焉蓋不用壯而持之以謙則德與性常合而不離是謂全德故曰常德不離復歸於嬰兒氣和而不暴性醇而未散嬰兒也孟子曰大人者不失其赤子之心白以况德之著黑以况道之復聖人自昭明德而默與道會無有一疵天下是則是效樂推而不厭故爲天下式正而不妄信如四時無或差忒若是者難終難窮未始有極也故曰常德不忒復歸於無極書於洪範言王道曰歸其有極老氏言爲天下式者復歸於無極極中也有極者德之見于事以中爲至無極者德之復于道不可致也爲天下谷谷虚而能受應而不藏德至於此則至矣盡矣不可以有加矣故曰常德乃足樸者道之常體復歸於樸乃能備道夫孤寡不穀而王公自以爲稱故抱樸而天下賔碧虚子陳景元曰雄尊顯也强梁也先也雌卑微也柔弱也退也夫有道之士知己之尊顯出人之先縱之則强梁生而禍患至矣乃處身卑微守其柔弱謙退下位而天下歸服其德如水之流入深谿既心宇如谿是能保其常德不離于身去剛躁之欲心復性歸于嬰兒也嬰兒者諭其怕然淳和是非都泯也谿者水注川曰谿有道之士知己之心字如谿由虚室生白昭昭明了乃守其淵默持之自晦使光而不曜此可爲天下之法式矣人既模楷法式者是見其常德無所差忒德不差忒將與道冥極也極者言其深不可窮極也人所歸服而模楷法式是己之尊榮在民之先當守其卑辱持勝自污而受衆垢若此則天下歸心如水之投于深谷夫器量如谷是内德充足德充而無名則復歸于道樸也樸者謂隱材器而藏用也谷者水注谿曰谷潁濱蘇轍曰雄雌先後之及我者也白黑明闇之及我者也榮辱貴賤之及我者也夫欲先而惡後欲明而惡闇欲貴而惡賤物之情也然而先後之及我不若明闇之切明闇之及我不若貴賤之深古之聖人去妄以求復性其性愈明則其守愈下其守愈下則其德愈厚其德愈厚則其歸愈大蓋不知而不爲不若知而不爲之至也知其雄守其雌知性者也知性而爭心止則天下之爭先者皆將歸之如水之赴谿莫有去者雖然譬如嬰兒能受而未能用也故曰復歸於嬰兒知其白守其黑見性者也居闇而視明天下之明者皆不能以形逃也故衆明則之以爲法雖應萬物而法未嘗差用未能窮也故曰復歸於無極知其榮守其辱復性者也諸妄已盡處辱而無憾曠兮如谷之虚物來而應之德足於此純性而無雜矣故曰復歸於樸達眞子曰蓋性復於嬰兒然後造於無極造於無極然後反於樸固其入道之序也德之不離然後不忒德之不忒然後乃足固其入德之序也爲衆有所歸若其谿然後爲天下式既爲天下式則萬善爲一己之所容然後爲天下谷固其所至之序也蓋有常性然後有常德有常德然後有常道其序也清源子劉驥曰天一生水在人爲精陰中之陽也故謂之雄地二生火在人爲神陽中之陰也故謂之雌知其雄者保其精也守其雌者存其神也純素之道唯神是守守而勿失與神爲一虚無自然也身之虚而萬物至心之無而和氣歸如水之注谿不召而自來故爲天下谿爲天下谿則德與性合而不離故常德不離復歸於嬰兒嬰兒者居不知所爲行不知所之所以俗人昭昭我獨若昏俗人察察我獨悶悶故知其白守其黑也知白守黑則慧而不用實智若愚定慧相資智恬交養守道之精杳杳冥冥守道之極昏昏默默鍊虚無之體成自然之眞與天地合其德與日月合其明故爲天下式爲天下式則德與性合而無差忒故常德不忒復歸於無極無極者無窮無極同於大通與道爲一聖人體道之眞不以物易己不以美害生雖有榮觀燕處超然大白若辱盛德容貌若愚故知其榮守其辱也知榮守辱則納污藏垢無所不容如谷之虚無所不納故爲天下谷爲天下谷則反歸眞空與道合體故常德乃足復歸於樸樸者道之大全謂如混沌之始樸一元之初生也黃茂材曰夫道虚無恬淡清靜無爲超然出於群物之上謂之雄可也何以爲雌謂之白可也何以爲黑謂之榮可也何以爲辱蓋道欲退藏非有所眩耀於世雖知其雄乃自處以雌雖知其白乃自處以黑雖知其榮乃自處以辱故能爲天下谿可以行也爲天下式可以法也爲天下谷可以容也夫道至大求之者多各從其所入爲天下谿常德不離復歸於嬰兒孰爲嬰兒非道乎此自其德之不離而入於道者也爲天下式常德不忒復歸於無極孰爲無極非道乎此自其德之不忒而入於道者也爲天下谷常德乃足復歸於樸孰爲樸非道乎此自其德之乃足而入於道者也惟道難言言之不足至於再三又使其音韵句讀相類可以誦咏於口而不忘老子之意所以開示後人何其詳且至耶樸散則爲器聖人用之則爲官長故大制不割御註曰形而上者謂之道形而下者謂之器有形名焉有分守焉道則全天與人合而爲一器則散天與人離而爲二道之全聖人以治身道之散聖人以用天下有形之可名有分之可守故分職率屬而天下理此之謂官長易曰知微知彰知柔知剛萬夫之望與此同義碧虚子陳景元曰夫復於道樸則渾淪窅冥視之不見聽之不聞此乃體冥眞理者也若於治道則當散而爲器河上公曰萬物之樸散則爲器用若道散則爲神明流爲日月分爲五行也夫人眞心之散則爲念慮念慮一動則百行彰而庶事生庶事者材器也故聖人就其材器因其賢能而用爲百官之元長故能大制群物任之自然而不割傷也潁濱蘇轍曰聖人既歸於樸復散樸爲器以應萬物譬如人君分政以立官長亦因其勢之自然雖制而非有所割裂也陸佃曰樸者言其合也器者言其離也渾則合合則爲樸割則離離則爲器器者樸之反也故聖人割而用之則爲官長故大制不割劉槩曰大制不割謂長而不宰是也蓋無爲而用天下則大制不割矣大制者小以成小大以成大吾以爲之宰守雌未及乎守黑守黑未及乎守辱守辱則玄之又玄道眞仁靜先生曹道冲曰舊曾自註曰制度之大者無裁割之迹有山東劉正叟者以道冲此言說於王雱雱乃註在經中今復别註曰大制天地之造物也物自隨性而成不煩裁製也達眞子曰凡制物以割者使然也今大制天下而不割則道任乎自然矣陳象古曰樸散爲器有用有形之至也官長治爲器之主也總其器之大小任其材之長短入用則合任過則離皆自然之道也豈假聖人强力以割之哉黃茂材曰樸者道也渾然而已散則爲器聖人體道而用之物莫尊於道故爲官長夫以道制天下者何用割爲將欲取天下而爲之者吾見其不得已碧虛子陳景元曰已死也老子以謂非徒失道必見其不得死潁濱蘇轍曰聖人之有天下非取之也萬物歸之不得已而受之其治天下非爲之也因萬物之自然而除其害耳若欲取而爲之則不可得矣黃茂材曰取天下者湯武是也使湯武取天下而欲爲之其不能得亦可見矣一人之身爲物之所侵冦者甚多欲取其身於聲色紛擾之塗置於淸靜自得之場而乃爲之則是自亂也程大昌曰因其理之當然循而行之不敢參以己意是之謂以天下爲天下而非己之敢任也若屈當然之理而自出操縱是取天下而爲之者也故知其决不能遂也不得已者欲取而不遂也天下神器不可爲也爲者敗之執者失之碧虛子陳景元曰七竅鑿而混沌死鞭策威而馬力竭豈非爲者敗之乎而又執而不移自謂聖治非惟喪於至理亦將自失其眞故曰執者失之潁濱蘇轍曰凡物皆不可爲也雖有百夫之聚不循其自然而妄爲之必有齟齬不服者而况天下乎雖然小物寡眾蓋有可以力取而智奪者至於天下之大有神主之不待其自歸則叛不聽其自治則亂矣淸源子劉驥曰天下神器謂天地神明之器人之形體法象天地化契陰陽乃神器也游心於淡合氣於漠順物自然無容私焉而天下治將欲取天下而爲之則以人滅天以故滅命吾見其不得已黃帝南望而元珠遺七竅始鑿而混沌死故不可爲也爲則有敗執則有失黃茂材曰天下神器不可爲也不可執也至於人身獨非神器乎目何爲而視耳何爲而聽手足何爲而動皆其神爾古之人能養其神超然獨存謂之神人是豈可爲可執也歟故物或行或隨或嘘或吹或强或羸或載或隳是以聖人去甚去奢去泰御註曰萬物之理或行或隨若日月之往來或嘘或吹若四時之相代或强或羸若五行之王廢或載或隳若草木之開落役於時而制於數固未免乎累唯聖人爲能不累於物而獨立於萬物之上獨往獨來是謂獨有獨有之人是謂至貴故運神器而有餘裕物態不齊而吾心常一又聖人覩萬物之變遷知滿假之多累故無益生無侈性無泰至遊乎宇內而已若是則豈有爲者之敗執者之失乎故曰繁文飾貌無益於治碧虛子陳景元曰此八事謂外物不可必也甚奢泰皆過當越分因兹甚奢泰致其爲之故老氏之特垂深戒穎濱蘇轍曰陽陰相盪高下相傾大小相使或行於前或隨於後或嘘而煖之或吹而寒之或益而强之或損而羸之或載而成之或隳而毁之皆物之自然而勢之不免者也然世之愚人私己而務得乃欲拒而違之其禍不覆則折唯聖人知其不可逆而順以待之去其甚去其奢去其泰使不至於過而傷物而天下無患矣此不爲之至也堯湯之於水旱雖不能免而終不至於敗由此故也易之泰曰后以裁成天地之道輔相天地之宜以左右民三陽在內三陰在外物之泰極矣聖人懼其過而害生故裁成而輔相之使不至於過此所謂去甚去奢去泰也臨川王安石曰安於所安則能去甚以儉爲寶則能去奢以不足自處則能去泰矣陳象古曰此過常踰分之謂也如是者何由爲之執之不知其要故也淸源子劉驥曰譬如萬物之理有行則有隨有嘘則有吹有强則有羸有載則有隳物之變化何常之有唯聖人體道之常無古無今與道爲一而合於自然去甚去奢去泰則體道之自然而養其心矣黃茂材曰凡物或行而前或隨而後或嘘之則煖或吹之則寒或其勢强或其力羸或始而載載安也盛也或終而隳其行也其嘘也其强也其載也近於太過其隨也其寒也其羸也其隳也近於不及是以聖人去甚去奢去泰務適其中而已經曰多言數窮不如守中程大昌曰甚也奢也泰也則不可不去而未至於已甚已奢已泰則置之勿論曹參從蓋公學黃老而曰不擾獄市以爲獄市姦人之所容也而擾之則姦人無所容也以道佐人主者不以兵强天下其事好還御註曰孟子所謂反乎爾者潁濱蘇轍曰聖人用兵皆出不得已非不得已而欲以强勝天下雖或能勝其禍必還報之楚靈齊惛秦始皇漢武帝或以殺其身或以禍其子孫人之所毒鬼之所疾未有得免者也臨川王安石曰明則人報之幽則天報之殺人之父人亦殺其父殺人之兄人亦殺其兄人報之也師之所處荆棘生焉大軍之後必有凶年者天報之也劉槪曰以道佐人主者不以兵强天下故孔子對衞靈公之問則曰爼豆之事則嘗聞之矣軍旅之事未之學也葉夢得曰古之善用兵者毒天下而民從之亡國而不失人
