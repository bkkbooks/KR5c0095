body:
  text: 持而盈之不如其已揣而銳之不可長保御註曰盈則溢矣銳則挫矣萬物之理盈必有虧不知持後以處先執虛以馭滿而沉溺滿盈之欲是增傾覆之禍故不如其已物之變無窮吾之智有盡前識者道之華愚之始也揣物之情而鋭於進取則智有時而困可長保乎碧虛子陳景元曰嚴君平曰富貴之於我猶登山而長望也名勢之於我猶奔電之忽過也潁濱蘇轍曰知盈之必溢而以持固之不若不盈之安也知銳之必折而以揣先之不知揣之不可必恃也若夫聖人有而不有尙安有盈循理後行尙安有銳無盈則無所用持無銳則無所用揣矣葉夢得曰道欲其不盈爲其盈而持之則必覆不若無所執而聽其虧之爲愈也道欲挫其銳幸其銳而揣之則必折不若無所度而長保之爲愈也盈不持則無䘮己之患銳不揣則無敵物之憂黃茂材曰道無執也而欲其虛持而盈之其可乎道無體也而欲其圓揣而銳之其可乎此皆在於非道非道早已又安能長保林東曰道之爲道惡盈而好謙惡銳而以不露圭角之爲尙假使於盈而能持於銳而能揣不若無盈無銳之安且久也盈與銳非道中物以其易溢易折非安且久之理也金玉滿堂莫之能守富貴而驕自遺其咎御註曰金玉富貴非性命之理也外物之不可恃而有者也碧虛子陳景元曰嚴君平曰金玉之於身而名勢之與神若氷若炭勢不俱存故名者神之穢也利者身之害也養神之穢積身之害損我之所成而益我之所敗得之以爲利失之以爲害則彼思慮迷而趣舍悖也黃茂材曰金玉如所謂被褐懷玉非世間金玉也富貴如所謂知我者希則我貴矣非世間富貴也古之人有所得於中天下事物不足以動其心重内而輕外貴已而賤物故易至於驕晉嵇康之徒相與淸談崇尙玄妙非無得於道而以陵人傲物卒至於禍宜乎老氏以爲戒也功成名遂身退天之道御註曰功成者隳名成者虧日中則昃月盈則蝕物之理也聖人睹成壞之相因識盈虛之有數超然自得不累於物無復驕盈之患非知天者孰能與此故曰功成名遂身退天之道四時之運功成者去是天之道知進而不知退知存而不知亡知得而不知喪能勿悔乎伊尹曰臣罔以寵利居成功碧虛子陳景元曰夫大功旣成顯名已遂而不知休退者何人哉且高鳥盡良弓藏狡兔死獵狗烹勢使然也惟體天道之盈虛知進退存亡者至人哉黃茂材曰功者無功之功非世所謂功也名者無名之名非世所謂名也功成名遂而身退觀諸四時之序亦可以見天道老莊列子范蠡四皓安期生東方朔古之有道者也史皆不載其所終豈非道成而退人莫得而知耶載營魄抱一能無離乎御註曰魄陰也麗於體而有所止故老氏於魄言營魂陽也託於氣而無不之故易於魂言遊聖人以神御形以魂制魄故神常載魄而不載於魄如車之運百物載焉如時之行寒暑往焉心有天遊六徹相因外天地遺萬物而神未嘗有所困也豈復滯於魄哉又天一生水於物爲精地二生火於物爲神精神生於道形本生於精守而勿失與神爲一則精與神合而不離以精集神以神使形以形存神精全而不虧神用而不竭形生而不敝如日月之麗乎天如草木之麗乎土未嘗離也竊嘗申之人之生也因精集神體象斯具四達並流無所不極上際於天下蟠於地化育萬物不可爲象其名爲同帝而世之愚者役已於物失性於俗無一息之頃内存乎神馳無窮之欲外喪其精魂反從魄形反累神而下與萬物俱化豈不惑焉碧虛子陳景元曰道家以陽神曰魂魂樂其生陰鬼曰魄魄好其殺魂則遊魄則靜白虎通曰營者營營不定貌故謂魂爲營也舊說曰載乘也營魂也又謂營護陽氣夫魂爲陽精魄爲陰靈陽精喜動逝故仙書有拘留之術陰靈喜浮惑故仙書有制伏之法使其形體常乘載陽精陰靈抱守太和純一之氣令無散離永保長年矣夫道之抱一如鑑之含明眀豈離鑑乎此教人養神也今解曰能無離乎者老氏審問之辭也潁濱蘇轍曰聖人性定而神凝不爲物遷雖以魄爲舍而神所欲行魄無不從則神常載魄矣眾人以物役性神昬而不治則神聽於魄耳目困以聲色鼻口勞以臭味魄所欲行而神從之則魄常載神矣故教之以抱神載魄使兩者不相離此固聖人所以修身之要至於古之眞人深根固蒂長生久視其道亦由是也王雱曰魄陰物形之主也神之爲物廣大通達而不自了者神常載於魄故神反拘於形體此廣者所以狹通者所以滯也欲學此道者常先廓其志氣勿累於形體使神常載魄而不載於魄則可以抱一而體神矣竊嘗論曰人之旣死有升沉之異良由滅神徇形以神從魄故至於淪乎幽陰化爲異物也若夫神完之人雖魄之陰滯精與神爲一而無所不至矣聖人之死曰神不從魄也其始也亦載魄而已陸佃曰魂爲陽陽爲動魄爲陰陰爲止魂者神之佐其動有變而無化魄者精之輔其止有化而無變故魂言遊魄言營遊魂以言其變營魄以言其止載營魄所以外運抱一所以内守也故曰載營魄抱一能無離乎載魄所以致運抱一所以致守而内外常合而無離矣劉涇曰人之生諸陽爲魂諸陰爲魄各有名象而藏於肝肺之間下士知之上士見之精與神相依以生而並精出入者魄也與神往來者魂也此篇言載營魄營卽魂是也黃帝曰動以營身謂之魂易曰遊魂爲變莊子曰其魂不疲皆爲魂主經營動作爲一身之運爲魄則並精出入主化成變而已今百骸九竅具吾形者魄之屬也使非魂以營之則與行尸何以異乎魄不可以無魂猶月不可以無日魄待魂而成營月待日而生光此言魂之用而曰營言魄之體而曰魄也載謂以形載也形車也魄與魂車之積也道眞仁靜先生曹道冲曰形體本無知覺以其載負魂魄故有動作魂爲陽利於淸虛魄爲陰好於營爲雖大槪謂之魂魄而老子獨言魄者以陰魄好營營於慾故也葉夢得曰人之生也以心藏神以腎藏精以肝藏魂以肺藏魄而後形體立精神之運形體不能拘而魂魄者所以守其形體者也魂出乎陽故升而上者散而無不之易謂之遊魂魄出乎陰故沉而下者滯而不能去老氏謂之營魄營者有方之言也善攝生者常使陽勝陰陰不能撓陽故魂每載魄而與之俱晦菴朱熹曰以車承人謂之載古今世俗之通言也以人登車亦謂之載則古文史類多有之如漢紀云劉章從謁者與載韓集云婦人以孺子載葢皆此意今所謂營者字與熒同而爲晶明光炯之意其所謂魄則亦若余之所論於九歌者耳其意葢以魂陽動而魄陰靜魂火二而魄水一故曰載營魄抱一能勿離乎言以魂加魄以動守靜以火迫水以二守一而不相離如人登車而常載於其上則魂安靜而魄精明火不燥而水不溢固長生久視之要訣也但爲之說者不能深考如河上公以營爲魂則固非字義而又并言人載魂魄之上以得生當愛養之則又失其文意獨其載字之義粗爲得之然不足以補其所失之多也若王輔嗣以載爲處以營魄爲人所常居之處則亦河上之意至於近世而蘇子由王元澤之說出焉則此二人者平生之論如水火之不同而於此義皆以魂爲神以魄爲物而欲使神常載魄以行不欲使神爲魄之所載洪慶善亦謂陽氣充魄爲魂魂能運動則其生全矣則其意亦若蘇王之云而皆以載爲以車承人之義矣是不唯非其文意且若如此則是將使神常勞動而魄亦不得以少息雖幸免於物欲沉溺之累而窈冥之中精一之妙反爲强陽所挾以馳騖於紛拏膠擾之塗卒以陷於眾人傷生損夀之域而不自知也專氣致柔能如嬰兒乎御註曰易曰乾其靜也專楊雄曰和柔足以安物靜而不雜之謂專和而不暴之謂柔嬰兒居不知所爲行不知所之不藏是非美惡故氣專而致柔孟子曰蹶者趨者是氣也而反動其心心不足以專氣則氣有蹶趨之不正而心至於僨驕而不可係聖人虛己以遊世心無使氣之强則其靜而不雜和而不暴與嬰兒也奚擇故曰能如嬰兒乎孟子曰其爲氣也至大至剛以直養而無害則塞乎天地之間老氏之專氣則曰致柔何也至剛以行義致柔以復性古之道術無乎不在碧虛子陳景元曰舊說曰專一也任也氣者冲和妙氣也又自然之氣也夫人卓然獨化禀自然冲和妙氣氣降形生自無染雜若乃專任冲妙知見都忘使氣自純和形自柔弱不爲眾惡所害是得嬰兒之全和也此教人養氣也潁濱蘇轍曰神不治則氣亂强者好鬬弱者喜畏不自知也神治則氣不妄作喜怒各以其類是之謂專氣神虛之至也氣實之始也虛之極爲柔實之極爲剛純性而亡氣是之謂致柔嬰兒不知好惡是以性全性全而氣微氣微而體柔專氣致柔能如嬰兒極矣王雱曰人生有三曰精曰神曰氣精全則神王神王則能帥氣矣神衰而不足以帥氣則動作不常使人陷於非道孟子曰志者氣之帥也楊雄曰氣者所適善惡之馬歟帥懦而眾悖則帥必亡馬怒而御疲則車必敗神不能專氣則喜怒哀樂惟氣所爲流陷越佚理固然也古之士無不曉此苟未及此則當淸心以防之孔子所謂三戒皆防氣也門人獨顔回能專氣故曰不遷怒氣之暴在陽而陽之發者莫暴於怒於怒可以無遷則非專氣而何人生本具聖質氣佚而不能專故自壯以往離道彌遠能抱一則神王神王則氣柔氣柔則眞全所以與嬰兒同專者有而擅其權之謂陸佃曰葢內守者氣之所以致專外運者氣之所以致柔其守致專其運致柔而其德比於赤子則然后其心可以疏瀹其神可以澡雪而照之於天萬法俱空而無一法之累也故言專氣致柔能如嬰兒乎道眞仁靜先生曹道冲曰心旣散辭氣亦蕩流問爾能專守一氣通於無間與物不逆柔而至順復命全眞如嬰兒在胎中乎陳象古曰氣爲動用之先柔爲剛强之本晦菴朱熹曰專非守之謂也只是專一無間斷致柔是到那柔之極處纔有一豪發露便是剛這氣便粗了滌除玄覽能無疵乎碧虛子陳景元曰舊說曰滌洗也除遣也理也玄覽心照也疵病也夫人當洗滌塵垢除遣五情内外淸虛心照萬事瑕疵之病瑩然不生此教人修心也自此上三事約人修身自此下三事勸人治國也經曰修之身其德乃眞修之天下其德乃溥也今解曰能無疵乎者言人欲要洗心除垢冥察內外之事當能自省已躬無有疵瑕之病乎潁濱蘇轍曰聖人外不爲魄所載內不爲氣所使則其滌除塵垢盡矣於是其神廓然玄覽萬物知其皆岀於性等觀淨穢而無所瑕疵矣臨川王安石曰滌除洗心也玄覽觀妙也如月之明如珠之瑩能無疵乎劉涇曰此章以全精全氣全神爲學道之根故無離以言養精如嬰兒以言養氣無疵以言養神也陳象古曰滌如水之濯也除如掃糞穢也玄覽於是可全矣無疵玄覽之要妙故又教之以不可以有疵瑕也淸源子劉驥曰聖人以此洗心退藏於密則滌除萬念而玄覽妙理何疵之有愛民治國能無爲乎碧虛子陳景元曰舊說曰愛民者當愛民如赤子臨政不可苛虐賦役不可傷性治國者當務農簡事使民各遂其業而安其生斯無爲之化也今解曰能無爲乎者言人君欲愛養萬民令不傷天性治國務農使無繁細常能淸靜無爲乎潁濱蘇轍曰旣以治身又推其餘以及人雖至於愛民治國一以無心遇之苟其有心則愛民者適所以害之治國者適所以亂之也臨川王安石曰愛民者以不愛愛之乃長治國者以不治治之乃長惟其不愛而愛不治而治故曰無爲夫無爲者用天下之有爲有爲者用天下之不足然老子方言其反本而曰愛民治國者何也葢老子爲言其反本遂自道而起教所謂吉凶與民同患是也不惟老子之言若是凡古之聖人皆如此也劉涇曰莊子曰道之眞以治身其緒餘以治國家愛民仁也治國政也王侯之事不能無爲視以芻狗則得之淸源子劉驥曰老氏方言其反本而繼之以愛民治國何也葢一身之設一國之象也聖人以心爲君以身爲國以氣爲民無爲而尊君之道也心無爲而尊於上萬氣自行百骸自治保氣所以愛民全形所以治國無爲也則用天下而有餘有爲也則爲天下用而不足故愛民治國能無爲乎黃茂材曰夫學道而至於無爲豈一日之積哉抱一矣致柔矣玄覽無疵矣然後可以至於無爲儻未能是而强欲至於無爲之地夫是之謂坐馳去道益遠國譬則身也民譬則神也愛民治國與其身同天門開闔能爲雌乎御註曰經曰知其雄守其雌爲天下谿聖人體天道之變化卷舒啟閉不違乎時柔剛微彰惟其所用然未嘗先人而常隨人未嘗勝物而嘗下物故天下樂推而不厭能爲雌於是乎在碧虛子陳景元曰天門者自然之門也自然生太極太極生天地天地生陰陽陰陽生萬物死萬物生死由之而往來故謂之天門開謂散施闔謂歙斂開則生成闔則衰滅雖生萬物而未見其生生者雖死萬物而未見其死死者生生死死而莫見其形得不謂之自然乎能體自然者其唯大人乎夫大人量包宇宙氣含陰陽所爲雌靜則生死王衰不入於胷中雌靜者自然之妙用也此戒治身治國者當以雌靜是守臨川王安石曰夫萬物由是而出由是而入故謂之天門有開闔則有動靜有動靜則有雌雄惟其守雌以勝雄守靜以勝動故曰天門開闔能爲雌乎劉涇曰成人事者必因天道故此言天門莊子曰天門無有也萬物出乎無有易曰一闔一闢謂之變葢天道主變愛民治國因諸天而已何事於雄不得己則亦應焉而已道眞仁靜先生曹道冲曰開闔者變化之道雌靜者畜養之德黃茂材曰天門顖門也今嬰兒腦顖中開闔不住修眞至此可以上通天道故謂之天門雌與牝同明白四達能無知乎潁濱蘇轍曰明白四達心也是心無所不知然而未嘗有能知之心也夫心一而已苟又有知之心者則是二也自一而二蔽之所自生而愚之所自始也今夫鏡之於物來則應之而己矣又安得知應物者乎本則無有以意加之此妄之源也黃茂材曰無知者無所不知猶人開眼而視無所不見何嘗曰吾有見焉有見有不見謂之眼病有知有不知謂之心病自抱一凡六進而後進於無知是以齧缺問於王倪四問而四不知齧缺因躍而大喜良有以也生之畜之生而不有爲而不恃長而不宰是謂玄德御註曰聖人存神知化與道同體則配神明育萬物無不可者生之以遂其性畜之以極其養無愛利之心焉故生而不有無矜伐之行焉故爲而不恃無刻制之巧焉故長而不宰若是者其德深矣遠矣與物反矣故曰是謂玄德碧虛子陳景元曰言修身治國能行上六事卽如道之生物不塞其原任其自成而已德之養物不禁其性全其素分而己夫萬物卓爾獨生聖人豈有乎哉羣類各自營爲聖人何恃乎哉且物自長養聖人安能主宰乎哉斯乃忘功忘物洞入冥極是謂淵德也王弼曰淵德者有德而不知其主乎幽冥也王雱曰玄爲妙體德之至也昔舜在側微書稱玄德葢至德常在於無思無爲道眞仁靜先生曹道冲曰雖生成在我任其賦命不專而有之雖雕刻眾形造化萬物不恃其能長養於物不主其功潛被嘿通不自彰顯故曰玄德陳象古曰生則品物流形各正性命也育則養之以冲和之氣得遂其自然生死也育之之功治天下之所有也萬物生之以奉己而不以爲有故亦爲而不恃長而不宰矣玄德運之在心不彰於外是也黃茂材曰經凡兩言此矣前者所言道也是第二章今之所言德也道降而爲德德之妙者復與道合故謂之玄德三十輻共一轂當其無有車之用埏埴以爲器當其無有器之用鑿戸牖以爲室當其無有室之用御註曰有無一致利用出入是謂至神有無異相在有爲體在無爲用陰陽之運萬物之理也車之用在運器之用在盛室之用在虛妙用出於至無變化藏於不累如鑑無象因物顯照碧虛子陳景元曰此明有無功用相資而立當其轂中空虛輪得以轉行車中空虛人所以載其上故其空無之處是有轉行容載之用也埏和也埴粘土也謂工人範和粘土陶成形器取其器中空無之處是有盛受諸物之用也鑿穿也半門曰戸門傍窓謂之牖古者穴處謂穿鑿穴中之土以覆其上爲戸牖居室也取其室中空無之處故人有安存出入之用也道眞仁靜先生曹道冲曰三者皆於外有以成形內虛而受物虛因有以能受有假無以爲用淸源子劉驥曰扁鵲言人身中有五藏眞氣之所會五藏各有六氣故有五六三十之會原猶車之三十輻也流轉不息通於一樞猶三十輻之共一轂也聖人知變化之樞機假有爲之形體以身爲爐三宮爲鼎造化於虛無恍惚之中如所乘之車所用之器所居之室在有爲體在無爲用晦菴朱熹曰無是轂中空處惟其中空故能受軸而運轉不窮猶傘柄上木管子眾骨所會者緣管子中空又可受傘柄而開闔下上車之轂亦猶是也莊子所謂樞始得其環中以應無窮亦此意黃茂材曰有有中之有有無中之有無中之有其用無窮有中之有其利甚博輻轂以爲車埏埴以爲器戸牖以爲室此則有中之有民之賴其利也博矣雖無車而有車之用雖無器而有器之用雖無室而有室之用此則無中之有至人達士資其用也無窮今參同契黃庭經多載是說葢有所由來矣故有之以爲利無之以爲用潁濱蘇轍曰非有則無無以致其用非無則有無以施其利是以聖人常無以觀其妙常有以觀其徼知兩者之爲一而不可分則至矣陸佃曰有無相用不可以一偏故無無則不足以用有無有則不足以見無以有爲利則或至於止以無爲用則用常至於無窮道眞仁靜先生曹道沖曰有者適時之利無者眞常之用在人身則駕御主持神與炁也無者虛妙之神炁也有者凝滯之形骸也心運以氣隨假形以爲利氣動以形隨假神而爲用此二者有無之相須也淸源子劉驥曰有以爲利無以爲用世之昧者唯聞捨身之道未達卽身之妙此老氏所以引車器室而詳喻之也是猶乾坤成列而易立乎其中乾坤毁則無以見易形體毁則無以保神所以貴乎形神俱妙也五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心發狂難得之貨令人行妨碧虛子陳景元曰五色之設黼黻文章别尊卑之飾斯則五色之用也而後世爲錦繡之麗靑黃悅目逐物外遷傷精喪明不能徹視無色之色非盲而何五音之設金石絲竹通天地之氣斯則五音之用也而後世作鄭衞之聲淫哇悅耳耽營不已蕩性塞聰不能冥聽無聲之聲非聾而何五味之說鹽梅調適養人之體斯則五味之用也而後世有熊掌之嗜芻豢美口饕餮無厭濁神穢眞不能内嘗無味之味非爽而何爽亡也差也失也田獵者國之常禮以講武事示民時也天子諸侯每𡻕三田一爲乾豆祭祀宗廟也二爲賓客交二國之好也三充君之庖食以時也時之不田則曰不恭不以時則謂之暴天物故春蒐夏苗秋獮冬狩若不遵法度馳騁逐境禽荒無節暴物傷農登崖踰險旬月不返心神發亂非狂而何夫金銀珠玉難得之寶貨人若貪取無厭采求不已則道行妨傷而身多勞辱也嚴君平曰五色重而天下盲五音調而天下聾五味和而天下喑田獵興而天下狂珠玉貴而天下勞幣帛通而天下傾是故五色者陷目之錐也五音者塞耳之椎也五味者斬舌之鉞也田獵者狂惑之帥也遠方之貨天下之所以違也難成之物天下之所以微也凡此數者變而相生不可窮極難明而易滅也難得而易失也殃禍之閭而危亡之室也求之以自賊而居之以自殺也此上戒君王而下訓兆民也潁濱蘇轍曰視色聽音嘗味其本皆出於性方其有性而未有物也至矣及目緣五色耳緣五音口緣五味奪於所緣而忘其本則雖見而實盲雖聞而實聾雖嘗而實爽也劉涇曰人之身竅肝爲目竅腎爲耳竅脾爲口而與五色聲味同爲死生此大患也而愚者見色不見其害猶弗見也聞聲不聞其患猶弗聞也嘗味不嘗其患猶弗嘗也故見作盲聞作聾嘗作爽是作之也非疾也疾則虧其體而已見聞嘗性固有在焉莊子曰屬性乎五色雖通如離朱非吾所謂明屬性乎五聲雖通如師曠非吾所謂聰屬性乎五味雖通如俞兒非吾所謂藏亦以係物失己而己受患爲先故耳次目受患爲深故口次耳又內狂其心外妨其行則吾身之患備矣馳馬從禽此兩者能亂人之陽以動其心以至於發狂者而彼反資以爲樂黃帝則曰狂之病妄行不休其說是也妨害也行所以行己難得之貨使人昏於同利則爲害大矣道眞仁靜先生曹道冲曰五色炫亂視極則損明五音喧雜聽極則損聰爽者失也人皆縱嗜好之常情失恬淡之眞味故眞人潄玉池以飲津固靈根以含氣也畋獵者極其精神以瞻望困其氣血以馳騖是使心志散亂猖獗發狂害物傷和莫甚於此亦如世俗奔逐情慾趨走聲利失志沮氣然後休息貨者非賦分之所有妄求徼取是謂難得與人善行有所妨礙黃茂材曰所貴於目者爲其見道若不見道與盲無異非蔽於五色而然乎所貴於耳者爲其聞道若不聞道與聾無異非淫於五音而然乎道之出口淡乎無味若以肥甘爲美又安知其所謂淡然者今人嚥納津液久而自不愛食五味葢得於此馳騁畋獵固未至於狂而以淸靜無爲者觀之豈不爲狂昔韓退之論擊毬之害曰凡五藏之繫絡甚微坐立必垂於胷臆之間而以之顚頓馳騁其危哉夫稍知道者視金帛珠玉如糞土然何至於尙貨葢非此之謂也當是時神農本草黃帝素問己行於人間將必有食芝餐玉養丹竈之說老子以爲是皆身外難得之物無益於生妨人多矣不若求之吾身之爲易也是以聖人爲腹不爲目故去彼取此御註曰八卦坤爲腹以厚載而容也離爲目以外視而明也厚載而容則無所不受外視而明則有所不及聖人以天下爲度故取此能容之腹非事事而治之物物而察之故去彼外視之目莊子曰賊莫大於德有心而心有眼故聖人去之潁濱蘇轍曰聖人視色聽音嘗味皆與人同至於馳騁畋獵未嘗不爲而難得之貨未嘗不用也然人皆以爲病而聖人獨以爲福何也聖人爲腹而眾人爲目目貪而不能受腹受而未嘗貪故也彼物之自外至者也此性之凝於內者也道眞仁靜先生曹道冲曰守綿綿之氣以實腹去察察之視以養明也陳象古曰爲腹則實其腹也內藏其明者也不爲目則防其外境之侵鑠我也彼外也此內也是聖人之所取舍也淸源子劉驥曰聖人不爲聲色五味畋獵貨財所惑所以爲腹不爲目也腹者有容於內目者有見於外聖人收視反聽遺元復命治其內而不治其外求諸己而不求諸人所謂明者非見彼也自見而已所謂聰者非聞彼也自聞而己所謂
