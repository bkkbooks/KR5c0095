body:
  text: 宋鶴林彭耜纂集勇於敢則殺章第七十三勇於敢則殺勇於不敢則活御註曰剛强者死之徒柔弱者生之徒列子曰天下有常勝之道曰柔碧虚子陳景元曰剛毅之人無所畏忌見威不懼必果無迴眎其凶頑便施誅戮雖有諌諍未嘗顧盻故曰勇於敢則殺懷道之士謹於去就檢身知退靜順柔和弗敢有爲不忍殺傷衆雖睚眦終懷慈仁故曰勇於不敢則活葉夢得曰勇於敢則好殺勇於不敢則好活均於必行而不可屈故同謂之勇程大昌曰勇於敢則殺即所謂强梁者不得其死蓋推其理有取死之道焉故也勇於不敢則活即虎兕無所投其爪甲兵無所措其刃者也此兩者或利或害天之所惡孰知其故是以聖人猶難之御註曰順天者存逆天者亡雖聖人不敢易也碧虚子陳景元曰兩者謂敢與不敢殺與活也故意也夫天地之大德曰生故聖人以慈爲寳而不樂殺人也死者人倫之荼毒也凡含生之類皆惡其死也勇於果敢者殺之道也勇於慈仁者活之道也若以此義守而不變是未明天地殺生之權也今乃曰或利或害者是於殺活有所未定耶夫人爲不善於顯明之處人得而誅戮之爲不善於幽閑之所鬼得而殺伐之此雖有大聖之慈天道之仁不能憫救也涑水司馬光曰聖人於天道亦不敢易言之潁濱蘇轍曰勇於敢則死勇於不敢則生此物理之常也然而敢者或以得生不敢者或以得死世遂以僥悻其或然而忽其常理夫天道之遠其有一或然者孰知其好惡之所從來哉故雖聖人猶以常爲正其於勇敢未嘗不難之列子曰迎天意揣利害不如其已患天道之難知是以歷陳之也王雱曰下愚小智但見衆人之所利而不知天所惡也故下文明天道之所以然當視以爲法陸佃曰觀之以麤理則剛强勝柔弱觀之以眞理則柔弱勝剛强故剛强天之所惡也道眞仁靜先生曹道冲曰此兩者敢與不敢然而保生者以不敢爲利謂其可活而亦有端居偶逢其禍者慕名者勇於敢捍敵而多害或有輕生而終不罹害者達眞子曰勇於敢則勇於有爲也勇於不敢則勇於無爲也無爲則任於自然有爲則因其或使有爲之爲害莫不甚於殺無爲之爲利莫不甚於活是以此兩者或利或害也天之道任其自然則或使者爲天之所惡也且天道遠而難測雖聖人猶難之况非聖人者乎陳象古曰勇於敢是害也勇於不敢是利也皆失其冲和之妙用也天之所惡與道違也葉夢得曰可殺而殺則利非所當殺而殺則害可活而活則利非所當活而活則害蓋可殺者必天之所惡天道難諶人不可以知其故聖人猶難之清源子劉驥曰勇於敢或以得生勇於不敢或以得死此兩者或利或害天之所惡孰知其故是以聖人猶難之然要其終而盡其變然後知天網恢恢廣大雖疏而不失也天之道不爭而善勝御註曰萬物之出與之岀而不辭萬物之歸與之歸而不迕是謂不爭消息盈虚物與之俱而萬物之多皆所受命是謂不爭而善勝陳象古曰天法道故如是碧虚子陳景元曰天道自然平施不逆萬物而萬物自尊之豈與人校其敢與不敢殺與活哉然而人自服從者不與物爭而能善勝者也所謂勝物而不傷非由其勇敢也涑水司馬光曰任物自然物莫能違潁濱蘇轍曰不與物爭於一時要於終勝之而已王雱曰天爲群物之父豈與赤子爲敵乎清源子劉驥曰不爭而天下莫能與之爭不言而善應御註曰天何言哉變以雷風示以禍福無毫釐之差有影響之應碧虚子陳景元曰天何言哉四時行焉百物生焉而福善禍淫之應信不差矣涑水司馬光曰隨其順逆應以吉凶潁濱蘇轍曰天何言哉四時行焉百物生焉未有求而不應者也清源子劉驥曰不言而萬物莫不受其命不召而自來碧虚子陳景元曰天道高遠又無言教何嘗呼召萬物而萬物背陰而向陽春生而秋實暑往而寒來涑水司馬光曰不疾而速不行而至潁濱蘇轍曰神之格思不可度思矧可斁思夫又誰召之哉臨川王安石曰陰陽代謝四時往盈虚與時偕行故不召而自來坦然而善謀御註曰德行常易以知險臨川王安石曰以其常易故坦然以其知險故善謀潁濱蘇轍曰坦然舒緩若無所營而其謀非人之所及也天網恢恢疏而不失御註曰聖人爲能體此故不就利不違害常利而無害所以與天合德異夫勇於敢者碧虚子陳景元曰張自然之羅故曰天網縱太虚之寬故曰恢恢四達皇皇是謂疏幽明難逃是謂不失潁濱蘇轍曰世以耳目觀天見其一曲而不睹其大全有以善而得禍惡而得福者未有不疑天網之疏而多失也唯能要其終始而盡其變化然後知其恢恢廣大雖疏而不失也達眞子曰皆其自然之所致惟勇於不敢者能同也蓋能同於天則能同於道矣黄茂材曰四者天之道也人能順天則存不能順天則亡無謂其道闊遠可得而欺也程大昌曰天之覆物也廣矣苟於細小之地而致察焉則效近而力狹所謂三年生一葉則物之有葉者少矣正其理也夫惟總大略小則夫不能致察於初大類乎疏矣然要其終驗其大則夫一定而不爽者常可必也故曰一雀過羿必得之則以一人而候一物者耳以天下爲之籠而雀無所逃此明於用大者之論也世之疑天者殆如夏葉有一黄落而執之以爲不純乎陽冬枝而有一華實而指之以爲不純於陰豈其可與論大者哉周之興也商之賢者不間在亡皆得伸氣而伯夷叔齊餓死于首陽之下至于漢之武帝慕古好儒而司馬遷獨受刑辟故遷發憤於夷齊以舒其怨而曰天道無親常與善人若伯夷叔齊者非善人耶此以一葉焦枯而議夏以一枝華實而疑冬者也遷蓋好黄老而不得夫恢恢之大旨者也民常不畏章第七十四民常不畏死奈何以死懼之若使民常畏死而爲奇者吾豈執而殺之孰敢碧虚子陳景元曰不畏死有二義達者得其常理而不畏死愚者失其常理而不畏死夫人生而靜天之性樂生惡死人之常耕而食織而衣安其居樂其業養生葬死此世之常禮也夫民存常性官守常法而無枉濫皆得其死而生死得常則何畏之有逮德下衰不能無爲禁網繁密民不聊生盜竊爲非欺紿生亂小恐惴惴而懷驚大恐縵縵而忘死如何刑法滋深主司暴酷更以大辟族誅之令而恐懽於良民哉畏死亦有二義養生謹慎之人畏其夭死而修德也造惡偷安之人畏其刑死而矯法也人之自然也則含哺而嬉乎淡泊鼓腹而游乎混茫雖百年之殂而不知老之將至此順化之民也今乃法令滋彰動入死地是使民常畏死夫民畏死則偷安其生偷安其生者未有不先興奇變奸詐之心而矯其法也奸詐生而禍亂作則吾主司者得專執而殺戮之欲其奸詐絶蹤而誰敢犯之者潁濱蘇轍曰政煩刑重民無所措其手足則常不畏死雖以死懼之無益也民安於政常樂生畏死然後執其詭異亂群者而殺之敦敢不服哉達眞子曰民之所畏者莫甚於死然所動者以愛慾所適者以情累所以動之死地是謂常不畏死也以道言之則常不畏死奈何以死焉懼乎言雖懼亦無如之何也陳象古曰奇邪也今以其不畏死故不敢任殺黄茂材曰此有司之事非老子可得而代其任獨孔子爲魯司寇七日而誅少正卯其他奇行之民固亦不少常有司殺者殺而代司殺者殺是代大匠斲夫代大匠斲希有不傷其手矣御註曰上必無爲而用天下下必有爲而爲天下用不易之道也代司殺者殺代大匠者斲是上與下同德倒道而言迕道而說人之所治也安能治人文王罔攸兼于庶言庶獄庶慎惟有司之牧夫爲是故也潁濱蘇轍曰司殺者天也方世之治而詭異亂群之人恣行於其間則天之所棄也天之所棄而吾殺之則是天殺之而非我也非天之所殺而吾殺之是代司殺者殺也代大匠斲則傷其手代司殺者殺則及其身矣清源子劉驥曰然司殺者造化也萬物之自生自殺有造物者主之不假人手若以人爲代造化生殺是猶代大匠斲也代斲且不免傷况代殺乎民之饑章第七十五民之饑以其上食税之多也是以饑民之難治以其上之有爲也是以難治御註曰賦重則民不足政煩則奸偽滋起民失其樸碧虚子陳景元曰有爲則政煩無爲則簡易易則易從煩則難治又上有擊鮮玉食之厭則下有腐糗糟糠之美涑水司馬光曰擾之故難治潁濱蘇轍曰上以有爲導民民亦以有爲應之故事多而難治黄茂材曰賦斂重而民力困故饑法令煩而民心詐故難治人之輕死以其生生之厚也是以輕死御註曰矜生太厚則欲利甚勤放僻邪侈無不爲已碧虚子陳景元曰夫政令煩苛賦斂重大而民亡本業矣亡業則競求寳貨而觸法犯禁輕就死地以其各求養生之具太厚致有蹈水火而不懼逆白刃而不驚故曰是以輕死涑水司馬光曰求利所以養生也而民常以利喪其生潁濱蘇轍曰上以利欲先民民亦爭厚其生故雖死而求利不厭王雱曰生者不有其生則生常全既過於厚則求欲無已觸刑蹈險視死輕矣道眞仁靜先生曹道冲曰多欲則厚於用度則不足不足則生貪心嗜好驅之飢寒迫之故輕生圖利也陳象古曰迷於愛慾忘其患苦衆人之情也黄茂材曰風俗驕奢而民决性命之情以爭故輕死唯無以生爲者是賢於貴生也碧虚子陳景元曰夫貪生趨利者如羊之就屠以速其死耳獨有外形忘生者處皂隸而不辱食藜藿而常甘雖世事之險巇亦陸沉而安穩是以有異乎貴生者也自貴其生者謂身欲安逸口欲厚味形欲美服目欲好色耳欲音聲涑水司馬光曰外其身而身存潁濱蘇轍曰貴生之極必至於輕死惟無以生爲而生自全矣王雱曰此篇三事但明其一則餘二可知也陳象古曰無以生爲道之妙也葉夢得曰由是言之患民之難治而有爲以治之豈若無爲而使之自治恐民之飢而多税以食之豈若無税而使之自食也黄茂材曰夫言豈一端而足哉老子之道本以貴生今云無以生爲者以民矜生大厚鄭有公孫朝公孫穆二人者極其酒色之欲問之則曰生難遇將以盡吾一生之歡此言所以祛其惑耶程大昌曰簞食瓢飲亦可以飽而必以食前方丈爲事則失於太厚也充方丈之食而推其所自來則豈其易辦也哉攫金忘人犯龍而探珠折一臂而期得國亦將甘心爲之雖水火兵刃悉皆無避則或因生生以致喪生也人之生章第七十六人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁故堅强者死之徒也柔弱者生之徒也御註曰萬物負陰而抱陽冲氣以爲和陽以發生爲德陰以肅殺爲事方其肅殺則冲和喪矣故曰堅强者死之徒柔弱者生之徒碧虚子陳景元曰民之生也含元和之氣抱眞一之精形全神王故其百骸柔弱也及其死也元和之氣散而眞一之精竭形虧神亡故其百骸堅强也無情者以氣聚散爲榮枯有識者以道存亡爲生死開元疏曰草木生則柔脆死則堅强則知人爲堅强之行者是入死之徒也爲柔弱之行者是出生之類爾嚴君平曰陽氣之所居木可卷而草可結也陽氣之所去水可凝而冰可拆也故神明陽氣生之根也柔弱物之藥也柔弱和順長生之具而神明陽氣之所托也萬物隨陽氣以柔弱也故堅强實滿死之形象也柔弱潤滑生之區宅也穎濱蘇轍曰冲氣在焉則體無堅强之病至理在焉則事無堅强之累是以兵强則不勝木强則共故堅强居下柔弱處上御註曰拱把之桐梓人皆知養之强則伐而共之矣柔之勝剛弱之勝强老氏之道術有在於是莊子曰以濡弱謙下爲表碧虚子陳景元曰夫兵者所謂凶險之器鬭爭之具所觸之境與敵對者也故兵强則主不憂主不憂則將驕將驕則卒暴夫以不憂之君御驕將以驕將臨暴卒且敗覆之不暇何勝敵之有哉故夏商之裔以百萬之師而傾四海始皇之末以一統之業而喪九州項羽忽霸而遽亡王莽既篡而旋滅符堅狼狽於淮上隋煬分崩於楚宫此數家之兵皆多至數兆少猶數億無不自恃其成以取其敗此皆兵强則不勝之明驗也臨川王安石曰共者不順之辭故曰木强則共王雱曰伐而共之達眞子曰用兵有言不敢爲主而爲客不敢進寸而退尺善勝敵者不爭皆意不在於强也是以兵强則不勝者此也木之强則必人共伐兵以柔弱致其勝木以柔弱致其存是以堅强可居其下而柔弱可處其上也人之立性固不異此潁濱蘇轍曰物之常理精者在上粗者在下其精必柔弱其粗必剛强黄茂材曰列子載老聃之言曰兵强則滅木强則折列子之書大抵祖述老子之意且其世相去不遠木强則折其文爲順今作共又讀如拱其說不通當以列子之書爲正葉夢得曰此有道以佐人主者所以不欲以兵强天下也天之道章第七十七天之道其猶張弓乎高者抑之下者舉之有餘者損之不足者補之天之道損有餘補不足人之道則不然損不足而奉有餘御註曰道無益損物有盈虚注焉而不滿酌焉而不竭者聖人之所保也降而在物則天地盈虚與時消息而况於人乎天之道以中爲至故高者抑之不至有餘下者舉之不至于不足將來者進成功者退四時運行各得其序滿招損謙得益時乃天道碧虚子陳景元曰嚴君平曰夫工人之爲弓也無殺無生無噏無張制以規矩督以準繩弦高急者寬而緩之弦弛下者攝而上之其有餘者削而損之其不足者補而益之弦質相任上下相權平正爲主調和爲常故弓可秤而矢可行夫按高舉下損大益小天地之道也開元疏曰此明人道不能同天道之損益而裒多益寡也在易之損下益上曰損損上益下曰益以下爲本也損損下益上其道上行夫在泰卦而損下益上遂變之爲損益損上益下民說無疆夫在否卦而損上益下遂變之爲益此聖人設卦觀象之法也開元引證深得之矣潁濱蘇轍曰張弓上筋弛弓上角故以況天之抑高舉下天無私故均人多私故不均葉夢得曰張弓者挽之而後弛是亦斂之於己而施之於物者也故天道亦如之此其高下抑揚有餘不足無不中其節者其取之不在外也人反是求於外而不求於内是以每損人之不足以奉己之有餘清源子劉驥曰天道出於自然故損有餘而補不足人道出於使然故損不足以奉有餘黄茂材曰天之道無高無下無有餘不足譬之張弓然適其平而已人則異於天以眇然之軀精神能有幾何晝夜用之役於外物無時少休豈非損不足奉有餘乎孰能損有餘而奉不足於天下者其唯道乎是以聖人爲而不恃功成不居其不欲見賢耶御註曰不恃其爲故無自伐之心不居其功故無自滿之志人皆飾智己獨若愚人皆求勝己獨曲全惟不欲見賢也故常無損得天之道碧虚子陳景元曰奉者明聖君哲人居物之上心不忘下如卑者之奉尊而不以高貴加人也夫聖人者圓通爲智因物爲心𩐋萬物而不爲義澤及萬世而不爲仁長於上古而不爲老覆載天地刻雕衆形而不爲巧豈以己所施爲矜恃其美哉功成事遂固處其位哉夫惟不恃不處故能爲群材之帥也潁濱蘇轍曰有道者澹足萬物而不辭既以爲人己愈有既以子人己愈多非有道無以堪此爲而恃成而處則賢見於世賢見於世則是有餘自奉也葉夢得曰惟有道者爲能爲天之所爲則亦爲而不恃功成而不處不自安乎外爾此聖人也而曰不欲見其賢夫賢且不欲見而况其聖者乎清源子劉驥曰敦能損有餘而奉不足於天下者其唯道乎道之在天下萬物恃之以生而不辭皆往資焉而不匱有餘者損之不足者奉之循天之理與天同德使天下自然不失其正也無自伐之心故爲而不恃無自滿之志故功成不居不恃其爲不居其功故不欲見賢黄茂材曰有道之士以太虚爲室以無何有爲鄉以曰月山川爲其燕娱乘雲氣驅役陰陽飲流瀣而食至和皆天地間物之有餘者取之不窮用之無盡將以養其精神無使不足而已非夫聖人孰能爲之然亦何嘗恃其爲之之迹居成功而見其賢耶道德眞經集註卷之十七
