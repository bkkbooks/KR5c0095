body:
  text: 宋鶴林彭耜纂集上士聞道章第四十一上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以爲道御註曰士志於道者也上士聞道眞積力乆至誠不息中士則有疑心焉疑心生則用志分其於道也一出一入焉下士則信不足以守智不足與明也故笑夫道無形色聲味之可得則其去耳目鼻口之所嗜也遠矣莊子曰大聲不入于俚耳高言不止於衆人之心碧虚子陳景元曰夫上士者受性清靜恬澹寂寞虚無無爲純粹而不雜靜一而不變聞乎道也超然而入以至于大妙而人觀其迹眞以爲勤行者也實無勤行也斯所謂天然縣解矣中士者受性中庸世之不用也則思欲就藪澤處閑曠吐故納新能經鳳騫導引養形壽考保神而已矣及乎世之用也則思欲語大功立大名禮君臣正上下殺身爲仁爲治而已矣此之謂若存若亡也下士者受性濁辱目欲視色耳欲聽聲口欲察味志氣欲盈若不得者則大憂以懼聞其恬澹寂寞無爲則大笑而非之若不爲下士之所非笑則不足以爲清眞上道也涑水司馬光曰非常之道固非常人所知潁濱蘇轍曰道非形不可見非聲不可聞不先知萬物之妄廓然無蔽卓然有見未免於不信也故下士聞道以爲荒唐謬悠而笑之中士聞道與之存亡出没而疑之惟了然見之者然後勤行服膺而不怠孔子曰語之而不惰者其回也與斯可謂上士也哉黄茂材曰上士聞道了然無疑故勤而行之中士聞道未能盡信故若存若亡下士瞢然無所知故大笑世之上士無幾中士不可多得所謂下士比比皆是此道所以難明也歟故建言有之明道若昧夷道若類進道若退上德若谷大白若辱廣德若不足建德若偷質眞若渝大方無隅大器晩成大音希聲大象無形道隱無名夫惟道善貸且成碧虚子陳景元曰夷平也纇絲之不匀者夫絲之無類乃織者之所取有類則紡者之所棄也夫上士襟懷坦夷平一與物無際而能支離其德若絲之有纇不爲世用也河上公本作類言大道之人坦蕩平夷隨類參同不自分别也上德之人無爲無事心同虚空高下莫測有若深谷無所不容大白者雪霜之謂也若雪霜之潔白而無所不到雖瓦甓污溷之處施而無擇有道之士豈異于是故處於濁世純白獨全而不雜染也孫登曰其德深廣則通疏見遠遺略小節如智識不足故良賈深藏若虚君子盛德容貌若愚陸希聲曰衣被天下而不有其仁斯廣德若不足者也此言陰德密行也夫建立陰德之人不顯其功畏人之知故若偷竊耳吴筠元綱論曰功欲陰過欲陽功陰則能全過陽則易改此之謂也渝變也色不明也質眞者純素也夫純素之士動無文章如五色之渝淺光華不發也開元御註曰方正也隅角也夫砥礪名節以作廉隅此謂束教之人非曰大方之士磨而不磷在涅不淄大方也而能和光同塵行不崖異無隅也故曰大方無隅貸施與也夫嘆美獨有此妙道能神鬼神帝生天生地善以冲和妙氣施與萬物且成實而復於自然也嚴君平曰道之爲化也始於無有終於無終存於不存貸於不貸動而萬物成靜而天下遂也陸希聲曰夫唯善濟貸於萬物而不責其報是以萬物受其成而不知其德故下士聞此道而笑之不信其能若此耳潁濱蘇轍曰建立也古之立言者有是說而老子取之下之所陳者是也道之所遇無所不見凡此十二者皆道之見於事者也而道之大全則隱於無名惟其所遇推其有餘以貸不足物之頼之以成者也道眞仁靜先生曹道冲曰纇爲不平然而道至平而趣高下不一至人與世浮沉曲全其道不特異其迹故若有瑕類也德之上者其虚若谷似不盈矣世俗爲高潔之行以顯於名有道之者至潔白而混於污辱之間至德不耀故若不足葉夢得曰明而若昩夷而若類進而若退者中智之所疑也上德者若谷不自有其德也大白者若辱能納污也廣德者若不足所以能有進也建德者若偷不見其用力則疑於惰也質眞者若渝不知其有常則以爲或變也大方者無隅不示人以形也大器者晚成不使見者速也大音者希聲不使得以聞也大象者無形不使得以見也道之隱於無名者每如此不可以一端求是以能推其餘以與人而萬物莫不資之以成也黄茂材曰夫爲道者用心於内不暇顧其外世人不足以知之故雖明道乃以爲昩雖進道乃以爲退雖夷道乃以爲類上德乃以爲谷谷不盈也大白乃以爲辱廣德乃以爲不足建德乃以爲偷質眞乃以爲渝求其方則無隅不知其爲大方求其器則晩成不知其爲大器求其音則希聲不知其爲大聲求其像則無形不知其爲大像下士所以每大笑之夫道隱無名知者固少然善貸萬物而不遺全生養命足以成功而有餘未有如道者也道生一章第四十二道生一一生二二生三三生萬物御註曰泰初有無無有無名一之所起天一而地一次之水生而火次之精具而神從之天肇一於北地耦二於南人成位於三三才具而萬像分矣號物之數謂之萬自此以往巧曆不能計碧虚子陳景元曰道者虚之虚者也無之無者也然之然者也混同大無冥寂淵通不可名言者也然而動出變化則謂之渾淪渾淪者一也渾淪一氣未相離散必有神明潜兆于中神明者二也有神有明則有分焉是故清濁和三氣噫然而出各有所歸清濁和者三也是以清氣爲天濁氣爲地和氣爲人三才既具萬物資生故曰三生萬物涑水司馬光曰道生一自無入有一生二分陰分陽二生三濟以中和潁濱蘇轍曰夫道非一非一及其與物爲偶而物不一故以一名道然而道則非一也一與一爲二二與一爲三自是以往而萬物生雖有萬不同而莫不負陰抱陽沖氣以爲和蓋物生於三而三生於一理之自然也陸佃曰道生一一者蓋大極也一生二二者陰陽也一生三三者冲氣也有陰有陽而陰陽之中又有冲氣則萬物於是乎生矣道眞仁靜先生曹道冲曰此顯道之始其理至微其言至玄自悟始得不可以口傳而象比故曰大極生陰陽陰陽生萬物陳象古曰一謂樸之始也二天之體也三地之形也天地既判萬物遂生情欲之繁不能守一矣葉夢得曰此蓋明道分而爲一雖裂而爲陰陽而一陰一陽亦不離乎道之所一是故道生一而陰陽各得其一惟一乃能爲二故陰陽配而爲二二具而一存乎其間則爲三三散而爲和氣以生萬物則萬物亦得其三之一以抱負乎陰陽是終始未見一物之外乎一也清源子劉驥曰道生一氣一氣運轉而生陰陽二氣二氣變化而生天地人三才三才既具萬物資生晦庵朱熹曰道即易之大極一乃陽數之奇一乃陰數之耦三乃奇耦之積其曰二生三者猶所謂二與一爲三也若直以一爲太極則不容復言道生一矣與列子易變而爲一之語正同所謂一者皆形變之始耳不得爲非數之一也黄茂材曰知其所以常存而不滅者然後可以語長生道生一矣一之中而道常存一生二矣二之中而一常存二生三矣三之中而二常存三生萬物矣而萬之中三常存人與萬物同生者也誠能思之則其所以生我者非三乎所以生三者非二乎所以生二者非一乎所以生一者非道乎故知道者常存而不滅不知道者墮於數數盡而止烏能以長生林東曰道生一至於三而止即莊子所謂一與言爲二二與一爲三是也物生於三三生於一理之自然者也萬物負陰而抱陽冲氣以爲和御註曰陰止而靜萬物負焉君子所以日入而息陽融而亨萬物抱焉聖人所以嚮明而治必有陰陽之中冲氣是已碧虚子陳景元曰負背也抱向也夫動物則畏死而趨生植物則背寒而向暖物之皮質周包于外皮質陰氣之所結也故曰負陰而骨髓充實于内骨髓陽氣之所聚也故曰抱陽冲和之氣運行于其間所以成乎形精也夫冲和之氣盛全則形精不虧而生理王也冲和之氣衰散則形精相離而入于死地也涑水司馬光曰萬物莫不以陰陽爲體以冲氣爲用臨川王安石曰字說沖氣以天一爲主故從水天地之中也故從中陸佃曰道家謂之冲氣醫家謂之胃氣故五臟之脉無胃氣則死道眞仁靜先生曹道冲曰形質者有而礙故曰陰神氣虚而靈故曰陽冲氣以爲和形假神而動神托形而用形與神非冲氣則不能和於内外之用陳象古曰陰陽道之妙用也負則在外抱則在内冲而用之不失其和也清源子劉驥曰冲氣者自然中和之氣非陰非陽不離陰陽可以調和陰陽然天下之至柔也是猶孤寡不穀名之至賤而王公自以爲稱黄茂材曰莊子曰至陰肅肅至陽赫赫肅肅出乎天赫赫發乎地兩者交通成和而物生焉此言天地之陰陽至於萬物之陰陽亦然陽必負陰陰必抱陽陰陽合而沖和之氣生程大昌曰列子曰清輕者上爲天濁重者下爲地冲和氣者爲人言能虚中以承清濁之會者是其和之得以成體者也張湛釋之曰陰陽氣偏交會而氣和氣和而人生也此其爲說是二之交焉而三三之徧焉而萬者也說者并冲爲和則失之矣林東曰負陰之靜而屬於背故曰負陰耳目鼻口在前皆陽動者也故曰抱陽抱則在前也陰陽氣冲合而爲和人之所惡唯孤寡不穀而王公以爲稱御註曰物罔隆而不殺事靡盛而不衰陰陽之運事物之理也消息盈虚與之偕行而不失其和者其惟聖人乎碧虚子陳景元曰乃所以有王公之貴耳潁濱蘇轍曰世之人不知萬物之所自生莫不賤寡小而貴衆大然王公之尊自稱孤寡不穀古之達者蓋已知之矣道眞仁靜先生曹道冲曰王公自以爲稱以至尊至高故取最下最薄而稱之也黄茂材曰水處人之所惡而幾於道孤寡不穀亦人之所惡而王公以爲稱道亦有可惡乎所謂在瓦甓而愈甚者也然亦何惡之有林東曰人所嫌惡惟孤寡不穀而王公以爲稱且安得而有抗爭此氣之冲虚合而爲和也故物或損之而益或益之而損御註曰木落則糞本損之而益故也月盈則必缺益之而損故也碧虚子陳景元曰夫物有能减損情欲而不自矜伐卑以自牧以謙受益如王公稱孤寡不穀之損故有尊貴之益也若俗物則不然唯好盈滿饕餮富貴而危敗及之涑水司馬光曰滿招損謙受益皆所以去甚泰就中和臨川王安石曰天道虧盈而益謙唯其益謙故損者乃所以爲益唯其虧盈故益者乃所以爲損人之所教亦我義教之强梁者不得其死吾將以爲教父御註曰以强勝弱以剛勝柔人之所教也我之所教則異乎此强梁者有我而好爭有死之道智者觀之因以爲戒故將以爲教父碧虚子陳景元曰上之强梁者則失群下之心而覆亡無日矣下之强梁者則爲衆所加而顛躓可待矣不得其死謂不得其壽終也老氏觀俗之失道將以爲後世法知謙損柔弱者必吉貪暴强梁者必凶書之垂誡以爲教父父先也本也涑水司馬光曰亦我教之爲衆教之父潁濱蘇轍曰世以柔弱爲損强梁爲益不知其非也故將使天下之教者皆以此教之曰不見强梁者之不得其死乎强梁妄之極也人知强梁之不免於死則知妄之不可爲知妄之不可爲而後可與語道矣故曰吾將以爲教父道眞仁靜先生曹道冲曰人莫不謂自己之所見爲是而教人使從亦我須當教人而於義宜然而後教之黄茂材曰損之而益益之而損人情物理古今皆然當是時儒墨各自名家其爲道雖不同而其教人未嘗或異至於以强梁爲戒尤老氏所尚故曰吾將以爲教父雖然其教人者止於是矣而其妙有不言之旨父不能傳於其子子不能受之於其父豈可得而教人哉程大昌曰此謂强梁者不得其死古必嘗有是語而時人已有師之者矣故引人言以證己教而曰人之所教我亦義教之言不止我之立教獨出於此也既已表發其語而又尊之以爲教父林東曰人之所教者亦我以理義論而教之故强梁者去强梁而免死吾將以爲教父我主其教得以制其子也天下之至柔章第四十三天下之至柔馳騁天下之至堅無有入於無間是以知無爲之有益也御註曰柔之勝剛無之攝有道之妙用實寓于此棄事則形不勞遺生則精不虧兹所以爲有益碧虚子陳景元曰至柔者水也至堅者金石也天下者汎舉也馳騁猶奔競不息貌王弼曰無有不可窮至柔不可折以此推之故知無爲之道而有益於物也涑水司馬光曰太山之溜穿石形之細者無若微塵然不能入無隙之物唯無有乃可以入於無間潁濱蘇轍曰以堅御堅不折則碎以柔御堅柔亦不靡堅亦不病求之於物則水是也以有入有捍不相受以無入有無未嘗勞有未嘗覺求之於物則鬼神是也是以聖人唯能無爲故能役使衆强出入衆有清源子劉驥曰經云道常無爲而無不爲無爲者寂然不動天下之至柔也無不爲者感而遂通馳騁天下之至堅也以至神鬼神帝生天生地天下之至堅其孰能當之無有者道也無間者虚空無爲也經所謂人能虚空無爲非欲於道道自歸之故無有入於無間注焉而不滿酌焉而不竭廣乎其無不容淵乎其不可測故是以知無爲之有益也黄茂材曰天下莫柔弱於水而攻堅强者莫之能先無有爭之爲患也古之眞人入水不濡入火不熱無有形之爲累也人能用其至柔造於無有何堅之不攻何往之不入斯二者非夫無爲之功不能至焉程大昌曰謂柔能勝剛者非曰直致而可以必遂也彼以剛來此不與抗常自處於雌弱而待其有隙之可乘列子固嘗諭之以水矣莊子又嘗喻之以風矣此二物者非不能極其馳騁也然使水而礙山風而觸石其能入乎則馳騁者有時而不得常遂也若夫超有而無也者生生化化而無所於待運道物物而莫之或攖則豈守柔待間者之所能及也不言之教無爲之益天下希及之矣御註曰不言之教設之以神無爲之益不虧其眞聖人以此抱樸而天下賔無爲而萬物化故及之者希碧虚子陳景元曰聖人觀天道之自然而謹身節用飭容儀以悟物故不言而其教行若乃有爲則滯迹損物既而無爲則利益甚多故知清靜簡易之道誠南面之至術則天下希及之也經曰知我者希則我貴矣黄茂材曰載籍以來立大功建大業其著見於有爲之迹世有人焉至於不言之教無爲之益至人君子修於方寸之間及其成也旁日月挾宇宙揮斥八極之表非夫有爲之功所有髣髴其萬一故曰希及之矣名與身章第四十四名與身孰親身與貨孰多御註曰非所親也非所多也潁濱蘇轍曰夫忘我者身且不有而况於名與貨乎道眞仁靜先生曹道冲曰身與名何者爲親而棄身成名可謂至愚者也身止有一而世間財貨至多物常多於身而一身與多物爲敵身先盡而物與貨尚多陳象古曰身者道之本黄茂材曰天下之所謂名者皆其外物而乃欲亡吾身以爭之是亦不知親疏者乎天下之所謂貨者何可勝計而乃欲役吾身以求之是亦不知多寡者乎得與亡孰病御註曰烈士徇名貪夫徇利其所得者名與貨而其亡也乃無名之樸不貲之軀病孰甚焉碧虚子陳景元曰夫虚名浮利得之若輕羽而性命形神亡之若泰山達人校量誰者是病涑水司馬光曰得名貨而亡身與得身而忘名貨二者敦病潁濱蘇轍曰不得者以亡爲病及其既得而患失則病又有甚於亡者惟齊有無均得喪而後無病也道眞仁靜先生曹道冲曰得則憂失已失又何憂也陳象古曰得不安於亡也黄茂材曰使其得之不過名也貨也而其亡者身也程大昌曰名之不親於身也貨之不重於身也人皆知之然徇物失我者常不暇恤是特不能權其輕重焉耳老子於此以身名貨三者參觀而概評之曰得名貨而亡身與得身而亡名貨二者敦病人能用此語也對而思之則輕重之衷昭昭然白黑分矣莊子用其說而伸之曰廢一手以得天下韓侯不爲委隋珠以彈一雀世所共笑則輕重益明矣是故甚愛必大費多藏必厚亡黄茂材曰費非謂費其貲財也而費精神之爲損大亡非謂亡其蓄積也而亡性命之爲禍厚凡此數者利害得失灼然甚明而人不思林東曰愛之甚則凡可以求之者無所不至能無費乎藏之多則攻之者必衆能無亡乎知足不辱道眞仁靜先生曹道冲曰辱莫大於貪程大昌曰知足之富决不受辱知止不殆可以長乆陳象古曰雖不欲長乆其可得乎黄茂材曰古之人知止足之戒無如漢之二疏辭榮還里保其天年而終可謂長乆矣乎曰二疏爲免於殆辱則可以爲長乆則未可程大昌曰無辱無殆故可長久道德眞經集註卷之十一
