body:
  text: 宋鶴林眞逸彭耜纂集太上章第十七太上下知有之御註曰在宥天下與一世而得淡泊焉無忻忻之樂而親譽不及無悴悴之苦而畏侮不至莫之爲而常自然故下知有之而已碧虚子陳景元曰太上者謂大人也大人即太古無名號之君也所謂上德不德者也其德無上可加故曰太上雖有君位而不以尊自稱任物自然而各正性命故其教無爲其治無迹隨時而舉事因資而立功百姓日用而不知其道但知有君上而已謂帝何力於我哉道眞仁靜先生曹道冲曰上古純質雖知有君簡靜無爲上下恬淡各安其所葉夢得曰有君臣然後有上下下知有之知其臨我者吾君而已民未見德則莫知何有於我也其次親之譽之其次畏之侮之御註曰澤加于民法傳于世天下愛之若父母故親之貴名起之如日月故譽之此帝王之治親譽之迹彰而大同之道虧矣道之以政齊之以刑故畏之舉天下以賞其善者不勸舉天下以罰其惡者不沮諸侯有問鼎大小輕重如楚子者陪臣有竊寳玉大弓如陽虎者此衰世之俗故侮之清源子劉驥曰其次以有爲治天下其德可親其功可譽故親之譽之不能兼忘天下也又其次則道之以政齊之以刑故畏之又其次則法令滋彰盜賊多有故侮之黃茂材曰泉涸魚相與處於陸相呴以濕相濡以沬不如相忘於江湖今也太上之道乃知而有之是未能至於相忘也故爲下其次親之譽之親之者以其貌譽之者以其言夫道豈聲音笑貌爲哉又其次畏之侮之畏之者畏其高而難行侮之者侮其近而無甚異其去道益遠矣故信不足焉有不信御註曰附離不以膠漆約束不以纏索此至信也商人作誓而民始畔周人作會而民始疑信不足故也碧虚子陳景元曰夫心之有孚之謂誠言而可復之謂信且信全則天下安信失則天下危今既權詐聿興欺罔並起君信不足于下故下有不信之心而應其君矣夫上之化下也如止水明鑑之接形容而理無差焉王弼曰夫御體失性則疾病生輔物失眞則疵釁作信不足焉則有不信此自然之道也穎濱蘇轍曰吾誠自信則以道御天下足矣惟不自信而加之仁義重之刑政而民始不信矣清源子劉驥曰於是愚智相欺上下相疑天下每每大亂罪在好智以其信道之心不足所以有不信之禍也猶兮其貴言功成事遂百姓皆曰我自然碧虚子陳景元曰夫自親譽而下已喪其太上無爲之化而不能復其淳古之風猶其貴重言教執守陳迹以爲化方雖然失道遠矣不猶愈於忽言不信而致犯上作亂乎夫有道之君垂拱而居無爲故功業成而不有矣憺默而教清靜故事務遂而忘知矣民皆淳樸無所妄爲謂我之自然而然也故親譽畏侮之心於何而有哉葉夢得曰號令教戒無非言也欲以是爲信可乎上不以情示之下下亦不以情報之上上下交相疑而不信其衰爲已甚而人猶以其言爲貴末流之弗悟也如此將以反之必使功成事遂而百姓皆謂自然雖欲親譽之而不能則可以復乎太上之世矣頌堯之德曰蕩蕩乎無能名巍巍乎其有成功而本之於惟天爲大惟堯則之夫天何爲者哉穹然在上而物無所歸德則所謂蕩蕩乎民無能名者乃所以謂我自然者也清源子劉驥曰徒貴聖人之言不知聖人之道聖人以道莅天下使民遷善遠罪日改月化若性之自爲而不知爲之者故功成事遂百姓皆曰我自然此太上之治也林東曰猶者遲而難之也其貴言之謹也如此蓋以言之不輕出諸口必欲取信於民而無待於告諭也如所謂太古塗民耳目非繆悠荒唐之說乃使民不役於耳目其效見於心之相信云爾大道廢章第十八大道廢有仁義御註曰失道而後德失德而後仁失仁而後義仁以立人義以立我而去道遠矣韓愈不原聖人道德之意乃以仁義爲定名道德爲虚位老子之小仁義其見小也莊子所謂蔽蒙之民碧虚子陳景元曰仁義生乎不足是猶泉涸魚相與處於陸相呴以濕相濡以沬不如相忘於江湖潁濱蘇轍曰大道之隆也仁義行於其中而民不知道既廢而後仁必見矣清源子劉驥曰純樸不殘孰爲犧樽白玉不毁孰爲圭璋道德不廢安取仁義黃茂材曰立人之道曰仁與義老子方將擺去人累而與造物者遊故不言仁義非惡仁義惡夫徇仁義而不知大道者楊子雲乃謂其搥提仁義非也老子雖不言仁而好言慈雖不言義而好言果果者義之異名慈者仁之殊號程大昌曰莊子曰至德之世上如標枝民如野鹿端正而不知以爲義相愛而不知以爲仁是故行而無迹事而無傳夫至德之世即大道未廢之時也端正相親其爲仁義也大矣特未立此名則亦不著其迹故道見而仁義不見焉耳自有易以來剏法立則凡陰陽剛柔之效乎事者聖人因其實而命之曰如是而爲仁如是而爲義仁義立而道之無者皆著於有如元氣播於陰陽人知其爲陰陽而不復見其爲元氣矣莊子固嘗明言之矣曰道德不隱安取仁義由其言而推之則分大道以爲仁義信其破全爲散矣智慧出有大僞碧虚子陳景元曰理勢然也潁濱蘇轍曰世不知道之足以澹足萬物也而以智慧加之於是民始以僞報之矣六親不和有孝慈國家昏亂有忠臣潁濱蘇轍曰六親方和孰非孝慈國家方治孰非忠臣堯非不孝而獨稱舜無瞽叟也伊尹周公非不忠也而獨稱龍逄比干無桀紂也黃茂材曰六親不和而後舜以孝名國家昏亂而後比干以忠顯大道既裂儒墨相攻而後老子之書出使天下常如太古鴻荒之世吾知老子昩昩然莫知其影響何書之可作哉絕聖棄智章第十九絶聖棄智民利百倍御註曰道之與性一而不雜離道爲德是名聖智絶而棄之與道同體則各安其性命之情其利博矣碧虚子陳景元曰河上公曰五帝畫象倉頡造書不如三皇結繩無文之治也莊子曰去小智則大智明經曰以智治國國之賊潁濱蘇轍曰非聖智不足以知道使聖智爲天下其有不以道御物者乎世之人不足以知聖智之本而見其末以爲以巧勝物者也於是馳騁於其末流而民不勝其害矣故絶聖棄智則民利百倍臨川王安石曰所以返樸也達眞子曰大道廢故能舉其道者則爲聖能知其道者則爲智是聖智因道廢而名也方道無不舉則聖之名可以絶道無不明則智之名可以棄道於天下無不舉無不明則民無不利者也故曰民利百倍又名聖者爲其有不聖也名智者爲其有不智也清源子劉驥曰聖人體道之眞以治身則隳肢體黜聰明離形去智同於大通聖智仁義猶當絶而棄之况其他乎黃茂材曰古之士也從事於道是非都忘有無俱遣悠然樂於放曠之野聖智無所施况仁義乎仁義無所用况巧利乎夫如是故一身妙用隨取而有故曰民利百倍絶仁棄義民復孝慈御註曰民將反其性而復其初不獨親其親子其子其於孝慈也何有碧虚子陳景元曰是欲人全其性命潁濱蘇轍曰未有仁而遺其親者也未有義而後其君者也仁義所以爲孝慈矣然及其衰也竊仁義之名以要利於世於是子有違父而父有虐子此則仁義之迹爲之也故絶仁棄義則民復孝慈黃茂材曰孝慈民之性也累盡性復故曰民復孝慈絶巧棄利盜賊無有御註曰爲機變之巧有欲利之心是皆穿窬之類也碧虚子陳景元曰擿玉毁珠焚符破璽使民樸鄙而盜自止潁濱蘇轍曰巧所以便事也利所以濟物也二者非以爲盜而賊盜不得則不行故絶巧棄利則盜賊無有葉夢得曰利富之也孝慈教之也盜賊禁其爲非也而不知天下由是而愈亂黃茂材曰戕天和而伐本眞者一切銷去故曰盜賊無有此三者以爲文不足故令有所屬御註曰先王以人道治天下至周而彌文及其弊也以文滅質文有餘而質不足天下舉失其素樸之眞而日淪于私欲之習老氏當周之末方將祛其弊而使之返本故攘棄仁義絶滅禮學雖聖智亦在所擯彼其心豈眞以仁義聖智爲不足以治天下哉先王之道若循環救文者莫若質故令有所屬謂見素抱樸少私寡欲也涑水司馬光曰屬著也聖智仁義巧利皆古之善道也由後世徒用之以爲文飾而内誠不足故令三者皆著於名而喪其實穎濱蘇轍曰世之貴此三者以爲天下之不安由文之不足故也是以或屬之聖智或屬之仁義或屬之巧利蓋將以文治之也然而天下益以不安曷不反其本乎見素抱樸少私寡欲而天下各復其性雖有三者無所用之矣故曰我無爲而民自化我好靜而民自正我無事而民自富我無欲而民自樸此則聖智之大仁義之至巧利之極也黃茂材曰三者聖智也仁義也巧利也皆性外事特其文爾不足以爲道故令有所屬者屬於道也程大昌曰其屬之之地即樸素而節私欲者是也見素抱樸少私寡欲臨川王安石曰不言守素而言見素不言返樸而言抱樸不言無私而言少私不言絶欲而言寡欲蓋見素然後可以守素抱樸然後可以返樸少私然後可以無私寡欲則致於不見所欲也陳象古曰少私寡欲絶棄之機要也黃茂材曰至道無華樸素而已所見者素其見無非道矣所抱者樸其抱無非道矣私可以無何少之云欲可以絶何寡之云見素抱樸爲上智言少私寡欲所以誘進中下之士者也絕學無憂章第二十絶學無憂御註曰任其性命之情而樂故無憂碧虚子陳景元曰今之學者糟粕而已矣所言絶學者非謂其絶滅不學也謂守其自然之性也潁濱蘇轍曰爲學日益爲道日損不知性命之正而以學求益增其所未聞積之不已而其中紛然不勝其憂矣故曰絶學無憂若夫聖人未嘗不學而以道爲主道眞仁靜先生曹道冲曰至人無學我即道也即我是道又何學也理暢無虧又何憂也達眞子曰凡學者學其所未至也未至其道則心不能無累有累所以有憂也既至其道則心無累無累所以無憂也道至於無憂故無所用學焉是以言絶學無憂葉夢得曰不學則道無所入見道則學無所用清源子劉驥曰方其爲學則日益聞見理有所未窮意有所未得能無憂乎及其爲道則日損無視無聽損之又損以至於無爲而無不爲則樂天知命故絶學無憂黃茂材曰天地萬物之理欲以一人之智窮其所不可窮其憂多矣林東曰捨本性而外求道别有所謂學皆外也惟於絶學則無有憂者率性而自得非學此又學彼之憂勞乎其心也唯之與阿相去幾何善之與惡相去何若御註曰唯阿同聲善惡一性小智自私離而爲二達人大觀本實非異碧虚子陳景元曰唯者恭應也唯聲低所以爲恭爲禮阿者慢應也阿聲高所以爲慢爲野夫以名教言之則唯恭而阿慢以理論之皆應聲也今爲善者無近名名極則害身爲惡者無近刑刑極則殘生故善之與惡非道之實乃外物耳既皆外物則相去奚異哉古本作美之與惡如上章天下皆知美之爲美斯惡已穎濱蘇轍曰學者溺於所聞而無以一之則唯之爲恭阿之爲慢不可同日而言矣而况善惡之相反乎夫惟聖人知萬物同出於性而皆成於妄如畫馬牛如刻虎彘皆非其實泯焉無是非同異之辨敦知其相去幾何哉劉涇曰莊子曰所美爲神奇所惡爲臭腐神奇化爲臭腐臭腐復化爲神奇何則善惡之間不能以寸近取諸身則唯應阿應同出一聲何以唯爲恭以阿爲慢善惡之殊何異此乎道眞仁靜先生曹道冲曰同爲應答何爭恭慢造善爲惡皆是勞心達眞子曰唯阿者因其世薄而分之也善惡者因其眞喪而别也方世之薄人生其慢焉則以唯者爲恭阿者爲慢方眞之喪則能修者爲善不修者爲惡然改阿爲唯非不能也是不爲也故唯之與阿相去幾何改惡爲善者非不能也是不修也故善之與惡相去何若黃茂材曰莊子亦嘗以臧穀亡羊發明此理學者宜致思於善惡不到之處何物可名若直以爲惡與爲善同是率天下而入於惡非老子意程大昌曰唯爲主善阿爲導諛林東曰善與惡不翅霄壤今謂之相去何若急欲惡人之復於善如唯阿之相去幾何也人之所畏不可不畏御註曰鼓萬物而不與聖人同憂者道也吉凶與民同患者事也碧虚子陳景元曰夫至人冥心妙道絶學無憂雖忘善惡於胸中必順唯阿於形外既而身處人間世豈不修其德乎故唯阿之禮不得不遵善惡之戒不可不畏其惟藴道之深者乎潁濱蘇轍曰聖人均彼我一同異其心無所復留然豈以是忽遺世法犯分亂理而不顧哉人之所畏吾亦畏之人之所爲吾亦爲之雖列於君臣父子之間行於禮樂刑政之域而天下不知其異也其所以不嬰於物者其心而已道眞仁靜先生曹道冲曰全身遠害安得謂之不畏黃茂材曰人有所畏亦有所喜畏其所畏而不喜其所可喜何也人之所畏烏可不畏若其所喜吾亦從而喜之則是同於流俗荒兮其未央哉碧虚子陳景元曰央中也止也臨川王安石曰道之荒大而莫知畔岸道眞仁靜先生曹道冲曰此老君處世之時所睹之事也達眞子曰如田之荒以其爲草所蔽人之性爲物所蔽固不異此葉夢得曰此非言之所能窮故曰荒兮其未央哉黃茂材曰荒如禽荒色荒之荒衆人熙熙如享太牢如春登臺碧虚子陳景元曰世人因學致僞逐境失眞道眞仁靜先生曹道冲曰心目所經外境方盛我獨怕兮其未兆若嬰兒之未孩碧虚子陳景元曰孩笑貌潁濱蘇轍曰人各溺於所好其美如享太牢其樂如春登臺囂然從之而不知其非唯聖人深究其妄遇之泊然不動如嬰兒之未能孩也黃茂材曰衆人慕樂如此我則怕然不動乘乘兮若無所歸碧虚子陳景元曰乘乘若虚舟之東西而無所歸止臨川王安石曰乘乘若無所歸者以其游心於無何有之鄉道眞仁靜先生曹道冲曰乘萬物而遊無所係著陳象古曰乘乘厚重貌守眞抱樸滿而不盈清源子劉驥曰嬰兒居不知所爲行不知所之乘乘兮如虚舟之東西程大昌曰衆人舒泰如享備味如覽勝會我方揣切其未嘗發見者如嬰兒之從騃而冥無所知甚言不曉世人趨樂之故也故繼之曰乘乘兮若無所歸宿也衆人皆有餘御註曰其在道曰餘食贅行碧虚子陳景元曰饕餮富貴之間謂其心有餘樂潁濱蘇轍曰衆人各自以爲有餘劉涇曰性無餘欠所謂有餘皆分外也陳象古曰有餘自盈滿也我獨若遺碧虚子陳景元曰知軒冕之去來如寄故獨忽之若遺忘耳劉涇曰若遺非誠遺也以不足愛吝爲懷而已不學者所謂誠遺也至人非不學蓋縁俗學滋蔓特可以絶救之耳道眞仁靜先生曹道冲曰人皆自謂我有餘而我獨遺忘若無物也葉夢得曰認之則有餘棄之則若遺黃茂材曰衆人皆有餘其盈溢於富貴驕奢如此我則若遺且如愚焉我愚人之心也哉純純兮御註曰吾與回言終日不違如愚純純兮天機不張而默與道契兹謂大智潁濱蘇轍曰若愚而非愚也劉涇曰衆人務學作智我獨絶焉則愚人而已程大昌曰純純乎無所能解也俗人昭昭我獨若昏俗人察察我獨悶悶御註曰同乎流俗則昭昭以爲明而其明也小察察以爲智而其智也鑿遺物離人而傲睨於一世之習則惛然若亡而存悶然若鈍而利世俗豈得而窺之碧虚子陳景元曰昭昭光耀自衒貌察察嚴明貌悶悶寬裕貌或作惛惛昩昩貌莊子曰至道之極昏昏默默潁濱蘇轍曰世俗以分别爲智聖人知群妄之不足辨也故其外若昏其中若悶道眞仁靜先生曹道冲曰俗人昭昭極智慮而察物惟恐其不顯不彰不知不聞也我獨若昏我獨事事不知若昏愚而無識者也察察謂盡物而不容也黃茂材曰俗人昭昭以其好於聲名我則昏昏俗人察察以其競於機巧我則悶悶澹兮其若海飂兮似無所止御註曰淵靜而性定道之全體變動而不居道之利用碧虚子陳景元曰莫測其深故曰海而又應變之道莫定其方若流波之漂揚而似無所止著一本作忽若晦寂兮似無所止言至人容儀忽然晦昩似其尸居其心寂靜無所繫縶故似無所止亦通達眞子曰澹者泊然而大也飂者曠然而通也衆人皆有以我獨頑且鄙御註曰桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用傳曰心不則德義之經爲頑古者謂都爲美謂野爲鄙劉涇曰以用也衆人之學所謂有用而已亦安知無用爲有用哉頑鄙是也鄙野也野人不學無用故也黃茂材曰高才絶智孰不求爲時用我獨頑似鄙凡此數者不喜其所可喜自足於道而已程大昌曰甚言世人趨末而不知有本也林東曰衆人皆以才智爲世用而我獨頑鄙無益於世以見衆人離道爲甚遠而我之體道爲甚謹我獨異於人而貴求食于母御註曰嬰兒慕駒犢從惟道之求而已夫道生之畜之長之育之萬物資焉有母之意惟道之求此所以異於人之失性於俗碧虚子陳景元曰或曰老氏以和光同塵爲務此篇何獨彼我之說云云曰此豈至人之本意哉蓋不得已而言之也夫至人所行何嘗有異自是世俗動靜相反因垂言立教故有彼此之云爾潁濱蘇轍曰道者萬物之母衆人徇物忘道而聖人脱遺萬物以道爲宗譬如嬰兒食於母而已劉涇曰嬰兒以母爲本道本也學末也此所以異也然聖人不尚異而獨異者此篇主絶學爲辭方俗學之溺如此則非異俗無以救俗道眞仁靜先生曹道冲曰衆人求物於外我獨食氣於内氣爲母神爲子神不離氣氣不離形子母相隨綿綿上下乆而自定閉之非也此簡易攝生之要也達眞子曰衆人所求者以外不以内以末不以本是反求食於子而不求食於母也陳象古曰異於人不同衆人之所學故也黃茂材曰母者道也經曰有名萬物之母是也孔德之容章第二十一孔德之容惟道是從御註曰一陰一陽之謂道物得以生謂之德道常無名豈可形容所以神其德德有方體同焉皆得所以顯其道潁濱蘇轍曰道無形也及其運而爲德則有容矣故德者道之見也自是推之則衆有之容皆道之見於物也臨川王安石曰孔德孟子所謂盛德是也故曰動容周旋中禮盛德之至蓋惟道是從則孔德之容矣葉夢得曰德之爲言得也道不可見而德有可得故道無容而德有容林東曰失道而後德德則有形容之可見也况於盛德之容乎况於衆有之美者乎凡此之容此之美皆自道出道雖不可形容乃著見於孔德之容衆有之美道之爲物惟恍惟惚御註曰道體至無而用乃妙有所以爲物然無非道恍者有象之可况惚者有數之可推所謂有者疑於無也故曰道之爲物碧虚子陳景元曰夫道者杳然難言故眡聽不能聞見何物之可謂耶今言物者蓋因强名以究妙理故曰有物混成亦稱道之爲物也恍似有也在有非有惚似無也居無非無居無非無乃即空是色也在有非有乃即色是空也臨川王安石曰道非物也然謂之道則有物矣恍惚是也陳象古曰恍惚不可定名之謂也黃茂材曰恍者陽也惚者陰也道惟陰陽而已不謂陰陽而謂恍惚者升降消長之理交感契合之情恍恍惚惚不可指名惟心能得之故其字從心惚兮恍兮中有象兮恍兮惚兮中有物兮御註曰見乃謂之象形乃謂之物恍惚之中象物斯具猶如太空變爲雷風猶如大塊化爲水火以成變化以行鬼神是謂道妙碧虚子陳景元曰象者氣象也物者神物也即莊子所謂眞君今之所謂性者也陸佃曰太始者形之始故曰其中有象太素者質之始故曰其中有物葉夢得曰恍惚非二境象物非二類也清源子劉驥曰恍惚者在有非有在無非無惚兮恍其中有象經所謂大象無形者是矣恍兮惚其中有物經所謂有物混成者是矣恍惚之中有物與象所謂無狀之狀無物之象也窈兮冥兮中有精兮其精甚眞其中有信御註曰窈者幽之極冥者明之藏窈冥之中至陰之原而天一所兆精實生焉精者天德之至正而不妄故云甚眞一而不變故云有信碧虚子陳景元曰窈兮深遠貌冥兮寂默貌其中藴乎純粹之精畜乎自然之信其精非僞故曰眞其化應時故曰信道眞仁靜先生曹道冲曰寂然無形今感之立應信莫過此春生秋煞夏炎冬凛未嘗差忒答響若谷現形如鑑豈不謂之信也黃茂材曰陰陽至妙窈冥難睹陰中之陽是謂陽精陽中之陰是謂陰精故曰其中有精陽之精者爲眞陽陰之精者爲眞陰故曰其精甚眞陽生於子陰生於午時日晷刻必至無差故曰其中有信自古及今其名不去以閲衆甫吾何以知衆甫之然哉以此御註曰衆甫之變日逝而不停甚眞之精常存而不去聖人貴精故能閲衆甫之變而知其所以然無思也而寂然無爲也而不動然感而遂通天下之故則思爲之端起而功業之迹著非天下之至精其孰能與於此潁濱蘇轍曰古今雖異而道則不去故以不去名之唯未嘗去故能以閲衆甫之變也甫美也雖萬物之美不免於變聖人之所以知萬物之所以然者以能體道而不去故也陸佃曰生者有生生者自太易至於太素所謂生生者也然生生者未嘗生未嘗無故能自古及今其名不去以閲衆甫也所謂其名不去常名是也夫衆美者有生而吾體不生衆美者有化而吾體不化故能名以閲之也莊子曰神奇復化臭腐臭腐復化神奇神竒者衆甫也清源子劉驥曰亘萬世而無弊充一性而常存故曰不去衆美之變日逝而不停甚眞之精常存而不亡所以披閲衆甫之死生終始也黃茂材曰經云吾不知其名字之曰道名即道也故爲萬物之母時雖變而無常名常存而不已甫美也天地之大人物之衆昆蟲草木之微莫不具有此美舍此皆非道也道德眞經集註卷之五
