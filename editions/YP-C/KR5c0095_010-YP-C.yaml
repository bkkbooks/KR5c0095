body:
  text: 靜而民自正皆此之謂也黃茂材曰樸雖無名若存諸念則是未能無欲也古之至人非特於物也無欲其於道也亦無所欲淡然自守淸靜無爲天下各自正其性命而已吾何欲焉上德不德章第三十八上德不德是以有德下德不失德是以無德上德無爲而無以爲下德爲之而有以爲御註曰孔子不居其聖而爲聖之時乃所以有德認而有之自私以失道何德之有不思而得不勉而中不行而至上德也不思則不得不勉則不中不行則不至下德也德有上下此聖賢之所以分歟離形去智通於大同仁義禮智蓋將簡之而弗得故無以爲屈折禮樂吁俞仁義以慰天下之心得人之得而不自得其得故有以爲碧虛子陳景元曰夫德者得也内得於心外得於物常得而無喪利而不害物得以生謂之德也且道有淺深故德有上下所謂上德者至德也至德者深矣遠矣與物反矣人不見其迹則謂之不德以其含光匿耀支離所爲使百姓日用而不知咸曰我之自然而已矣所謂德全者也故曰是以有德谷神子曰上德不德與道同也下德者迹用漸彰至一澆散因循任物物保其安天下稱之歸美於已雖其德不喪已遠於至德也夫有上德者性受自然之至妙命得元氣之精微神貫天地明竝日月無思無慮而心自無爲忘功忘名而迹無以爲以用也故無用巳爲也不爲而自得也故曰上德無爲而無以爲夫言下德者降於上德者也性受自然之平淡命得元氣之純和神配陰陽明效日月民皆仰戴咸共樂推麟鳳見而嘉祥來歌謡彰而有以爲也故曰下德爲之而有以爲涑水司馬光曰我無爲民自化無以爲猶言無用有爲也穎濱蘇轍曰聖人從心所欲不踰矩非有意於德而德自足其下知德之貴勉强以求不失蓋僅自完耳而何德之有無爲而有以爲之則猶有爲也唯無爲而無以爲之者可謂無爲矣其下非爲不成然猶有以爲之非徒作而無術者也陸佃曰知之者不如忘之者得之者不如冥之者上德者忘之者也故曰上德不德又曰上德無爲而無事於爲也下德有爲而有事於爲也劉槪曰上德無爲而無以爲此心迹俱無爲者也所謂眞空是也眞空者聖人所以極高明而其崇以效天者也下德爲之而有以爲此心迹俱有爲者也所謂妙有是也妙有者聖人之所以道中庸而其卑法地者也陳象古曰不德者謂不自矜其德故人仰其德而歸之不失德者謂自矜其德而患失之苟患失之無所不至故人觀其所爲而輕之安可更以德言哉書曰滿招損謙受益時乃天道又曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功葉夢得曰道無上下上亦道也下亦道也雖稊稗瓦礫之微而道無不在是以上經言道論其常與非常而已德則有體履之爲行施之爲政在得爲得在失爲失在吉爲吉在凶爲凶故不得不辨其上下德雖道之降然去道未遠猶有通乎道而不自爲德者故曰上焉者不德而有德過是則認德而忘道有役其身以求之惟恐其不獲者而德自是微矣故曰下焉者不失德而無德無爲者道也德能體之而有無敢欲爲之心德猶在焉至於爲之而有以爲則每下矣淸源子劉驥曰虛靜恬淡寂寞無爲此天地之道聖人之德也同乎無知其德不離與道爲一而不知道之在我也故上德不德是以有德不德者不知有德離形去智同於大通無問其名無窺其情物故自生若彼知之是乃離之以其認而有之自私以失道也故下德不失德是以無德上德出於自然不思而得不行而至故無爲而無以爲下德出於使然不思則不得不行則不至故爲之而有以爲黃茂材曰道與德相去一間爾中之謂道不偏之謂德由之謂道不已之謂德道如嬰兒之未孩德如其始孩謂之玄德者其妙不可窮也謂之常德者愈久而不亡也謂之上德者非人所能及也皆足以合於道上德不德無爲而無以爲非道而何至於下德則去道遠矣林東曰上德近於道故不認德而爲德是以有德下德則勤勤於德如恐失之所以無德此德之眞者非於勤執而得之也上仁爲之而無以爲上義爲之而有以爲上禮爲之而莫之應則攘臂而仍之故失道而後德失德而後仁失仁而後義失義而後禮御註曰堯舜性之仁覆天下而非利之也故無以爲列敵度宜之謂義以立我以制事能無爲乎禮以交物以示人以節文仁義其用多矣則忿爭之心生而乖亂之變起春秋之時一言之不讎一拜之不中兩國爲之暴骨則攘臂而仍之尙其患之小者聖人厚於仁而薄於義禮以履之非所處也故上仁則同於德上義則有以爲上禮則有莫之應者道不可致故失道而後德德不可至故失德而後仁仁可爲也爲則近乎義故失仁而後義義可虧也虧則飾以禮故失義而後禮至於禮則離道滋遠而所失滋眾矣碧虛子陳景元曰夫仁者博施兼愛皆可爲也可爲而無偏私故言上仁有心濟乎羣品故言爲之功成不居事遂不宰故言而無以爲夫義者宜也有所宜必有所虧處於事類而無所不宜故曰上義有宜有利故爲之其所爲者皆由裁非斷割而有以爲故曰上義爲之而有以爲攘臂謂攘除衣袂以出臂也仍引也夫禮者履也謂履道而行辯上下定貴賤謙恭和柔使無爭心斯禮之本也故稱上焉玉帛交馳威儀相答擎跽曲拳進退顧揖此禮之文也故爲末焉莊子曰大禮與天地同節又曰以禮爲翼者所以行於世也古聖制禮使人定心氣整容貌故曰爲之然而中下之士喪本崇末曲説煩多不能應答故曰而莫之應此失禮之微者也而有怫然作色奮臂仍引指陳去就爲爭競之端故曰則攘臂而仍之又失禮之甚者也涑水司馬光曰立制度以强民民不肯從則用刑以威之仍引也字或作扔穎濱蘇轍曰仁義皆不免於爲之矣其所以異者仁以無以爲爲勝義以有以爲爲功耳德有上下而仁義有上無下何也下德在仁義之間而仁義之下者不足復言故也自德以降而至於禮聖人之所以齊民者極矣故爲之而不應則至於攘臂而强之强之而又不應於是刑罰興而甲兵起則徒作而無術矣程大昌曰仁義禮無異道禮卽仁義之形諸文爲度數者也非别有一禮也老氏旣賤仁義則仁義之形而每下者至於有條可畫有數可數者固其所賤也林東曰或以前識繼於禮之後以爲智次之説老氏尚謂禮爲忠信之薄故不言信其於智則有所謂以智治國國之賊不以智治國國之福非如三綱五常之敘至於仁義禮上者止此尚何下之足言夫禮者忠信之薄而亂之首也前識者道之華而愚之始也是以大丈夫處其厚不處其薄居其實不居其華故去彼取此御註曰凡物不並盛陰陽是也理相奪予威德是也實厚者貌薄父子之禮是也由是觀之禮繁者實必衰也實衰則僞繼之而爭亂作故曰夫禮者忠信之薄而亂之首也道降而出出而生智以智爲鑿揣而銳之敝精神而妄意度兹謂前識前識則徇末忘本故爲道之華心勞而智益困故爲愚之始億則屢中此孔子所以惡子貢在彼者道所去在此者道所尚道所尚則厚而不薄實而無華非夫智足以自知反其性本而不流於事物之末習其孰能之易曰敦復無悔中以自考也敦者厚之至也人生而厚者性也復其性者處其厚而已此大丈夫所以備道而全德碧虛子陳景元曰夫忽道德仁義而專以禮教爲用者豈非忠信之薄而亂之首乎若乃尊道德仁義而兼用禮教者是禮之上也則何往而不治哉德和也道理也德無不容仁也道無不理義也義明而物親忠也忠純實而反乎情樂也信行容體而順乎文禮也此足以見老莊之旨於道德仁義禮樂忠信豈有忽棄者乎夫修崇禮教者智也智爲先見故曰前識識旣先物安能忘懷故以智治國國之賊豈非道之華而愚之始乎若乃藏識藏智何思何慮則反其質素而爲大賢矣且禮煩則亂智變則詐此必然之理也大丈夫者剛健純粹有道之士也文中子曰大丈夫恬然無思淡然無慮行乎無路遊乎無怠出乎無門入乎無房屬其精神偃其知見漠然無爲而無不爲也夫如是則所處自然樸厚而居於上德不置身於澆薄煩巧也居則忠信而誠實曷嘗華綺而詐僞也是故去彼禮義之淺末取此道德之大本者也涑水司馬光曰忠信禮之本也守其文忘其本則巧僞橫生矣世有臆度屢中人或謂之智而多言數窮未免於愚穎濱蘇轍曰忠信而無禮則忠信不見禮立而忠信之美發越於外君臣父子之間夫婦朋友之際其外粲然而其中無餘矣故順之則治違之則亂治亂之相去其間不能以髮故曰亂之首也聖人玄覽萬物是非得失畢陳於前如鑑之照形無所不見而孰爲前後世人視止於目聽止於耳思止於心冥行於萬物之間役智以求識而偶有見焉雖自以爲明而不知至愚之自是始也世之鄙夫樂其有得於下而忘其上故喜薄而遺厚采華而棄實非大丈夫孰能去彼取此道眞仁靜先生曹道沖曰禮者束以名教加以恥辱剋意强說僞而失眞禮者詐偽而忠信之誠薄矣忠信旣薄豈不犯上而姦謟故爲亂之先也不待自然先造智謀預爲機術以在道爲華非眞實也亂眞役念求明而反愚也大丈夫有道之士也處純厚而棄浮薄絶華僞而居其眞實遠者彼也近者此也近者求諸已遠者求諸人不强知他事而自取巳眞黃茂材曰古今一時也萬物一物也無有前後之異人以智强推測之或得其一二則自矜耀以爲有先見之明而不知其愚莫甚焉何則用智者見物而不見道苟不見道謂之愚可也所謂大丈夫者爲其有高世之見而不徇於流俗者也以禮爲忠信之薄不處而處於厚以前識爲道之華不居而居於實非有高世之見而不徇於流俗者能之乎去彼取此者道也昔之得一章第三十九昔之得一者天得一以淸地得一以甯神得一以靈谷得一以盈萬物得一以生侯王得一以爲天下貞其致之一也御註曰莊子曰通於一萬事畢致一則不二抱一則不離守一則不遷能知一則無一之不知不能知一則無一之能知昔之得一者體天下之至精物無得而耦之者故確然乎其上者純粹而不雜隤然乎其下者靜止而不變至幽而無形者神也得一則不昧至虛而善應者谷也得一則不窮萬物以精化形故得一以生侯王以獨制眾故得一以爲天下正自天地以至於侯王雖上下異位幽明散殊而天之所以淸地之所以甯侯王之所以爲天下正非他求而外鑠也一以致之而已故曰其致之一也碧虛子陳景元曰一者元氣也莊子曰氣也者虛而得物者也唯道集虛又曰虛室生白吉祥止止天者純陽之氣且天得之故能剛健運動穹窿廣覆垂象淸明萬物資始地者純陰之質且地得之故能信順柔弱磅礴厚載安甯不動萬物資生神者妙萬物以爲言且神得之故能通變無方反覆不窮正直靈響應物無盡谷者谿之絶深且谷得之故能氣運水注盈滿不竭萬者數之大物者形可見且物得之故能生生成成而不歇滅侯王者人主也且侯王得之故能永有大寶無思不服而爲天下平正夫上五事能致淸甯靈盈生者皆由君道正之使然也正者得其沖一之謂也涑水司馬光曰一者道之子物之祖也故莫不賴之以成功以事言之常久不已所謂一也穎濱蘇轍曰一道也物之所以得爲物者皆道也天下之人見物而忘道天知其淸而已地知其寕而已神知其靈而已谷知其盈而已萬物知其生而已侯王知其爲天下貞而已不知其所以得此者皆道存焉耳陸佃曰入於一道將得出於一道將失一者有無之界也列子曰一者形變之始莊子曰一之所起有一而未形天尊地卑故言天而地次之天地之間虛而不屈動而愈岀者不可知之神也故神次之萬物盈於天地之間所以生且死者聽乎神而已故言谷而萬物次之侯王者所以法夫四者而以宰萬物者也故侯王次之達眞子曰道之混同則歸於一故得一者得其道之混同者也陳象古曰一者大道之妙用也致至也至其妙用之理也葉夢得曰前旣離道爲德以迹觀之蓋析而有二矣恐天下遂認其二而不知其一者未嘗亡也故於是復極言之一者何也莊周曰泰初有無無有無名一之所起有一而未形此道之將判萬物總焉而不能外者也故曰道生一一生二自是而往巧厯所不能算矣其在易自天一而降積之爲天地之五十五衍之爲大衍四十九而所謂一者終藏而不見豈非散於天地萬物之間無往而不在人無得而窺之者歟是以自天而淸至王侯之貞槪而論焉未有不得而能立者黃茂材曰夫盈於天地之間何可以數計皆不離乎一物始於一一卽一也一生二二卽二一也二生三三卽三一也三生萬物萬物卽萬一也自此推之至於恆河沙數卽恆河沙數一也故知乎一恆河沙數可得而知其致之寕非一乎天無以淸將恐裂地無以寕將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以爲貞而貴高將恐蹶御註曰天軄生覆地職形載裂則無以覆發則無以載神依人而行者也歇則無所示谷受而不藏者也竭則莫之應聚則精氣爲物得一以生故也散則遊魂爲變失一以滅故也惟正也故能御萬變而獨立萬物之上無以爲正而貴高將不足以自保能無蹶乎碧虛子陳景元曰無以者致誡之辭也陰陽書曰天裂者陽氣之不足君德之衰微也地震者陰氣之有餘臣道之失職也已上雖敘天地等事會歸戒於侯王侯王尚爾况黎庶乎穎濱蘇轍曰致之言極也天不得一未遽裂也地不得一未遽發也神不得一未遽歇也谷不得一未遽竭也萬物不得一未遽滅也侯王不得一未遽蹶也然其極必至於此耳陳象古曰裂則不全發則不靜歇則不久竭則易崩滅則不繼蹶則不安皆失道所致也葉夢得曰不幸而失之爲裂爲發以至爲蹶雖天地之大亦不能自存也此雖未必然而理則有是故以將言之黃茂材曰天無一必裂地無一必發神無一必歇谷無一必竭萬物無一必滅侯王無一必蹶不言必而言將恐者是一未嘗無也故貴以賤爲本高以下爲基是以侯王自稱孤寡不穀此其以賤爲本邪非乎御註曰賤者貴之所恃以爲固下者高之所自起世之人覩其末而聖人探其本世之人見其成而聖人察其微故常得一也孤寡不穀名之賤者也而侯王以爲稱知所本而己侯王所以貴高而不蹶其以此乎碧虛子陳景元曰夫貴者豈可以自貴哉必由賤者所奉然後貴耳高者豈可自高哉必緣下者所戴然後高耳孤寡不穀凡此三者皆人之鄙惡而侯王以爲稱謂者蓋卑以自牧不矜其尊貴若此豈非以賤爲本耶穎濱蘇轍曰天地之大侯王之貴皆一之致夫一果何物也視之不見執之不得則亦天下之至微也此所謂賤且下也昔之爲此稱者亦舉其本而遺其末耳陳象古曰是用賤下之道者也自謂孤寡不穀謙之至也易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也非乎者不可以爲非也黃茂材曰夫是一也非特貴者有之賤者亦有之非特高者有之下者亦有之東郭子問於莊子曰道烏乎在曰在螻蟻曰何其下耶曰在稊稗曰何其愈下耶曰在瓦甓曰何其愈甚耶曰在屎溺孤寡不穀未爲賤也故致數譽無譽不欲琭琭如玉落落如石御註曰自高以勝物自貴以賤物强而不知守以柔白而不知守以黑以求譽於世而致數譽則過情之譽暴集無實之毁隨至所以無譽玉貴而石賤一定而不變聖人乘時任物無所底滯萬變無常而吾心常一是眞得一者也故不可得而貴賤孟子曰所惡乎執一者謂其執一而廢百也不欲琭琭如玉落落如石非知化之聖不能及此是謂上德碧虛子陳景元曰開元本作故致數輿無輿者言就數輿則有輪轅箱軸等羣材之名無有名爲輿者合之則輿矣就國求之則有士農工商等萬民之號無有名爲國者合之則爲國矣然則忽羣材而輿何以成之棄萬民而國何以存之此重誡侯王之愛民也有道之君不欲顯耀琭琭如玉冥心韜光落落如石此能守沖一之道爲天下正者也穎濱蘇轍曰輪輻蓋軫衡軛轂轊會而爲車物物可數而車不可數然後知無有之爲車所謂無之以爲用者也然則天地將以大爲天地耶侯王將以貴爲侯王耶大與貴之中有一存焉此其所以爲天地侯王者而或莫之知耳故一處貴而非貴處賤而非賤非若玉之琭琭貴而不能賤石之落落賤而不能貴也達眞子曰致人之以言尚已者謂之譽凡處至貴則有貴之譽處至高則有高之譽且處至貴至高莫不致譽之速數也侯王雖得致速數之譽心得其道之一忘貴而同賤忘高而同下常若其無譽也故曰故致數譽無譽琭琭者玉之貌也落落者石之貌也玉也石也堅確而不易者也玉者貴之譬則侯王也石者賤之譬則孤寡也玉之貴也不能同乎石之賤石之賤也不能齊乎玉之貴至道之人得一於心者以至貴同至賤故不欲琭琭如玉以至賤同至貴故不欲落落如石非道之得一於心者孰能與此黃茂材曰致就也就車數之爲輪爲轂爲衡爲輿無有名爲車者故成爲車此河上公舊説也玉德之美也石質之堅也而不欲如之何也琭琭落落可得而名爾反者道之動章第四十反者道之動弱者道之用天下之物生於有有生於無御註曰天下之理動靜相因强弱相濟歛藏於冬而蕃鮮於春水之性至柔也而攻堅强者莫之能先其此之謂歟然則有無之相生若循環然故無動而生有有極而歸無彼蔽於莫爲溺於或使豈道也哉碧虛子陳景元曰反者覆也變也虛靜者物之本物之將生先反復虛靜之原及其變也出虛靜而動之是先反而後動易之復卦剛反動而順以行是以出入無疾此之謂也弱者道之用旣反虛靜爲道之動則柔弱雌靜實道之用也有一也一者元氣也言天下之萬物皆生於元氣也元氣屬有有光而無象雖有光景出於虛無虛無者道之體也列子曰有形者生於無形則天地安從生又曰形動不生形而生影聲動不生聲而生響無動不生無而生有是故物生於有有生於無涑水司馬光曰一陰一陽之謂道潁濱蘇轍曰復性則靜矣然其寂然不動感而遂通天下之故則動之所自起也道無形無聲天下之弱者莫如道然而天下之至强莫加焉此其所以能用萬物也世不知靜之爲動弱之爲强故告之以物之所自生者蓋天下之物聞有以母制子而未聞有以子制母者也臨川王安石曰言反不言靜言弱不言强言動則知反之爲靜言弱則知用之爲强葉夢得曰此猶以論夫一也自其多者數之則一者其反而萬物由之以運則道之動也自貴與高者觀之則一者其弱而萬物資之以立則道之用也夫如是知天下之物生於有則天地至於侯王者是已而有生於無則一固存焉於其間也淸源子劉驥曰經云虛無恍惚道之根萬物共本道之元反於此者離道以善故爲道之動體於此者至弱而强故爲道之用黃茂材曰無生有有生物凡物之生莫知其所以然人能求其所以生者還以自生豈不長生乎
