body:
  text: 道所在名非常名不可見其形不可聞其聲况可得而親疎利害貴賤乎黃茂材曰孔子曰吾觀老子其猶龍乎夫龍豈可得而親之疎之利之害之貴之賤之者乎旣曰不可得而貴又曰爲天下貴何也蓋亦自貴而已經曰知我者希則我貴矣以正治國章第五十七以正治國以奇用兵以無事取天下吾何以知其然哉御註曰正者道之常奇者道之變無事者道之眞國以正定兵以奇勝道之眞無容私焉順物自然而天下治矣碧虛子陳景元曰其然猶如是也老氏自設問答言我何以知天人之意如是哉謂下文也潁濱蘇轍曰古之聖人柔遠能邇無意於用兵唯不得已然後有征伐之事故以治國爲正用兵爲奇雖然此亦未足以取天下天下神器不可爲也爲者敗之執者失之唯體道者廓然無事雖不取天下而天下歸之矣葉夢得曰物各有所當治國者必以正用兵者必以奇國以奇治之則亂兵詭道用之以正亦未免於敗然聖人之奇豈若後世之詐哉敵至而爲之所是以其變不窮黃茂材曰夫道無爲而無不爲正也奇也無事也非知道者孰能之推而治國用兵取天下特其緒餘土苴耳古之人有行之者如伊尹太公范蠡張良之徒皆以此程大昌曰正者如人之行正路也奇者如人之行捷徑也無事者本其當然而不鑿不擾也夫天下多忌諱而民彌貧人多利器國家滋昏人多伎巧奇物滋起法令滋彰盜賊多有故聖人云我無爲而民自化我好靜而民自正我無事而民自富我無欲而民自樸碧虛子陳景元曰忌諱謂禁令也君不能無爲而以政教治國禁網繫密民慮抵犯避諱不暇弗敢云爲舉動失業日至貧窮利器者權謀也君不能安靜而以智變爲務上下欺紿則民多權謀偷安其生包藏禍心日至昏亂伎巧謂工伎巧妙也君不能無事而以機械爲妙志在奢淫則民尙雕琢服玩金玉奇恠異物日益滋生古本作民多智慧而邪事滋起法令謂刑法教令也君不能無欲而以刑法作威民雖苟免其罪然而不足則姦宄生焉故聖人云此老氏之謙不敢自專其言故舉聖人之云或謂老氏爲周柱下史遍觀上世之遺書三墳之古文以證其必然潁濱蘇轍曰人主多忌諱下情不上達則民貧而無告矣利器權謀也明君在上常使民無知無欲民多權謀則其上眩而昏矣人不敦本業而趨末伎則非常無益之物作矣患人之詐僞而多爲法令以勝之民無所措手足則日入於盜賊矣達眞子曰有欲者外也朴之散也無欲者内也朴之聚也故曰我無欲而民自朴前曰以無爲取天下蓋由此而見矣非體道之盡者孰能與此黃茂材曰上古之時民如標枝然昧昧而行安有忌諱權謀不作安有利器穴居坏飲安有伎巧不知君臣上下之分安有法令大樸旣散人僞日長至於商周之末極矣忌諱尙而民彌貧利器用而國家昏伎巧工而奇物起法令煩而盜賊充斥聖人將欲舉天下而返於湻樸之俗亦豈有他術哉淸靜無爲無所事而去其欲而已程大昌曰其曰聖人云者古有是語而老子援以自証也其政悶悶章第五十八其政悶悶其民湻湻其政察察其民缺缺御註曰在宥天下下知有之而無欣欣之樂碧虛子陳景元曰法令滋彰盜賊多有故人則凋弊道眞仁靜先生曹道沖曰悶悶如天道昏昏默默任其自然察察者政教煩細民多犯之故缺缺也淸源子劉驥曰悶悶者不徇於物而恬淡無爲也察察以智治國也黃茂材曰昏昏默默至道之極窈窈冥冥至道之精而以察察爲政者豈足語道哉故曰水至淸則無魚人至察則無徒禍兮福所倚福兮禍所伏孰知其極御註曰昭昭生於冥冥有倫生於無形德慧術智存乎疢疾高明之家鬼瞰其室知時無止知分無常知終始之不可故則禍福倚伏何常之有碧虛子陳景元曰若有道之君守之以淸淨任之以自然不利貨財不近貴富不樂夀不哀夭不榮通不醜窮不拘一世之利以爲己私分不以王天下爲己處顯如是則禍福倚伏於何而有陸佃曰天之肇降生民而其福至於湻湻其禍至於缺缺豈有他哉繫一人之政而已故禍兮福所倚福兮禍所伏淸源子劉驥曰其民缺缺則民始惑亂無以反其性情而復其初則禍福倚伏千變萬化而未始有極也其無正邪碧虛子陳景元曰禍福倚伏豈無正邪必有正耳在乎有道之君無爲無事忘形忘物而後正耳若有心爲正其正必復爲奇矣有心爲善其善必復爲祅矣謂下文也陳象古曰言物未嘗不存於正道也正復爲奇善復爲祅民之迷也其日固已久矣御註曰通天下一氣耳今是而昨非先迕而後合神奇臭腐相爲終始則奇正之相生祅善之更化乃一氣之自爾天下之生久矣小惑易方大惑易性自私之俗勝而不明乎禍福之倚伏且復察察以治之民安得而反其眞乎碧虛子陳景元曰嗟薄俗不能自正自善而乃矯眞爲正逆性爲善而反爲奇爲祅迷惑不悟其所由來固已久矣潁濱蘇轍曰天地之大世俗之見有所眩而不知也蓋福倚於禍禍伏於福譬如晝夜寒暑之相代正之爲奇善之爲祅譬如老稚生死之相繼未始有正而迷者不知也夫惟聖人出於萬物之表而覽其終始得其大全而遺其小察視之悶悶若無所明而其民湻湻各全其性矣若夫世人不知道之全體以耳目之所知爲至矣方且自以爲福而不知禍之伏於其後方且自以爲善而不知祅之起於其中區區以察爲明至於察甚傷物而不悟其非也可不哀哉臨川王安石曰種種分別遂生妄想黃茂材曰禍福奇正善祅之在天下如循環然孰知其極易稱惟聖人能知進退存亡况夫禍福之倚伏奇正之相生祅善之更化豈世人所能知哉故曰久矣是以聖人方而不割亷而不劌直而不肆光而不耀御註曰聖人所以正天下者何哉如斯而己碧虛子陳景元曰劌作穢濁穢也有道之君率性淸亷使物之自化耳而不以已之潔白揚彼之污但使物知勸而洗除穢濁矣自此以上皆悶悶之政非察察之治也古作劌傷也言聖人廉以自淸而不以刑物使傷也潁濱蘇轍曰知小察之不能盡物是以雖能方能廉能直能光而不用其能恐其䧟於一偏而不反也此則世俗之所謂悶悶也臨川王安石曰聖人無方無隅故方而不割崖岸而不畏故廉而不劌大直若屈故直而不肆用其光復歸其明故光而不耀陸佃曰不割彼以爲方不劌彼以爲廉不肆彼以爲直不耀彼以爲光道眞仁靜先生曹道沖曰不以廉而彰人之穢不以潔而明人之汚葉夢得曰民日迷於其間而弗悟聖人固當有以救之是故方而不割則有全者存廉而不劌則有質者存直而不肆則有屈者存光而不耀則有晦者存是以閉而不盡用爲悶而不爲察者也淸源子劉驥曰此四者皆悶悶之政非察察之治使民去智與故循天之理黃茂材曰夏商以來士守一介不見道之大全方則必割廉則必劌直則必肆光則必耀如伯夷叔齊尾生申徒狄之徒而遂至於害性傷生亦可悲矣老子時爲柱下史非不方也廉也直也光也而人莫知其爲老子者不割不劌不肆不耀焉爾故能樂其全程大昌曰廉者物之稜也陛廉之廉是也旣曰廉則遂有芒角鋒刃矣治人事天章第五十九治人事天莫若嗇夫惟嗇是以早復早復謂之重積德重積德則無不克無不克則莫知其極莫知其極可以有國有國之母可以長久御註曰聰明智識天也動靜思慮人也適動靜之節省思慮之累所以治人不極聰明之力不盡智識之任所以事天此之謂嗇涑水司馬光曰嗇者省嗇精神也早復者不遠復也不遠而復不離於德可以修身潁濱蘇轍曰凡物方則割廉則劌直則肆光則耀唯聖人方而不割廉而不劌直而不肆光而不耀此所謂嗇也夫嗇者有而不用者也世患無以服人苟誠有而能嗇雖未嘗與物較而物知其非不能也則其服之早矣物旣已服歛藏其用至於没身而終不試則德重積矣德積旣厚雖天下之剛强無不能克則物莫測其量矣如此而後可以有國彼小人有尺寸之柄而輕用之一試不服而天下測知其深淺而爭犯之雖欲保其國家而不可得也吾是以知嗇之可以有國則有國之母也臨川王安石曰夫人莫不有視聽思目之能視耳之能聽心之能思皆天也然視而使之明聽而使之聰思而使之正皆人也然形不可太勞精不可太用太勞則竭太用則瘦唯能嗇之而不使至於太勞太用則能盡性盡性則至於命早復者復於命也王雱曰治人在乎正己事天在乎盡性惟此兩者一於嗇而已動極而靜則其復晩矣惟嗇者不侈於費已其去本也未嘗遠故復靜爲早德不外耗則積於內矣積於內而資納無窮則其爲積也積之又積也盡性之人蓋將生天生地宰制造化其於事物何所不能盡性則大矣大而化之則聖矣化則無窮故莫知其極陸佃曰嗇者愛養之辭韓非所謂愛其精神嗇其知識是也蓋嗇精養神然後可以俯治人而仰事天故曰治人事天莫如嗇達眞子曰嗇於一心則必歛動而歸靜嗇於一性則必歛意而歸無心歛動於靜然後能盡心性歛意於無然後能正性盡其心正其性者人道之盡也人道盡則固可以治人矣心靜則任其自然性正則安其固有任自然安固有者天道之盡也天道盡則固可以事天矣是以治人事天莫如嗇惟心早復於靜意早復於性則所謂重其積德也能內重其積德以至治人則人無不順以至事天則天無不符以至應萬物則萬物莫不歸以至率萬化則萬化莫不盡是謂重積德則無不克母也者爲眾子之莫不從以眾動而歸靜以眾有而歸無固不異子之從母也惟眾動而歸靜則靜之者無終窮眾有而歸無則無之者無極盡故曰有國之母可以長久晦菴朱熹曰早復者言能嗇則不遠而復重積德者言先已有所積復養以嗇是又加積之也如修養者此身未有損失而又加以嗇養是謂早服而重積若待其已損而後養則養之方足以補其所損不得謂之重積矣所以貴早復者早覺未損而嗇之也黃茂材曰嗇者守於內不耗於外以之治人而人治事天而天應謂之早復復者物之初今之道家所謂返本還元是已可以成德可以勝羣物可以同於無極可以爲有國之母林東曰嗇雖有慳吝意乃簡損之理人爲難治天爲難事能於簡損而早復其德性之眞則可以見道旣見夫道則人雖姦詐天雖難測理不難見治之事之皆基於此是謂深根固柢長生久視之道御註曰根深則柢固性復則形全與天地爲常故能長生與日月參光故能久視人與物化而我獨存此之謂道碧虛子陳景元曰杜光庭曰修道之士嗇神以安體積氣以全和內固三關而祛萬慮百神率服眾行周圓變化莫窮享年長久固蒂於混元之域深根於無何有之鄉與夫九老七元差肩接武矣古本作柢本也潁濱蘇轍曰孟子曰盡其心養其性所以事天也以嗇治人則可以有國者是也以嗇事天則深根固蒂者是也古之聖人保其性命之常不以外耗內則根深而不可拔蒂固而不可脫雖以長生久視可也蓋治人事天雖有內外之異而莫若嗇則一也陸佃曰根在幽蒂在顯根則以言其命蒂則以言其性萬物莫足以測之之謂深惟命爲能與於此故曰深根萬物莫足以傾之之謂固惟性爲能與於此故曰固蒂黃茂材曰深根固柢長生久視之道於是乎在經云歸根曰靜靜曰復命其道見於易之復卦治大國章第六十治大國若烹小鮮御註曰事大眾而數搖之則少成功藏大器而數徙之則多傷敗烹小鮮而數撓之則潰治大國而數變法則惑是以治道貴淸靜而民自定潁濱蘇轍曰烹小鮮者不可撓治大國者不可煩煩則人勞撓則魚爛道眞仁靜先生曹道沖曰寬猛相濟生熟得中黃茂材曰道無大小治大國烹小鮮同於一道以道莅天下者其鬼不神非其鬼不神其神不傷民非其神不傷民聖人亦不傷民夫兩不相傷故德交歸焉碧虛子陳景元曰西昇經曰所謂爲道自然助之不善於祠鬼自避之此之謂也人不作舋則祅祥何緣而興人守常德則神變無因而傷民河上公曰夫兩不相傷人得治於陽鬼得治於陰人得全其性命鬼得保其精神故德交歸焉杜光庭曰夫民爲邦本本固則邦寕人爲神主主安則神享聖人以道爲治旣不傷於人鬼神感聖人之功亦不害於物兩者交悦二德交歸潁濱蘇轍曰聖人無爲使人各安其自然外無所求內無所畏則物莫能侵雖鬼無所用神矣非其鬼之不神亦有神而不傷人非神之不傷人聖人亦未嘗傷人故鬼無能爲耳人鬼之所以不相傷者由上有聖人耳故德交歸之陸佃曰神無乎不在其在人則聖而不可知者也其在鬼則靈而不可知者也故鬼之所以不神者非無神也其神不傷而已故曰非其鬼不神其神不傷人葉夢得曰詩頌文王之聖至於思齊曰神罔時怨繼之曰神罔時恫豈不以鬼無所怨於人則亦無恫於人降之嘉祥而禍災不至其有傷之者乎晦菴朱熹曰老子謂以道莅天下者其鬼不神若是王道修明則此等不正之氣都消鑠了黃茂材曰有道之世人能養其神不使其鬼勝故曰其鬼不神有干越之劍者柙而藏之不敢用也寶之至也聖人之不輕用其神亦如其劍雖曰神不傷人是亦聖人能養其神使不傷人爾故曰兩不相傷德交歸焉大國者下流章第六十一大國者下流御註曰人莫不有趨高之心而趨高者常蹶江海所以能爲百谷王者以其善下之也潁濱蘇轍曰天下之歸大國猶眾水之趨下流也臨川王安石曰大國下流者如眾人之所惡也非君子惡居之下流也道眞仁靜先生曹道沖曰人以謙爲德海以容爲量自高者不受於物能下者爲物所歸淸源子劉驥曰一身之設一國之象也身之虛而萬物至心之無而和氣歸虛無者聖人之所居所謂大國也以其不爭而天下莫能與之爭至於萬物之精華無極之物自來歸之猶泉水之趨下流也經所謂知其雄守其雌爲天下谿此之謂也天下之交天下之牝牝常以靜勝牡以靜爲下故大國以下小國則取小國小國以下大國則取大國故或下以取或下而取御註曰天下皆以剛强敵物而我獨寓於柔靜不爭之地則人孰勝之者是乃所以交天下之道碧虛子陳景元曰天下之所交牝者以其大國善守雌牝柔靜之德故能攝伏天下雄壯之國涑水司馬光曰交猶歸聚也穎濱蘇轍曰眾動之赴靜猶眾高之赴下也大國下以取人小國下而取於人臨川王安石曰交者眾人之會能處眾人之所惡則天下之動莫不歸之矣故曰天下之交牝蓋天下之交交於牝而已道眞仁靜先生曹道沖曰牝者母也物莫不慕其母也牝柔而靜牡剛而動常爲牝之驅役故聖人知雄守雌柔而不爭虛而處下物皆歸之達眞子曰牝者靜也牡者動也以靜爲眾動之所歸以牝爲眾牡之所往理固無他以靜爲下故也爲國者體此以靜制動以牝制牡故大國以下小國能屈已之勢也大國屈己之勢則取小國矣小國以下大國能畏彼之勢也小國能畏彼之勢則取大國矣以用也以取者力行而取也而取者自然而取也大國忘勢難在乎力行故曰以取小國趨勢易情之自然故曰而取陳象古曰交謂交結而附於已者也葉夢得曰取之爲言得其所欲之謂也淸源子劉驥曰天一生水在人爲精地二生火在人爲神神者陽中之陰故謂之雌亦天下之牝也聖人知雄守雌以陰煉陽陰極則陽生無爲之妙天地之要變化之機也故牝常以靜勝牡焉以靜而爲之下靜則羣動趨之下則眾高赴之天下常勝之道也黃茂材曰夫道非徒下之而已雖曰下之其終也必有以勝之必有以取之牝柔也靜而處下然能勝牡此非下之而終有以勝之者歟大國以下小國則取小國湯事葛是也小國以下大國則取大國勾踐事吳是也此非下之而終有取之者歟故曰或下以取或下而取亦其自然之理本於無心大國不過欲兼畜人小國不過欲入事人兩者各得其所欲故大者宜爲下御註曰天道下濟而光明故無不覆地道卑而上行故能承天人法地地法天故大者宜爲下道眞仁靜先生曹道沖曰大國得小國則益盛小國得大國則遂安各遂所欲大者能先下之則小者歸故宜下陳象古曰大國恃强鮮能下下今獨言大者宜爲下明所難也黃茂材曰夫有所欲於人而不能下人則不得其所欲大國欲兼畜人小國欲入事人能下則得不能下則不得至於道固無欲然欲至於道是亦爲有欲也大者道也故宜爲下此一篇全是借物眀道
