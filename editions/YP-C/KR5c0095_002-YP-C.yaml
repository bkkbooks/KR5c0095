body:
  text: 皆禁而止之此所謂使夫知者不敢爲也聖人之治豈棄人絶物而恝然自立於無事之地哉爲出於無爲而已淸源子劉驥曰聖人之道虛旡自然不可爲也爲者敗之執者失之故使夫知者不敢爲也爲無爲則其爲出於不爲自然之妙用無不治矣此莊子所謂游心於淡合氣於漠順物自然無容私焉而天下治道冲章第四道冲而用之或不盈淵兮似萬物之宗御註曰道有情有信故有用無爲無形故不盈冲者中也是謂大和莊子曰鯢桓之審爲淵止水之審爲淵流水之審爲淵淵虛而靜不與物雜道之體也惟虛也故羣實之所歸惟靜也故羣動之所屬是萬物之所係一化之所待也故曰似萬物之宗然道本無係物自宗道故似之而已碧虛子陳景元曰冲虛也又中也或不定之辭也又常也淵深靜也兮者深歎詠道之辭也明此冲虛之道不虧不盈體性凝湛深不可測故謂之淵也夫不測之理非有非無難以定名故寄言似也羣生日用注酌湛然體含萬象善惡斯保動植咸歸故爲萬物之宗潁濱蘇轍曰夫道冲然至無耳然以之適眾有雖天地之大山河之廣無所不遍以其無形故似不盈者淵兮深渺吾知其爲萬物宗也而不敢正言之故曰似萬物之宗臨川王安石曰道有體有用體者元氣之不動用者冲氣運行於天地之間其冲氣至虛而一在天則爲天五在地則爲地六葢冲氣爲元氣之所生旣至虛而一則或如不盈似者不敢正名其道也陸佃曰道者用之以冲則雖遍法界而不見其盈深不可識而爲萬物之宗師言或似者言之不敢正也列子所謂疑獨莊子所謂疑始是也道眞仁靜先生曹道冲曰或者疑問之辭也道貴通流而不絶不以定名而絶其變通之妙故云似不盈疑似不自盈滿而虛己者也淵者水之性言其淵澄不動似是萬物之宗祖也陳象古曰冲和也道有冲和之氣充塞於天地之間雖如此而不自盈滿言其不可測度准量也淵深妙之旨也宗主也道無作無爲於萬物而萬物因冲和之氣以生故曰似萬物之宗黃茂材曰一陰一陽之謂道冲者陰陽和氣也而用之或不盈者虛故能應也淵兮似萬物之宗者靜可以宗羣有也程大昌曰冲者盈之對謙冲幼冲大盈若冲冲氣爲和皆以不極乎盈爲義或之者疑之也似之者不敢主言也或不盈者非誠有所缺少也疑之而已萬物之宗則無之未出爲有者是矣不盈者未能遽及乎無也則似之而已挫其銳解其紛和其光同其塵湛兮似或存御註曰銳則傷紛則雜挫其銳則不爭解其紛則不亂和其光莊子所謂光矣而不耀是也同其塵莊子所謂與物委蛇而同其波是也湛兮似若存心若死灰而身若槁木之枝泰定之中天光自照惽然若亡而存油然不形而神此其道歟穎濱蘇轍曰人莫不有道也而聖人能全之挫其銳恐其流於妄也解其紛恐其與物構也不流於妄不構於物外患已去而光生焉又從而和之恐其與物異也光至潔也塵至雜也雖塵無所不同恐其棄萬物也如是而後全則湛然其常存矣雖存而人莫之識故曰似或存耳臨川王安石曰銳者火之形紛者絲之形挫其銳圓成也解其紛靜一也和其光不皦於上同其塵不昧於下程大昌曰銳才智之外形而有芒角者也紛事之節目繁會而盤錯者也莊子之謂膠膠擾擾者是也塵者在地非土在空非氛以配世事則其浮游汙雜者是也銳挫紛解則應物而不見其功光和塵同則混俗而無以自表乍而觀之道若不屬斯人矣徐而察其湛然無雜者則道未嘗不在也吾不知誰之子象帝之先碧虛子陳景元曰吾者老氏自稱也象似也我觀至道杳冥冲用不測匠成萬物今古常存道旣無祖無宗誰敢言孫言子彷彿深思似出乎天帝之先矣臨川王安石曰吾不知道是誰所生之子象帝之先象者有形之始也帝者生物之祖也故繫辭曰見乃謂之象帝出乎震其道乃在天地之先道眞仁靜先生曹道冲曰有象之大者莫大於天故爲有象之君故曰象帝杳冥生眞精眞精生冲氣冲氣生天地天地生萬物惟道自然非物能生故云吾不知誰之子似是象帝之先也黃茂材曰吾不知其誰氏之子象帝之先卽道是已道本無名或謂化工或謂造物或謂象帝之先皆强名也天地章第五天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗御註曰恩生於害害生於恩以仁爲恩害則隨至天地之於萬物聖人之於百姓輔其自然無愛利之心焉仁無得而名之束芻爲狗祭祀所用適則用之過則棄之彼萬物之自生百姓之自治曾何容心焉碧虛子陳景元曰天地無恩而大恩生聖人不仁而大仁成不仁謂無情於仁愛非薄惡之也潁濱蘇轍曰天地無私而聽萬物之自然故萬物自生自死死非吾虐之生非吾仁之也譬如結芻爲狗設之於祭祀盡飾以奉之夫豈愛之時適然也旣事而棄之行者踐之夫豈惡之亦適然也聖人之於民也亦然特無以害之則民全其性死生得喪吾無與焉雖未嘗仁之而仁亦大矣臨川王安石曰天地之於萬物聖人之於百姓有愛也有所不愛也愛者仁也不愛者亦仁也惟其愛不留於愛有如芻狗當祭祀之用也盛之以篋函巾之以文繡尸祝齋戒然後用之及其旣祭之後行者踐其首跡樵者焚其肢體天地之於萬物當春生夏長如其有仁愛以及之至秋冬萬物彫落非天地之不愛也道眞仁靜先生曹道冲曰天地聖人至仁而不自以爲仁故曰不仁黃茂材曰天地之於萬物無傷而己任之自遂聖人之於百姓無擾而己任之自生任之自生故民無不生任之自遂故物無不遂此其爲仁甚大若無顧愛之心故謂天地聖人不仁申韓之學遂竊以爲刑名其慘刻甚矣問之則曰聖人治天下無所顧愛其說葢起於此豈不失老子之意哉程大昌曰結芻爲狗當祭則用已事而棄是芻狗之時貴時賤者也天地之生化萬物而遞相代謝實其似之苟有心於爲仁其將孰爲乎爲此則妨彼利一而遺百其爲仁亦勞而小矣槪運一氣與物爲時使根性與之相直者自生自化自形自色自消自息而天地若無預焉此不仁之仁也聖人無心而用大正以取法於天地也是故未嘗曲愛一人而無一人不受其德也莊子用此推之而曰至仁無親當使我忘天下而天下亦自忘我此正不仁之仁槪加被冒而世人不知其德者也非眞相忘也林東曰老氏之於道其能游戯三昧者乎說者以不仁乃所謂深仁如於乎不顯乃所爲深顯王者不治夷狄乃所爲深治豈有天地聖人以不仁稱之言天地聖人則當以深仁目之此俗儒之淺於理者之所云天地之間其猶槖籥乎虛而不屈動而愈出御註曰槖籥虛而能受受而能應故應而不窮有實其中則觸處皆礙碧虛子陳景元曰槖以鼓風吹火者也籥笛也言天地之間虛空無爲生物無私以喻聖人之心虛廓淵靜應世不逆若槖之懷風籥之含聲應用不絶而終不可屈也以况聖人無私無心而不事愛利也潁濱蘇轍曰槖與籥也方其一動氣之所及無不靡也不知者以爲機巧極矣然槖籥則何爲哉葢亦虛而不屈是以動而愈出耳王雱曰槖籥虛以應物感則應應而不藏天地之於萬物聖人之於百姓應其適然而不係累於當時不留情於旣往虛而不屈者其體動而愈出者其用淸源子劉驥曰言天地則人在其中矣晦菴朱熹曰虛而不屈動而愈出有一物之不受則虛而屈矣有一物之不應是動而不能出矣黃茂材曰虛旡體也故不屈動不已也故愈出悟芻狗之說則可以忘形骸知槖籥之理則可以鍊精炁程大昌曰槖冶鞴也籥其管也槖也者吸氣滿之而播諸冶鑪者也管也者受此吸而嘘之所以播也多言數窮不如守中御註曰愼汝內閉汝外收視反聽復以見天地之心焉此之謂守中涑水司馬光曰能守中誠不言而信穎濱蘇轍曰見其動而愈出不知其爲虛中之報也故告之以多言數窮不如守中之不窮也淸源子劉驥曰天地得一氣之妙而運行不息聖人得一氣之妙而升降無窮其道杳然難言哉若求之於多言則泥古人之糟粕獘精神於蹇淺非徒無益也故多言數窮不如守中守中者內保之而外不蕩也無思無爲寂然不動而守之於中如天地槖籥之無心自然運用以其有眞君存焉谷神章第六谷神不死是謂玄牝碧虛子陳景元曰河上公章句谷者訓養也神謂五藏之神肝藏魂肺藏魄心藏神腎藏精脾藏志夫人能淸靜虛空以養其神不爲諸欲所染使形完神全故不死也若觸情耽滯爲諸境所亂使形殘神去則何道之可存哉涑水司馬光曰中虛故曰谷不測故曰神天地有窮而道無窮故曰不死玄者言其妙牝者萬物之母道眞仁靜先生曹道冲曰玄者杳冥而藏神牝者冲和而太上此陰陽之宗天地之祖今術家以口鼻爲玄牝非也淸源子劉驥曰靈樞經云天谷元神守之自眞言人身中上有天谷泥丸藏神之府也中有應谷絳宮藏氣之府也下有靈谷關元藏精之府也天谷者元宮也乃元神之室性之所存是神之要也聖人則天地之要神守於元宮氣騰於牝府神氣交感自然成眞眞合自然與道爲一而入於不死不生故曰谷神不死是謂玄牝玄天也牝地也人之形體法象天地所以靈樞以天谷泥丸元神之室爲元宮以絳宮關元精氣之府爲牝府玄牝者神氣之所要會也晦菴朱熹曰谷之虛也聲達焉則響應之乃神化之自然也是謂玄牝玄妙也牝是有所受而能生物者也至妙之理有生生之意焉程子所以取老氏之說也又曰谷是虛而能受神謂無所不應黃茂材曰谷體虛虛能養神神常存故不死谷神之道妙不可傳乃從而爲之說曰是謂玄牝玄者妙道之門牝者生物之祖玄牝之門是謂天地根潁濱蘇轍曰玄牝之門言萬物自是出也天地根言天地自是生也綿綿若存用之不勤潁濱蘇轍曰綿綿微而不絶也若存存而不可見也能如是雖終日用之而不勞矣道眞仁靜先生曹道冲曰綿綿者冲和不絶之謂道貴無迹謂之有則滯謂之無則頑故曰若存黃茂材曰綿綿相繼之謂也綿綿若存所以形容不死之道上士聞道勤而行之今乃用之不勤何也勤者有時而不勤用之不勤者無適而不勤與道合矣其爲勤莫大焉天長地久章第七天長地久天地所以能長且久者以其不自生故能長生御註曰天穹窿而位乎上經爲日月緯爲星辰而萬物覆焉地磅礴而位乎下結爲山嶽融爲川澤而萬物載焉萬物覆載於天地天地無心於萬物故天確然而常運地隤然而常處所以能長且久也天地有心於生物則天俄而可度其覆物也淺矣地俄而可測其載物也薄矣若是則烏能長生涑水司馬光曰凡有血氣之類皆營爲以求生唯天地無爲而自生潁濱蘇轍曰天地雖大而未離於形數則其長久葢有量矣然老子之言長久極於天地葢以人所見者言之耳若夫長久之至則所謂天地始者是矣王雱曰天地之不自生非利乎長久而然道固如此而已所謂長久者亦瞬息之間耳唯覆載傾陷而未嘗壞者乃其眞也陸佃曰貪生者不生遺生者不死道眞仁靜先生曹道冲曰不生者生之本黃茂材曰萬物莫不資天地以生而天地實未嘗生之人自生人獸自生獸禽魚草木自生禽魚草木天地何與焉生生者不生萬物所以代謝相仍不生者不死天地所以長久不己人能同於天地豈有不長生乎是以聖人後其身而身先外其身而身存御註曰天地之與聖人咸得乎道而聖人所以治其身亦天地己故此章先言天地之不自生而繼之以聖人不自有其身也碧虛子陳景元曰聖人無爲身在廟堂而心游姑射法天地之覆載均養無私大有處謙不敢爲天下先其百姓欣戴樂推而不厭故先又能忘功忘名外身寡欲其天下愛之如父母神明祐之若赤子故存潁濱蘇轍曰如使天地與物競生而聖人與人爭得則天地亦一物耳聖人亦一人耳何以大過之哉王雱曰聖人雖聖而形與物齊唯體天道而不爭迺能獨異於眾使其立已而與眾敵則匹夫匹婦皆足以勝之劉涇曰聖人與天地同則後身外身猶之不自生也身先身存猶之長久也後身謂屈己外身謂忘我道眞仁靜先生曹道沖曰後其身而身先退已進人爲眾所推爲後而反先外其身而身存齊生死者不爲生死所累外形骸者不爲形骸所礙淸源子劉驥曰人處天地之中與天地分一炁而治所以不能與天地同其長久者以其有爲有欲貪生太厚也是以聖人後其身而不敢有爲外其身而不敢有欲人皆取先已獨取後是謂後其身忘其肝膽遺其耳目外死生遺禍福是謂外其身後其身而不先外其身而不存芒然彷徨乎塵垢之外逍遥乎無爲之業隳肢體黜聰明離形去智同於大通與道同久則身不期先而先不期存而存黃茂材曰後其身所以處世也外其身所以體道也今有人焉卑遜亷退鄕里推之朝廷高之則夫離形去智遺世獨立必能長存亦可知矣非以其無私耶故能成其私御註曰天地之大德曰生聖人之大寶曰位天地體道故無私無私故長久聖人體道故無私無私故常存碧虛子陳景元曰天地生育萬物而聖人外己全民皆不以仁恩自恃豈有自私之心乎實無私也無私故能長久以其長久故始能成其私也潁濱蘇轍曰道則然耳劉涇曰天地不自生與聖人之後外其身皆無私也然天地以此長久聖人以此存則皆成其私也黃茂材曰人皆亡己獨存物皆夭已獨夀非私乎程大昌曰不自私者乃所以遂其私歟上善若水章第八上善若水御註曰易曰一陰一陽之謂道繼之者善也莊子曰離道以善善名旣立則道之體虧然天一生水離道未遠淵而虛靜而明是謂天下之至精故曰上善若水碧虚子陳景元曰至人虛懷無欲應變隨時不逆諸緣處善忘善故曰上善水能方圓凝釋深淺浮沉順道涵虛咸有其理惟至人兼而通之故曰若水臨川王安石曰善者可以繼道而未足以盡道故上善之人若水矣劉涇曰易曰繼之者善莊子曰離道以善皆謂自道而降莫近於善淸源子劉驥曰天一生水亦去道未遠故上善若水水善利萬物而不爭處眾人所惡故幾於道御註曰融爲雨露萬彚以滋凝爲霜雪萬寳以成疏爲江河聚爲沼沚萬物皆往資焉而不匱以利萬物孰善於此善利萬物萬物蒙其澤受其施而常處於柔弱不爭之地納汙受垢不以累乎其心故於道爲近幾近也碧虛子陳景元曰水藴三能之近道天無水則陽旱地無水則塵飛利澤萬物故曰善利此一能也去實歸虛背高趨下壅之則止決之則行聽從於人故曰不爭此二能也人之情惡處下流好居上位而水則就卑受濁令物潔白獨納汙辱故曰處眾人之所惡此三能也潁濱蘇轍曰二者皆自無而始成形故其理同道無所不在無所不利而水亦然然而旣已麗於形則於道有間矣故曰幾於道然而可名之善未有若此者也故曰上善道眞仁靜先生曹道冲曰柔弱者俗之所恥汙下者俗之所惡水性獨異於俗黃茂材曰水有上善一小善七利物不爭處眾人之所惡上善也人能體此可幾於道居善地心善淵與善仁言善信政善治事善能動善時夫惟不爭故無尤矣碧虛子陳景元曰至人所居善執謙下化及鄕黨如水在地善就卑下滋潤羣物故曰居善地此一善也至人之心善保虛靜洞鑒幽微如水淵澄波流九變不失明靜故曰心善淵此二善也至人善行仁慈惠及天下如水膏潤無不霑濟故曰與善仁此三善也至人之言善守誠信不與物期自然符契如水景物妍醜無差流滿輒移行險不失故曰言善信此四善也至人從政善治於民正容格物物自順從如水淸平善定高下滌蕩羣物使無塵穢故曰政善治此五善也至人臨事善能任物隨器授職不失其材如水柔性善事方圓能隨形器無用不成故曰事善能此六善也至人動靜善觀其時出處應機能全其道如水之動善隨時變冬凝夏液不差其節故曰動善時此七善也潁濱蘇轍曰避高趨下未嘗有所逆善地也空虛靜默深不可測善淵也利澤萬物施而不求報善仁也圓必旋方必折塞必止決必流善信也洗滌羣穢平準高下善治也遇物賦形而不留於一善能也冬凝春泮涸溢不失節善時也有善而不免於人非者以其爭也水惟不爭故兼七善而無尤劉涇曰善以處下爲居水以就下爲地在善則得水之地故曰居善地善以安靜爲心水以深靜爲淵在善則得水之淵故曰心善淵善以教人爲與水以利物爲仁在善則得水之仁故曰與善仁善以不欺爲信水以行險不失爲信在善則得水之信故曰言善信善以正己正物爲政水以激揚淸濁爲治在善則得水之治故曰政善治善以同心爲事水以圓方而不滯爲能在善則得水之能故曰事善能善以爲動水以冬凝春泮爲時在善則得水之時故曰動善時言上善當如水以不爭爲善也以不爭爲利乃能兼此七者而爲天所祐人所助也何過之有乎黃茂材曰其小善七居善地者瀦而爲澤也心善淵者靜可以鑒也與善仁者濟物之功博也言善信者其流聲不息也政善治者可以濯垢汙也事善能者因器而爲方圓也動善時者冬凝春則泮也此七者能其一亦可以爲善人而未若不爭之爲上不爭故無尤程大昌曰八十一章其申言不爭之益者凡六曰不自伐故有功不自矜故長夫惟不爭故天下莫能與之爭是其一也欲上人而下之欲先人而後之以其不爭故天下莫能與之爭則其二也天道不爭而善勝三也聖人之道爲而不爭四也戰而不武勝而不與是謂不爭之德五也與此之不爭無尤者凡六也夫其謂爭者非必至於鬭且戰也彼己匹對兩不相下斯謂爭矣天之陰陽至神而無著也然常以冬夏二至而爭葢已居其地者未退而方來待代者欲前此之謂爭故爭者對起而不退聽之謂也有待乎道者則不然矣
