body:
  text: 大道汎兮章第三十四大道汎兮其可左右御註曰汎然無所繫故動靜不失往來不窮左之右之而無不可碧虛子陳景元曰汎汎乎滿乎太空而無所繫著者其惟道之體乎或可於左或可於右皆逢其原而無所不周者其惟道之用乎穎濱蘇轍曰汎兮無可無不可故左右上下周旋無不至也王雱曰汎然不倚一物故用之無所不通葉夢得曰易曰一陰一陽之謂道易之言道以陰陽而老氏之獨曰萬物負陰而抱陽則爲之陰陽者誰乎故於此特以左右見之左陽也右陰也大道汎兮其無所倚故自陰而之陽則可以左自陽而之陰則可以右林東曰一説以左右爲佐佑説老氏書有輔萬物之自然是也萬物恃之以生而不辭功成不居穎濱蘇轍曰世有生物而不辭者必將名之以爲己有世有避物而不有者必將辭物而不生生而不辭成而不有者惟道而已臨川王安石曰萬物之資貸以生則亦恃之而不辭矣功成而不居巍巍乎其有成功蕩蕩乎民無能名是也道眞仁靜先生曹道沖曰萬物雖繁道皆以無爲之妙而成之不以其多而拒之裁成萬物不以爲能陳象古曰不言巳之能生也不自有其成功也葉夢得曰萬物由乎其間則恃之以生者吾固不得辭非我也陰陽也及其功成吾亦不得名之有矣名且不得而况於實乎黃茂材曰萬物之生非道而何故不可得而辭生物之功亦爲大矣功成而不居其功衣被萬物而不爲主故常無欲可名於小矣萬物歸焉而不知主可名於大矣是以聖人終不爲大故能成其大御註曰道復於至幽則小而與物辨顯於至變則大而與物交與物辨故常無欲與物交故萬物歸焉覆露乎萬物而不示其宰制之功故不爲主鼔舞乎羣眾而莫窺其歸往之迹故不知主夫道非小大之可名也云可名者道之及乎物者爾碧虛子陳景元曰杜光庭曰聖人愛民恤物巨細申恩若可名於小矣任物遂性歸功於天又可名於大矣決道施化布德及人鼓以湻和之風被以淸靜之政忘功不有不自尊高故其盛業可大聖德可久以其不爲大故能成此尊大矣修身之士汎然無著若雲之無心水之任器可左可右隨方隨圓不滯於常物來斯應鑒物斯廣不均應用之心利物雖多不矜兼濟之德仁逮蠢動未始爲私眾善歸宗不爲之主是能彰非小非大之德無自尊自伐之稱可以契上眞之大道矣穎濱蘇轍曰大而有爲大之心則小矣王雱曰有意於主則反與物對惟其主萬物而未嘗有意乃所以充塞無外而莫能離夫道之爲物方其小也未嘗不大方其大也未嘗離小但觀者各得其迹而已要而言之非小非大不可言傳可以意得自大則有其大有其大則小矣唯其非大而强名以大則眞大也道眞仁靜先生曹道沖曰不自爲大終爲萬物之宗不自爲先終爲天地之祖陳象古曰物由道生不自爲主其施甚廣無欲觀妙乃道之幾可名於小其樸若全萬物歸已之恩不自恃其功沖而用之物莫能測故可名爲大黃茂材曰道無大小自吾無欲以觀之則謂之小自物不知所主以觀之則謂之大聖人體此以游於世豈不爲大乎然未嘗有自大之心執大象章第三十五執大象天下往往而不害安平泰御註曰象如天之垂象無爲也運之以健無言也示之以文聖人之御世處無爲之事行不言之教而民歸之如父母故曰執大象天下往陰陽和靜鬼神不擾羣生不傷萬物不夭民雖有智無所用之何害之有安則無危亡之憂平則無險陂之患泰者通而治也臨川王安石曰大象者道之喻執其大則爲萬物之所歸向吾能順性命之理受之而不逆故往而不害能安則能平能平則能泰善安然後至於平平然後至於泰也道眞仁靜先生曹道沖曰無象者大象也母之於子也未有母處而子不往就之也物來附德猶子歸母不害其所利則相蓄養和平而安泰也達眞子曰大象者道之象也然道不可執聖人體之固若其執爾聖人體道則爲天下之所歸故曰執大象天下往往者歸往之謂也莫足以傾則曰安莫足以險則曰平莫足以否則曰泰葉夢得曰大象猶大物也恍惚之間有物有象其藏深矣不可名以大執而示物然後其大者見焉天下始得從之而往吾雖受之而未嘗見其有物則雜然共處各安其性命之情並行而不相悖固未有能害之者也是以不失其居則安不違其分則平不逆其情則泰淸源子劉驥曰象者物之始見去道未遠故以喻道大象者無象之象虛無之眞也身之虛而萬物至心之無而和氣歸故執大象天下往經所謂太虛内神六合朝眞亦此之謂也以至萬物之精華無極之物皆來歸之注焉而不滿酌焉而不竭利而不害爲而不爭故往而不害安平泰安則安於性命之情平則定乎内外之分泰則交通成和而上下與天地同流也黃茂材曰道本無象孰得而執然必有主之者故天下往焉往者謂其無往而不在也太古之時有羲皇在上天下之民含哺而嬉鼓腹而遊無日不在乎道之中可謂安平泰矣又豈有害者哉樂與餌過客止道之出言淡乎其無味視之不足見聽之不足聞用之不可旣碧虛子陳景元曰此舉喻也夫音樂之和人必爲之少留饌餌之美客必爲之暫止樂之佚也耳滿而過焉餌之飫也舌味而爽焉客之止也主倦而厭焉夫法之初興民皆親之譽之及其獘也則民畏之侮之莊子曰仁義先王之蘧廬也止可以一宿而不可以久處覯而多責此言法之用也隨世汙隆滯而久之理必敗矣旣敗豈有往而不害者哉旣受其害則奚足言其安平泰也夫樂佚餌飫則過爽隨焉大法一獘則畏侮彰焉若夫道之出言淡然無味所謂信言不美也淸靜無爲則民樂其性故含哺鼓腹而遊乎混茫則不知其所之矣豈有和悦之聲甘美之味而審聽咀嚼哉穎濱蘇轍曰作樂設餌以待來者豈不足以止過客哉然而樂闋餌盡彼將捨之而去若夫執大象以待天下天下不知好之又况得而惡之乎雖無臭味形色聲音以悦人而其用不可盡矣臨川王安石曰夫五味之於口五聲之於耳世皆沉溺而不知反者以其悦之於口耳之間也唯道之於口則非味而常淡然耳惟其不悦於味而視道之無味不悦於聲而視道之無聲則視之不足見聽之不足聞而其用不可盡矣道眞仁靜先生曹道沖曰樂者音樂也餌者飲食也旣就而歸附樂所以和其心食所以養其形内外得所雖過客亦留而不去而况其素來處者惟道深遠久大其言簡淡初聞甚淡久之味在其中矣非玄覽莫能見非聽幽莫能聞雖無近利久而用之始知無盡黃茂材曰張樂設餌過客且止聲色嗜欲之能悦人如此若夫道出於口則無味視於目則無色聽於耳則無聲然人能得而用之其用無窮豈外物可比哉將欲歙之章第三十六將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲取之必固與之御註曰此聖人所以履霜而知堅氷之至碧虛子陳景元曰此一章先賢解之多端皆不條理其説或引孔子曰可與適道未可與權或引國家權變爲辭近乎縱橫之説此乃與陰符天機合矣在乎高識變通者密用爾穎濱蘇轍曰未嘗與之而遽奪則勢有所不極理有所不足勢不極則取之難理不足則物不服然此幾於用智也與管仲孫武何異聖人之與世俗其迹固有相似者也聖人乘理而世俗用智乘理如醫藥巧於應病用智如商賈巧於射利臨川王安石曰天下之人常爲陰陽轉徙而不知反故欲張者必歙欲强者必弱知雄之爲動而當守其雌知白之爲明而當守其黑故處之以歙則天下之張皆歸之而不爲彼之所歙持之以弱則天下之强皆歸之而不爲彼之所弱道眞仁靜先生曹道沖曰故知機者謹密也陳象古曰張極必歙强極必弱興極必廢與極必奪自然之理也淸源子劉驥曰物盛則衰物極則反乃消息盈虛之常理也日中則昃月滿則虧日月尚爾况其他乎此天之道黃茂材曰凡物有歙有張有弱有强有廢有興有奪有予造化者未嘗容心於其間如日月寒暑相爲往來當其張也必有歙之者焉當其强也必有弱之者焉當其興也必有廢之者焉當其與也必有奪之者焉是謂微明御註曰其未兆爲微而其理甚著賢人覩而眾莫知涑水司馬光曰知微之明臨川王安石曰非見機者不能與於此達眞子曰自其張之微而明其有歙自其强之微而明其有弱黃茂材曰此理雖明達之者少故謂微明林東曰人當見微而知著是謂微明柔之勝剛弱之勝强穎濱蘇轍曰聖人知剛强之不足恃故以柔弱自處天下之剛强方相傾相軋而吾獨柔弱以待之及其大者傷小者死而吾以不校坐待其斃此所謂勝也雖然聖人豈有意於此以勝物哉知勢之自然而居其自然耳達眞子曰剛勝柔强勝弱形器之然也柔之勝剛弱之勝强道用之然也淸源子劉驥曰剛强所以勝人勝人則有時而力屈柔弱所以自勝自勝則吾往而不勝黃茂材曰柔未嘗求勝剛也而剛者常不能屈故曰柔勝弱未嘗勝强也而强者常不能加故曰弱勝魚不可脱於淵國之利器不可以示人御註曰淵者魚之所以藏其身利器者國之所以制人吞舟之魚蕩而失水則蟻能苦之故不可脱於淵聖人能窮海內而無智名威服萬物而無勇功而天下治碧虛子陳景元曰國家之權謀泄漏於民下則小夫得以玩弄况奸雄乎穎濱蘇轍曰魚之爲物非有爪牙之利足以勝物也然方其托於深淵雖强有力者莫能執之及其脫淵而陸則蠢然一物耳何能爲哉聖人居於柔弱而剛强者莫能傷也非徒莫能傷也又將以全制其後此不亦天下之利器也哉魚惟脱於淵然後人得制之聖人惟處於柔弱而不厭故終能服天下此豈與眾人共之者哉臨川王安石曰魚之爲物深潛退伏而藏於深淵之中而不可脱於淵聖人之利器常隱於微妙而不可離於樸也道眞仁靜先生曹道沖曰淵者魚之所以存身脱則有鈎網之患道者人之所以生失者必有禍患之憂又利於國之器藏而以息盜機豈可示於外也葉夢得曰聖人之於天下也蓋亦有運之者焉而不可以示人謂之利器吞舟之魚蕩而失水則螻蟻得而制之脱淵之病也是故聖人藏其用而不盡古者謂是爲神故曰神而化之使民宜之自伏羲至於文王因時之變立成器以爲天下利使斯民由之而不知者皆是物也是以民可使由之不可使知之雖吾孔子亦云不知是而一二以暴之則民必有伺其間而奪之者此三代而下所以詐僞萌生而卒無以勝之者歟黃茂材曰庖丁爲文惠君語解牛之妙提刀而立爲之四顧爲之躊躇滿志善刀而藏之文惠君曰吾聞庖丁之言得養生焉由此觀之魚豈可脱於淵國之利器豈可以示人魚脱於淵必制於人國之利器示人必奪於人皆非善刀而藏之者也林東曰魚脱於淵而處陸則死人不可以捨福而趨禍國之利器以示人則謀動干戈而有傷乎物則亦取禍之道道常無爲章第三十七道常無爲而無不爲侯王若能守萬物將自化碧虛子陳景元曰夫道之常也湛寂不動故曰無爲應物而動物皆自用故曰無不爲夫侯王若能常以虛爲心亦以無爲身持守而不撓者故萬物將自從其化也經曰我無爲而民自化黃茂材曰道惟無爲故能無不爲若其有爲則其爲也小矣侯王守此可以使萬物化萬物之化非道孰能然今云將自化者生而不有爲而不恃衣被萬物而不爲主也歟化而欲作吾將鎭以無名之樸穎濱蘇轍曰聖人以無爲化萬物萬物化之始於無爲而漸至於作譬如嬰兒之長人僞日起故三代之衰人情之變日以益甚方其欲作而上之人與天下皆靡故其變至有不可勝言者苟其方作而不爲之動終以無名之樸鎭之庶幾可得而止也道眞仁靜先生曹道沖曰旣化而泰民性過於泰則動作流蕩復以無名之樸鎭靜之民不可得而名狀之矣故定達眞子曰化而欲作道之散也無名之樸道之聚也以樸則無名固知化者有名也以化而欲作固知樸者不作也由是知鎭以無名之樸者使有名復歸於無名有作復歸於無作蓋以反本之謂也淸源子劉驥曰性靜謂之神神靜則萬化安心動謂之情情動則萬化亡非陰陽賊之心則使之也故吾將鎭以無名之樸天眞之性道之大原不可得而名故以樸爲喻鎭以無名之樸者必靜必淸守性之眞惟寂惟寞體道之原居杳冥之内在恍惚之中離形去智不識不知物我兼忘與道爲一無名之樸亦將不欲不欲以靜天下將自正御註曰易曰乾道變化各正性命乾道變化則無爲也各正性命則不欲以靜天下將自正也以道治天下至於各正性命此之謂治之至穎濱蘇轍曰聖人中無抱樸之念外無抱樸之迹故樸全而用大苟欲樸之心尚存於胸中則失之遠矣葉夢得曰靜者盡性而至命者也夫然天下不期而自正矣莊周曰正正者不失其性命之情其知靜哉淸源子劉驥曰莊子所謂抱神以靜形將自正經所謂我好
