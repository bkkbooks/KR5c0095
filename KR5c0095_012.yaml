body:
  text: 宋鶴林彭耜纂集大成若缺章第四十五大成若缺其用不敝大盈若沖其用不窮大直若屈大巧若拙大辯若訥御註曰域中有四大道居一焉體道之全故可名於大無成與虧是謂大成不有其成故若缺故其用不敝此孔子所以集大成而爲聖之時碧虚子陳景元曰大成謂全德之君子如大壑酌之而不竭明鑑應之而不疲故曰其用不敝盛德大業者謙冲而不驕富貴滿堵者虚儉而不奢所用豈能窮匱大直者謂隨物而直彼含垢而不申其直不在己故若屈也大巧者謂因物性之自然而成器用不造爲異端故若拙也涑水司馬光曰物成必毁盈必溢理之常也有道者雖成若缺雖盈若冲故不弊不窮潁濱蘇轍曰天下以不缺爲成故成必有弊以不虚爲盈故盈必有窮聖人要於大成而不恤其缺期於大盈而不惡其沖是以成而不弊盈而不窮也直而不屈其直必折循理而行雖曲而直巧而不拙其巧必勞付物自然雖拙而巧辯而不訥其辯必窮因理而言雖訥而辯臨川王安石曰萬物始乎是終乎是是大成也陸佃曰大成不見其足故若缺大盈不見其溢故若冲大直不見其伸故若屈大巧不見其力故若拙大辯不見其給故若訥清源子劉驥曰道無成虧故謂之大成道無盈虚故謂之大盈不有其成故若缺不見其盈故若沖成必有虧以其若缺故其用不敝盈必有虚以其若沖故其用不窮大直者直而不肆故若屈大巧者不爲而成故若拙大辯者不言之教故若訥黄茂材曰苟不知道其誰肯以屈拙訥自處哉躁勝寒靜勝熱清靜爲天下正御註曰陽動而躁故勝寒陰止而靜故勝熱二者毗乎陰陽而不適乎中方且爲物汨方且與動爭爲能正天下惟無勝寒之躁勝熱之靜則不雜而清抱神以靜天下將自正碧虚子陳景元曰躁動也言春夏陽氣發於地上萬物因之以生物極則反故夏至則一陰生乎其中矣氣動極則寒寒則萬物以衰死明躁爲死本盛爲衰原夫至清者在濁而物莫能滑亂至靜者處動而事莫能溷撓且大成大盈大直大巧大辯則有不敝不窮若屈若缺若訥以對之惟清惟靜則可以持衆事而爲天下之中正者也莊子曰抱神以靜形將自正必靜必清無勞汝形無摇汝精乃可以長生也潁濱蘇轍曰成而不缺盈而不沖直而不屈巧而不拙辯而不訥譬如躁之不能靜靜之不能躁耳夫躁能勝寒而不能勝熱靜能勝熱而不能勝寒皆滯於一偏而非其正也唯泊然清靜不染於一非成非缺非盈非冲非直非屈非巧非拙非辯非訥而後無所不勝可以爲天下正矣達眞子曰春與夏則萬物動之時也動之極則有寒之者至焉故曰躁勝寒是躁勝之時必有寒也秋與冬則萬物靜之時也靜之極則有熱之者至焉故曰靜勝熱是靜勝之時必有熱也此理之必然矣皆出於勝極之所致也惟大成猶若缺大盈猶若冲大直猶若屈大巧猶若缺大辯猶若訥皆無其勝極之心也心無勝極則清不爲物所污靜不爲動所誘若是則心之所造其有不正哉故曰清靜爲天下正葉夢得曰春秋傳曰正直爲正正曲爲直清靜之爲天下正正其直者也黄茂材曰有天之寒暑有人之寒暑墮脂折膠天之寒亦甚矣而躁則勝之爍石流金天之暑亦酷矣而靜則勝之乃知人身自有一宇宙其寒暑足以勝天之寒暑若其知道清靜自然則可同於太極爲天下正何至於勝之天下有道章第四十六天下有道却走馬以糞天下無道戎馬生於郊御註曰以道治天下者民各樂其業而無所爭糞其田疇而已强陵弱衆暴寡雖疆界不能正也碧虚子陳景元曰却屏去也糞治田也郊交也言二國相交之境也天下有道謂時之泰也兵革寢息人多務本户競農桑屏去走馬之武功而歸治田之常業天下無道謂時之否也强弱相陵人皆失業習尚戰爭自然戎馬生于郊境之上道眞仁靜先生曹道沖曰去走馬以息戰民耕桑以糞田内若意馬不馳丹田自實如不務道則好兵則戎馬生於郊野達眞子曰走馬者亡戰之馬也戎馬者備戰之馬也國之戰敵皆棄道徇欲所致之然也天下有道無所事於戰敵故却其走馬則同於糞壤天下無道有所事於戰故戎馬生於郊清源子劉驥曰莊子所謂野馬塵埃以馬喻氣也揚子亦言氣也者所以適善惡之馬也歟氣之盛衰繫心動靜心靜氣正心動氣奔有道之士其心既靜其氣徐清其息自减從减至無凝然自定故却走馬以糞糞者糞其根本謂其歸根返本也天下無道忘道逐物其心既動其氣自奔嗜慾氣邪妄想氣亂故戎馬生於郊莊子所謂坐馳亦此之謂也黄茂材曰至治之世以道莅天下何用走馬却以糞宜矣及其有事且急也非戎馬無以遏亂略乃使生於近郊蓋有不得已焉如人日衰疾病間作捨醫藥不可夫攝生者而至於用醫藥其於道不亦遠乎罪莫大於可欲禍莫大於不知足咎莫大於欲得故知足之足常足矣御註曰人見可欲則不知足不知足則欲得欲得則爭端起而禍亂作禍亂作則戎馬生於郊然則知足而各安其性命之分無所施其智巧也日用飲食而已何爭亂之有碧虚子陳景元曰犯法爲罪夫人有欲愛之心者則非理貪求奔馳而不反是故逐秋毫之微者失大山之重爲罪之因莫重乎可欲也列子曰齊人有欲金者清旦衣冠而之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何對曰取金之時不見人徒見金夫觀於濁水而迷於清淵者不照也禍害也可欲者於貪求之中尚有數耳不知足者凡經歷於目而無一可捨滿不知損亡敗及之故禍釁之發莫大乎不知足也咎殃咎也物之經目猶有限也天下之物見與不見咸欲得之使盡在己而靡有孑遺者此無道之甚也小則害身大則喪國得不戒哉潁濱蘇轍曰匹夫有一於身患必及之侯王而爲是必戎馬之所自起也知足者所遇而足故無不足也臨川王安石曰墨子曰非無安居也我無足心也非無足財也我無足心也萬物常至於足而有所謂不足者以其無足心也得道者知其足心足財故曰知足之足常足矣道眞仁靜先生曹道沖曰不知足者足亦不足知足則不足常足達眞子曰罪者人加也禍者鬼責也咎者天伐也人之罪未深於鬼禍鬼之禍未深於天之殃咎也凡無道徇欲者必致乎此知足者足於道而不足於物足於内而不足於外是以舉無不足也故知足之足則常足矣若是則奚有罪禍咎之及己哉清源子劉驥曰人之有欲至於决性命之情以爭之故罪莫大於可欲若不知足則攘奪誕謾無所不至故禍莫大於不知足欲得則所欲必得恣縱之甚殃咎尤大然此三事不過衣食適身充口之外皆是餘物故繼之以知足知足則定乎性命之分逍遥於天地之間而心意自得何禍咎之有故知足之足常足矣黄茂材曰人有三患可欲也不知足也欲得也一性之内無欠無餘人能知之無適不足程大昌曰可讀當如許可之可人之有欲者不加制遏顧乃自恕自許以爲無害者也世人縱欲而不知足者未必不幸於一勝所欲既遂則秦人盡兼天下而還以兵亡是其禍也漢文帝之罷露臺也自言其心曰吾奉先帝宫室常恐羞之何以臺爲及其謝諸將用兵則又曰朕能勝衣冠念不到此故雖拊髀嘆頗牧飲食念鉅鹿而十萬横行可樂之言終不聽也武帝繼之奢侈踰於古初郡縣亘乎四夷而哆然未厭也由後世言之文帝爲足乎武帝爲足乎不出户章第四十七不出户知天下不窺牖見天道碧虚子陳景元曰當食而思天下之飢當衣而思天下之寒愛其親知天下之有耆老憐其子知天下之有稚幼夫如是又何出户而知天下哉涑水司馬光曰得其宗本潁濱蘇轍曰性之爲體充遍宇宙無遠近古今之異古之聖人其所以不出户牖而無所不知者特其性全故耳陸佃曰萬物皆備於我有天道焉有地道焉有人道焉葉夢得曰雖山河不能爲之礙况户牖乎黄茂材曰天地萬物其道一也林東曰撫我則后虐我則讎天下之心何難知之有所福者善所禍者淫天之道何難見之有此其不出户亦可知不窺牖亦可見其出彌遠其知彌少御註曰去道彌遠所知彌少矣涑水司馬光曰去本逐末潁濱蘇轍曰世之人爲物所蔽性分於耳目内爲身心之所紛亂外爲山河之所障塞見不出視聞不出聽户牖之微能蔽而絶之不知聖人復性而足乃欲出而求之是以彌遠而彌少也道眞仁靜先生曹道冲曰雖遠愈迷葉夢得曰有不能達則播糠眯目天地且爲之易位清源子劉驥曰離靜而動故其知彌少是以聖人不行而知不見而名不爲而成碧虚子陳景元曰蓋由得之於身心而施之萬事涑水司馬光曰至理不易潁濱蘇轍曰性之所及非特能知能名而已蓋可以因物之自然不勞而成之矣道眞仁靜先生曹道冲曰契理即知何必親見林東曰亦道在邇而求諸遠意爲學日益章第四十八爲學日益爲道曰損損之又損以至於無爲而無不爲矣御註曰學以致其道始乎爲士終乎爲聖日加益而道積于厥躬孔子謂顔淵曰吾見其進也致道者墮支體黜聰明離形去智而萬事銷忘故日損潁濱蘇轍曰苟一日知道顧視萬物無一非妄臨川王安石曰爲學者窮理也爲道者盡性也性在物謂之理則天下之理無不得故曰日益天下之理宜存之於無故曰日損窮理盡性必至於復命故損之又損之以至於無爲者復命也然命不亟復也必至於消之復之然後至於命故曰損之又損之以至於無爲然無爲也亦未嘗不爲故曰無爲而無不爲陸佃曰爲學日益此智者也爲道日損此仁者也損之又損之至於無爲而無不爲聖人也智者所以窮理而將以增其所無仁者所以盡性而將以减其所有故有曰損若夫聖人則所謂至命者也無所不有故無日益無所不益故無曰損道眞仁靜先生曹道冲曰損者减也世之學求之於外外事紛葩故尚於多知博聞日加其能以遊名利之場道之學者其志在内内事簡直故貴於息心養氣日踐其事以遊道德之鄉勞役精神氣血皆以削除减之損之以至無爲無事陳象古曰學者有漸從少至多故曰有益道成則藏其用秘其明故曰曰損黄茂材曰無所不知而後可以言學故學欲日益忘其所知而後可以言道故道欲日損益者易進損者難忘損而未能忘其損未爲損也損之而忘其損乃可至於無爲之地潁濱蘇轍曰無所不爲而不失於無爲矣故取天下者常以無事及其有事不足以取天下道眞仁靜先生曹道冲曰以道自治無心而天下自服法以係之力以率之智以籠之威以加之故有不服之者天下者通言萬物也達眞子曰無心則無爲無爲則無事舜禹有天下而不與蓋其無心及於無爲無爲及於無事故也潁濱蘇轍曰人皆有欲取天下之心故造事而求之心見於外而物惡之故終不可得聖人無爲故無事其心見於外而物安之雖不取天下而天下歸之矣黄茂材曰深於道者爲無爲事無事若其有事豈足以取天下聖人無常心章第四十九聖人無常心以百姓心爲心御註曰聖人之心萬物之照也虚而能受靜而能應疏觀萬物而知其情因民而已此之謂以百姓心爲心莊子曰卑而不可不因者民也碧虚子陳景元曰聖人體道無爲虚心待物物感斯應應其所感感既不一故應無常心莊子曰至人之用心若鏡不將不迎應而不藏故能勝物而不傷此乃聖人無常心也潁濱蘇轍曰虚空無形因萬物之形以爲形在方爲方在圓爲圓如使空自有形則何以形萬物哉是以聖人無心因百姓之心以爲心臨川王安石曰聖人無心故無思無爲雖然無思也未嘗不思無爲也未嘗不爲以吉凶與民同患故也黄茂材曰有常德有常道何獨無常心有常德有常道所以處己無常心所以處世天下之人如此其不一也而使其心皆如吾之心豈不繁然亂哉故聖人不以己之心爲心而以百姓之心爲心欲與天下大同也歟善者吾善之不善者吾亦善之德善矣信者吾信之不信者吾亦信之德信矣御註曰善否相非誕信相譏世俗之情自爲同異豈德也哉德善則見百行無非善者故不善者亦善之德信則見萬情無非信者故不信者亦信之眞僞兩忘是非一致是全德之人此舜之於象所以誠信而喜之潁濱蘇轍曰無善不善皆善之無信不信皆信之善不善信不信在彼而吾之所以善之信之者未嘗渝也可謂德善德信矣不然善善而棄不善信信而棄不信豈所謂常善救人而無棄人哉道眞仁靜先生曹道冲曰爾善吾豈不以爲善而爾自不善吾亦善之爾信吾固信之爾雖無信吾亦信之黄茂材曰善其善不善其不善則所善者寡矣信其信不信其不信則所信者狹矣天下之大人物之衆敦善敦不善敦信敦不信聖人未嘗有棄物之心故善者吾善之不善者吾亦善之未嘗有疑物之心故信者吾信之不信者吾亦信之夫然則吾心之中無適而非善信是爲德善德信聖人之在天下惵惵爲天下渾心百姓皆注其耳目聖人皆孩之御註曰方其在天下則吉凶與民同患雖無常心而不可以不戒故所以爲己則惵惵然不自暇逸所以爲天下則齊善否同信誕兩忘而閉其所譽渾然而已聖人作而萬物睹故百姓皆注其耳目百姓惟聖人之視聽則聖人者民之父母也矜憐撫奄若保赤子而仁覆天下碧虚子陳景元曰惵惵憂勤貌又不停貌渾者無分别也陸希聲曰聖人在天下𢡁然應彼物感未嘗少息而其心渾然與天下爲一未嘗自有所爲故仲尼之所絶者有四謂無意無必無固無我是以能無可無不可無爲無不爲也河上公本作怵怵王弼本作歙歙註傾也聖人以無爲德化不逆萬物之情故百姓被其聖德而各遂其能明者爲視聰者爲聽皆傾注其耳目以效聖人自然之法而聖人冕旒垂目黈纊塞耳不勞身於聰明不察物於幽隱撫念蒼生皆如赤子寧忍以事騷撓惟孩之而已矣潁濱蘇轍曰天下善惡信偽方各自是以相非相賊不知所定聖人憂之故惵惵爲天下渾其心無善惡無信僞皆以一待之彼方注其耳目以觀聖人之予奪而吾一以嬰兒遇之於善無所喜於惡無所嫉夫是以善者不矜惡者不愠釋然皆化而天下始定矣王雱曰惵惵者恐懼之意聖人以天下爲心所以建立萬法天下以聖人爲心所以歸復大道心者能覺知分别而聖人務使人復於無知故曰渾心也一本作歙歙歙歙收斂之意亦通也道眞仁靜先生曹道冲曰聖人忘言不得已而惵惵垂誨欲令天下之心渾合爲一至言皆注知於百姓耳目冀其開悟哀憐愚昩之至也聖人欲令其去澆競皆返孩稚之樸此聖人視赤子之至誠如是達眞子曰惵惵者恐畏之謂也聖人之在天下常恐畏其人之不善欲使之皆善常恐畏其人之不信欲使之皆信故善者應不善者亦應信者應不信者亦應故爲天下渾其心則此所謂無常心也若是則百姓皆注其耳則莫不聽也百姓皆注其目則莫不視也百姓視聽皆一仰於聖人者何哉以聖人皆孩之也故曰聖人皆孩之陳象古曰言百姓隨教順治未有所能如孩童之就乳不難率也黄茂材曰謂之聖人出而與民同患者也天下之人敦不注其耳目今也惵惵然渾其心無所是非無所好惡可以使民由之而不知孩者未有知也程大昌曰若嬰兒之未孩則孩也者又嬰兒之稚者也孟子曰大人不失赤子之心者也則赤子也者取其方爲嬰兒而眞淳尤爲未散者也百姓既注其耳目而聖人遂求有以復其赤子之初岀生入死章第五十出生入死御註曰萬物皆出於機入於機天機自張與出俱生天機自止與入俱死生者造化之所始死者陰陽之所變碧虚子陳景元曰未出乎域中者也涑水司馬光曰出生地則入死地潁濱蘇轍曰性無生死出則爲生入則爲死生之徒十有三死之徒十有三民之生動之死地亦十有三碧虚子陳景元曰徒類也生之徒謂攝生者之類也死之徒謂趣死者之類也十有三者韓非曰四支與九竅十有三動靜屬於生死焉夫善攝生者目不妄視於采色耳不妄聽於淫聲鼻不妄嗅於穢膻口不妄言於非道手不妄持於凶器足不妄履於邪徑動靜翛然諸惡莫犯此乃長生之徒也趣死者目亂於采色耳耽於淫聲鼻因於穢膻口美於非道手便於凶器足捷於邪徑動靜没溺諸吉無有此乃近死之徒也夫生死之原皆係此十三事矣孫登曰天地之物有生之類順理者寡逆理者衆故十分之中順理者三耳夫生不以道死不以理順生者尟則逆死者多故死之中順命者三耳或解云三業十惡能制伏者長生之徒放縱者近死之徒以理推之九竅四支最長涑水司馬光曰言十人之中大約柔弱以保其生者三剛强以速其死者三雖志在愛生而不免於趨死者亦三其所以愛生而趨死者由其自奉養太厚故也潁濱蘇轍曰用物取精以自滋養者生之徒也聲色臭味以自賊戕者死之徒也二者既分生死之道矣吾又知作而不知休知言而不知默知思而不知忘以趣於盡則所謂動而之死地者也生死之道以十言之三者各居其三矣豈非生死之道九而不生不死之道一而已乎不生不死則易所謂寂然不動者也老子言其九不言其一使人自得之以寄無思無爲之妙也臨川王安石曰有求生以惡滅者生之徒十有三是也有求滅而惡生者死之徒十有三是也有生無異於死者動之死地亦十有三是也惟其不悟眞滅眞生是以不脱輪回故曰生之徒十有三死之徒十有三動之死地亦十有三道眞仁靜先生曹道冲曰修生者若奉黄老之道求長生不死者也亦十中或有三得之死之徒若奉釋氏修無生寂滅之道亦十中或有三得之既不達黄老長生之旨又不悟釋氏無生之性故其數終則死而枉縱之人不得天數凡所動作皆趨速死之地又非修無生不往不來之法皆以嗜慾動則就虧神損道之地十中亦有三以此而自致傷夭之者三峩了一子李文惒曰夫坎水子位在人爲腎宜實而不宜虚元陽復還之生門也離火午位在人爲心宜虚而不宜實衆陰剥陽之死户也是以人能修坎則生役離則死故攝生者悟精氣之生身在乎坎妄念之喪神在乎離故自少至老一周十二辰消而從坎重復即生之徒十有三重陽而再益火滅而益膏也不善攝生者莫知生理役用從離妄念縱慾故自少至老亦一周十二辰消而自離再姤即死之徒十有三重陰而再損膏竭而益火也葉夢得曰十有三四支九竅是也老氏蓋嘗以有身爲大患矣而昩者不察累於有身之患皆無能外此十有三物之間使能知其非我有則超然乃立乎形骸之外豈出入之所得名然而沉迷轉徒自壯至老日化而至於死非特不知生而且其動而趨焉者未嘗不之於死地也則亦以是十有三物而已黄茂材曰坎爲水水數六離爲火火數七凡十有三也林東曰出於胚胎則爲生體魄入地則爲死雖有生死而九竅四支生死俱焉一身之中上七竅而下二竅兩手兩足故謂十有三也然動之死地亦十有三蓋以自戕自賊動與惡會而自趨死地亦十有三本來子邵若愚曰老子以十分爲率而言之生之徒十分中有三分死之徒十分中有三分又有民之縁求養生動之死地亦十分中有三分縁生之徒心著有死之徒心著無民之生心著境三者心有所著皆居生死之地夫何故以其生生之厚御註曰不知身之爲大患潁濱蘇轍曰有生則有死故生之徒則死之徒也人之所頼於生者厚則死之道常十九蓋聞善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地碧虚子陳景元曰諸惡害其有情而不損其無心潁濱蘇轍曰至人常在不生不死中生地且無安有死地哉達眞子曰凡言攝者皆非己所有也能齊死生則以生爲假攝而已陳象古曰外境之來於我何有道生之章第五十一道生之德畜之物形之勢成之是以萬物莫不尊道而貴德道之尊德之貴莫之爵而常自然碧虚子陳景元曰道者虚無之體德者自然之用道體虚無蓮動而生物物從道受氣故曰生之德用自然包含而畜物物自德養形故曰畜之凡動植之類皆本道而生因德而養物質方具故形之物既形矣則隨四時之勢而成之道降純精而生物之性德含和氣而養物之形道可以爲父德可以爲母由此而言萬物無有不尊仰於道而貴重於德也爵者錫命也世之所以尊貴者皆因王者之爵命萬物咸被道德生成之功而尊貴若父母者是道德非假於爵命而常自然有所攝伏也穎濱蘇轍曰道者萬物之母故生萬物者道也及其運而爲德牧養群衆而不辭故畜萬物者德也然而道德則不能以自形因物而後形見物則不能自成遠近相取剛柔相交積而爲勢而後興亡治亂之變成矣王雱曰德者道之分物者德之器勢者物之理道尊而德卑德貴而物賤尊者如君父貴者如金玉命於天則爲天子命於天子則爲諸侯有所受命則出命者能賤之矣惟道在萬物之先而制其命敦能爵之故常自然也清源子劉驥曰萬物之尊道而貴德也迎之不見其首隨之不見其後不可得而尊故不可得而卑不可得而貴故不可得而賤所以莫之爵而常自然也黄茂材曰道有常尊不待物而尊德有常貴不因物而貴非如人爵者也人爵尊貴出於使然道德尊貴自然而已故道生之畜之長之育之成之熟之養之覆之生而不有爲而不恃長而不宰是謂玄德御註曰别而言則有道德勢物之異合而言則皆出于道道者萬物之奥也萬物化作而道與之生萬物斂藏而道與之成出乎震成乎艮養乎坤覆乎乾剛柔相摩八卦相盪若有機緘不能自已道實冒之碧虚子陳景元曰此八者皆大道之元功肖翹蝡動之物得不尊之貴之乎道之生乎萬物若顯其有則收其仁矣養乎萬物若恃其爲則居其功矣長育群村成熟庶品養覆動植若矜其宰則處其長矣有是而退藏於密可謂陰德深矣遠矣臨川王安石曰此三者皆出於無我故謂之元德黄茂材曰道之與德相爲用也始言其道之大終言其德之元元者妙也非妙不足以繼其道道德眞經集註卷之十二
