body:
  text: 宋鶴林真逸彭耜纂集寵辱章第十三寵辱若驚貴大患若身御注曰寵者在下貴者在上居寵而以為榮則辱矣處貴而以為纍則患莫大焉碧虛子陳景元曰寵者謂富貴慶賞諸吉也辱謂貧賤刑罰諸凶也夫達道之士以形骸為逆旅生死如贅癰不榮通不醜窮知軒冕之去來乃外物之寄託豈有寵辱係懷而可驚怛哉此謂中人耳中智之士則處安而慮危得寵而知辱故皆如驚者戒慎之深也夫心之感動異於震驚故謂之若驚世俗趨末則驚辱中智觀本故驚寵貴者尊愛之稱大患者軒冕寶貨外物養身之屬也且至人知身非我有而尚外之况尊愛他物乎今世之人謂軒冕寶貨可以資生故貴之如身而不知身之與物皆是大患之本不足貴也陸佃曰寵所以為辱貴所以為患何也曰寵之與貴皆外物者也外物非吾所有而有之此所以為大患大辱道真仁靜先生曹道冲曰以寵辱為重甚於性命葉夢得曰寵辱者視寵猶辱也貴大患者以貴為大患也驚者猝然遇之而駭者也身者憂患之所從生而不欲有者也常物之情得其所欲則順而安非其所欲則逆而駭故世不驚於寵而驚於辱寵之過必辱辱之復必寵視寵猶辱而若驚者知寵之必有辱也貴者人之所尊也貴賤無常分有貴而賤者爭生滅無定形有身而偶者敵視貴為患而若身者知貴之必有賤也黃茂材曰寵人所榮也在道則為可辱貴人所欲也在道則為可患自古以來因寵貴之極陷於禍敗者何可勝數譬之犧牛衣以文繡食以芻菽及其牽而入於太廟求為孤犢而不可得則夫所謂寵貴者豈不可辱可患乎何謂寵辱寵為下碧虛子陳景元曰開元御本作寵為下言人得富貴慶賞者恃寵而驕盈則生禍因寵獲禍則寵為辱本故曰為下河上公本作寵為上辱為下於義完全而理無迂闊皇甫謐本亦作寵為上辱為下言以得為上失為下也潁濱蘇轍曰所謂寵辱非兩物也辱生於寵而世不悟以寵為上而辱為下者是也若知辱生於寵則寵顧為下矣陸佃曰可得而寵者下也劉涇曰寵人者為上則寵於人者為下矣孟子曰趙孟之所貴趙孟能賤之矣得之若驚失之若驚是謂寵辱若驚御注曰軒冕在身非性命之理物之儻來寄也寄之其來不可拒故至人不以得為悅其去不可圉故至人不以失為憂今寄去則不樂受而喜之是以得失纍乎其心能勿驚乎碧虛子陳景元曰世俗據其富貴操之則栗捨之則悲未達得失之非我故皆驚懾也中智之士知禍福循環得其寵榮必有悴辱故戒之持勝如失之驚也臨川王安石曰得失若驚此寵之所以為辱也黃茂材曰寵於人則服役於人其得也在人而不在我故得亦驚其失也在人而不在我故失亦驚夫在我者大澤焚而不能熱河漢沍而不能寒疾雷破山風振海而不能驚又何有於得失哉何謂貴大患若身御注曰據利勢擅賞罰作福威天下畏之如神明尊之如上帝可謂貴矣聖人則不以貴自纍故能長守貴而無患譬如人身墮肢體黜聰明離形去智通於大同則無入而不自得也世之人以物易性故纍物而不能忘勢以形纍心故喪心而不能忘形其患大矣劉涇曰前章言五色聲味馳騁田獵難得之貨交攻其內外所謂大患也而患本於有身無是身則無是患矣而身者委形於造物則安能必無哉今享天下之貴則事天下之事將羶行以悅人蒿目以憂世其患可勝言哉莊子曰夫貴者夜以繼日思慮善否其為形也亦疏矣道真仁靜先生曹道冲曰世俗不知寵為致辱之大患而返貴重致辱之患如身吾所以有大患者為吾有身及吾無身吾有何患御注曰人之生也百骸九竅六臟賅而存焉吾誰能為親認而有之皆惑也體道者解乎此碧虛子陳景元曰夫人所以有大患者謂其有身也且人之身無羽毛以禦寒暑必將資物以為養而貪生太厚者動入死地若能外其身不以身為身忘其心不以心為心冥乎造化同乎萬物使行若曳枯木坐若聚死灰則向之寵辱大患何緣及之又曰無者忘也外也或以無身為滅壞空寂者失老氏之宗旨矣潁濱蘇轍曰性之於人生不能加死不能損其大可以充塞天地其精可以蹈水火入金石凡物莫能患也然天下常患亡失本性而惟身之貴愛身之情篤而物始能患之矣生死疾病之變攻之於內寵辱得失之交攖之於外未有一物而非患也夫惟達人知性之無壞而身之非實忽然忘身而天下之患盡去然後可以涉世而無纍矣道真仁靜先生曹道冲曰我因何能致大患為有此身為致患之本又何况身外更有不能捨棄重於身者乎清源子劉驥曰人之有身饑渴寒暑生老病死莫非患也故吾所以有大患者為吾有身及吾無身吾有何患所謂無身者外生死遺禍福忘乎物忘乎天其名為忘己忘己之人是謂入於天若然者體合大道心同太虛死生無變於己而况利害之端乎故貴以身為天下若可寄天下愛以身為天下若可託天下御注曰天下大器也非道莫運聖人體道天下樂推而不厭其次則知貴其身而不自賤以役於物者若可寄而已知愛其身而不自賤以困於物者若可託而已涑水司馬光曰夫貴重天下者天下亦貴重之愛利天下者天下亦愛利之未有輕賤殘賊天下而天下貴愛之者也故聖人之貴愛天下所以貴愛其身也如此則付以大器必能守之潁濱蘇轍曰人之所以騖於權利溺於富貴犯難而不悔者凡將以厚其身耳今也祿之以天下而重以身任之則其忘身也至矣如此而以天下子之雖天下之大不能患之矣陳象古曰恃貴有已而為天下非寄天下之要也恃愛有己而為天下非託天下之要也故曰若可寄若可託言若則不可寄不可託之義也葉夢得曰不貴其貴而貴其身雖得天下而不敢執視之猶逆旅兹非可以寄天下者乎不愛其寵而愛其身雖有天下而不敢任處之猶蘧廬茲非所以托天下者乎黃茂材曰人不知貴其身者以天下為重而以身為輕爾故不知貴其身人不知愛其身者以天下為大而以身為小爾故不知愛其身老子之道以身為天下可貴可愛者皆在身彼天下特其外物故可寄托焉林東曰達人遺寵而辱不及忘身而患不至有身者以其不能忘身也忘身則無身而亦無患若舜有天下而不與堯之非心黃屋則幾矣貴與愛寄與托則一意辭勢互换然耳視之不見章第十四視之不見名曰夷聽之不聞名曰希摶之不得名曰微此三者不可致詰故混而為一碧虛子陳景元曰無形之形天地以生謂之夷無聲之聲五音以始謂之希無緒之緒萬端以起謂之微此皆先賢舉其進道之方也若夫能忘其視聽冥其循摶混一都無則至矣盡矣不可以加矣潁濱蘇轍曰此三者雖有智者莫能詰也要必混而歸於一而後可爾所謂一者性也三者性之用也人始有性而已及其與物構然後分裂四出為視為聽為觸日用而不知反其本非復混而為一則日遠矣若推而廣之則佛氏所謂六入皆然矣首楞嚴有云反流全一六用不行此之謂也道真仁靜先生曹道冲曰大象平夷無色可見大音希聲默不可聽冲妙無形虛不可執三者謂希夷微也皆無質象不可以器位分之故復混為一非視聽把執擊摶之能知似隱似見或存或亡不可究詰亦若萬籟一風而異聲七竅同氣而殊用思不可推言不可議者也清源子劉驥曰夷則無色故視之不見希則無聲故聽之不聞微則無形故摶之不得此三者不可致詰隨事强名夫道一而已故混而為一黃茂材曰此章論真有也真有雖有視之不見聽之不聞摶之不得則近於無老子慮夫人之溺於無而不知其有於是為之别白而言曰是道也分之則為三夷希微是也合之則為一混然者是也是皆真有非無人不能知之乃謂老莊為虛無之學豈足與語道哉其上不皎其下不昧御注曰形而上者陰陽不測幽而難知兹謂至神故不皎皎言明也形而下者一陰一陽辨而有數兹謂至道故不昧昧言幽也碧虛子陳景元曰夫形色之物皆有涯分惟道超然出於九天之表處陽而不明存乎太極之先而不為高矣使其學者居上與日月齊照而其光不皎故曰其上不皎沈然沒於九地之外處陰而不暗流乎六極之下而不為深矣使其學者在下與瓦甓同寂而其明不昧故曰其下不昧涑水司馬光曰皎明也道之升萬物以生而不可見道之降萬物以息而未嘗亡潁濱蘇轍曰物之有形者麗於陰陽故上皎下昧不可逃也道雖在上而不皎在下而不昧不可以形數推也道真仁靜先生曹道冲曰忽焉在上明而不曜倏然在下幽而不晦陳象古曰皎明白之稱也昧隱暗之稱也不皎謂道行於己不自明其功也不昧謂道施於物不可隱蔽於其理也黃茂材曰此又論無之非無也其在上也人見其皎而非皎其在下也人見其昧而非昧繩繩兮不可名復歸於無物御注曰道之體若晝夜之有經而莫測其幽明之故豈貌像聲色可得而形容乎故復歸於無物潁濱蘇轍曰繩繩運而不絶也人見其運而不絶則以為有物矣不知其卒歸於無也清源子劉驥曰繩繩兮綿綿不絶運用無窮不可得而形容復歸於無物是謂無狀之狀無物之象是謂恍惚御注曰無狀之狀無物之象恍兮惚其中有物惚兮恍其中有象猶如太虛含蓄萬象而不睹其端倪猶如一性靈智自若而莫究其運用謂之有而非有謂之無而非無若日月之去人遠矣以鑑燧求焉而水火自至水火果何在哉無狀之狀無物之象亦猶是也穎濱蘇轍曰狀其著也象其微也無狀之狀無物之象皆非無也有無不可名故謂恍惚迎之不見其首隨之不見其後御注曰其始無首其卒無尾故迎之隨之有不得而見焉道真仁靜先生曹道冲曰周流無端故無首尾陳象古曰不可致詰故如是清源子劉驥曰莫知其始故迎之不見其首莫知其終故隨之不見其後黃茂材曰此又論無有之非無有也既謂惚恍矣烏有其首之可迎烏有其後之可隨雖無其首與後也謂無其中可乎經曰惚兮恍其中有象恍兮惚其中有物其中何也物與象是也由此以言無有之非無有可見矣執古之道以御今之有能知古始是謂道紀御注曰一陰一陽之謂道師天而無地者或蔽於道之動而憑其强陽師陰而無陽者或溺於道之靜而止於枯槁為我者廢仁為人者廢義豈古之道哉不可致詰而非有是謂恍惚而非無執之以馭世則變通以盡利鼓舞以盡神而無不可者此所謂自古以固存者歟碧虛子陳景元曰古道者無形無名天地之原萬物之宗也即視之不見聽之不聞之道也老氏使其治身治世者持執上古無為自然之道制馭即今有為煩擾之俗歸乎淳風復乎太始使各正性命不遷其德是謂知道之綱紀也陸佃曰能知古始古者今之所出始者終之初莊子所謂無端之紀是也道真仁靜先生曹道冲曰綿古不移道也見機而作事也治身者執古之道謂人之靈物與造化齊生不泯不滅今之有者身也受之於陰陽得之於父母貸一氣以有生本五行以成質執守神用攝御身形是謂執古之道不失御今之有不虧古謂先天之道始謂萬物之宗能知道者是謂執物之紀而總之清源子劉驥曰聖人體道之真以治身緒餘土苴以治天下國家所以御今之有也能知古始則知道之大原故是謂道紀黃茂材曰夫道在太極之先而不為高在六極之下而不為深先天地生而不為久長於上古而不為老時有古今道無古今故可執而御謂道為非有可乎哉太易太初太始太素太極此五太者時之所謂古而道之所謂始人能知之可以為道之紀古之善為士章第十五古之善為士者微妙玄通深不可識御注曰列禦寇居鄭圃四十年人無識者老子謂孔子曰良賈深藏若虛君子盛德容貌若愚其謂是歟潁濱蘇轍曰粗盡而微微極而妙妙極而玄玄則無所不通而深不可識矣道真仁靜先生曹道冲曰雖在世間人不以為異黃茂材曰齧缺王倪蒲衣子南郭子綦支離疏王駘與夫子祀子輿子桑户之徒皆古微妙玄通之士人不能識故謂莊子寓言焉當商周之季士之被褐懷玉隱居田肆不肯出而嬰於世網者何時無之但無所紀見如論語載楚狂接輿荷篠丈人長沮桀溺今皆謂無是人可乎嗚呼人固難知有道之士尤其難知此經所以謂其不可識夫惟不可識故强為之容御注曰天之高不可俄而度地之厚不可俄而測曰圓以覆曰方以載者擬諸其容而已强為之容豈能真索其至碧虛子陳景元曰恐後世無以為師法故强為說其容狀指陳表儀謂下文也陳象古曰顯教示信若不强為之容恐來者不可學也黃茂材曰夫有道之士雖為難識天與之形道與之貌亦可見髣佛豫兮若冬涉川猶兮若畏四鄰儼若容涣若冰將釋敦兮其若朴曠兮其若谷渾兮其若濁御注曰豫者圖患於未然猶者致疑於已事若冬涉川守而不失已若畏四鄰易所謂以此齊戒者是也敦者厚之至性本至厚如木之朴未散為器曠者廣之極心原無際如谷之虛受而能應不劌雕以為廉不矯激以為異渾然而已故若濁與修身以明污者異矣碧虛子陳景元曰豫猶豫也言有道之士順從自然而舉事退藏輒加重慎雖履坦途常憂沒溺如寒沍之月揭涉長川其心豫然恐下沉於不測之淵也又履虛無而不敢有為故出處而深思猶然而畏懼謹於去就而慮幽明之司察如世人避禁而畏四鄰之竊知此戒之深也儼然端謹而心無散亂如賔對主人曷敢造次其無事無為也夫東郭順子正容悟物使人意消故田子方師仰之李含光居于暗室如對君父故司馬子微激賞之此可謂能儼若客也外雖矜莊而內心間放若春冰之釋涣然泮散凝滯都亡敦者淳厚貌朴者質素貌又形未分曰朴有道之士天資淳厚而質素之材未嘗分散其語默恬和而無文飾也曠者寬大之稱谷者含虛之竅有道之士德純厚而不顯器寬大而含容任善惡之去來而不撓于懷有如空谷之應答而嘗虛也雜波流曰渾不分明曰濁有道之士內心清靜而外雜波流若濁水之不明曷分别乎妍醜也已上七事治國則民不識不知復乎太古修身則和光同塵冥乎至道潁濱蘇轍曰戒而後動曰豫其所欲為猶迫而後應豫然若冬涉川逡巡如不得已也疑而不行曰猶其所不欲遲而難之猶然如畏四鄰之見之也無所不敬未嘗情也知萬物之出於妄未嘗有所留也人僞己盡復其性也虛而無所不受也和其光同其塵不與物異也臨川王安石曰雖然亦不可不反諸本也故敦兮其若朴而守之以素也故曠兮其若谷谷者虛而能應者也然而其道亦不可得而别也故混兮其若濁而已矣此所謂善為士者也夫豫也猶也以至于混而其若濁也皆所為不可識而强為之容也陸佃曰以其先事而慮常迫而後動故曰豫若冬涉川以後事而慮常以防而後居也故曰猶若畏四鄰以其雖以迫而後動防而後居而其心常儼之若容涣若冰將釋者散而不凝於物也敦兮其若朴者其體無乎不圓也曠兮其若谷者其體無乎不虛也敦兮其若朴曠兮其若谷然後冥之以無知混之以無覺故曰渾兮其若濁劉概曰猶豫皆疑而不敢進之辭也以其不為物先故豫若冬涉川猶若畏四鄰以其不為事主也故儼若容道真仁靜先生曹道冲曰建德若偷為善不伐豫若履冰慎之至也猶若畏鄰密之至也葉夢得曰豫者先事而戒也古者謂大象為豫物大則見之者早而冬涉川亦理之所易見而戒者也故先事如之猶者後事而猶疑也猶亦獸名畏人而善登木畏人登木可矣無人登木者疑也四鄰吾所親狎可以無畏而猶畏故後事如之儼若容莊也涣若冰將釋舒也冰者時而後散不遽毁其堅者也將以臨民不可以不莊故容張之也孔子享禮有容色退而燕居不可以不舒故涣孔子居不容燕居申申如也夭夭如也弛之也敦兮其若朴足於己者實也曠兮其若谷受於物者虛也雖然是皆其表吾終日暴而不知斂則物得以窺之矣故終之以渾兮其若濁潔而與衆異易濁而與衆異難清源子劉驥曰豫者圖患於未然若冬涉川不得已於事也猶者致疑於已事若畏四鄰退藏於密也儼若容者望之儼然寂然不動也涣散也散其留滯混然融和如列子之心凝形釋骨肉都融是也故若冰將釋敦兮其若朴者敦厚無華若混沌之始朴曠兮其若谷曠蕩無邊若天谷之至虛渾兮其若濁者和光同塵渾雜如濁與修身以明污者異矣此七者皆古之善為士者所為可謂良賈深藏若虛盛德容貌若愚所以深不可識也此子列子居鄭圃四十年無人識者國君卿大夫視之猶衆庶也晦庵朱熹曰儼若客語意最精今本多誤作容殊失本指又曰舊讀儼若容止作容字嘗疑此或非老子意後見一書引此乃以容宇為客字於是釋然知老子此七句而三協韻以客韻釋吻若符契又此凡言若某者皆有事物之實所謂客者亦曰不敢為主而無與於事故其容儼然耳黃茂材曰豫兮若冬涉川踐履必加敬也猶兮若畏四鄰常若有臨於其左右前後也儼若容居處不敢慢也涣若冰將釋形氣無留滯也敦兮其若朴初不見其圭角也曠兮其若谷其中足以容也渾兮其若濁處俗而不違於俗也皆其道德之容睟然見於其外使人愛慕之不厭若乃晋人之風蓬頭跣足不拘繩檢終日酣飲疾呼大叫自以為曠達豈足言此哉孰能濁以靜之徐清孰能安以動之徐生御注曰易曰來徐徐徐者安行而自適之意至人之用心非以靜止為善而有意於靜非以生出為功而有為于生也因其固然付之自爾而無怵迫之情遑遽之勞焉故曰徐靜之徐清萬物無足以撓其心故孰能濁動之徐生萬物無足以係其慮故孰能安安有止之意為物所係則止矣豈能應物而不傷碧虛子陳景元曰言世俗之人誰能如有道之士心同淵泉即其濁以澄而靜之則徐徐復其清矣誰能如有道之士支離其德當其安以久而動之則徐徐全其生矣潁濱蘇轍曰世俗之士以物汨性則濁而不復清枯槁之士以定滅性則安而不復生今知濁之亂性也則靜之靜之而徐自清矣知滅性之非道也則動之動之而徐自生矣易曰寂然不動感而遂通天下之故今所謂動者亦若是耳黃茂材曰大道泛兮初無定名若以為濁靜之則清若以為安動之則生所以能與物為無窮保此道者不欲盈夫惟不盈故能敝不新成御注曰有積也故不足無藏也故有餘至人無積亦虛而已保此道而以天下之美為盡在己者亦已小矣故不欲盈經曰大白若辱盛德若不足碧虛子陳景元曰言人保守此徐清徐生之道者善能謙以自牧而安其虛靜夫惟不盈者再舉獨有至人不矜恃盈滿故能常守弊陋薄惡雖有新成之功亦能持勝不動更求進嚮復增上善不住小成斯乃聖人之深趣也王雱曰得道者未嘗盈則成道者未嘗新也道之為用萬世而不敝以其無敝無新不成不敗故也敝生於新敗生於成士雖成道而常若敝敗則終無敝敗矣苟得道之初矜其新成則與道異意非大成也經曰大成若缺其用不敝此篇句句有序以至於成成而若敝則盡之矣陳象古曰盈滿假之謂也志自滿假道隨而污故不可盈古人行道其弊不生今人若能如古豈有新成之弊哉恐其奉道之不至也故無弊者其要在於不自盈而已黃茂材曰盈對虛而為言蔽匿也藏也老子曰良賈深藏若虛其不欲盈可知夫物新必有故成必有壞無新也孰故乎無成也敦敗乎夫如是可保此道致虛極章第十六致虛極守靜篤御注曰莫貴乎虛莫善乎靜虛靜者萬物之本也虛故足以受群實靜故足以應群動極者衆會而有所至篤者力行而有所至致虛而要其極守靜而至于篤則萬態雖雜而吾心常徹萬變雖殊而吾心常寂此之謂天樂非體道者不足以與此潁濱蘇轍曰致虛不極則有未亡也守靜不篤則動未亡也丘山雖去而徹塵未盡未為極與篤也蓋致虛存虛猶未離有守靜存靜猶陷於動而况其他乎不極不篤而責虛靜之用難矣道真仁靜先生曹道冲曰以虛為虛未極於虛也以靜為靜未極於靜也虛靜兼忘是為篤極葉夢得曰知虛之為虛而致之未必能致於虛猶有實以為之對也知靜之為靜而守之未必能守於靜猶有動以為之别也故致虛必極守靜必篤致虛極則無虛是為真虛守靜篤則無靜是為真靜黃茂材曰虛靜之境要在純熟致虛不極則不可得而虛守靜不篤則不可得而靜萬物並作吾以觀其復御注曰方其並作而趣於動出之塗吾觀其動者之必靜出者之必復而因以見天地之心碧虛子陳景元曰非止於人而萬物之並作未有不始於寂然而發於無形及觀其復也盡返於杳冥而歸於無朕以全其真也易曰復其見天地之心乎天地之心謂寂然至無也潁濱蘇轍曰極虛篤靜以觀萬物之變然後不為變之所亂知凡作之未有不復者也苟吾方且與萬物皆作則不足以知之矣臨川王安石曰復本也萬物並作吾能觀其復非致虛極守靜篤者不能與於此陳象古曰物極則復復者自靜故可以觀又曰萬物雖多安能離吾之道哉黃茂材曰人與萬物同生一根惟虛而靜則能觀其復復初也物之根也名為觀物實以自觀程大昌曰物之從枯而茁壯長者是其作也華實皆泯津歸於根則其復也老氏借淺以明賾也虛者物莫之能昏靜者物莫之能誘故其接物易以有見也對奕之智常不及旁觀之明而操舟失港凡岸立之人往往皆能指其曲折故由動觀動或反與之俱而據要觀妙者必其心不徇物乃始能之也夫物藝藝各復歸其根御注曰藝藝者動出之象萬物出乎震相見乎離則藝藝並作英華發外說乎兊勞乎坎則去華就實歸其性宅碧虛子陳景元曰藝藝茂盛貌或作云云動作貌潁濱蘇轍曰萬物皆作於性皆復於性譬如華葉之生於根而歸於根濤瀾之生於水而歸於水耳陸佃曰藝藝者所謂幻化也各歸其根者所謂空性也幻化有滅而空性無壞道真仁靜先生曹道冲曰萬物紛紜動作既極必返於本不假至人用意裁制清源子劉驥曰聖人使人息其愛欲之念歸乎虛靜之本復其性命之源譬如萬物生於根而歸於根也歸根曰靜靜曰復命潁濱蘇轍曰苟未能自復於性雖止動息念以求靜非靜也故惟歸根然後為靜命者性之妙也性猶可言至於命則不可言矣易曰窮理盡性以至於命臨川王安石曰命者自無始以來未嘗生未嘗死者也故物之歸根曰靜靜則復於命矣道真仁靜先生曹道冲曰復於元命返於天真陳象古曰本自清靜因物有遷也黃茂材曰夫物藝藝各歸其根窮理也歸根曰靜盡性也靜曰復命至於命也復命曰常御注曰復命則萬變不能遷無間無歇與道為一以挈天地以襲氣母碧虛子陳景元曰能悟之者則行住坐卧不離乎是潁濱蘇轍曰方其作也雖天地山河之大未有不變壞不常者惟復於性而後湛然常存矣道真仁靜先生曹道冲曰夫物或興或衰或生或滅皆為造化之所陶鑄惟道常然晝不能明夜不能晦復性命之道則知真常黃茂材曰窮理盡性以至於命則可常存矣知常明御注曰明道之常不為物遷故足以鑑天地照萬物碧虛子陳景元曰知猶悟也曰明或作日明言日益明達潁濱蘇轍曰不以復性為明則皆世俗之智雖自謂明而非明也不知常妄作凶御注曰隨物轉徙觸塗自患故凶易曰復則不妄迷而不知復兹妄也已碧虛子陳景元曰不悟常道者反以神變為妖長生為誕虛極靜篤為空曠歸根復命為滅亡不知强知不識强識易所謂不常其德或承之羞故曰不知常妄作凶潁濱蘇轍曰不知復性則緣物而動無作而非凶雖得於一時而失之遠矣黃茂材曰常之為道至微至妙非夫明智玄通之士則不能達秦漢以來方士爭言神仙之術陷於禍敗如徐福欒大之徒皆妄作者也老子知其凶之必至知常容御注曰知常則不藏是非美惡故無所不容潁濱蘇轍曰方迷於妄則自是而非彼物皆吾敵吾何以容之苟知其皆妄則雖仇讎猶將哀而憐之夫何所不容哉陳象古曰安於天理不復爭競何有而不能容乎清源子劉驥曰知常則與天地合其德如天地之無不覆載也黃茂材曰真常之道大無不包知之者必有容宇宙之量容乃公御注曰無容心焉則不獨親其親子其子何私之有潁濱蘇轍曰無所不容則彼我之情盡而尚誰私乎清源子劉驥曰有容德乃大如天地之無私覆載也故曰公黃茂材曰容有容宇宙之量則無己無人無物皆冥於一公乃王碧虛子陳景元曰既能包容乃於己無私則襟懷蕩然平夷而至公矣既公平無私則德用周普天下輻輳無有不歸往者矣王潁濱蘇轍曰無所不公則天下將往而歸之矣黃茂材曰以此處上帝王天子之德也以此處下玄聖素王之道也王乃天御注曰在上而無所不覆者天也碧虛子陳景元曰人既歸往天將祐之潁濱蘇轍曰無所不懷雖天何以加之臨川王安石曰王者人道之極也人道極則至於天道矣黃茂材曰王者與天為徒也程大昌曰王之能容也無擇而無棄即天之不頗其覆者是也天乃道御注曰天地人莫不由之者道也盡人則同乎天體天則同乎道潁濱蘇轍曰天猶有形至於道則極矣臨川王安石曰天與道合而為一黃茂材曰天法道者也道乃久沒身不殆御注曰道者萬世無弊庶物得之者昌關百聖而不窮蔽天地而不息劉涇曰所謂自古固存黃茂材曰道者自本自根未有天地自古以固存故曰道乃久得道則可久矣而曰沒身不殆身又可沒乎曰身者有形之物安得不沒身沒而謂之久何也其死而不亡者乎其形化而心不與之然者乎林東曰天猶有形至於道則悠久無窮雖沒吾之身而未嘗危殆有以見體道之君子與道周旋雖久而安也其源出於致虛之極守靜之篤也道德真經集注卷之四
