body:
  text: 宋鶴林彭耜纂集天下有始章第五十二天下有始以為天下母既得其母以知其子既知其子復守其母殁身不殆御注曰無名天地之始有名萬物之母始與母皆道也自其氣之始則謂之始自其生生則謂之母有始則能生生矣道能母萬物而字之則物者其子也通於道者兼物物故得其母以知其子多聞則守之以約多見則守之以卓窮物之理而不纍於物達道之徼而不失其妙則利用出入往來不窮可以全生可以盡年而無危殆之患碧虛子陳景元曰成者子也生者母也子者一也一為沖氣乃道之子所謂道生一也一為道之子道為一之母道為真精之體一為妙物之用既得其道體以知其妙用體用相須會歸虛極夫人既知其妙物之用而復守其真精之體體用冥一應感不窮然後可以無為而無不為故能沒身不殆矣潁濱蘇轍曰聖人體道以周物譬如以母知子了然無不察也雖其智能周之然而未嘗以物忘道故終守其母也臨川王安石曰一陰一陽之謂道而陰陽之中有沖氣沖氣生於道道者天也萬物之所自生故為天下母夫物藝藝各歸其根歸根曰靜靜曰復命則得以返其本也故曰復守其母也達真子曰萬物以天地為始天地以道為始是天下之始莫不始於道也唯天下莫不始之於道所以為天下之母也凡萬物之所資生者母也凡萬物之所資息者子也以道為母則天下資生於道者皆子也是以既得其母以知其子矣以其有復歸於無以其動復歸於靜則有之者無終窮動之者無危殆故曰既知其子復守其母沒身不殆言體道之反本者能然也黃茂村曰天下之生林林如也推其始必有生之者焉經曰有名萬物之母此其始生者也故為母萬物其子也得其母而守之則是生我者常存而我生者不失矣故能不殆塞其兊閉其門終身不勤開其兊濟其事終身不救碧虛子陳景元曰免目也緘無厭之目則諸境自絶矣門口也杜多言之口則衆禍莫干矣諸境自絶則嗜欲之源塞衆禍莫干則云為之路閉如是則恬淡安逸而終身不勤若乃不守母道者開其愛悅之源而弗塞則嗜欲之情長矣通其云為之路而弗閉則禍患之事濟矣如是則憂苦危亡而終身不救也王雱曰免悅也人悅則形開矣故為免兊則物入之矣門者精神之所出也外見諸理形開以受之而復出精神與之為構則擾擾萬緒自此始矣故當塞免閉門常守其母也塞兊閉門以外應物則酬酢萬變而用常有餘免開物入而復費精神用以濟事則以內徇外逐物往矣一溺此流誰能救之哉道真仁靜先生曹道沖曰兊澤也在人為口與舌禍福樞機不可妄發門謂語言視聽情念也吉凶之應出入於此故閉之也有道者掩扉塞免終身不勞清源子劉驥曰經所謂閉塞命門保玉都是也內景不出外景不入其氣自定其神自真其神既真則性入自然與道為一以挈天地以襲氣母而入於不死不生故終身不勤若開其喜悅之源而弗塞濟其愛欲之事而弗閉則物誘於外而情動於中氣亡液漏精散神去所以役役不見其成功故終身不救見小曰明守柔曰強用其光復歸其明無遺身殃是謂襲常御注曰小者道之妙見道之妙者自知而已故無不明柔者道之本守道之本者自勝而已故無不強明者光之體光者明之用聖人之應世從體超用則輝散為光攝用歸體則智徹為明顯諸仁藏諸用如彼日月萬物皆照而明未嘗虧所以神明其德是也物之化無常也惟復命者遺物離人復歸於明而不與物俱化故體常而無患碧虛子陳景元曰此謂防於未萌治於未亂守柔弱則物不能加可謂強矣見微小則事不能昏可謂明矣光者智照也智主外故外照而常動動則為物之用明者慧解也慧主內故內景而常靜靜則為己之體夫智照出則應事反則歸理是以用歸體故曰用其光復歸其明不役智外照而守慧內景復嗜欲之未萌而歸子母之元故無殃是謂密用常道者也潁濱蘇轍曰夫耳之能聽目之能視鼻之能嗅口之能嘗身之能觸心之能思皆所謂光也蓋光與物接物有去而明無損是以應萬變而不窮殃不及於其身故其常性湛然相襲而不絶矣臨川王安石曰見小曰明者微而見之則可謂之明見於大則不足以謂之明故曰見小曰明至柔馳騁天下之至堅也故曰守柔曰強用光復歸其明者蓋光者明之用明者光之體言強則知柔之為體言明則知光之為用唯其能用其光復歸其根則終身不至於有咎而能密合常久之道故曰無遺身殃是謂襲常陳象古曰常人忽於小而重於大干雲之木起於蔥青千里之塗始於足下此見小之義也預識先知非明而何揉曲木者不纍日銷金石者不纍月此柔弱勝剛強之義也光者照於外者也明者內自照者也用其光則知其子是也歸其明則復其母是也黃茂材曰漢世尚黃老有老父者獨深得其道蓋公諸人皆不及也惜乎史失其名龔勝之死有老父來弔甚哀既而曰嗟乎薰以香自燒膏以明自銷龔生竟夭天年非吾徒也遂趨而出莫知其誰使我介然章第五十三使我介然有知行於大道唯施是畏碧虛子陳景元曰畏其不合於古道也潁濱蘇轍曰體道者無知無行無所施設而物自化今介然有知而行於大道則有所施設建立非其自然有足畏者矣道真仁靜先生曹道沖曰介然謂凝寂不動長守大道無為而已凡有所為者雖曰善動至人之所畏也達真子曰介者纖介之謂小有知於大道猶唯施是畏况大有知者乎清源子劉驥曰知之淺矣使我介然有知已非道之妙若有所施為則尤非自然黃茂材曰夫道不可以智知不可以力行無所施設作為今有介然有知是以智知之行於大道是以力行之唯施是畏是有所設施作為不亦可畏乎林東曰使我介毅然有知而行於大道唯於施為間而無不致其畏謹則不至於好邪徑而求捷速不至於捨本而逐末如下文所謂也大道甚夷而民好徑御注曰道夷而徑速欲速以邀近功而去道也遠矣碧虛子陳景元曰是以崎嶇迷惑不達涑水司馬光曰道本簡易由人之好鑿故失道道真仁靜先生曹道沖曰修身之道自然綿綿實為至理而學速求必得故方術之家紛然並作清源子劉驥曰好由捷徑以失真道所謂甚易知甚易行而天下莫能知莫能行也朝甚除田甚蕪倉甚虛服文采帶利劍厭飲食資財有餘是謂盜誇非道也哉碧虛子陳景元曰也哉傷嘆之詞也唯施是畏其在兹乎涑水司馬光曰失道之國好察近而遺遠逐末而忘本故視其朝若修治而察其民實貧困又取非其有謂之盜德薄位尊智小謀大危亡將及曾不自知乃更矜誇以為得意服美不稱積實無厭故曰盜誇所以有此誇者豈非本欲行道而更鑿以致失哉臨川王安石曰此逐末也猶人趨邪徑而棄大道也達真子曰失大道而由小徑者以事物比之則如朝甚除而日用田甚藥而荒塞倉甚虛其畜積而反服文采帶利劍厭飲食以為資財有餘是不務修其本而反矜施其末也善建不拔章第五十四善建者不拔善抱者不脫子孫以祭祀不輟御注曰建中以該上下故不拔抱一以應萬變故不脫建中而不外乎道抱一而不離於精若是者豈特行一國與當年蓋將及天下與來世其傳也遠矣涑水司馬光曰不拔者深根固蒂不可動搖不脫者民心懷服不可傾奪不輟者享祚久長潁濱蘇轍曰世豈有建而不拔抱而不脫者乎惟聖人知性之真審物之妄捐物而修身其德充積實無所立而其建有不可拔者實無所執而其抱有不可脫者故至其子孫猶以祭祀不輟也臨川王安石曰善建者德建也能德建則不拔矣善抱者抱一也抱一而不離則不脫矣能建德抱一則德之盛故盛德百世祭祀祭祀者見於愈遠而不忘故曰子孫祭祀不輟陸佃曰善閉無關鍵而不可開故曰善建者不拔善結無繩約而不可解故曰善抱者不脫道真仁靜先生曹道沖曰深根固蒂是謂善建抱本守真是謂不脫先利於身次及於物又以正直清廉仁愛之道遺於後世故慶及子孫積德繼美祭祀不絶矣葉夢得曰出而有立故謂之建入而有守故謂之抱出者有本故不可拔入者有常故不可脫夫如是則立者雖遠而愈長守者雖近而愈久譬之於己非特及其身而已垂之子孫祭祀不輟其事我者無時而可亡也黃茂材曰夫道獨立而不改以是而建則為善建故不拔載營魄抱一能無離乎以是而抱則為善抱故不脫不拔不脫非特可持當年雖傳後世可也故曰子孫以祭祀不輟修之身其德乃真修之家其德乃餘修之鄉其德乃長修之國其德乃豐修之天下其德乃普御注曰修之身其德乃真所謂道之真以治身也修之家其德乃餘修之鄉其德乃長所謂其緒餘以治人也修之國其德乃豐修之天下其德乃普所謂其土苴以治天下國家也其修彌遠其德彌廣在我者皆其真也在彼者特其末耳故餘而後長豐而後普於道為外碧虛子陳景元曰此五者近修諸身而遠及天下也夫修道於身者心間性淡愛氣養神少私寡欲益壽延年諸偽咸盡乃為真人矣涑水司馬光曰皆循本以治末由近以及遠王雱曰因修身之法而推之以及其外餘而後長長而後豐豐而後普道真仁靜先生曹道沖曰以道修身則神真行正身正而天下化况以之治家信有餘矣施於鄉而一鄉化矣施於一國其國盛矣始自一身遍及四海達真子曰真則不偽餘則不欠踰於衆則曰長足於衆則曰豐遍於衆則曰普凡得於道之謂德自一身以至一家自一家以至一鄉自一鄉以至一國自一國以至天下以道為治則無乎不善矣故以身觀身以家觀家以鄉觀鄉以國觀國以天下觀天下吾何以知天下之然哉以此碧虛子陳景元曰觀者照察也故以先聖治身之道反觀吾身心若吾身心能體於道則其德乃真矣老氏言我奚以知天下之民嚮道者昌背道者亡之然哉者設問之辭也答曰我以此上之所陳五事反觀照察所以知之經曰不出户知天下易曰觀我生觀民也其是之謂乎潁濱蘇轍曰天地外者世俗所不見矣然其理可推而知也修身之至以身觀身以家觀家以鄉觀鄉以國觀國皆吾之所及知也然安知聖人以天下觀天下不若吾之以身觀身乎豈身可以身觀而天下獨不可以天下觀乎故曰吾何以知天下之然哉以此言亦以身知之耳臨川王安石曰身有身之道故以身觀身家有家之道故以家觀家以至於鄉國天下吾何以知天下之然哉以此者蓋以此道觀之也言以此者此則同於道彼則異於道同則取之異則去之道真仁靜先生曹道沖曰察身之損益邪正則知衆人矣察家之逆順盛衰則知他之家矣自一鄉之小至天下之大小大則殊其治一也何以知天下之然以用此道而知矣陳象古曰見治身之道則知治己之身見治家之道則知治己之家見治鄉之道則知治己之鄉見治國之道則知治己之國見治天下之道則知治己之天下不拔不脫由此可明矣以此者蓋用此觀身觀家觀鄉觀國觀天下之道矣黃茂材曰雖其大小遠近之有不同而其為德未始或異故以吾一身而觀衆身以吾一家而觀衆家以吾一鄉而觀衆鄉以吾一國而觀衆國以吾一天下而觀衆天下皆可以知之或問以吾一天下而觀衆天下何也湯問於夏革曰四海之外奚有曰猶齊州也朕東行至營人民猶是也問營之東復猶營也西行至豳人民猶是也問豳之西復猶豳也朕以是知四海四荒四極之不異是也以天下觀天下捨夏革其誰知之程大昌曰吾何以知天下之然而自指其要領在此者以真為斷也含德之厚章第五十五含德之厚比於赤子御注曰孟子曰大人不失赤子之心碧虛子陳景元曰含懷也夫至人純粹懷德深厚情復於性憺泊無欲狀貌兀然比於赤子也赤子者取其始生其色赤純和之至也潁濱蘇轍曰老子之言道德每以嬰兒況之者皆言其體而已未及其用也今夫嬰兒泊然無欲其體之者至矣然而物來而不知應故未可以言用也臨川王安石曰赤子者天守全而陽不散故含德之厚比於赤子陸佃曰知其雄守其雌為天下溪為天下溪常德不離復歸于嬰兒此即所謂含德之厚比於赤子也道真仁靜先生曹道沖曰含者抱也心不偷薄其德乃厚赤子謂嬰兒也天純未散外無所營積和在中復如赤子葉夢得曰老子既以嬰兒論道矣於此含德之厚復比之赤子嬰兒其未孩者也所保者氣而已故道似之赤子則既孩矣而未有知也故德似之清源子劉驥曰聖人抱道懷德深厚無思無為寂然不動故比於赤子程大昌曰含德者藴其德於內而不形於外者也莊子謂絶滅聲律文采而人始含其聰明削曾史之行鉗楊墨之口而後人始含其德者蓋釋此也毒蟲不螫猛獸不據攫鳥不搏御注曰含德之厚者憂患不能入邪氣不能襲故物莫能傷焉莊子曰人能虛己以遊世其孰能害之碧虛子陳景元曰毒蟲者蜂蠆之類也以尾端肆毒曰螫猛獸者虎豹之類也以爪拏按曰據攫鳥者雕鶚之類也以羽距擊觸曰搏夫至人神矣嗒然喪偶如赤子之無心故神全而物莫能傷也潁濱蘇轍曰道無形體物莫得而見也況可得而傷之乎人之所以至於有形者由其有心也故有心而後有形有形而後有敵敵立而傷之者至矣無心之人物無與敵者而曷由傷之夫赤子之所以至此者唯無心也臨川王安石曰赤子之心非有害物也無害物則物亦莫能害道真仁靜先生曹道沖曰稚子無心害物物亦不與為害清源子劉驥曰憂患不能入邪氣不能襲其天守全其神無郤物無自入焉如莊子所謂醉者之墜車雖骨節與人同而犯害與人異以其死生驚歡不入於胸中彼全於酒者猶若是而况全於天者乎黃茂村曰今夫赤子毒蟲不螫猛獸不據攫鳥不摶者精不離而和不散爾人能養其精和之至則亦赤子如也昔有梁鴦者能養野禽獸委食於園庭之內雖虎狼雕鶚之類無不柔馴者雌雄在前孳尾成群異類雜居不相摶噬問其術則曰吾心無逆順鳥獸視吾猶其儕也夫心無逆順所謂含德之厚也歟骨弱筋柔而握固未知牝牡之合而峻作精之至也御注曰德全者形全故骨弱筋柔而握固形全者神全故未知牝牡之合而峻作精之至者可以入神莊子曰聖人貴精碧虛子陳景元曰赤子未知喜怒而拳握至堅者以其真性專一故也峻者赤子之命源也情欲未萌而陽德自動者真精之氣運行之所至也以况至人虛心無情氣蓮自動而諸欲莫干也上清洞真品云人之生也稟天地之氣為神為形受元一之氣為液為精天氣減耗神將散矣地氣減耗形將病矣元氣減耗命將竭矣故帝一回元之道泝流百脈上補泥丸腦實則神全神全則形全形全者百關調於內邪氣亡於外髓凝為骨腸化為筋純粹不雜而長生可致矣峻作古本作全作王弼曰作長也無物以損其身故能全長也涑水司馬光曰皆在其自然穎濱蘇轍曰無執而自握無欲而自作是以知其精有餘而非心也道真仁靜先生曹道沖曰手未能把執攫奪取掇心無所知而手無所用故自然握固未知牝牡之合而峻作人稟五行全氣精力氣血既盛則因牝牡發泄而嬰兒未知嗜欲無所流散而時為跳躑伸縮頓奮之狀此謂峻作達真子曰骨弱筋柔而握固體之自然也不為物屈矣未知牝牡之合而峻作性之自然也不為情亂矣陳象古曰握固則無所欲得而自執也峻作則不因有為而自動也清源子劉驥曰德全則形全故骨弱筋柔而握固形全則精全故未知牝牡之合而峻作無執而自握無欲而峻作以一心定而萬物服精之至也程大昌曰握固峻作非知而為之也真淳未散不知其然而然終日號而嗌不嗄和之至也御注曰致一之謂精精則德全而神不虧沖氣以為和和則氣全而嗌不嗄人之生也精受於天一而為智之源和得於天五而為信之本及其至也可以入神可以復命而失其赤子之心者精搖而不守氣暴而不純馳其形性潛之萬物豈不悲夫碧虛子陳景元曰號啼也啼極無聲曰嗄又聲嘶也夫赤子終日皞啼而嗌不嘶散者天和之氣至全也故真人之息以踵其嗌不哇而和氣全也潁濱蘇轍曰心動則氣傷氣傷則號而嗄終日號而不嗄是以知其心不動而氣和也臨川王安石曰終日號而聲不嗄乃和之至蓋和者主於氣也程大昌曰是其淳和中充皞啼所不能變也故得取以喻和也知和曰常御注曰純氣之守制命在內形化而性不亡碧虛子陳景元曰夫和者大同於物故赤子以和全真至人知和之貴也故用之為常道潁濱蘇轍曰和者不以外傷內也復命曰常遇物而知反其本者也知和曰常得本以應萬物者也其實一道也故皆謂之常臨川王安石曰和之為用則常而不變道真仁靜先生曹道沖曰和者生理之常非别有方法陳象古曰知此和之至可以常行而不離清源子劉驥曰知和則純粹不雜靜一不變而與天地為常黃茂村曰號而不嗄和之至也知此則為復歸於嬰兒矣故能長久知常曰明御注曰明足以見道者知性之不亡故也臨川王安石曰不明則不足以知常清源子劉驥曰知常則朝徹見獨無古無今而與日月參光黃茂材曰常久也日月得天而能久照四時變化而能久成聖人久於其道而天下化成非夫明智洞達天地造化之機安能識之益生曰祥御注曰祥者物之先見生物之理增之則贅禍福特未定也碧虛子陳景元曰祥者吉凶之兆也夫一受其成形而素分已定若非理益之必致凶祥潁濱蘇轍曰生不可益而欲益之則非其正矣祥妖也陸佃曰達生之情常任於自然而不益生故能出乎吉凶之表道真仁靜先生曹道沖曰但於身命有益者則為吉祥過此雖外美而內不善非生之祥也達真子曰祥者非其常也陳象古曰保此常守此明日益日生至於盛大無凶咎也黃茂村曰天下之人或夭於嬰孩或喪於強壯其能保百年之壽者幾何今吾益吾生而使長生不死在於天下豈不曰祥乎心使氣曰強御注曰體合於心心合於氣則氣和而不暴兹強也以與物敵而非自勝之道碧虛子陳景元曰心有是非而氣無分别潁濱蘇轍曰氣惡妄作而又以心使之則強梁甚矣臨川王安石曰氣者當專氣致柔今反為心之所使不能專守於內則為暴矣此祥者非作善之祥乃災異之祥此強者非守氣之強乃勝暴之強夫言豈一端而已各有所當也道真仁靜先生曹道沖曰心動而使氣氣作而形隨未有動作而不求強好勝者也真人心不動而氣自動亦若人之眠睡外務已息泯然無知而寐中手足瞤動豈心之使而動也一寐尚然况寂然在道者也黃茂材曰以力使氣是氣也為暴戾之氣以心使氣是氣也為沖和之氣沖和之氣充於一身天地不能使之天鬼神不能使之災聲色利欲不能使之亂豈不曰強乎物壯則老是謂不道不道早已碧虛子陳景元曰夫物之壯也必至乎枯老心之強也必至於凶暴且道以柔弱為用今以強壯為心者謂之不道已止也死也言不行道者早死也已潁濱蘇轍曰益生使氣不能聽其自然日入於剛強而老從之則失其赤子之性矣臨川王安石曰惟道則先於天地而不為壯長於上古而不為老道真仁靜先生曹道沖曰雖欲不止如何哉葉夢得曰是以已之亦貴乎早也黃茂材曰壯而老老而已在物莫不然若知道者可與天地相為終始豈有已乎知者不言章第五十六知者不言言者不知塞其免閉其門挫其鋭解其紛和其光同其塵是謂玄同御注曰道無問問無應知道者默而識之無所事言齧缺問於王倪所以四問而四不知多言數窮離道遠矣碧虛子陳景元曰莊子曰知北遊於玄水之上登隱弅之丘而適遭無為謂焉知謂無為謂曰子欲有問乎若何思何慮則知道何處何服則安道何從何道則得道三問而無為謂不答也非不答不知答也知不得問反於白水之南登狐闋之上而覩狂屈焉知以之言也問乎狂屈狂屈曰唉豫知之將語若中欲言而忘其所欲言知不得問反於帝宫見黃帝而問焉黃帝曰無思無慮始知道無處無服始安道無從無道始得道知問黃帝曰我與若知之彼與彼不知也其敦是耶帝曰彼無為謂真是也狂屈似之我與知終不近也潁濱蘇轍曰道非言説亦不離言説然能知者未必言能言者未必知唯塞免閉門以杜其外挫鋭解紛和光同塵以治其內默然不言而與道同臨川王安石曰挫其鋭同其塵此文兩見蓋道德莫不皆如此道真仁靜先生曹道沖曰契理則忘言雖言而不能行與不知道何異兊口也緘口默行不須説也三要七竅為身之門户自內其散失者神氣精血機情好惡自外而入者緣境聲色滋味寒暑所失者真所入者假故閉其門也彼方為光顯沮之則為怨俱與和之於己何損彼方塵垢外之則不樂故至人韜光隱德暫與同之於身何浼玄者隱密不顯不自飾智矜俗獨異於衆清源子劉驥曰天地有大美而不言四時有明法而不議萬物有成理而不説聖人行不言之教譬如知音者識音以弦心知其音口不能傳道深微妙知者不言不知道者以言相煩多言數窮去道遠矣善為道者默而識之性以成之塞其免則收視反聽閉其門則形全精復挫其鋭則歸精神乎無始解其紛則體純素而不雜和其光則含光不耀同其塵則大同無己夫如是則與天同心而無知與道同身而無體是謂玄同豈拘拘然自投於親疏利害貴賤之間哉程大昌曰塞免閉門不使衆人得見其經歷出入之地也挫鋭解紛平夷而簡易也和光同塵則能降己齊物矣凡為此皆求至乎渾兮其若濁者也彼我一觀高下無别是之謂同同之上加元焉深而又深侣鷗群獸幾微更不外見又諸家釋免皆本易之免悅為義恐不然也詩曰行道兊矣毛氏曰免成蹊也成蹊者孟子謂山間之蹊介然用之而成路者是也其讀如稅不可得而親不可得而疏不可得而利不可得而害不可得而貴不可得而賤故為天下貴御注曰世之人愛惡相攻而有戚疏之態情偽相感而有利害之見用舍相權而有貴賤之分反覆更代未始有極奚足為天下貴碧虛子陳景元曰上交於道而不諂舉世舉之而不勸故不可得而親昵也下交於器而不瀆舉世非之而不沮故不可得而疏隔也淡泊無欲守分知足故不可得而利誘也處卑不辱在醜不爭故不可得而陷害也爵祿不能污權勢不能動故不可得而貴寵也失志不屈居貧愈安故不可得而賤鄙也夫至人行此六行不榮通不醜窮無天怨無人非無物纍無鬼責故為天下貴潁濱蘇轍曰可得而親則可得而疏可得而利則可得而害可得而貴則可得而賤體道者均覆萬物而孰為親疏等觀逆順而敦為利害不知榮辱而孰為貴賤情計之所不及此所以為天下貴也陸佃曰神人者不即不離無縛無脫故不可得而親踈不生不滅無取無舍故不可得而利害不損不益無得無失故不可得而貴賤夫惟如此故能無對於物旁日月挾宇宙天地為一官萬物為一府其緒餘足以為天下國家其土苴足以治天下其粳粃塵垢足以陶鑄堯舜而天下之物豈復有加哉故曰為天下貴道真仁靜先生曹道沖曰未嘗與物交焉能親也不使欲厭焉能疏也不妄求取焉能利也不犯禁忌焉能害也不取榮盛焉能貴也不處卑猥焉能賤也陳象古曰親疏利害貴賤世之所重衆人之所分别者也大道所在名非常名不可見其形不可聞其聲况可得而親疏利害貴賤乎黃茂材曰孔子曰吾觀老子其猶龍乎夫龍豈可得而親之疏之利之害之貴之賤之者乎既曰不可得而貴又曰為天下貴何也蓋亦自貴而已經曰知我者希則我貴矣道德真經集注卷之十三
