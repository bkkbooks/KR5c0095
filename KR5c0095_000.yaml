front:
  text: 道德真經集注序恃四道常無言不得已而有言言之費也從而言之費之費者也言固可廢乎曰不可也以藥治病非上醫也方病而奪之藥雖盧扁莫為也蓋老子一書自列氏莊氏已陰立訓傳而自為一家者也至漢相曹參用其言有驗世益尊信之文帝時有河上公者乃始泄道之藴名為注釋自是之後有鄰氏傅氏徐氏劉氏晋魏以來獨王氏最顯唐玄宗又改定章句刻石渦口廟中而世之言道德經益繁宋興專守一道曰仁其治以慈儉不爭為本幾若委靡不振而實參用老子家法故當時君臣於此書頗盡心焉耜雖不敏亦覃思有年矣常患注釋之繁而矛盾迭興復憂流派之廣而門户各異求出世者多鄙薄於治世之常經思治世者復忽略於出世之妙旨於是合本朝注釋之書畢力纂集尊御注於其首列諸子於其下凡分一十二卷其他如河上公王弼所著已載陳景元纂微兹不復詳吁亦多言矣乎然世方懵於其道我又吝於其言則道益晦矣此經以自然為體無為為用治世出世之法皆在焉如我無為而民自化我無欲而民自朴此治世之法也如生之徒十有三死而不亡者壽此出世之法也若夫秦漢方術之士所謂丹竈奇技符籙小數盡舉而歸之道家此道之緒餘土苴者耳學者當於此而有悟焉則鑿開混沌剖破藩蘺以之治世則反朴而還淳以之出世則超凡而入聖然後知孔老無異法天生二聖人迭為賔主以道詔天下後世其功至不淺也惟我同志相與勉之紹定己丑重九日鶴林真逸彭耜謹序道德真經說序史記列傳曰老子者楚苦縣厲鄉曲仁里人
