body:
  text: 也裴駉注云地理志曰苦縣屬陳國司馬貞索隱曰地理志誤也苦縣本屬陳春秋時楚滅陳而苦又屬楚故云楚苦縣高帝立淮陽國陳縣苦縣皆屬焉苦音怙張守節正義云括地志苦縣在亳州谷陽縣界今真源縣也厲音賴姓李氏名耳宇伯陽諡曰聃禮記曾子問鄭氏注曰老聃古壽考者之號也與孔子同時疏云老聃即老子也索隱曰說文云聃耳曼也故名耳宇聃正義曰聃耳曼無輪也神仙傅云外宇聃按字號也疑老子耳曼無輪故世號曰聃周守藏室之史也周本紀曰幽王三年西周三川皆震伯陽甫曰周將亡矣注云韋昭曰伯陽父周大夫也唐固曰伯陽父周柱下史老子也後漢書竇章傳注云老子為守藏史復為柱下史孔子適周將問禮於老子孔子世家曰魯南宫敬叔言魯君曰請與孔子適周魯君豫之一乘車兩馬一竪子俱適周問禮蓋見老子云又家語曰孔子謂南宫敬叔曰吾聞老聃博古知今通禮樂之原明道德之歸則吾師也今將往矣老子曰子所言者其人與骨皆已朽矣獨其言在耳且君子得其時則駕不得其時則蓬纍而行吾聞之良賈深藏若虛君子盛德容貌若愚去子之驕氣與多欲態色與淫志是皆無益於子之身吾所以告子若是而已孔子去謂弟子曰為吾知其能飛魚吾知其能游為綸飛者可以為矰至於龍吾不能知其乘風雲而上天吾今曰見老子其猶龍邪孔子世家曰辭去而老子送之曰吾聞富貴者送人以財仁人者送人以言吾不能富貴竊仁人之號送子以言曰聰明深察而近於死者好議人者也博辨廣大危其身者發人之惡者也為人子者母以有己為人臣者母以有己孔子自周反于魯弟子稍益進焉又家語曰及去周老子送之曰請送子以言孔子曰謹奉教自周反魯道彌尊矣遠方弟子之進蓋三千焉老子修道德其學以自隱無名為務居周久之見周之衰乃遂去至關關令尹喜曰子將隱矣强為我著書於是老子乃著書上下篇言道德之意五千餘言而去莫知其所終注云列仙傳曰關令尹喜者周大夫也善內學隱德行仁時人莫知老子西游喜先見其氣知真人當過候物色而迹之果得老子老子亦知其奇為著書與老子俱之流沙之西莫知所終亦著書九篇名關令子索隱曰列仙傳是劉向所記物色而迹謂視其氣物有異色而尋迹之或曰老萊子亦楚人也著書十五篇言道家之用與孔子同時云仲尼弟子列傳曰孔子之所嚴事於周則老子於楚老萊子蓋老子百有六十餘歲或言二百餘歲以其修道而養壽也自孔子死之後百二十九年注云徐廣曰實一十九年而史記周太史儋見秦獻公曰始秦與周合而離離五百歲而復合合七十歲而霸王者出焉周本紀曰烈王二年周太史儋見秦獻王或曰儋即老子或曰非也世莫知其然否老子隱君子也老子之子名宗宗為魏將封於段干宗子注注子宫宫玄孫假假仕於漢文帝而假之子解為膠西王卬太傅因家于齊焉老子無為自化清靜自正索隱曰太史公因其行事於當篇之末結以此言亦是贊也又云此是昔人所評老聃之德故太史公引以記之太史公曰老子所貴道虛無因應變化於無為故著書辭稱微妙難識太史公曰樂臣公學老子史記樂毅傳曰樂氏之族有樂瑕公樂臣公趙且為秦所滅亡之齊樂臣公善修黃帝老子之言顯聞於齊稱賢師注云一作巨公其本師號曰河上丈人不知其所出皇甫謐高士傳云河上丈人者不知何國人也自匿姓名居河之湄著老子章句號曰河上丈人亦曰河上公又葛玄河上公注老子序曰河上公者莫知其姓名也漢文帝時結草為庵于河之濱常讀老子道德經文帝好老子之言有所不解數句遣使問之公曰道尊德貴非可遙問也帝即駕從詣之河上公即授素書老子道德經章句二卷謂帝曰熟研此則所疑自解豫注是經以來千七百餘年凡傳三人連子四矣言畢失公所在因號曰河上公云河上丈人教安期生安期生教毛翕公毛翕公教樂瑕公樂瑕公教樂臣公樂臣公教蓋公漢書曹參傳顔師古曰蓋古盍反蓋公教於齊高密膠西為曹相國師曹參世家曰孝惠帝元年更以參為齊丞相參之相齊齊七十城天下初定悼惠王富於春秋參盡召長者諸生問所以安集百姓如齊故俗諸儒以百數言人人殊參未知所定聞膠西有蓋公善治黃老言使人厚弊請之既見蓋公為言治道貴清靜而民自定推此類具言之參於是避正堂舍蓋公焉其治要用黃老術故相齊九年齊國安集大稱賢相宋太宗太平興國七年冬十月上謂近臣曰朕每讀老子至佳兵者不祥之器聖人不得已而用之未嘗不三復以為規戒見續資治通鑑長編又淳化四年閏十月丙午上曰清靜致治黃老之深旨也夫萬務自有為以至於無為無為之道朕當力行之至如汲黯卧治淮陽宓子賤彈琴治單父此皆行黃老之道也參知政事吕端等對曰國家若行黃老之道以致升平其效甚速宰臣吕蒙正曰老子稱治大國若烹小鮮夫魚撓之則潰民撓之則亂今之上封事議制置者甚多願陛下漸行清靜之化以鎮之見續資治通鑑長編又上讀老子語近臣曰伯陽五千言讀之甚有所益治身治國之道並在其內至云善者吾亦善之不善者吾亦善之此云善惡無不包容治身治國其術如是若每事不能容納則何以治天下哉見國朝事實并皇宋類苑真宗咸平二年上謂宰相曰道德二經治世之要道明皇注解雖粲然可觀王弼所注言簡意深真得清靜之㫖也因令鏤板見國史道釋志仁宗天聖四年正月玉清昭應宫使王曾請下三館校道藏庫經從之上因言其書多載飛鍊金石方藥之事豈若老氏五千言之約哉張知白曰陛下留意於此乃治國清靜之道也高宗紹興二十八年十月庚寅上諭宰執曰賀允中問朕好道之意朕謂之曰朕之好道非世俗之所謂道也世俗修鍊以求飛升不死若果能飛升則秦始皇漢武帝當得之矣朕惟治道貴清靜苟侈心一生雖欲自抑有不能已者故所好惟在恬淡寡欲清心省事所謂為道曰損損之又損以至於無為斯與一世之民同躋仁壽如斯而已見皇宋中興紀事本末孝宗淳熙戊戌程大昌以講官侍清燕嘗從容奏及道本恭得聖訓孔老元無二道韓愈析之非是嘗親制原道辨首以賜大昌見程大昌易老通言序宋解經姓氏政和御注碧虛子陳景元字太初建昌人出家為道士入天台山師事張無夢妙得老莊之旨博學多聞藏書數千卷當世名公多從之游自號碧虛子熙寧中屢膺召見進所著道德經藏室纂微篇賜號真靖大師涑水司馬光字君實陜州夏縣人溫國文正公潁濱蘇轍字子由眉山人自號潁濱遺老諡文定公臨川王安石字介甫臨川人荆國文公王雱字元澤荆公之子陸佃字農師山陰人門號曰陶山先生劉槩宇仲平開封人劉涇字巨澤簡州陽安人自號前溪自荆公下至此總名崇寧五注道真仁靜先生曹道冲字希藴女道士世號曹仙姑賜號清虛文逸大師道真仁靜先生達真子馬蹄山人不著姓氏三峨了一子李文惒蜀人陳象古名在黨籍中葉夢得字少藴姑蘇人自號石材翁清源子劉驥宇德稱泉州人晦庵朱熹字元晦建安人自號晦庵一號紫陽子文公黃茂材字少譽福州連江人自號海濱居士程大昌字泰之新安人文簡公林東字子晦福州閩縣人自號三山樵子本來子邵若愚錢塘人
