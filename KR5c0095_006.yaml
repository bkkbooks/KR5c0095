body:
  text: 宋鶴林彭耜纂集曲則全章第二十二曲則全枉則直窪則盈弊則新少則得多則惑是以聖人抱一為天下式碧虛子陳景元曰聖賢之士鈎深致遠廓然見獨而蟠曲才能未嘗顯耀者故欲遠害而全身也故曰曲則全聰逹明察曉辨諸物有大功業立大名聲心直如猛矢志端如朱絃常枉己屈伏而不自伸者此則大直之士也故曰枉則直人以謙卑為本易曰地道變盈而流謙蓋設象而會意也夫陵原川谷之變高下之不常也川谷窪下則水流而滿之陵原高峻則雨剝而頽之人之謙下則衆仰德而歸之以致其光大也夫自尊則衆毁而辱及之以致其危亡也故曰窪則盈且人有賢才而能支離其德弊薄其身則衆共樂推而其道日新矣故曰弊則新夫少者簡易之謂也易曰易則易知簡則易從易簡而天下之理得矣西升經曰子得一萬事畢又曰丹書萬卷不如守一故曰少得則夫多者博學之謂也莊子曰文滅質博溺心列子曰路多岐則亡羊學多方則喪道庚桑子曰萬人操弓共射一雕雕無不中萬物章章以害一生生無不傷經曰多言數窮不如守中此並戒其多也故曰多則惑道生一一者道之子謂太極也太極即混元也亦太和純一之氣也又無為也夫聖人抱守混元純一之道者謂復太古無為之風也經曰天得一以清地得一以寧莊子曰天無為以之清地無為以之寧以此可明矣自曲則全下六事尚有對治之迹此云抱一無為可以兼包之故為天下式潁濱蘇轍曰聖人動必循理理之所在或直或曲要於通而已通故與物不忤故全也直而非理則非直也循理雖枉而天下之至直也衆之所歸者下也雖欲不盈不可得矣昭昭察察非道也悶悶若將弊矣而日新之所自出也道一而已得一則無不得矣多學而無以一之則惑矣抱一者復性者也蓋曲則全枉則直窪則盈弊則新少則得多則惑皆抱一之餘也故以抱一終之臨川王安石曰方則易挫曲以應之此所以能全也直則易折故枉以待之此所以能直也海者常處於卑而為百川之所委故窪則盈無春夏之榮華秋冬之雕落故弊則新少者復本則得矣多者有為則惑矣王雱曰至人沖虛其行如水無心於物不與物忤故常全也此篇大旨與莊子養生主相類陸佃曰蓋其周旋動止於物無忤與之俱往故謂之曲物之變也而天理之在我終於完而無缺故謂之全達真子曰己雖全也常自以為曲所以求全不已則卒至於全矣是則所謂曲則全也己雖直也常自以為枉所以求直不已則卒至於直矣是則所謂枉則直也猶德雖盈也常自以為不足則若其窪知雖新也常自以為不明則若其弊以若窪之心不已其求則卒至於盈是則所謂窪則盈也以若弊之心不已其求則卒至於新矣是則所謂弊則新也少則約多則詳以道散則適於多道聚則歸於少是以少則得得其道也多則惑惑其道也是以聖人抱一為天下式抱一則不離於道為天下式陳象古曰一者不繁不亂可以曲可以全可以枉可以直可以窪可以盈可以弊可以新可以少可以得可以多可以惑夫小者大之端暗者明之漸理當然也故聖人抱一於數則有增於象則有容不自滿假先見未萌天下若取以為式則人人合於道矣葉夢得曰曲則全窪則盈少則得理也即其體而言之也枉則直弊則新多則惑勢也極其變而言之也曲則不忤故全窪則不滿故盈少則不夸故得此理之必至者也枉非以求直而枉之極必直弊非以求新而弊之反必新多非以求惑而多之罪必惑此勢之不得不然者也理勢之相成或更為終始或迭為得失紛然其不可窮而聖人獨能濟之不與之俱變者抱一也前言魂魄之合而曰抱一者一之存乎己者也今言理勢之雜而曰抱一者一之總乎物者也一則萬法之所從出故以為天下式黃茂材曰世皆曲吾與之為曲故能保其全人皆枉吾與之為枉故能養其直莫不欲盈也孰自處於窪吾能窪乃所以為盈莫不欲新也孰自期於弊吾能弊乃所以為新為道日損損則少其入道也近故得為學日益益則多其去道也遠故惑曰全曰直曰盈曰新曰得曰惑散之則六斂之則一通乎一萬事畢又何有於六乎故曰聖人抱一為天下式不自見故明不自是故彰不自伐故有功不自矜故長夫惟不爭故天下莫能與之爭御注曰不蔽于一己之見則無所不燭故明不私于一己之是而惟是之從則功大名顯而天下服故彰人皆取先己獨處後曰受天下之垢若是者常處于不爭之地孰能與之爭乎碧虛子陳景元曰此四事皆無為之職夫聖人無為何嘗顯見己之才能則天下自然稱其明矣故曰不自見故明河上公曰聖人雖明不以自見千里之外乃因天下之目以視之故能明達夫能用天下之目者亦不自顯見之意也音訓雖異而其旨略同矣且聖人虛靜何嘗自是而非人蓋彼我都忘則天下自然稱其是而其德彰矣故曰不自是故彰且聖人恬淡何嘗自伐取其德美則天下自然稱其功業矣故曰不自伐故有功且聖人寂寞何嘗自矜大其賢貴則天下自然稱其有道而長存矣故曰不自矜故長潁濱蘇轍曰不自見不自是不自伐不自矜皆不爭之餘也故以不爭終之臨川王安石曰不自見乃無所不見故常明不自是乃無所不是故常彰不自伐則善不喪故有功不自矜則不有能故能可久矣夫惟不爭故天下莫能與之爭者書曰汝惟不矜天下莫與汝爭能達真子曰如自見其全則以為全足於己更不求其全由是故全或至於不能明如自是其直則以為直足於身更不求其直由是故直或至於不能彰唯不自見其全也常以為求全之不足若是則全終至於明也唯不自是其直也常以為求直之不足若是則直終至於彰也推此二類凡有於己者皆不自足於己如雖有功也不自伐其功故得其有功己雖長也不自矜其長故能得其長蓋聖人不自滿假凡在於此也葉夢得曰見字當讀為見乃謂之象之見夫惟得一故雖晦其迹不自見而反明雖藏其用不自是而反彰不伐而有功不矜而能長亦由前之為曲全窪盈者天下之理同也是以復終之以夫唯不爭故天下莫能與之爭以為萬物之變非吾所能執及其既定物亦莫能與我競此不爭之效也雖萬物無不可為爭心苟存則雖一法無所容措黃茂材曰至人之處於世未嘗有我也無我故不自見不自是不自伐矜夫然故與物無爭而物亦莫與之爭方舟而濟於河有虛船來觸舟雖有惼心之人不怒天下孰能與之爭乎不自見而明不自是而彰不自伐矜有功而長亦其自然之理夫何容心古之所謂曲則全者豈虛言哉誠全而歸之御注曰聖人其動若水以交物而不虧其全其應若繩以順理而不失其直知窪之為盈無亢滿之纍知弊之為新無夸耀之迹若性之自為而不知為之者致曲而已故全而歸之可以保身可以盡年而不知其盡也是謂全德之人豈虛言哉碧虛子陳景元曰夫聖人獨抱守純一無為何嘗更有爭競之心哉經曰含德之厚比於赤子毒蟲不螫猛獸不據攫鳥不搏蟲獸尚爾况於人乎然而上古有此曲全之語豈今日之寓言哉人能行之誠有全德之美而歸之于身此再三勸勵之深旨也潁濱蘇轍曰世以直為是以曲為非將循理而行於世則有不免於曲者矣故終篇復言之曰此豈虛言哉誠全而歸之夫所謂全者非獨全身也內以全身外以全物物我兼全而歸復於性則其為直也大矣葉夢得曰知此則循其本而反之所謂曲則全者豈虛言哉吾誠先得其全而後歸於道則由枉而下為可知矣黃茂材曰醉者之墜車雖疾不死骨節與人同而犯害與人異其神全也全於酒猶若是况全於天乎古之至人天以其全付之還以其全歸之希言自然章第二十三希言自然御注曰希者獨立于萬物之上而不與物對列子所謂疑獨是也去智與故循天之理不從事於外故言自然碧虛子陳景元曰希者疏也易曰吉人之辭寡涑水司馬光曰知道者不言而諭故曰自然潁濱蘇轍曰道之出口淡乎其無味視之不足見聽之不足聞用之不可既此所謂希言矣臨川王安石曰多言數窮故希言則自然陸佃曰夫物莫能使之然亦莫能使之不然者謂之自然道真仁靜先生曹道沖曰言教出則為迹未能因於物情故聖人行不言之教任自然之理達真子曰道不可聞故聽之不聞則名曰希希者冥其聲之謂也葉夢得曰此章明言不足以得道欲得道者必即道以求之而道之不行世始有方術之士各以其一曲詼詭譎怪違理而叛道雖幸或見不旋踵而亡矣清源子劉驥曰聽之不聞名曰希希言則聽乎無聲而無聲之中獨聞和焉故自然也故飄風不終朝驟雨不終日孰為此者天地天地尚不能久而况於人乎御注曰天地之造萬物風以散之委衆形之自化雨以潤之任萬物之自滋故不益生不勸成而萬物自遂于天地之間所以長且久也飄驟則陰陽有繆戾之患必或使之而物被其害故不能久碧虛子陳景元曰形之大者莫過乎天地氣之廣者莫極乎陰陽陰陽相激天地交錯尚不能崇朝終日何况人處天地之間不似毫末之在馬體乎而敢縱愛欲任喜怒趣取速亡不亦悲乎潁濱蘇轍曰陰陽不爭風雨時至不疾不徐盡其勢之所至而後止若夫陽亢於上陰伏於下否而不得泄於是為飄風暴雨若將不勝然其勢不能以終日古之聖人言出於希行出於夷皆因其自然故久而不窮世或厭之以為不若詭辭之悅耳怪行之驚世不知其不能久也道真仁靜先生曹道沖曰飄風驟雨謂不常也而况人心豈能常也葉夢得曰夫言之不足尚如此黃茂材曰道無可言自然而已自然則久飄風驟雨非其自然故不能終朝日况於人乎人法地地法天天法道道法自然其所法也回轉而及自然自然之功豈易到哉故從事於道者道者同於道德者同於德失者同於失同於道者道亦得之同於德者德亦得之同於失者失亦得之碧虛子陳景元曰從為也順也言人為事當從順于道希言愛氣永保天和豈可若飄風驟雨而不久長也潁濱蘇轍曰孔子曰苟志於仁矣無惡也故曰仁者之過易辭志於仁猶若此而況志於道者乎苟從事於道矣則其所為合於道者得道合於德者得德不幸而失雖失於所為然必有得於道德矣道真仁靜先生曹道沖曰聖人從事於自然之道不強物情道者同於道有道者可與語道德者同於德謂彼此俱造於德則可與語於德也失者同於失鵂鶹與梟皆以夜為晝則難與辨其謬失也葉夢得曰非失之云能得道也因其失而正之亦可以得乎道也黃茂材曰道至大也有從事於此道則同於道德則同於德失則同於失譬之海廣無不容大無不納物之在其中也無不各得其欲故道者曰吾得之德者曰吾得之失者曰吾得之失既以為失矣又焉得曰失道而後德則德也者非失而得之乎失德而後仁則仁也者非失而得之乎失仁而後義失義而後禮則義與禮也者非失而得之乎夫是謂之大同信不足有不信碧虛子陳景元曰仙道貴生鬼道貴終蓋各以類應也是以信乎道者得其道信乎德者得其德不信于道輕忽于德故道亦不應德亦無稱舉之天下豈有信之者哉潁濱蘇轍曰不知道者信道不篤因其失而疑之於是益以不信夫惟知道然後不以得失疑道也達真子曰信道足則於道無不信也信德足則於德無不信也陳象古曰言亂而理寡故人不之信黃茂材曰至道甚微信者寡不信者多老子重言及此憫世人之愚而欲其信也歟跂者不立章第二十四跂者不立跨者不行御注曰違性之常而冀形之適難矣碧虛子陳景元曰冒進之夫跂望非分欲求寵榮雖苟得之有若延頸舉踵何能久立乎涑水司馬光曰心有所屬故不能兩存潁濱蘇轍曰人未有不能立且行者也苟以立為未足而加之以跂以行為未足而加之以跨未有不喪失其行立者彼其自見自是自伐自矜亦若是矣道真仁靜先生曹道沖曰跨謂不內不外跨其兩端不一于道也達真子曰跂者非立之常跨者非行之常而皆性之強矯非動之自然者也黃茂材曰跂而欲立必不能立跨而欲行必不能行程大昌曰足之履地為立跂則騰竦以為高隨足力所及而更迭以進是之謂步跨則展布以示闊貪新失故且將並其能行能步者而失之自見者不明自是者不彰自伐者無功自矜者不長其在道也曰餘食贅行御注曰泰色淫志豈道也哉故於食為餘於行為贅碧虛子陳景元曰棄餘之食適使人惡附贅之形適使人醜涑水司馬光曰皆外競而內亡黃茂材曰自見其見不可與明自是其是不可與彰伐者無功矜者不長此皆性外事程大昌曰露才揚己之謂自見曰子既已知則為自是誇其勞者為自伐眩其能者為自矜凡此數者不獨足己自當又且廣己造大課其所有甚狹而無助故不明不彰無功不長物或惡之故有道者不處也碧虛子陳景元曰凡物尚惡之况有道之士乎葉夢得曰智之不眀未必皆能惡也故曰物或惡之惟有道者不處豈必知道而後能辨也程大昌曰見是伐矜有道者不肯指以為居也有物混成章第一一十五有物混成先天地生御注曰氣形質具而未相離曰渾淪合於渾淪則其成不虧易所謂太極者是也天地亦待是而後生故云先天地生然有生也而非不生之妙故謂之物碧虛子陳景元曰至理湛然而常存故謂之有物真道萬泒而莫分故謂之混成然而混成不可得而知萬物由之以生故曰有物混成也先天地生者道之元也經曰吾不知誰子象帝之先莊子曰夫道在太極之先而不為高在六極之下而不為深先天地生而不為久長於上古而不為老此皆標道之大體也潁濱蘇轍曰夫道非清非濁非高非下非去非來善惡混然而成體其於人為性故曰有物混成此未有知其生者蓋湛然常存而天地生於其中耳陳象古曰混成大道之喻也道無定象天地有形因道而生故先天地之義昭矣葉夢得曰易曰易有太極是生兩儀則生兩儀者易也然不直言易而設為太極於中者蓋言易之生物不可以正名故假太極以見則易與太極固未之有分也謂太極為生兩儀則有易居其上謂太極為生於易則未見太極之有間故寄之曰有則易為無也老子曰有物混成先天地生則天地生於混成而混成者亦自有所生也然不顯言其生而虛生生者於上亦以生生者不可以正名黃茂材曰有物果何物也先天地而生天地者也林東曰有物混然而成則包含萬象圭角不露皆所以想像道之體質也必也先天地而生言是道之有自來也遠矣或以為道在太極之先則非止在天地先也亦言其來也遠之意寂兮寥兮獨立而不改周行而不殆可以為天下母御注曰寂兮寥兮則不涉于動不交于物湛然而已大定持之不與物化言道之體利用出入往來不窮言道之用萬物恃之以生碧虛子陳景元曰杳冥空洞無象無質故曰寂寥大塊卓然無物可比妙道廓然何物偶對故曰獨立物雖千變萬化出生入死而妙道未嘗遷故曰不改且道之用也散則沖和之氣遍于太無斂則精純之物藏于黍粟周流六虛應用不窮故曰周行而不殆夫物無大小皆仰於道得之則全離之則殞生之成之咸有所賴故曰可以為天下母潁濱蘇轍曰寂兮無聲寥兮無形獨立無匹而未嘗變行於群有而未嘗殆俯以化育萬物則皆其母矣達真子曰致虛極則曰寂廣遠極則曰寥此有物混成之體也陳象古曰母取其始生萬物也葉夢得曰寂寥之中獨立而周行者彼亦不過動靜之兩間爾學者多不能明寥之義與寂同為靜非也古者謂大風之聲為寥吹萬竅而怒號者寥能覆之則安得為靜乎寂言靜也寥言動也惟寂故能獨立而不改惟寥故能周行而不殆此其所以能母天下者也吾不知其名字之曰道強為之名曰大大曰逝逝曰遠遠曰反御注曰運而不留故曰逝應而不窮故曰遠歸根曰靜靜而復命故曰反道之中體方名其大則遍覆包含而無所殊易所謂以言乎遠則不御也動者靜作者息則反復其道不離乎性易所謂以言乎邇則靜而正也碧虛子陳景元曰凡物之大皆有邊際惟道之大無窮無極往無涯畔故云大曰逝愈逝愈遠莫究其源故云逝曰遠雖遠出八荒之外逐之不逮而收視反聽湛然於方寸之間若鑑之明應而不藏故云遠曰反反復也潁濱蘇轍曰道本無名聖人見萬物之無不由也故字之曰道見萬物之莫能加也故強為之名曰大然其實則無得而稱之也自大而求之則逝而往矣自往而求之則遠不及矣雖逝雖遠然反而求之一心足矣道真仁靜先生曹道沖曰不可名字而強名曰道也道非大小既強名之不可不謂之大矣逝者往也道不止於大又能逝而遍於萬物既以謂逝則無往不周雖曰遠未嘗離本故曰返清源子劉驥曰不可得而名故吾不知其名以其萬物之無不由也故字之曰道以其萬物之莫能加也故強為之名曰大自大而求之則測之益深窮之益遠故曰逝自逝而求之則在太極之先而不為高在六極之下而不為深故曰遠雖遠至六合之外無窮無盡然反求諸己不離乎方寸之中故曰反林東曰字曰道強名曰大然其實則無得而稱之也不特如是其大大則直塊然一物矣大而又能逝逝而遠遠而又反則非泛然無統虛無荒唐之説甚矣反之一宇見大道之道與吾儒不隔蠅翼或者不可以老氏孔子差殊觀也故道大天大地大王亦大域中有四大而王處一焉御注曰道覆載天地者也天無不覆地無不載王者位天地之中而與天地參故亦大碧虛子陳景元曰王者黔黎之首不敢與天地道為比故云亦也域中有四大者謂道天地王也域者限域也夫道大包宇宙細入秋毫或超象外或處域中自地而上皆屬于天蒼蒼之謂也天在地外地處天內王者人倫之尊居九州之間此皆處于域中故曰域中有四大也而又王者參天地之道而秉萬物之權於四大之中預其一焉莊子曰莫神於天莫富於地莫大於帝王帝王之德配天地故曰王居其一焉穎濱蘇轍曰由道言之則雖天地與王皆不足大也然世之人皆知三者之大而不信道之大也道真仁靜先生曹道沖曰無不化育故曰大無不覆燾故曰大無不持載故曰大人者三才之一非君何以統制域者謂限制之名雖有名而無邊際之實範圍萬物者也凡言天則造物可知矣凡言地則成物可知矣凡言王則人道可知矣靈秀智力莫出於人而王統之大也清源子劉驥曰王亦大者王指人心而言之經所謂心為國主五藏王是也人心潛天而天潛地而地俯仰之間再撫四海恍惚之際經緯萬方亦可謂大矣故域中有四大而王處一焉此使人知自貴自愛而不陷溺其良心也人法地地法天天法道道法自然碧虛子陳景元曰此戒王者當法象二儀取則至道而天下自然治矣夫王者守雌靜則與陰同德其所載無私是法地也又不可守地不變將運剛健則與陽同波其所覆至公是法天也復不可執天不移將因無為則與道同體其所任物咸歸自然是法道自然此謂王者之法天地則至道也非天地道之相法也宜察聖人垂教之深旨不必專事其空言而已矣潁濱蘇轍曰故以實告之人不若地地不若天天不若道道不若自然然使人一日復性則此三者人皆足以盡之矣道真仁靜先生曹道沖曰人與地近形著而位分故法則於地而知剛柔之分地靜而承順法則於天清明剛健崇高至極而未能混於無形故法於道也道無可法自然而已達真子曰道也者固無所法也以其相因而相成相繼而相用固若其法爾王者能盡人道以人道之施為則應於地故人法地也以地道之化養則應於天故地法天也以天之運用則應於道故天法道也以道之充塞則應於自然故道法自然也然則有物混成之初信以為天下之母矣道德真經集注卷之六
