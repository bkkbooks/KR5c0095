body:
  text: 宋鶴林彭耜纂集上德不德章第三十八上德不德是以有德下德不失德是以無德上德無為而無以為下德為之而有以為御注曰孔子不居其聖而為聖之時乃所以有德認而有之自私以失道何德之有不思而得不勉而中不行而至上德也不思則不得不勉則不中不行則不至下德也德有上下此聖賢之所以分歟離形去智通於大同仁義禮智蓋將簡之而弗得故無以為屈折禮樂吁俞仁義以慰天下之心得人之得而不自得其得故有以為碧虛子陳景元曰夫德者得也內得於心外得於物常得而無喪利而不害物得以生謂之德也且道有淺深故德有上下所謂上德者至德也至德者深矣遠矣與物反矣人不見其迹則謂之不德以其含光匿耀支離所為使百姓日用而不知咸曰我之自然而已矣所謂德全者也故曰是以有德谷神子曰上德不德與道同也下德者迹用漸彰至一散因循任物物保其安天下稱之歸美于己雖其德不喪已遠於至德也夫有上德者性受自然之至妙命得元氣之精微神貫天地明並日月無思無慮而心自無為忘功忘名而迹無以為以用也故無用己為也不為而自得也故曰上德無為而無以為夫言下德者降於上德者也性受自然之平淡命得元氣之純和神配陰陽明效日月民皆仰戴咸共樂推麟鳳見而嘉祥來歌謡彰而有以為也故曰下德為之而有以為涑水司馬光曰我無為民自化無以為猶言無用有為也潁濱蘇轍曰聖人縱心所欲不逾矩非有意於德而德自足其下知德之貴勉強以求不失蓋僅自完耳而何德之有無為而有以為之則猶有為也唯無為而無以為之者可謂無為矣其下非為不成然猶有以為之非徒作而無術者也陸佃曰知之者不如忘之者得之者不如冥之者上德者忘之者也故曰上德不德又曰上德無為而無事於為也下德有為而有事於為也劉概曰上德無為而無以為此心迹俱無為者也所謂真空是也真空者聖人所以極高明而其崇以效天者也下德為之而有以為此心迹俱有為者也所謂妙有是也妙有者聖人之所以道中庸而其卑法地者也陳象古曰不德者謂不自矜其德故人仰其德而歸之不失德者謂自矜其德而患失之苟患失之無所不至故人觀其所為而輕之安可更以德言哉書曰滿招損謙受益時乃天道又曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功葉夢得曰道無上下上亦道也下亦道也雖稊稗瓦礫之微而道無不在是以上經言道論其常與非常而已德則有體履之為行施之為政在得為得在失為失在吉為吉在凶為凶故不得不辨其上下德雖道之降然去道未遠猶有通乎道而不自為德者故曰上焉者不德而有德過是則認德而忘道有役其身以求之惟恐其不獲者而德自是微矣故曰下焉者不失德而無德無為者道也德能體之而有無敢欲為之心德猶在焉至於為之而有以為則每下矣清源子劉驥曰虛靜恬淡寂寞無為此天地之道聖人之德也同乎無知其德不離與道為一而不知道之在我也故上德不德是以有德不德者不知有德離形去智同於大通無問其名無窺其情物故自生若彼知之是乃離之以其認而有之自私以失道也故下德不失德是以無德上德出於自然不思而得不行而至故無為而無以為下德出於使然不思則不得不行則不至故為之而有以為黃茂材曰道與德相去一間爾中之謂道不偏之謂德由之謂道不已之謂德道如嬰兒之未孩德如其始孩謂之玄德者其妙不可窮也謂之常德者愈久而不亡也謂之上德者非人所能及也皆足以合於道上德不德無為而無以為非道而何至於下德則去道遠矣林東曰上德近於道故不認德而為德是以有德下德則勤勤於德如恐失之所以無德此德之真者非於勤執而得之也上仁為之而無以為上義為之而有以為上禮為之而莫之應則攘臂而仍之故失道而後德失德而後仁失仁而後義失義而後禮御注曰堯舜性之仁覆天下而非利之也故無以為列敵度宜之謂義以立我以制事能無為乎禮以交物以示人以節文仁義其用多矣則忿爭之心生而乖亂之變起春秋之時一言之不讎一拜之不中兩國為之暴骨則攘臂而仍之尚其患之小者聖人厚於仁而薄於義禮以履之非所處也故上仁則同於德上義則有以為上禮則有莫之應者道不可致故失道而後德德不可至故失德而後仁仁可為也為則近乎義故失仁而後義義可虧也虧則飾以禮故失義而後禮至於禮則離道滋遠而所失滋衆矣碧虛子陳景元曰夫仁者博施兼愛皆可為也可為而無偏私故言上仁有心濟乎群品故言為之功成不居事遂不宰故言而無以為夫義者宜也有所宜必有所虧處于事類而無所不宜故曰上義有宜有利故為之其所為者皆由裁非斷割而有以為故曰上義為之而有以為攘臂謂攘除衣袂以出臂也仍引也夫禮者履也謂履道而行辨上下定貴賤謙恭和柔使無爭心斯禮之本也故稱上焉玉帛交馳威儀相答擎跽曲拳進退顧揖此禮之文也故為末焉莊子曰大禮與天地同節又曰以禮為翼者所以行於世也古聖制禮使人定心氣整容貌故曰為之然而中下之士喪本崇末曲説煩多不能應答故曰而莫之應此失禮之微者也而有怫然作色奮臂仍引指陳去就為爭競之端故曰則攘臂而仍之又失禮之甚者也涑水司馬光曰立制度以強民民不肯從則用刑以威之仍引也字或作扔潁濱蘇轍曰仁義皆不免於為之矣其所以異者仁以無以為為勝義以有以為為功耳德有上下而仁義有上無下何也下德在仁義之間而仁義之下者不足復言故也自德以降而至於禮聖人之所以齊民者極矣故為之而不應則至於攘臂而強之強之而又不應於是刑罰興而甲兵起則徒作而無術矣程大昌曰仁義禮無異道禮即仁義之形諸文為度數者也非别有一禮也老氏既賤仁義則仁義之形而每下者至於有條可畫有數可數者固其所賤也林東曰或以前識繼於禮之後以為智次之説老氏尚謂禮為忠信之薄故不言信其於智則有所謂以智治國國之賊不以智治國國之福非如三綱五常之敘至於仁義禮上者止此尚何下之足言夫禮者忠信之薄而亂之首也前識者道之華而愚之始也是以大丈夫處其厚不處其薄居其實不居其華故去彼取此御注曰凡物不並盛陰陽是也理相奪豫威德是也實厚者貌薄父子之禮是也由是觀之禮繁者實必衰也實衰則偽繼之而爭亂作故曰夫禮者忠信之薄而亂之首也道降而出出而生智以智為鑿揣而鋭之敝精神而妄意度兹謂前識前識則徇末忘本故為道之華心勞而智益困故為愚之始億則屢中此孔豫所以惡子貢在彼者道所去在此者道所尚道所尚則厚而不薄實而無華非夫智足以自知反其性本而不流于事物之末習其敦能之易曰敦復無悔中以自考也敦者厚之至也人生而厚者性也復其性者處其厚而已此大丈夫所以備道而全德碧虛子陳景元曰夫忽道德仁義而專以禮教為用者豈非忠信之薄而亂之首乎若乃尊道德仁義而兼用禮教者是禮之上也則何往而不治哉德和也道理也德無不容仁也道無不理義也義明而物親忠也忠純實而反乎情樂也信行容體而順乎文禮也此足以見老莊之旨於道德仁義禮樂忠信豈有忽棄者乎夫修崇禮教者智也智為先見故曰前識識既先物安能忘懷故以智治國國之賊豈非道之華而愚之始乎若乃藏識藏智何思何慮則反其質素而為大賢矣且禮煩則亂智變則詐此必然之理也大丈夫者剛健純粹有道之士也文中子曰大丈夫恬然無思淡然無慮行乎無路遊乎無怠出乎無門入乎無房屬其精神偃其知見漠然無為而無不為也夫如是則所處自然朴厚而居于上德不置身于薄煩巧也居則忠信而誠實曷嘗華綺而詐偽也是故去彼禮義之淺末取此道德之大本者也涑水司馬光曰忠信禮之本也守其文忘其本則巧偽橫生矣世有臆度屢中人或謂之智而多言數窮未免於愚潁濱蘇轍曰忠信而無禮則忠信不見禮立而忠信之美發越於外君臣父子之間夫婦朋友之際其外粲然而其中無餘矣故順之則治違之則亂治亂之相去其間不能以髮故曰亂之首也聖人玄覽萬物是非得失畢陳於前如鑑之照形無所不見而孰為前後世人視止於目聽止於耳思止於心冥行於萬物之間役智以求識而偶有見焉雖自以為明而不知至愚之自是始也世之鄙夫樂其有得於下而忘其上故喜薄而遺厚采華而棄實非大丈夫孰能去彼取此道真仁靜先生曹道沖曰禮者束以名教加以耻辱克意強説偽而失真禮者詐偽而忠信之誠薄矣忠信既薄豈不犯上而姦諂故為亂之先也不待自然先造智謀預為機術以在道為華非真實也亂真役念求明而反愚也大丈夫有道之士也處純厚而棄浮薄絶華偽而居其真實遠者彼也近者此也近者求諸己遠者求諸人不強知他事而自取己真黃茂材曰古今一時也萬物一物也無有前後之異人以智強推測之或得其一二則自矜耀以為有先見之明而不知其愚莫甚焉何則用智者見物而不見道苟不見道謂之愚可也所謂大丈夫者為其有高世之見而不徇於流俗者也以禮為忠信之薄不處而處於厚以前識為道之華不居而居於實非有高世之見而不徇於流俗者能之乎去彼取此者道也昔之得一章第三十九昔之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為天下貞其致之一也御注曰莊子曰通於一萬事畢致一則不二抱一則不離守一則不遷能知一則無一之不知不能知一則無一之能知昔之得一者體天下之至精物無得而耦之者故確然乎其上者純粹而不雜隤然乎其下者靜止而不變至幽而無形者神也得一則不昧至虛而善應者谷也得一則不窮萬物以精化形故得一以生侯王以獨制衆故得一以為天下正自天地以至于侯王雖上下異位幽明散殊而天之所以清地之所以寧侯王之所以為天下正非他求而外鑠也一以致之而已故曰其致之一也碧虛子陳景元曰一者元氣也莊子曰氣也者虛而待物者也唯道集虛又曰虛室生白吉祥止止天者純陽之氣且天得之故能剛健運動穹窿廣覆垂象清明萬物資始地者純陰之質且地得之故能信順柔弱盤礴厚載安寧不動萬物資生神者妙萬物以為言且神得之故能通變無方反覆不窮正直靈響應物無盡谷者溪之絶深且谷得之故能氣運水注盈滿不竭萬者數之大物者形可見且物得之故能生生成成而不歇滅侯王者人主也且侯王得之故能永有大寶無思不服而為天下平正夫上五事能致清寧靈盈生者皆由君道正之使然也正者得其沖一之謂也涑水司馬光曰一者道之豫物之祖也故莫不賴之以成功以事言之常久不已所謂一也潁濱蘇轍曰一道也物之所以得為物者皆道也天下之人見物而忘道天知其清而已地知其寧而已神知其靈而已谷知其盈而已萬物知其生而已侯王知其為天下貞而已不知其所以得此者皆道存焉耳陸佃曰入於一道將得出於一道將失一者有無之界也列子曰一者形變之始莊子曰一之所起有一而未形天尊地卑故言天而地次之天地之間虛而不屈動而愈出者不可知之神也故神次之萬物盈於天地之間所以生且死者聽乎神而已故言谷而萬物次之侯王者所以法夫四者而以宰萬物者也故侯王次之達真子曰道之混同則歸於一故得一者得其道之混同者也陳象古曰一者大道之妙用也致至也至其妙用之理也葉夢得曰前既離道為德以迹觀之蓋析而有二矣恐天下遂認其二而不知其一者未嘗亡也故於是復極言之一者何也莊周曰泰初有無無有無名一之所起有一而未形此道之將判萬物總焉而不能外者也故曰道生一一生二自是而往巧曆所不能算矣其在易自天一而降積之為天地之五十五衍之為大衍四十九而所謂一者終藏而不見豈非散於天地萬物之間無往而不在人無得而窺之者歟是以自天而清至王侯之貞概而論焉未有不得而能立者黃茂材曰夫盈於天地之間何可以數計皆不離乎一物始於一一即一也一生二二即二一也二生三三即三一也三生萬物萬物即萬一也自此推之至於恆河沙數即恆河沙數一也故知乎一恆河沙數可得而知其致之寧非一乎天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以為貞而貴高將恐蹶御注曰天職生覆地職形載裂則無以覆發則無以載神依人而行者也歇則無所示谷受而不藏者也竭則莫之應聚則精氣為物得一以生故也散則遊魂為變失一以滅故也惟正也故能御萬變而獨立萬物之上無以為正而貴高將不足以自保能無蹶乎碧虛子陳景元曰無以者致誡之辭也陰陽書曰天裂者陽氣之不足君德之衰微也地震者陰氣之有餘臣道之失職也已上雖敘天地等事會歸戒于侯王侯王尚爾况黎庶乎潁濱蘇轍曰致之言極也天不得一未遽裂也地不得一未遽發也神不得一未遽歇也谷不得一未遽竭也萬物不得一未遽滅也侯王不得一未遽蹶也然其極必至於此耳陳象古曰裂則不全發則不靜歇則不久竭則易崩滅則不繼蹶則不安皆失道所致也葉夢得曰不幸而失之為裂為發以至為蹶雖天地之大亦不能自存也此雖未必然而理則有是故以將言之黃茂材曰天無一必裂地無一必發神無一必歇谷無一必竭萬物無一必滅侯王無一必蹶不言必而言將恐者是一未嘗無也故貴以賤為本高以下為基是以侯王自稱孤寡不穀此其以賤為本邪非乎御注曰賤者貴之所恃以為固下者高之所自起世之人睹其末而聖人探其本世之人見其成而聖人察其微故常得一也孤寡不穀名之賤者也而侯王以為稱知所本而已侯王所以貴高而不蹶其以此乎碧虛子陳景元曰夫貴者豈可以自貴哉必由賤者所奉然后貴耳高者豈可自高哉必緣下者所戴然後高耳孤寡不穀凡此三者皆人之鄙惡而侯王以為稱謂者蓋謙以自牧不矜其尊貴若乃豈非以賤為本耶潁濱蘇轍曰天地之大侯王之貴皆一之致夫一果何物也視之不見執之不得則亦天下之至微也此所謂賤且下也昔之為此稱者亦舉其本而遺其末耳陳象古曰是用賤下之道者也自謂孤寡不穀謙之至也易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可逾君子之終也非乎者不可以為非也黃茂材曰夫是一也非特貴者有之賤者亦有之非特高者有之下者亦有之東郭子問於莊子曰道烏乎在曰在螻蟻曰何其下耶曰在稊稗曰何其愈下耶曰在瓦甓曰何其愈甚耶曰在屎溺孤寡不穀未為賤也故致數譽無譽不欲琭琭如玉落落如石御注曰自高以勝物琭貴以賤物強而不知守以柔白而不知守以黑以求譽于世而致數譽則過情之譽暴集無實之毁隨至所以無譽玉貴而石賤一定而不變聖人乘時任物無所底滯萬變無常而吾心常一是真得一者也故不可得而貴賤孟子曰所惡乎執一者謂其執一而廢百也不欲琭琭如玉落落如石非知化之聖不能及此是謂上德碧虛子陳景元曰開元本作故致數輿無輿者言就數輿則有輪轅箱軸等群材之名無有名為輿者合之則輿矣就國求之則有士農工商等萬民之號無有名為國者合之則為國矣然則忽群材而輿何以成之棄萬民而國何以存之此重戒侯王之愛民也有道之君不欲顯耀琭琭如玉冥心韜光落落如石此能守沖一之道為天下正者也潁濱蘇轍曰輪輻蓋軫衡軛轂轊會而為車物物可數而車不可數然後知無有之為車所謂無之以為用者也然則天地將以大為天地耶侯王將以貴為侯王耶大與貴之中有一存焉此其所以為天地侯王者而或莫之知耳故一處貴而非貴處賤而非賤非若玉之琭琭貴而不能賤石之落落賤而不能貴也達真子曰致人之以言尚己者謂之譽凡處至貴則有貴之譽處至高則有高之譽且處至貴至高莫不致譽之速數也侯王雖得致速數之譽心得其道之一忘貴而同賤忘高而同下常若其無譽也故曰故致數譽無譽琭琭者玉之貌也落落者石之貌也玉也石也堅確而不易者也玉者貴之譬則侯王也石者賤之譬則孤寡也玉之貴也不能同乎石之賤石之賤也不能齊乎玉之貴至道之人得一於心者以至貴同至賤故不欲琭琭如玉以至賤同至貴故不欲落落如石非道之得一於心者孰能與此黃茂材曰致就也就車數之為輪為轂為衡為與無有名為車者故成為車此河上公舊説也玉德之美也石質之堅也而不欲如之何也琭琭落落可得而名爾反者道之動章第四十反者道之動弱者道之用天下之物生於有有生於無御注曰天下之理動靜相因強弱相濟斂藏於冬而蕃鮮於春水之性至柔也而攻堅強者莫之能先其此之謂歟然則有無之相生若循環然故無動而生有有極而歸無彼蔽于莫為溺于或使豈道也哉碧虛子陳景元曰反者覆也變也虛靜者物之本物之將生先反復虛靜之原及其變也出虛靜而動之是先反而後動易之復卦剛反動而順以行是以出入無疾此之謂也弱者道之用既反虛靜為道之動則柔弱雌靜實道之用也有一也一者元氣也言天下之萬物皆生於元氣也元氣屬有有光而無象雖有光景出于虛無虛無者道之體也列子曰有形者生於無形則天地安從生又曰形動不生形而生影聲動不生聲而生響無動不生無而生有是故物生於有有生於無涑水司馬光曰一陰一陽之謂道潁濱蘇轍曰復性則靜矣然其寂然不動感而遂通天下之故則動之所自起也道無形無聲天下之弱者莫如道然而天下之至強莫加焉此其所以能用萬物也世不知靜之為動弱之為強故告之以物之所自生者蓋天下之物聞有以母制子而未聞有以子制母者也臨川王安石曰言反不言靜言弱不言強言動則知反之為靜言弱則知用之為強葉夢得曰此猶以論夫一也自其多者數之則一者其反而萬物由之以運則道之動也自貴與高者觀之則一者其弱而萬物資之以立則道之用也夫如是知天下之物生於有則天地至于侯王者是已而有生於無則一固存焉於其間也清源子劉驥曰經云虛無恍惚道之根萬物共本道之元反於此者離道以善故為道之動體於此者至弱而強故為道之用黃茂材曰無生有有生物凡物之生莫知其所以然人能求其所以生者遺以自生豈不長生乎林東曰道本靜矣反之得非動乎天下之物生於有蓋有天地以生之非生於有耶有生於無則無者道也此道之或反或弱而主於生物非有生於無可乎道德真經集注卷之十
