  - {type: variant, offset: 6235, length: 1, content: 七, CK-KZ: 楚靈齊惛秦始皇漢武帝或以殺其身或以禍其子孫人之所毒鬼之所疾未有得免者也臨川王安石曰明則人報之幽則天報之殺人之父人亦殺其父殺人之兄人亦殺其兄人報之也師之所處荆棘生焉大軍之後必有凶年者天報之也劉槪曰以道佐人主者不以兵强天下故孔子對衞靈公之問則曰爼豆之事則嘗聞之矣軍旅之事未之學也葉夢得曰古之善用兵者毒天下而民從之亡國而不失人}
