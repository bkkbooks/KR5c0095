body:
  text: 宋鶴林眞逸彭耜纂集道可道章第一道可道非常道名可名非常名御註曰無始曰道不可言言而非也又曰道不當名可道可名如事物焉如四時焉當可而應代廢代興非眞常也常道常名自本自根未有天地自古以固存碧虚子陳景元曰夫道者杳然難言非神口所能辯故心困焉不能知口辟焉不能議在人靈府之自悟爾謂之無爲自然也涑水司馬光曰世俗之談道者皆曰道體微妙不可名言老子以爲不然曰道亦可言道耳然非常人之所謂道也名亦可强名耳然非常人之所謂名也潁濱蘇轍曰莫非道也而可道者不可常惟不可道而後可常耳今夫仁義禮智此道之可道者也然而仁不可以爲義而禮不可以爲智可道之不可常如此惟不可道然後在仁爲仁在義爲義在禮爲禮在智爲智彼皆不常而道常不變不可道之能常如此道不可道而况可得而名之乎凡名皆其可道者也名既立則圓方曲直之不同不可常矣臨川王安石曰常者莊子謂無古無今無終無始也道本不可道若其可道則是其迹也有其迹則非吾之常道也道本無名有可名則非吾之常名蓋名生於義故有名也葉夢得曰道無物不可得而名聖人無意於言即已苟欲言非名之則無以顯其道故存其不可道不可名者以爲之常而設爲可道之道可名之名以寄其非常此老氏之書所以作也清源子劉驥曰道言其體名言其用可道可名猶百家衆技也各有所長時有所用不該不徧非眞常也黃茂材曰常之爲言長也乆也道與天地相終始其爲長乆豈人所能言哉若使可得而道可得而名則是世人之見何足以爲常經曰吾不知其名字之曰道道惟有一而已何以與名對老子之意欲詳以長久之道示人者耶本來子邵若愚曰大道者至虚至靜無形無名不可以視聽求不可以思議知不可以語言及此無始無終常存不改之道自虚無始化一氣因有一氣之迹是故可道既云可道則非常存之道既有一氣之名則非常存之名無名天地之始有名萬物之母御註曰道常無名天地亦待是而後生莊子所謂生天生地是也未有天地孰得而名之故無名爲天地之始有天地然後萬物生焉故有名爲萬物之母碧虚子陳景元曰無名者指其道而言之也夫萬化未作無其强名但妙本之始即降渾淪之樸將離則易之太極生兩儀也有名者指天地而言之也天施地化茂養萬物亭之毒之如母養子故曰有名萬物之母夫大道杳冥豈係乎有名無名哉聖人立教以明本迹之同異爾涑水司馬光曰天地有形之大者也其始必因於無故名天地之始曰無萬物以形相生其生必因於有故名萬物之母曰有潁濱蘇轍曰自其無名形而爲天地天地位而名始立矣自其有名播而爲萬物萬物育而名不可勝載矣故無名者道之體而有名者道之用也道眞仁靜先生曹道冲曰無名謂道本無名非有非無不涉器位所謂生天地始萬物者也分靈散景降在人身則爲神性大道虚寂次道者德也德者得也萬物得之而成是生眞一一者有名之始而冲氣爲一謂之太極太極生天地冲氣委和降於胎中積者爲形妙者爲息是謂命也人生天地中天地無爲因人顯用三才備矣萬物成矣故曰母葉夢得曰昔者佛氏蓋嘗爲色空之說自無適有謂之色色出於無則雖色而未嘗不空自有入無謂之空空反於有則雖空而未嘗非色色與空雖黃帝神禹不能窺其間矣聖人亦何心焉即有以爲有無物而非有故以有名爲萬物之母天地亦由之而生即無以爲無無物而非無故以無名爲天地之始萬物亦由之而隱清源子劉驥曰大道無形生育天地方其未有天地孰得而名之故無名天地之始大道無名長養萬物及其既有萬物則有形之可名故有名萬物之母黃茂材曰天地之始其果無乎若其果無孰從而始無名非無也不可得而名故爾及其既有其果有乎亦强爲之名耳經曰惚兮恍其中有象恍兮惚其中有物又曰有物混成皆强名也母者謂其能生物也有天地然後有萬物故先天地後及萬物其言次序如是程大昌曰天地也者總司造化開闔作復在域中既極其大矣而老氏又即天地之上别立一目而名之曰無且曰此之無者可以名爲天地之始也諸如此類皆儒流疑以爲虚夸無實者也然而易之兩儀即天地也而生兩儀者實爲太極太極也者非天非地而能該天地以立於是時也無儀可仿無數可數故老氏易其名而命以爲無也凡老子之謂無約其等級則與太極正相應也名雖異而理正同也又曰老氏之形容此有凡三易其名而實同一理借數言之則爲一一者可以生萬而未至爲萬也仿形而言則爲像對器而言則爲樸曰象曰樸又皆可以爲形爲器而其形器未及凝結者也是故上之已不爲無而下之未至爲物則此之謂有者無古今彼此之間而常爲物生之祖也本來子邵若愚曰未現一氣已前無形無名之時此即天地之始此不可言之道縁有一氣之名爲生萬物之母此可言之道乃知我身從一而有人能以一爲法悟入而見大道常無欲以觀其妙常有欲以觀其徼御註曰不立一物兹謂常無不廢一物兹謂常有常無在理其上不皦天下之至精也故觀其妙常有在事其下不昩天下之至變也故觀其徼有無二境徼妙寓焉大智並觀乃無不可碧虚子陳景元曰欲者逐境生心也妙者要也又微之極也徼者邊隅也大道邊有小路曰徼又歸也夫虚無之道寂然不動則曰無欲感孕萬物則曰有欲無欲觀妙守虚無也有欲觀徼謂存思也常謂眞常即大道也無欲有欲即道之應用也涑水司馬光曰徼邊際也萬物既有則彼無者宜若無所用矣然聖人常存無不去欲以窮神化之微妙也無既可貴則彼有者宜若無所用矣然聖人常存有不去欲以立萬事之邊際也苟專用無而棄有則蕩然流散所謂有之以爲利無之以爲用也潁濱蘇轍曰聖人體道以爲天下用入於衆有而常無將以觀其妙也體其至無而常有將以觀其徼也若夫行於其徼而不知其妙則粗而不神矣留於其妙而不知其徼則精而不遍矣臨川王安石曰蓋有無者若東西之相反而不可以相無也故非有則無以見無而非無則無以出有有無之變更出迭入而未離乎道此則聖人之所謂神者矣易曰無思也無爲也寂然不動感而遂通天下之故此之謂也蓋昔之聖人常以其無思無爲以觀其妙常以感而遂通天下之故以觀其徼徼妙並得而無所偏取也道眞仁靜先生曹道冲曰聖人雖有動靜以常爲主有欲謂聖人之動徼者邊也夫以無窮之妙以觀有際之物何止邊徼無不照矣葉夢得曰惟聖人爲能超乎有無之外而游乎有無之間我欲求之於無故觀之於空而妙者在焉莊周之所謂睹無者天地之友是也我欲求之於有故觀之於有而徼者在焉莊周之所謂睹有者昔之君子是也黃茂材曰經言不欲寡欲可欲多矣今若曰無欲有欲則與經之言相符然無欲謂之常可也有欲謂之常可乎曰自有物以來九竅者胎生八竅者卵生皆因於欲生復生生寧有盡時故有欲亦謂之常人知無之出於道而不知有之亦出於道遂欲屏心息慮入山林遠妻子流而入於釋氏空寂之說夫豈知有無同出於玄者哉程大昌曰形而上者謂之道形而下者謂之器道即器也器即道也特所形有上下而非判然二物也此之妙徼即易之道器矣此兩者同出而異名同謂之玄玄之又玄衆妙之門御註曰道本無相孰爲徼妙物我同根是非一氣故同謂之玄世之惑者舍妄求眞去眞益遠殊不知有無者特名之異耳素問曰玄生神易曰神也者妙萬物而爲言也妙而小之謂玄玄者天之色也孔子作易至說卦然後言妙而老氏以此首篇聖人之言相爲終始潁濱蘇轍曰以形而言有無信兩矣安知無運而爲有有復而爲無未嘗不一哉其名雖異其本則一知本之一也則玄矣凡遠而無所至極者其色必玄故老子常以玄寄極也言玄則至矣然猶有玄之心在焉玄之又玄則盡矣不可以有加矣衆妙之所從出也道眞仁靜先生曹道冲曰兩者謂無欲與有欲靜爲體動爲用靜合於無動合於有動靜殊名皆本於道同會於玄暫異終同也玄謂淵默無象又玄謂通變無極或入於機或出於機開闔陰陽出入無有故曰衆妙之門清源子劉驥曰學者當自有以入無由徼以至妙原始要終未嘗不同故出而異名同謂之玄玄者天之色所謂遠而無所至極者也玄之又玄則神之又神深之又深入無窮之門游無極之野與虚無同其體與混元同其功萬物之妙皆由此出故曰衆妙之門黃茂材曰南伯子葵問女偊曰子獨惡乎聞之曰聞諸副墨之子副墨之子聞諸洛誦之孫洛誦之孫聞之瞻明瞻明聞之聶許聶許聞之需役需役聞之於謳於謳聞之玄冥玄冥聞之參寥參寥聞之疑始夫道愈微而愈有愈窮而愈不可盡女偊九聞而至疑始玄之又玄可見於此所以爲衆妙之門也歟林東曰由徼以之妙本末一致表裏相須故同出而異名而皆謂之玄玄者如天之正色言遠而無極也所謂幽深微妙道法自然者也東坡衆妙掌記以爲道一而已安有衆耶又以既謂之妙雖衆可也此謂衆妙之門天下皆知章第二天下皆知美之爲美斯惡已皆知善之爲善斯不善已御註曰道無異相孰爲美惡性本一致孰爲善否世之所美者爲神奇所惡者爲臭腐神奇復化爲臭腐臭腐復化爲神奇美與惡奚辨昔之所是今或非之今之所棄後或用之善與不善奚擇碧虚子陳景元曰夫美善生於妄情凡人以情之所好爲美而情之所惡爲惡縱己妄情非惡而何以己之所是爲善而己之所非爲不善縱己是非安有美乎夫聖人豈無美善蓋有而不矜同於無也不矜則德全同無則害遠德全害遠美善盡矣潁濱蘇轍曰天下以形名言美惡其所謂美且善者豈信美且善哉陸佃曰美至於無美天下之眞美也善至於無善天下之眞善也眞美斯離天下皆知美之爲美眞善斯散天下皆知善之爲善劉涇曰妙名立則美善生矣徼名立則惡不善生矣葉夢得曰不有惡也夫孰爲美不有不善也夫孰爲善美生於惡則美亦惡矣善生於不善則善亦不善矣清源子劉驥曰混沌未判萬象同體二炁既分物物爲對既謂之美純樸已殘必有惡爲之對既謂之善則情性已離必有不善爲之對黃茂材曰天下之所謂美不足以爲美天下之所謂善不足以爲善然則何以爲美且善知乎此者可與入道故有無之相生難易之相成長短之相形高下之相傾音聲之相和前後之相隨御註曰大易未判萬象同體兩儀既生物物爲對此六對者群變所交百慮所生殊途所起世之人所以陷溺而不能自出者也無動而生有有復歸無故曰有無之相生有涉險之難則知行地之易故曰難易之相成長短之相形若尺寸是也高下之相傾若山澤是也聲舉而響應故曰聲音之相和形動而影從故曰前後之相隨陰陽之運四時之行萬物之理俄造而有倏化而無其難也若有爲以經世其易也若無爲而適己性長非所斷性短非所續天之自高地之自下鼓宫而宫動鼔角而角應春先而夏從長先而少從對待之境雖皆道之所寓而去道也遠矣碧虚子陳景元曰此六事者因矜美善動入有爲有爲既彰偏執斯起偏執則殘賊互生物失其性涑水司馬光曰凡事有形迹者必不可齊不齊則爭爭則亂亂則窮故聖人不貴潁濱蘇轍曰彼不知有無難易長短高下聲音前後之相生相奪皆非其正也方且自以爲長而有長於我者臨之斯則短矣方且自以爲前而有前於我者先之斯則後矣臨川王安石曰有之與無難之與易高之與下音之與聲前之與後是皆不免有所對唯能兼忘此六者則可以入神可以入神則無對於天地之間矣陸佃曰有無者以言乎其道難易者以言乎其德長短者以言乎其體高下者以言乎其位聲音者以言乎其交感前後者以言乎其終始此勢之然也劉涇曰得鹿者俄失之失馬者俄得之得失無端相生之類也水者不車陸者不舟巧拙無端相成之類也冥陵朝菌壽夭無端相形之類也王公乞人貴賤無端相傾之類也夢飲酒者旦而哭泣哀樂無端相和之類也嬰孩少壯老耄死亡無端相隨之類也清源子劉驥曰美或爲惡善或爲不善是猶有無之相生難易之相成長短之相形高下之相傾聲音之相和前後之相隨此六對者可否相因終始反覆非天下之至正也昔之所是今或非之今之所棄後或用之經所謂正或爲奇善或爲妖是以聖人處無爲之事行不言之教御註曰處無爲之事莊子所謂無爲而用天下也行不言之教易所謂以神道設教而天下服也爲則有成虧言則有當愆曾未免乎累豈聖人所以獨立於萬物之上而物之所不能累歟碧虚子陳景元曰無爲非拱默也謂聖人美善都忘滅情復性自然民任其能物安其分上下無擾故云處無爲之事理契言忘故曰行不言之教潁濱蘇轍曰當事而爲無爲之之心當教而言無言之之意夫是以岀於長短之度離於先後之數非美非惡非善非不善而天下何足以知之王雱曰夫聖人無心以百姓心爲心雖事而未嘗涉爲之之迹雖教而未嘗發言之之意故事以之濟教以之行而吾寂然未始有言爲之累而天下亦因得以反常而復樸也夫惟無累故雖寄形陰陽之間而造化不能移彼六對者烏能擾之哉陸佃曰夫聖人處無爲之事行不言之教將以使人冥於眞善混於眞美復歸于樸而與天地造物爲友者矣清源子劉驥曰聖人體道在己其用心不勞其應物無方黃茂材曰相生相成相形相傾相和相隨天下事物莫不皆然聖人與人混處其中亦豈能捨是哉其處事也無爲而爲其行教也不言而言程大昌曰此章之指正惡夫好尚外形而人得仿以爲僞也萬物作而不辭生而不有爲而不恃功成不居夫惟不居是以不去御註曰萬物並作隨感而應若鑑對形妍醜畢現若谷應聲美惡皆赴無所辭也故曰作而不辭自形自化自生自色各極其高大而遂其性孰有之哉故曰生而不有𩐎萬物而不爲戾澤及萬世而不爲仁覆載天地彫刻衆形而不爲巧故曰爲而不恃四時之運功成者去天之道也聖人體之故功蓋天下而似不自己認而有之亦已惑矣故曰功成不居有居則有去古今是也在己無居物莫能遷適來時也適去順也何加損焉故曰夫惟不居是以不去碧虚子陳景元曰作動也聖人在宥天下無事無爲故百姓耕而食織而衣含餔而熙鼔腹而遊樂其性分而動又萬物自生卓然獨化不爲已有群品營爲各適其性不恃己德功成事遂道洽於物心遊姑射之山不居萬民之上此聖人之全德也夫聖人功同造化使萬物咸得其極而忘名忘己不以寳位爲己有故民莫覺莫知是以其道不喪其德不去也穎濱蘇轍曰萬物爲我作而我無所辭我生之爲之而未嘗有未嘗恃至於成功亦未嘗以自居也聖人居於貧賤而無貧賤之憂居於富貴而無富貴之累此所謂不居也我且不居彼尚何從去哉此則居之至也王雱曰形名已降莫不代謝惟道無體物莫能遷聖人體道故充塞無外而未嘗有物應接萬變而未嘗有心如是則豈以適然之事攬以爲己功而固有之哉夫然後離六對之境絶美惡之名越生死流處常住法也持此心以涉世則功名雖高豈有充滿之累乎道眞仁靜先生曹道冲曰辭拒也聖人之道猶太空萬物動作岀没往來於其中任其自爲未嘗辭而不受納而乆留生而不有不以能生爲己有葉夢得曰萬物作吾與之作而不辭生吾與之生而不有方其爲時固不自恃適然成功吾何認而居焉此聖人所以由乎道而終無名也不尚賢章第三不尚賢使民不爭不貴難得之貨使民不爲盜不見可欲使心不亂御註曰尚賢則多知至於天下大駭儒墨畢起貴貨則多欲至於正晝爲盜日中穴阫不尚賢則民各定其性命之分而無夸跂故曰不爭不貴貨則民各安其性命之情而無覬覦故曰不爲盜人之有欲决性命之情以爭之而攘奪誕謾無所不至伯夷見名之可欲餓於首陽之上盜跖見利之可欲暴於東陵之下其熱焦火其寒凝水故其心則憒亂僨驕而不可係道至於聖人者不就利不違害不樂壽不哀夭不榮通不醜窮則敦爲可欲欲慮不萌吾心湛然有感斯應止而無所礙動而無所逐也孰能亂之孔子四十而不惑孟子曰我四十不動心碧虚子陳景元曰夫人君之謙下雌靜不矜尚己之賢能則民之從化如風靡草柔遜是守何有爭乎經曰我無爲而民自化我好靜而民自正難得之貨爲金玉珠犀也言上化清靜民務耕織藏金於山捐珠於淵不利貨財不近貴富則民無貪盜之心矣可欲者謂外物惑情令人生可尚愛欲之心也而曰不見者非遠絶不見也謂不以見爲見而爲無爲也若乃人君見外物而無可尚愛欲之心者是不爲色塵所染則性源清靜恬澹而復其眞一矣涑水司馬光曰賢之不可不尚人皆知之至其末流之弊則爭名而長亂故老子矯之欲人尚其實而不尚其名也潁濱蘇轍曰聖人未嘗不用賢也獨不尚之爾未嘗棄難得之貨也獨不貴之爾未嘗去可欲也獨不見之爾夫是以賢者用而民不爭難得之貨可欲之事畢效於前而盜賊禍亂不起臨川王安石曰尚賢則善也不貴難得之貨爲盜惡也二者皆不欲何也蓋善者惡之對也有善必有其惡皆使善惡俱忘也世之言欲者有二焉有可欲之欲有不可欲之欲若孟子謂可欲之謂善若目之於色耳之於聲鼻之於臭是不可欲之欲也葉夢得曰民失其性不夸於名則溺於利尚賢名也貴貨利也孟子曰養心莫善於寡欲故舉是二者以見吾不示之所欲得則烏有亂其心者哉黃茂材曰不見可欲非閉其目而不之見也物之交於吾前而動於吾心者甚多將不之見其可得乎惟能見其無有可欲之處然後不足以亂吾心毛嬙麗姬天下之美也而魚見之深入鳥見之高飛是以聖人之治虚其心實其腹弱其志强其骨常使民無知無欲御註曰谷以虚故應鑑以虚故照管籥以虚故受耳以虚故能聽目以虚故能視鼻以虚故能齅有實其中則有礙於此聖人心虚則公聽並觀而無好惡之情腹實則贍足平泰而無貪求之念豈賢之可尚貨之足貴哉志者心之所之骨者體之所立志强則或徇名而不息或逐貨而無厭或伐其功或矜其能去道益遠骨弱則行流散徙與物相刃相靡胥淪溺而不返聖人之志每自下也而人高之每自後也而人先之知其雄守其雌知其榮守其辱是之謂弱其志正以止之萬物莫能遷固以執之萬變莫能傾不壞之相若廣成子者千二百歲而形未嘗衰是之謂强其骨清源子劉驥曰虚其心者物我兼忘也實其腹者精神内守也物我兼忘則欲慮不萌而志自弱矣精神内守則形體充實而骨自强矣弱其志則貴乎無知强其骨則貴乎無欲故常使民無知無欲也黃茂材曰老子之道深戒乎强今强其骨何也戒乎强者惡其與物爭也强其骨者自强也使夫知者不敢爲也爲無爲則無不治矣御註曰辯者不敢騁其詞勇者不敢奮其忮能者不敢矜其材智者不敢施其察作聰明務機巧滋法令以蓋其衆聖人皆禁而止之此所謂使夫知者不敢爲也聖人之治豈棄人絶物而恝然自立於無事之地哉爲出於無爲而已清源子劉驥曰聖人之道虚無自然不可爲也爲者敗之執者失之故使夫知者不敢爲也爲無爲則其爲出於不爲自然之妙用無不治矣此莊子所謂游心於淡合氣於漠順物自然無容私焉而天下治道德眞經集註卷之一
