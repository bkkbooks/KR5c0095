body:
  text: 宋鶴林彭耜纂集道者萬物之奧章第六十二道者萬物之奧也碧虛子陳景元曰夫道也者包括無外萬物資始最深最奧為庶品之根本無有逃其術內者潁濱蘇轍曰凡物之見於外者皆其門堂也道之在物譬如其奧物皆有之而人莫之見耳清源子劉驥曰西升經云道深甚奧虛無之淵言道為萬類之淵藪無物不藴藏也莫神於天道實覆之莫富於地道實載之天地之大尚不離於覆載之內况其他乎黃茂村曰物生於三三生於二二生於一一生於道則道也者豈不為萬物之奧乎程大昌曰道之播而出也為有有之又出也為形形具而物有其質及其在人則德仁義禮皆是物也故物者道之邊際而道者萬物之藴奧也善人之寶不善人之所保碧虛子陳景元曰善人謂上士也上士聞道勤而行之鍊質資神固守妙本以為長久之寶也不善人謂下士也下士聞道而大笑之及其忤道悖德履凶踐禍思欲反復元吉咸仰道之所保庇也涑水司馬光曰守而用之依於有道以自安潁濱蘇轍曰夫惟賢者得而有之故曰善人之寶愚者雖不能有然而非道則不能安也故曰不善人之所保臨川王安石曰莫非道也善人求之足以至於道不善而求之則足以免於罪道真仁靜先生曹道沖曰小人雖不善略知道亦能自保其身黃茂村曰道無善無不善善人得之為寶不善人得之可資以安程大昌曰善人者不善人之反也善人寶之則不善人且將背而遠之矣而此之所寶彼亦保之其理何也孔子曰誰能出不由户何莫由斯道也美言可以市尊行可以加於人人之不善何棄之有碧虛子陳景元曰此釋不善人之所保也無言無行之夫尚假甘美之言自尊之行可以奪衆貨之賈可以升稠人之上又況有道者乎穎濱蘇轍曰蓋道不遠人而人自遠之今誠有人美言之則可以為市於世尊行之則可以加於人矣朝為不義而夕聞大道妄盡而性復雖欲指其不善不可得也而又安可棄之哉清源子劉驥曰美言可以市言市之所同知也尊行可以加於人言人之所能行也所以聖人常善救人而無棄人黃茂材曰經曰天下皆知善之為善斯不善已美言尊行天下所謂善也未足以語道故立天子置三公雖有拱璧以先駟馬不如坐進此道穎濱蘇轍曰立天子置三公將以道救人耳雖有拱璧之貴駟馬之良而進之不如進此道之多也臨川王安石曰立天子置三公雖有合拱之璧先乘駟馬足以迎賢者之來而不如坐進此道而已道真仁靜先生曹道沖曰曰以駟馬璧玉遍求賢俊不如端居進道則不召自來矣葉夢得曰駟馬貴矣而先之以拱璧世必以是為寶非吾所謂寶也清源子劉驥曰立天子以化之置三公以佐之雖有拱璧之寶以先駟馬之車然出而治人也不如坐進此道黃茂材曰魏文侯聞田子方之言形解而不欲動口鉗而不欲言曰吾所學者真土梗耳夫魏真為我纍耳然則貴為天子輔以三公加之拱璧駟馬之榮不如坐進此道亦可知矣程大昌曰坐之為言安其所而不他猶坐忘之坐也古之所以貴此道者何也不曰求以得有罪以免邪故為天下貴御注曰求則得之求在我者也古之人所以求之于陰陽度數而未得者求在外故也惡者遷善愚者為哲此有罪所以免歟故道之善救者如此碧虛子陳景元曰耶者嘆美之詞也潁濱蘇轍曰道本在我人患不求求則得之矣道無功罪人患不知知則凡罪不能污也王雱曰求以得故善人寶之有罪以免故不善人保之葉夢得曰夫婦之愚未有求道而不得一有聞焉雖向之嘗以為罪者可以一洗皆空則道之為貴果在此不在彼也清源子劉驥曰古之得道者出乎天地陰陽度數之外禍亦不至福亦不來禍福無有烏有人災程大昌曰若其昔嘗暴棄溺於不善矣今而回心向道則亦受而誨之未嘗追咎既住也為無為章第六十三為無為事無事味無味大小多少報怨以德御注曰聖人應物之有體道之無於斯三者概可見矣大小言形多少言數物量無窮不可為倪大而不多小而不少則怨恩之報孰睹其辨聖人所以同萬有於一無能成其大碧虛子陳景元曰夫心不動則虛明虛明則衆妙可觀矣身不勞則實厚實厚則精神不虧矣口不嗜則恬漠恬漠則靈液不竭矣又解味無味者不味是非美惡之言而味大道無味之言經曰道之出口淡乎其無味也潁濱蘇轍曰聖人為無為故無所不為事無事故無所不事味無味故無所不味其於大小多少一以道遇之而已蓋人情之所不忘者怨也然及其愛惡之情忘則報怨猶報德也王雱曰大小多少者畏事之小如大謹事之少如多莊子曰不忽於人報怨以德者以直報怨者事也以德報怨者得也事則吉凶與民同患故種種色相一不可廢若夫德則不見有物安得怨乎如上三事體道者也方其體道故當如此爾舉怨而以德則知無所不用德道真仁靜先生曹道沖曰世間之物與事不過大小多少道一以貫之報怨以德仇讎怨絶報怨以怨相報無盡清源子劉驥曰聖人體道在己與天地同其德與混元同其功不為而為不作而作自然而然也故為出於無為事出於無事味出於無味其道雖大而本甚小故言大小其用雖多而要甚少故言多少大小者含太虛於方寸多少者總萬有于真一大小多少則大同於物而萬物與我為一何怨之有此言報怨以德足見聖人仁民愛物之廣大如天地之無不覆載所以能體道之大也黃茂材曰道無為也而有無為之為道無事也而有無事之事道無味也而有無味之味天下莫大乎秋毫之末而太山為小何形之小大莫壽乎殤子而彭祖為夭何數之多少雖有忮心之人不怨飄瓦又何怨何德其能齊小大一多少平怨德如此圖難於其易為大於其細天下之難事必作於易天下之大事必作於細是以聖人終不為大故能成其大夫輕諾必寡信多易必多難是以聖人由難之故終無難矣碧虛子陳景元曰圖度其始易之時則於終無難矣營為於初細之日則於後無大矣嚴君平曰是以大難之將生也猶風邪之中人也未然之時慎之不來在於皮毛湯尉去之入於湊理微針取之在於臟腑百藥除之入於骨髓天地不能變造化不能治故曰天下難事必作於易潁濱蘇轍曰世人莫不畏大而侮小難多而易少至於難而後圖大而後為則事常不濟矣聖人齊大小一多少無所不畏無所不難而安有不濟者哉陸佃曰天下難事必作於易天下大事必作於細既謹矣又當守之以謙故曰聖人終不為大故能成其大陳象古曰易者難之基細者大之本故難易之相尋大小之相續如循環之無端聖人知其然信其理故保小守下而已清源子劉驥曰聖人抱道懷德不離乎方寸之中自知不自見自愛不自貴故終不為大然方寸之中真性之內無不忘也無不有也淡然無極而衆美從之此天地之道聖人之德也故能成其大輕諾者其後必寡信多易者其後必多難聖人之於道勤而行之猶以為難故能窮理盡性以至於命而終無難也其安易持章第六十四其安易持其未兆易謀其脆易泮其微易散為之於未有治之於未亂御注曰安者危之對未兆者已形之對脆者堅之對微者著之對持之於安則無危謀之於未兆則不形聖人之知幾也脆者泮之則不至於堅冰微者散之則不著此賢人之殆庶幾也奔壘之車沈流之航聖人無所用智焉用智於未奔沈所謂為之於未有治之於未亂潁濱蘇轍曰方其未有持而謀之足矣及其將然非泮而散之不去也然猶愈於既成也故為之於未有者上也治之於未亂者次也陸佃曰其安易持其未兆易謀此言造理而悟也其脆易破其微易散此言造形而悟也清源子劉驥曰身乃神之車神之舍神之主也主人安靜神即居之主人躁動神即去之故其安易持患生不意禍生所忽審其未兆而謀之乘其微脆泮而散之則易矣及其禍患已成而後謀之是猶奔壘之車沈流之航聖人無所施其智巧聖人用智於未奔沈故為之於未有治之於未亂去其害道者而已黃茂材曰當其安而持之不待於已危故易持當其未兆而謀之不待於已形故易謀當其脆而泮之不待於已堅故易泮當其微而散之不待於已著故易散為於未有之前何為不成治於未亂之際何治不濟而不謂之易為易治者其易可知矣合抱之木生於毫末九層之臺起於纍土千里之行始於足下御注曰有形之類大必滋於小高必基於下遠必自於近其作始也簡其將畢也必巨聖人見端而思末睹指而知歸碧虛子陳景元曰此三者喻不見幾夫患不預防惡不漸杜其猶植木乎初生於毫末可拔而絶之及其合抱也本據乎陰崖梢侵於陽嶺青青百尋鬱蔽日月惡可伐哉又如築臺乎起土於一畚可蹴而圯之及其九層也聳百仞之高出乎中天擬丘陵之大廣乎數畝惡可毁哉又如遠行乎始登於跬步可旋踵而返及其千里也長川渺彌峻嶺巇嶮途隘而可畏路僻而多岐惡可還哉清源子劉驥曰神聖之道積習而成雖可以頓悟不可以頓進日月有數大小有定聖功生焉神明出焉由小至大猶合抱之於毫末從卑至高猶九層之於纍土自近及遠猶千里之於足下黃茂村曰合抱之木天下以為大也大生於小故知合抱即毫末也九層之臺天下以為高也高起於下故知九層即纍土也千里之行天下以為遠也遠始自近故知千里即足下也然則物之小者下者近者其可忽諸為者敗之執者失之是以聖人無為故無敗無執故無失故民之從事常於幾成而敗之慎終如始則無敗事矣碧虛子陳景元曰為營為也執執著也敗起於有為不為則何敗之有失因於有執不執則何失之有是以聖人稟高明之性措意不在小成而常以虛靜恬淡寂寞無為為心自然無為無執無敗無失幾近也言世俗之人雖從務於善事皆有始而無卒先勤而後墮常以功業近成而不能戒謹乃復亡敗也若能謹末如初始終如一則所為無不成矣豈有敗事也詩曰靡不有初鮮克有終潁濱蘇轍曰治亂禍福之來皆如彼三者積小以成大聖人待之以無為守之以無執故能使福自生使禍自亡譬如種苗深而厚耔耘之及秋自穰譬如被盜危坐而熟視之盜將自却世人不知物之自然以為非為不成非執不留故常與禍爭勝與福生贅是以禍至於不救福至於不成蓋其理然也聖人知有為之害不以人助天始終皆因其自然故無不成者又曰世人心存於得喪方事之微猶有不知而聽其自然者及見其幾成而重失之則未有不以為敗之者矣故曰慎終如始則無敗事矣陳象古曰極力有為為極必敗極力以執執極必失葉夢得曰世固未嘗有成敗以吾有為故成者必敗世固未嘗有得失以吾有執故得者必失此民之所以從事而不得不謹者也是以聖人欲不欲不貴難得之貨學不學以復衆人之所過以輔萬物之自然而不敢為碧虛子陳景元曰難得之貨謂金玉珠犀也世俗以不欲為憂聖人以不欲為樂聖人之清靜節儉世俗之食濁奢侈是以世俗之所不欲者乃聖人之所欲也故視金玉如遺土也世俗損天真以務外學而失其分內之性聖人守自然而不學保其分內之天和然世俗以不學為過聖人以不學為真學故曰學不學以復衆人之所過穎濱蘇轍曰人皆徇其所欲以傷物信其所學以害理聖人非無欲也欲而不欲故雖欲而不傷於物非無學也學而不學故雖學而不害於理然後內外空明廓然無為可以輔萬物之自然而待其自成矣劉概曰欲衆人之所不欲故曰欲不欲不欲衆人之所欲故曰不貴難得之貨學衆人之所不學故曰學不學不學衆人之所學故曰復衆人之所過達真子曰欲之所先莫甚於難得之貨學之所失莫甚於衆人之所過動不知靜為不知止皆所謂過也聖人欲期於不欲所以不貴難得之貨學期於不學所以復衆人之所過若是則不有其為執之蔽也故曰以輔萬物之自然清源子劉驥曰聖人非無欲也欲人之所不欲不以物易性故不貴難得之貨非無學也學人之所不學不以博溺心故以復衆人之所過反其性情而復其初而已不益生不助長順物自然無容私焉而天下治故以輔萬物之自然而不敢為黃茂材曰道無欲也欲不欲所以求在我也外物又何足貴天下之物各有自然之理愚者不及智者過之與其過也寧不及故刳心去智學所不學輔物自然而已何敢為哉古之善為道章第六十五古之善為道者非以明民將以愚之御注曰民可使由之不可使知之三代而下釋夫恬淡無為而悅夫啍啍之意屈折禮樂以正天下之形吁俞仁義以慰天下之心將以明民也名曰治之而亂孰甚焉涑水司馬光曰去華務實還淳反朴穎濱蘇轍曰古之所謂智者知道之大全而覽於物之終始故足貴也凡民不足以知此而溺於小智以察為明則智之害多矣故聖人以道治民非以明之將以愚之耳蓋使之無知無欲而聽上之所為則民雖有過亦小矣道真仁靜先生曹道沖曰智則生姦愚則反朴達真子曰用其光復歸其明古之善為道者欲使民復歸其明是謂非以明民也欲使斂明若愚是謂將以愚之也葉夢得曰自道而降民日趨於偽不患其不明而患其明之過故聖人逆為之防而欲以道愚之也民之難治以其智多御注曰天下每每大亂罪在於好智碧虛子陳景元曰民之多智則姦宄生焉雖有法令而無所畏故曰難治也夫弓弩畢弋機變之智多則鳥亂於上矣鈎餌綱罟曹笱之智多則魚亂於水矣削格羅落罝罘之智多則獸亂於澤矣智詐漸毒頡滑堅白解垢同異之變多則俗惑於辨矣故天下每每大亂故以智治國國之賊御注曰法出姦生涑水司馬光曰上下相欺潁濱蘇轍曰吾以智御人人亦以智應之而上下交相賊矣陳象古曰用智則失其自然故喻之以賊不以智治國國之福御注曰焚符破璽而民鄙朴掊斗折衡而民不爭涑水司馬光曰王道正直達真子曰以智治國如莊子所謂開人也開人者賊生不以智治國如莊子所謂開天也開天者德生清源子劉驥曰不以智治國則忘情去欲返本復朴故國之福知此兩者亦楷式御注曰知此兩者則知所以治國知所以治國故民則而象之以為楷式碧虛子陳景元曰兩者謂用智與不用智道真仁靜先生曹道沖曰可為後世楷模陳象古曰楷式不可渝也常知楷式是謂玄德玄德深矣遠矣與物反矣然後乃至大順御注曰玄者天之色常知楷式而不用其智則與天合德深不可測遠不可窮獨立乎萬物之上物無得而偶之碧虛子陳景元曰人君常知福可任之賊可去之致黔首於富壽是有深冥之德又觀其迹與物違戾究其理則與民同歸涑水司馬光曰物情莫不貴智而有玄德者獨賤之雖反於物乃順於道潁濱蘇轍曰吾之所貴者德也物之所貴者智也德與智固相反然智之所順者小而德之所順者大矣達真子曰然則此者能與物反歸於道也凡以道則大順非道則大逆黃茂材曰物皆強吾獨弱物皆動吾獨靜物皆華吾獨朴物皆死吾獨生非為與物反乎能反於物者可以至大順江海為百谷王章第六十六江海所以能為百谷王者以其善下之故能為百谷王御注曰王有歸往之義君能下下則民歸之如水之就下碧虛子陳景元曰開元御疏曰江海所以能令百川朝宗而為王者以其善居下流之所致也易云地道變盈而流謙清源子劉驥曰聖人體江海之善下所以懷微妙抱質朴虛空無為非欲於道道自歸之以至天地之精萬物之靈莫不歸之經所謂執大象天下往亦此之謂也黃茂材曰此章所以重發明大國者下流章之義以江海喻之又見其道之大而能下者也孰得而爭之程大昌曰孟子曰以善服人者未有能服人者也有其善而能下人則天下歸之如百谷之歸江海矣是以聖人欲上人以其言下之欲先人以其身後之是以聖人處上而人不重處前而人不害是以天下樂推而不厭以其不爭故天下莫能與之爭御注曰易於屯之初曰以貴下賤大得民也得其民者得其心也處上而人不重則從之也輕處前而人不害則利之者衆若是者無思不服故不厭易曰百姓與能碧虛子陳景元曰陸希聲曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙之為德卑以自牧故江海以謙為德而為百谷所歸往聖人以謙為德而為天下所先上夫聖人豈欲先上哉天下樂推而不厭耳所以言先上者舉聖人以勸衆人耳然則聖人之處先上者豈爭而得之耶書曰汝惟不矜故天下莫與汝爭能汝惟不伐故天下莫與汝爭功此之謂也潁濱蘇轍曰聖人非欲上人先人也蓋下之後之其道不得不上且先耳王雱曰聖人豈計利而為此哉亦德而已矣德下之則形上矣德後之則形先矣故常為天下貴陳象古曰孤寡不穀以言下之也菲飲食而致孝乎鬼神惡衣服而致美乎黼冕卑宫室而盡力乎溝洫以身後之也道德真經集注卷之十五
